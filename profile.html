<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Profile</title>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <style>
    :root {
      --pa: #22d3ee;
      --pa-rgb: 34,211,238;
      --pf: system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:var(--pf);color:#e8e8ff;background:#070b18}
    body{position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(0,229,255,.1),transparent 38%),radial-gradient(circle at 80% 90%,rgba(168,85,247,.14),transparent 40%),#070b18;z-index:0;pointer-events:none}

    /* ── top nav ── */
    .pf-topnav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.05)}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:12px;border:1px solid rgba(0,229,255,.2);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.82rem;font-weight:700;transition:all .2s;backdrop-filter:blur(8px)}
    .back-link:hover{border-color:rgba(0,229,255,.45)}
    .back-link svg{width:14px;height:14px;flex-shrink:0}
    .pf-topnav-actions{display:flex;gap:10px;align-items:center}
    .pf-share-btn,.pf-edit-toggle{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:12px;border:1px solid;font-size:.8rem;font-weight:700;cursor:pointer;font-family:var(--pf);transition:all .2s}
    .pf-share-btn{border-color:rgba(var(--pa-rgb),.35);background:rgba(var(--pa-rgb),.1);color:var(--pa)}
    .pf-share-btn:hover{background:rgba(var(--pa-rgb),.2)}
    .pf-edit-toggle{border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.1);color:#c084fc}
    .pf-edit-toggle:hover{background:rgba(168,85,247,.2)}
    .pf-edit-toggle svg,.pf-share-btn svg{width:14px;height:14px;flex-shrink:0}

    /* ── banner ── */
    .pf-banner{position:relative;width:100%;height:220px;overflow:hidden;background:linear-gradient(135deg,#0a0f28,#0d0b20)}
    .pf-banner-img{width:100%;height:100%;object-fit:cover}
    .pf-banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(7,11,24,.85))}
    .pf-banner-upload{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;cursor:pointer;background:rgba(0,0,0,.45)}
    .pf-banner:hover .pf-banner-upload.editable{opacity:1}
    .pf-banner-upload-label{padding:10px 20px;border-radius:12px;background:rgba(7,11,24,.85);border:1px solid rgba(var(--pa-rgb),.4);color:var(--pa);font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
    .pf-banner-upload-label svg{width:16px;height:16px}

    /* ── profile header ── */
    .pf-header{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:0 24px;margin-top:-56px}
    .pf-avatar-row{display:flex;align-items:flex-end;gap:20px;margin-bottom:16px;flex-wrap:wrap}
    .pf-avatar-wrap{position:relative;flex-shrink:0;cursor:pointer}
    .pf-avatar{width:108px;height:108px;border-radius:50%;object-fit:cover;border:3px solid var(--pa);background:#0a0f28;display:flex;align-items:center;justify-content:center;font-size:2.4rem;font-weight:900;color:var(--pa);overflow:hidden;box-shadow:0 0 20px rgba(var(--pa-rgb),.25)}
    .pf-avatar img{width:100%;height:100%;object-fit:cover}
    .pf-avatar-upload{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);opacity:0;transition:opacity .2s}
    .pf-avatar-wrap:hover .pf-avatar-upload.editable{opacity:1}
    .pf-avatar-upload svg{width:20px;height:20px;color:#fff}
    .pf-name-block{flex:1;min-width:0;padding-bottom:4px}
    .pf-display-name{font-size:1.6rem;font-weight:900;color:#f4f7ff;line-height:1.2;margin:0 0 4px}
    .pf-tagline{font-size:.9rem;color:#8892b8;margin:0;line-height:1.4}
    .pf-meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .pf-meta-chip{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;color:#8892b8}
    .pf-meta-chip svg{width:12px;height:12px;color:var(--pa);flex-shrink:0}
    .pf-bio{font-size:.92rem;color:#b0bad4;line-height:1.7;margin:0 0 20px;white-space:pre-wrap}
    .pf-social-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
    .pf-social-link{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;border:1px solid rgba(var(--pa-rgb),.25);background:rgba(var(--pa-rgb),.06);color:var(--pa);font-size:.78rem;font-weight:700;text-decoration:none;transition:all .2s}
    .pf-social-link:hover{border-color:rgba(var(--pa-rgb),.5);background:rgba(var(--pa-rgb),.12)}
    .pf-social-link svg{width:13px;height:13px;flex-shrink:0}

    /* ── main content ── */
    .pf-content{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:0 24px 80px}

    /* ── section headers ── */
    .pf-section{margin-bottom:48px}
    .pf-section-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
    .pf-section-title{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:900;color:#f4f7ff;text-transform:uppercase;letter-spacing:.06em;margin:0}
    .pf-section-title svg{width:18px;height:18px;color:var(--pa)}
    .pf-add-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;border:1px solid rgba(var(--pa-rgb),.3);background:rgba(var(--pa-rgb),.08);color:var(--pa);font-size:.78rem;font-weight:700;cursor:pointer;font-family:var(--pf);transition:all .2s}
    .pf-add-btn:hover{background:rgba(var(--pa-rgb),.16)}
    .pf-add-btn svg{width:13px;height:13px}

    /* ── products grid ── */
    .pf-products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
    .pf-product-card{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;transition:all .22s;position:relative}
    .pf-product-card:hover{border-color:rgba(var(--pa-rgb),.28);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
    .pf-product-img{width:100%;height:160px;object-fit:cover;background:rgba(255,255,255,.04);display:block}
    .pf-product-img-placeholder{width:100%;height:160px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
    .pf-product-img-placeholder svg{width:40px;height:40px;opacity:.2}
    .pf-product-body{padding:14px}
    .pf-product-category{font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--pa);margin-bottom:5px}
    .pf-product-name{font-size:.95rem;font-weight:800;color:#f4f7ff;margin:0 0 6px;line-height:1.3}
    .pf-product-desc{font-size:.8rem;color:#8892b8;line-height:1.5;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .pf-product-price{font-size:1rem;font-weight:900;color:var(--pa)}
    .pf-product-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;opacity:0;transition:opacity .2s}
    .pf-product-card:hover .pf-product-actions{opacity:1}
    .pf-item-edit-btn,.pf-item-del-btn{width:28px;height:28px;border-radius:8px;border:1px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--pf);transition:all .2s}
    .pf-item-edit-btn{border-color:rgba(var(--pa-rgb),.4);background:rgba(var(--pa-rgb),.12);color:var(--pa)}
    .pf-item-del-btn{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.1);color:#f87171}
    .pf-item-edit-btn svg,.pf-item-del-btn svg{width:12px;height:12px}

    /* ── portfolio grid ── */
    .pf-portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
    .pf-portfolio-card{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;transition:all .22s;position:relative;cursor:pointer}
    .pf-portfolio-card:hover{border-color:rgba(var(--pa-rgb),.28);transform:translateY(-2px)}
    .pf-portfolio-img{width:100%;height:180px;object-fit:cover;background:rgba(255,255,255,.04);display:block}
    .pf-portfolio-img-placeholder{width:100%;height:180px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
    .pf-portfolio-img-placeholder svg{width:40px;height:40px;opacity:.2}
    .pf-portfolio-body{padding:14px}
    .pf-portfolio-category{font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--pa);margin-bottom:4px}
    .pf-portfolio-title{font-size:.95rem;font-weight:800;color:#f4f7ff;margin:0 0 5px;line-height:1.3}
    .pf-portfolio-desc{font-size:.8rem;color:#8892b8;line-height:1.5;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .pf-portfolio-card:hover .pf-product-actions{opacity:1}

    /* ── music player ── */
    .pf-player{background:rgba(10,15,35,.9);border:1px solid rgba(var(--pa-rgb),.12);border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:0}
    .pf-player-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
    .pf-player-cover{width:72px;height:72px;border-radius:12px;object-fit:cover;background:rgba(var(--pa-rgb),.08);border:1px solid rgba(var(--pa-rgb),.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .pf-player-cover svg{width:28px;height:28px;color:var(--pa);opacity:.5}
    .pf-player-cover img{width:100%;height:100%;object-fit:cover;border-radius:12px}
    .pf-player-info{flex:1;min-width:0}
    .pf-player-title{font-size:1rem;font-weight:800;color:#f4f7ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 0 3px}
    .pf-player-artist{font-size:.82rem;color:#8892b8;margin:0}
    .pf-player-controls{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .pf-ctrl-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(var(--pa-rgb),.1);color:var(--pa);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .pf-ctrl-btn:hover{background:rgba(var(--pa-rgb),.2)}
    .pf-ctrl-btn.play{width:44px;height:44px;background:linear-gradient(135deg,var(--pa),#a855f7);color:#050c1a;border:none}
    .pf-ctrl-btn.play:hover{filter:brightness(1.1)}
    .pf-ctrl-btn svg{width:18px;height:18px}
    .pf-ctrl-btn.play svg{width:20px;height:20px}
    .pf-progress-wrap{flex:1;display:flex;flex-direction:column;gap:5px}
    .pf-progress{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.1);cursor:pointer;outline:none}
    .pf-progress::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--pa);cursor:pointer}
    .pf-progress::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--pa);border:none;cursor:pointer}
    .pf-time-row{display:flex;justify-content:space-between;font-size:.7rem;color:#8892b8}
    .pf-volume-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .pf-vol-icon{color:#8892b8}
    .pf-vol-icon svg{width:16px;height:16px}
    .pf-volume{-webkit-appearance:none;appearance:none;width:70px;height:3px;border-radius:2px;background:rgba(255,255,255,.1);cursor:pointer;outline:none}
    .pf-volume::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--pa);cursor:pointer}
    .pf-volume::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:var(--pa);border:none;cursor:pointer}
    .pf-track-list{display:flex;flex-direction:column;gap:2px;margin-top:12px;max-height:280px;overflow-y:auto}
    .pf-track-item{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s;position:relative}
    .pf-track-item:hover{background:rgba(var(--pa-rgb),.06)}
    .pf-track-item.active{background:rgba(var(--pa-rgb),.1)}
    .pf-track-num{width:22px;font-size:.75rem;color:#8892b8;text-align:center;flex-shrink:0}
    .pf-track-item.active .pf-track-num{color:var(--pa)}
    .pf-track-thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;background:rgba(var(--pa-rgb),.06);border:1px solid rgba(var(--pa-rgb),.12);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .pf-track-thumb svg{width:14px;height:14px;color:var(--pa);opacity:.5}
    .pf-track-thumb img{width:100%;height:100%;object-fit:cover}
    .pf-track-info{flex:1;min-width:0}
    .pf-track-title{font-size:.85rem;font-weight:700;color:#f4f7ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pf-track-item.active .pf-track-title{color:var(--pa)}
    .pf-track-artist{font-size:.72rem;color:#8892b8}
    .pf-track-dur{font-size:.7rem;color:#8892b8;flex-shrink:0}
    .pf-track-actions{display:none;gap:5px;flex-shrink:0}
    .pf-track-item:hover .pf-track-actions{display:flex}

    /* ── shareable card ── */
    .pf-card-section{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center}
    .pf-share-card{width:300px;min-height:170px;border-radius:16px;background:rgba(8,12,28,.96);border:1px solid rgba(var(--pa-rgb),.3);padding:20px;box-shadow:0 0 32px rgba(var(--pa-rgb),.1);flex-shrink:0}
    .pf-share-card-accent{height:3px;background:linear-gradient(90deg,var(--pa),#a855f7);border-radius:2px;margin-bottom:16px}
    .pf-share-card-name{font-size:1rem;font-weight:900;color:#f4f7ff;margin:0 0 3px}
    .pf-share-card-tagline{font-size:.75rem;color:#8892b8;margin:0 0 12px}
    .pf-share-card-divider{height:1px;background:rgba(var(--pa-rgb),.15);margin:0 0 12px}
    .pf-share-card-contact{display:flex;flex-direction:column;gap:5px}
    .pf-share-card-row{display:flex;align-items:center;gap:7px;font-size:.72rem;color:#b0bad4}
    .pf-share-card-row svg{width:11px;height:11px;color:var(--pa);flex-shrink:0}
    .pf-card-actions{display:flex;flex-direction:column;gap:10px}
    .pf-copy-link-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(var(--pa-rgb),.35);background:rgba(var(--pa-rgb),.08);color:var(--pa);font-size:.82rem;font-weight:700;cursor:pointer;font-family:var(--pf);transition:all .2s}
    .pf-copy-link-btn:hover{background:rgba(var(--pa-rgb),.18)}
    .pf-copy-link-btn svg{width:14px;height:14px}
    .pf-embed-code{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;font-size:.72rem;color:#8892b8;font-family:'Courier New',monospace;word-break:break-all;margin-top:4px}

    /* ── customization panel ── */
    .pf-custom-panel{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(7,11,24,.97);border-top:1px solid rgba(var(--pa-rgb),.2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 24px;transform:translateY(100%);transition:transform .3s ease}
    .pf-custom-panel.open{transform:translateY(0)}
    .pf-custom-inner{max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start}
    .pf-custom-group{display:flex;flex-direction:column;gap:8px}
    .pf-custom-label{font-size:.64rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#8892b8}
    .pf-color-presets{display:flex;gap:8px;flex-wrap:wrap}
    .pf-color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
    .pf-color-dot.active{border-color:#fff}
    .pf-color-custom{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.15);cursor:pointer;padding:2px;background:transparent}
    .pf-font-btns{display:flex;gap:8px}
    .pf-font-btn{padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#8892b8;font-size:.8rem;font-weight:700;cursor:pointer;font-family:var(--pf);transition:all .2s}
    .pf-font-btn.active{border-color:rgba(var(--pa-rgb),.5);background:rgba(var(--pa-rgb),.1);color:var(--pa)}
    .pf-toggle-group{display:flex;flex-direction:column;gap:8px}
    .pf-toggle-row{display:flex;align-items:center;gap:10px;font-size:.82rem;color:#b0bad4;cursor:pointer;user-select:none}
    .pf-toggle{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
    .pf-toggle.on{background:var(--pa);border-color:var(--pa)}
    .pf-toggle::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
    .pf-toggle.on::after{transform:translateX(16px)}
    .pf-custom-save{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:12px;background:linear-gradient(90deg,var(--pa),#a855f7);border:none;color:#050c1a;font-size:.85rem;font-weight:800;cursor:pointer;font-family:var(--pf);transition:all .2s;align-self:flex-end}
    .pf-custom-save:hover{filter:brightness(1.1)}
    .pf-custom-toggle-btn{position:fixed;bottom:20px;right:20px;z-index:51;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--pa),#a855f7);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(var(--pa-rgb),.4);transition:all .2s}
    .pf-custom-toggle-btn:hover{transform:scale(1.08)}
    .pf-custom-toggle-btn svg{width:22px;height:22px;color:#050c1a}

    /* ── modals ── */
    .pf-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .pf-modal-overlay.open{opacity:1;pointer-events:all}
    .pf-modal{background:rgba(10,15,35,.98);border:1px solid rgba(var(--pa-rgb),.2);border-radius:20px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
    .pf-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .pf-modal-title{font-size:1rem;font-weight:800;color:#f4f7ff;margin:0}
    .pf-modal-close{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#8892b8;cursor:pointer;font-family:var(--pf);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .pf-modal-close:hover{border-color:rgba(248,113,113,.4);color:#f87171}
    .pf-form-group{margin-bottom:14px}
    .pf-form-label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8892b8;margin-bottom:6px}
    .pf-form-label span{color:#f43f5e;margin-left:2px}
    .pf-form-input,.pf-form-textarea,.pf-form-select{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:9px;color:#e8e8ff;font-size:.86rem;font-family:var(--pf);outline:none;transition:border-color .2s}
    .pf-form-input::placeholder,.pf-form-textarea::placeholder{color:#3a4268}
    .pf-form-input:focus,.pf-form-textarea:focus,.pf-form-select:focus{border-color:rgba(var(--pa-rgb),.45)}
    .pf-form-textarea{resize:vertical;min-height:80px;line-height:1.5}
    .pf-form-select option{background:#0a0f28;color:#e8e8ff}
    .pf-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pf-upload-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .pf-upload-btn{padding:8px 14px;border-radius:9px;border:1px dashed rgba(var(--pa-rgb),.35);background:rgba(var(--pa-rgb),.06);color:var(--pa);font-size:.78rem;font-weight:700;cursor:pointer;font-family:var(--pf);transition:all .2s}
    .pf-upload-btn:hover{background:rgba(var(--pa-rgb),.14)}
    .pf-upload-preview{max-width:60px;max-height:60px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,.1)}

    .pf-btn-cancel:hover{border-color:rgba(255,255,255,.2);color:#e8e8ff}

    .pf-modal-status{font-size:.8rem;color:#8892b8;min-height:18px;margin-top:8px}

    /* ── status toast ── */

<script>

var token = localStorage.getItem("bf_token");
var userId = null;
try { userId = token ? JSON.parse(atob(token.split(".")[1])).id : null; } catch(e){}
var publicUserId = null;
var isOwner = false;
var editMode = false;

// Check if viewing a public profile
var urlParams = new URLSearchParams(window.location.search);
var viewId = urlParams.get("id");

if (viewId) {
  publicUserId = viewId;
  isOwner = (userId === viewId);
} else {
  if (!token) { window.location.replace("app.html"); }
  publicUserId = userId;
  isOwner = true;
}

var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var FONTS = { modern:"system-ui,-apple-system,'Segoe UI',Arial,sans-serif", classic:"Georgia,'Times New Roman',Times,serif", technical:"'Courier New',Courier,monospace" };

// ── State ─────────────────────────────────────────────────────────────────────

var products    = [];
var portfolio   = [];
var tracks      = [];
var editingProductId  = null;

// ── Load all data ─────────────────────────────────────────────────────────────
async function loadAll() {
  var profilePath = isOwner ? "/api/bfp/profile/me" : "/api/bfp/profile/" + publicUserId;
  var headers = token ? { "Authorization": "Bearer " + token } : {};
  var [profRes, prodRes, portRes, musRes] = await Promise.all([
    fetch(API_URL + profilePath, { headers }),
    fetch(API_URL + (isOwner ? "/api/bfp/products" : "/api/bfp/products/public/" + publicUserId), { headers }),
    fetch(API_URL + (isOwner ? "/api/bfp/portfolio" : "/api/bfp/portfolio/public/" + publicUserId), { headers }),
    fetch(API_URL + (isOwner ? "/api/bfp/music" : "/api/bfp/music/public/" + publicUserId), { headers })
  ]);
  try { profileData = (await profRes.json()).profile; } catch(e){}
  try { products    = (await prodRes.json()).products || []; } catch(e) { products = []; }
  try { portfolio   = (await portRes.json()).items    || []; } catch(e) { portfolio = []; }
  try { tracks      = (await musRes.json()).tracks    || []; } catch(e) { tracks = []; }
  applyProfile(profileData || {});
  renderProducts();
  renderPortfolio();
  renderMusic();
  renderShareCard();
  if (!isOwner) {
    document.getElementById("editToggleBtn").style.display = "none";
    document.getElementById("shareBtn").style.display = "none";
  }
}

// ── Apply profile data to UI ──────────────────────────────────────────────────
function applyProfile(p) {
  // accent color
  var accent = p.accent_color || "#22d3ee";
  setAccentCss(accent);
  document.querySelectorAll(".pf-color-dot").forEach(function(d){
    d.classList.toggle("active", d.dataset.color === accent);
  });
  var picker = document.getElementById("customColorPicker");
  if (picker) picker.value = accent;
  // font
  var font = p.font_style || "modern";
  setFontCss(font);
  document.querySelectorAll(".pf-font-btn").forEach(function(b){
    b.classList.toggle("active", b.dataset.font === font);
  });
  // display name
  var name = p.display_name || "Your Name";
  document.getElementById("displayNameEl").textContent = name;
  document.getElementById("taglineEl").textContent  = p.tagline || "";
  document.getElementById("bioEl").textContent      = p.bio     || "";
  // initials
  var initials = name.split(" ").map(function(w){ return w[0]; }).join("").toUpperCase().slice(0,2);
  document.getElementById("avatarInitials").textContent = initials;
  // avatar/banner
  if (p.avatar_url) {
    var aImg = document.getElementById("avatarImg");
    aImg.src = p.avatar_url; aImg.style.display = "block";
    document.getElementById("avatarInitials").style.display = "none";
  }
  if (p.banner_url) {
    var bImg = document.getElementById("bannerImg");
    bImg.src = p.banner_url; bImg.style.display = "block";
  }
  // meta chips
  var chips = [];
  if (p.location) chips.push({ svg:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>', text: p.location });
  if (p.website)  chips.push({ svg:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>', text: p.website.replace(/^https?:\/\//,"") });
  document.getElementById("metaChips").innerHTML = chips.map(function(c){
    return '<span class="pf-meta-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+c.svg+'</svg>'+esc(c.text)+'</span>';
  }).join("");
  // social links
  var sl = p.social_links || {};
  var socialHtml = [];
  var sicons = {
    twitter:   '<path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>',
    instagram: '<rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>',
    linkedin:  '<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>',
    tiktok:    '<path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>'
  };
  Object.keys(sl).forEach(function(k) {
    if (!sl[k]) return;
    var label = k.charAt(0).toUpperCase() + k.slice(1);
    var href  = sl[k].startsWith("http") ? sl[k] : "https://" + sl[k];
    var svg   = sicons[k] || '<circle cx="12" cy="12" r="10"/>';
    socialHtml.push('<a href="'+esc(href)+'" target="_blank" rel="noopener" class="pf-social-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+svg+'</svg>'+esc(label)+'</a>');
  });
  document.getElementById("socialRow").innerHTML = socialHtml.join("");
  // section visibility
  var secs = { products: p.show_products !== false, portfolio: p.show_portfolio !== false, music: p.show_music !== false, card: p.show_card !== false };
  Object.keys(secs).forEach(function(k) {
    var tgl = document.getElementById("tgl-" + k);
    if (tgl) tgl.classList.toggle("on", secs[k]);
    applySectionVisibility(k, secs[k]);
  });
  // fill edit form
  if (isOwner) {
    document.getElementById("eDisplayName").value = p.display_name || "";
    document.getElementById("eTagline").value     = p.tagline      || "";
    document.getElementById("eBio").value         = p.bio          || "";
    document.getElementById("eLocation").value    = p.location     || "";
    document.getElementById("eWebsite").value     = p.website      || "";
    document.getElementById("eTwitter").value     = (sl.twitter)   || "";
    document.getElementById("eInstagram").value   = (sl.instagram) || "";
    document.getElementById("eLinkedin").value    = (sl.linkedin)  || "";
    document.getElementById("eTiktok").value      = (sl.tiktok)    || "";
  }
  // page title
  document.title = "BizForce AI — " + (p.display_name || "Profile");
}

// ── Edit mode ─────────────────────────────────────────────────────────────────
function toggleEditMode() {
  if (!isOwner) return;
  editMode = !editMode;
  document.getElementById("editToggleBtn").textContent = editMode ? "✓ Done Editing" : "Edit Profile";
  document.querySelectorAll(".edit-only").forEach(function(el){ el.style.display = editMode ? "" : "none"; });
  document.getElementById("infoEditPanel").classList.toggle("open", editMode);
  document.querySelector(".pf-custom-toggle-btn") && (document.querySelector(".pf-custom-toggle-btn").style.display = editMode ? "" : "none");
  document.querySelectorAll(".pf-avatar-upload, #bannerUploadZone").forEach(function(el){ el.classList.toggle("editable", editMode); });
  // refresh renders to show/hide action buttons
  renderProducts(); renderPortfolio(); renderMusic();
}

// ── Section visibility ────────────────────────────────────────────────────────
var sectionState = { products: true, portfolio: true, music: true, card: true };
function toggleSection(key, el) {
  sectionState[key] = !sectionState[key];
  el.classList.toggle("on", sectionState[key]);
  applySectionVisibility(key, sectionState[key]);
}
function applySectionVisibility(key, visible) {
  sectionState[key] = visible;
  var sectionId = key === "products" ? "productSection" : key === "portfolio" ? "portfolioSection" : key === "music" ? "musicSection" : "cardSection";
  var el = document.getElementById(sectionId);
  if (el) el.style.display = visible ? "" : "none";
}

// ── Accent color ──────────────────────────────────────────────────────────────
function setAccent(color, dotEl) {
  setAccentCss(color);
  document.querySelectorAll(".pf-color-dot").forEach(function(d){ d.classList.remove("active"); });
  if (dotEl) dotEl.classList.add("active");
  document.getElementById("customColorPicker").value = color;
}
function setAccentCss(color) {
  var r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
  document.documentElement.style.setProperty("--pa", color);
  document.documentElement.style.setProperty("--pa-rgb", r+","+g+","+b);
  renderShareCard();
}
document.getElementById("customColorPicker").addEventListener("input", function() {
  setAccent(this.value, null);
});

// ── Font ──────────────────────────────────────────────────────────────────────
function setFont(key, btn) {
  setFontCss(key);
  document.querySelectorAll(".pf-font-btn").forEach(function(b){ b.classList.remove("active"); });
  if (btn) btn.classList.add("active");
}
function setFontCss(key) {
  document.documentElement.style.setProperty("--pf", FONTS[key] || FONTS.modern);
}

// ── Save info ─────────────────────────────────────────────────────────────────
async function saveInfo() {
  var btn = document.getElementById("saveInfoBtn");
  var status = document.getElementById("infoSaveStatus");
  btn.disabled = true; status.textContent = "Saving…"; status.className = "pf-modal-status";
  try {
    var body = {
      display_name: document.getElementById("eDisplayName").value.trim(),
      tagline:      document.getElementById("eTagline").value.trim(),
      bio:          document.getElementById("eBio").value.trim(),
      location:     document.getElementById("eLocation").value.trim(),
      website:      document.getElementById("eWebsite").value.trim(),
      social_links: {
        twitter:   document.getElementById("eTwitter").value.trim(),
        instagram: document.getElementById("eInstagram").value.trim(),
        linkedin:  document.getElementById("eLinkedin").value.trim(),
        tiktok:    document.getElementById("eTiktok").value.trim()
      }
    };
    var res = await fetch(API_URL + "/api/bfp/profile/me", {
      method:"PUT", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}, body:JSON.stringify(body)
    });
    if (!res.ok) throw new Error((await res.json()).error || "Save failed");
    var d = await res.json(); profileData = d.profile;
    applyProfile(profileData);
    status.textContent = "Saved!"; status.className = "pf-modal-status ok";
  } catch(e) { status.textContent = e.message; status.className = "pf-modal-status err"; }
  btn.disabled = false;
  setTimeout(function(){ status.textContent = ""; status.className = "pf-modal-status"; }, 3000);
}

// ── Upload helper ─────────────────────────────────────────────────────────────
var activeUploadTarget = null;
function triggerUpload(inputId, urlFieldId, previewId, statusId, folder) {
  activeUploadTarget = { urlFieldId, previewId, statusId, folder };
  document.getElementById(inputId).click();
}
async function handleFileUpload(inputEl) {
  if (!activeUploadTarget) return;
  var { urlFieldId, previewId, statusId, folder } = activeUploadTarget;
  activeUploadTarget = null;
  var file = inputEl.files[0];
  if (!file) return;
  var statusEl = document.getElementById(statusId);
  statusEl.textContent = "Uploading…";
  try {
    var signedRes = await fetch(API_URL + "/api/bfp/upload-url", {
      method:"POST", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({ folder, filename:file.name, contentType:file.type })
    });
    if (!signedRes.ok) throw new Error("Could not get upload URL");
    var { signedUrl, publicUrl } = await signedRes.json();
    var upRes = await fetch(signedUrl, { method:"PUT", headers:{"Content-Type":file.type,"x-upsert":"true"}, body:file });
    if (!upRes.ok) throw new Error("Upload failed");
    document.getElementById(urlFieldId).value = publicUrl;
    var prev = document.getElementById(previewId);
    prev.src = publicUrl; prev.style.display = "block";
    statusEl.textContent = "Uploaded!";
  } catch(e) { statusEl.textContent = "Upload failed: " + e.message; }
  setTimeout(function(){ statusEl.textContent = ""; }, 3000);
  inputEl.value = "";
}

// File input listeners
["bannerFileInput","avatarFileInput","productImageInput","portfolioImageInput","musicCoverInput"].forEach(function(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener("change", async function() {
    if (id === "bannerFileInput") await uploadBannerDirect(this);
    else if (id === "avatarFileInput") await uploadAvatarDirect(this);
    else await handleFileUpload(this);
  });
});

async function uploadBannerDirect(inputEl) {
  if (!inputEl.files[0] || !isOwner || !editMode) return;
  var file = inputEl.files[0];
  try {
    var signedRes = await fetch(API_URL + "/api/bfp/upload-url", {
      method:"POST", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({ folder:"banners", filename:file.name, contentType:file.type })
    });
    var { signedUrl, publicUrl } = await signedRes.json();
    await fetch(signedUrl, { method:"PUT", headers:{"Content-Type":file.type,"x-upsert":"true"}, body:file });
    await fetch(API_URL + "/api/bfp/profile/me", {
      method:"PUT", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({ banner_url: publicUrl })
    });
    var bImg = document.getElementById("bannerImg"); bImg.src = publicUrl; bImg.style.display = "block";
    showToast("Banner updated!");
  } catch(e) { showToast("Banner upload failed", true); }
  inputEl.value = "";
}
async function uploadAvatarDirect(inputEl) {
  if (!inputEl.files[0] || !isOwner || !editMode) return;
  var file = inputEl.files[0];
  try {
    var signedRes = await fetch(API_URL + "/api/bfp/upload-url", {
      method:"POST", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({ folder:"avatars", filename:file.name, contentType:file.type })
    });
    var { signedUrl, publicUrl } = await signedRes.json();
    await fetch(signedUrl, { method:"PUT", headers:{"Content-Type":file.type,"x-upsert":"true"}, body:file });
    await fetch(API_URL + "/api/bfp/profile/me", {
      method:"PUT", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({ avatar_url: publicUrl })
    });
    var aImg = document.getElementById("avatarImg"); aImg.src = publicUrl; aImg.style.display = "block";
    document.getElementById("avatarInitials").style.display = "none";
    showToast("Avatar updated!");
  } catch(e) { showToast("Avatar upload failed", true); }
  inputEl.value = "";
}

// ── Products ──────────────────────────────────────────────────────────────────
function renderProducts() {
  var grid = document.getElementById("productsGrid");
  if (!products.length) {
    grid.innerHTML = '<div class="pf-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>' + (isOwner && editMode ? 'No products yet. Click "Add Product" to get started.' : 'No products yet.') + '</div>';
    return;
  }
  grid.innerHTML = products.map(function(p) {
    var imgHtml = p.image_url
      ? '<img class="pf-product-img" src="'+esc(p.image_url)+'" alt="">'
      : '<div class="pf-product-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
    var actHtml = isOwner && editMode ? '<div class="pf-product-actions"><button class="pf-item-edit-btn" onclick="openProductModal(\''+p.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="pf-item-del-btn" onclick="deleteProduct(\''+p.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>' : '';
    var price = p.price != null ? '<div class="pf-product-price">'+esc(p.currency)+' '+Number(p.price).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})+'</div>' : '';
    return '<div class="pf-product-card">'+imgHtml+'<div class="pf-product-body">'+(p.category?'<div class="pf-product-category">'+esc(p.category)+'</div>':'')+'<div class="pf-product-name">'+esc(p.name)+'</div>'+(p.description?'<div class="pf-product-desc">'+esc(p.description)+'</div>':'')+price+'</div>'+actHtml+'</div>';
  }).join("");
}

function openProductModal(id) {
  editingProductId = id;
  document.getElementById("productModalTitle").textContent = id ? "Edit Product" : "Add Product";
  document.getElementById("productModalStatus").textContent = "";
  document.getElementById("productModalStatus").className = "pf-modal-status";
  if (id) {
    var p = products.find(function(x){ return x.id === id; });
    if (p) {
      document.getElementById("pName").value     = p.name        || "";
      document.getElementById("pDesc").value     = p.description || "";
      document.getElementById("pPrice").value    = p.price != null ? p.price : "";
      document.getElementById("pCurrency").value = p.currency    || "USD";
      document.getElementById("pCategory").value = p.category    || "";
      document.getElementById("pStatus").value   = p.status      || "active";
      document.getElementById("pImgUrl").value   = p.image_url   || "";
      var prev = document.getElementById("pImgPreview");
      if (p.image_url) { prev.src = p.image_url; prev.style.display = "block"; } else { prev.style.display = "none"; }
    }
  } else {
    ["pName","pDesc","pPrice","pCategory"].forEach(function(id){ document.getElementById(id).value = ""; });
    document.getElementById("pCurrency").value = "USD";
    document.getElementById("pStatus").value = "active";
    document.getElementById("pImgUrl").value = "";
    document.getElementById("pImgPreview").style.display = "none";
  }
  openModal("productModal");
}
async function saveProduct() {
  var btn = document.getElementById("productSaveBtn");
  var status = document.getElementById("productModalStatus");
  var name = document.getElementById("pName").value.trim();
  if (!name) { status.textContent = "Name is required"; status.className = "pf-modal-status err"; return; }
  btn.disabled = true; status.textContent = "Saving…"; status.className = "pf-modal-status";
  try {
    var body = {
      name, description:document.getElementById("pDesc").value.trim(),
      price:document.getElementById("pPrice").value||null, currency:document.getElementById("pCurrency").value,
      category:document.getElementById("pCategory").value.trim(), status:document.getElementById("pStatus").value,
      image_url:document.getElementById("pImgUrl").value||null
    };
    var url    = editingProductId ? API_URL+"/api/bfp/products/"+editingProductId : API_URL+"/api/bfp/products";
    var method = editingProductId ? "PUT" : "POST";
    var res = await fetch(url, { method, headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}, body:JSON.stringify(body) });
    if (!res.ok) throw new Error((await res.json()).error || "Save failed");
    var d = await res.json();
    if (editingProductId) { products = products.map(function(p){ return p.id===editingProductId ? d.product : p; }); }
    else { products.unshift(d.product); }
    renderProducts();
    closeModal("productModal");
    showToast(editingProductId ? "Product updated!" : "Product added!");
  } catch(e) { status.textContent = e.message; status.className = "pf-modal-status err"; }
  btn.disabled = false;
}
async function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;
  try {
    var res = await fetch(API_URL+"/api/bfp/products/"+id, { method:"DELETE", headers:{"Authorization":"Bearer "+token} });
    if (!res.ok) throw new Error("Delete failed");
    products = products.filter(function(p){ return p.id !== id; });
    renderProducts(); showToast("Product deleted!");
  } catch(e) { showToast(e.message, true); }
}

  }).join("");
}

  if (id) {
    var item = portfolio.find(function(x){ return x.id === id; });
    if (item) {
      document.getElementById("pfTitle").value    = item.title       || "";
      document.getElementById("pfDesc").value     = item.description || "";
      document.getElementById("pfCategory").value = item.category    || "";
      document.getElementById("pfUrl").value      = item.url         || "";
      document.getElementById("pfImgUrl").value   = item.image_url   || "";
      var prev = document.getElementById("pfImgPreview");
      if (item.image_url) { prev.src = item.image_url; prev.style.display="block"; } else { prev.style.display="none"; }
    }
  } else {
    ["pfTitle","pfDesc","pfCategory","pfUrl"].forEach(function(id){ document.getElementById(id).value=""; });
    document.getElementById("pfImgUrl").value = "";
    document.getElementById("pfImgPreview").style.display = "none";
  }
  openModal("portfolioModal");
}
async function savePortfolio() {
  var btn = document.getElementById("portfolioSaveBtn");
  var status = document.getElementById("portfolioModalStatus");
  var title = document.getElementById("pfTitle").value.trim();
  if (!title) { status.textContent = "Title is required"; status.className = "pf-modal-status err"; return; }
  btn.disabled = true; status.textContent = "Saving…"; status.className = "pf-modal-status";
  try {
    var body = { title, description:document.getElementById("pfDesc").value.trim(), category:document.getElementById("pfCategory").value.trim(), url:document.getElementById("pfUrl").value.trim(), image_url:document.getElementById("pfImgUrl").value||null };
    var url    = editingPortfolioId ? API_URL+"/api/bfp/portfolio/"+editingPortfolioId : API_URL+"/api/bfp/portfolio";
    var method = editingPortfolioId ? "PUT" : "POST";
    var res = await fetch(url, { method, headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}, body:JSON.stringify(body) });
    if (!res.ok) throw new Error((await res.json()).error || "Save failed");
    var d = await res.json();
    if (editingPortfolioId) { portfolio = portfolio.map(function(p){ return p.id===editingPortfolioId ? d.item : p; }); }
    else { portfolio.push(d.item); }
    renderPortfolio(); closeModal("portfolioModal"); showToast(editingPortfolioId ? "Item updated!" : "Item added!");
  } catch(e) { status.textContent = e.message; status.className = "pf-modal-status err"; }
  btn.disabled = false;
}
async function deletePortfolio(id) {
  if (!confirm("Delete this portfolio item?")) return;
  try {
    await fetch(API_URL+"/api/bfp/portfolio/"+id, { method:"DELETE", headers:{"Authorization":"Bearer "+token} });
    portfolio = portfolio.filter(function(p){ return p.id !== id; });
    renderPortfolio(); showToast("Item deleted!");
  } catch(e) { showToast(e.message, true); }
}

// ── Music Player ──────────────────────────────────────────────────────────────
var audioEl = null;
var currentTrackIdx = -1;
var isPlaying = false;

function renderMusic() {
  var wrap = document.getElementById("musicPlayerWrap");
  if (!tracks.length) {
    wrap.innerHTML = '<div class="pf-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>'+(isOwner && editMode ? 'No tracks yet. Click "Add Track" to get started.' : 'No tracks yet.')+'</div>';
    return;
  }
  wrap.innerHTML = '<div class="pf-player">' +
    '<div class="pf-player-header">' +
      '<div class="pf-player-cover" id="playerCover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>' +
      '<div class="pf-player-info"><p class="pf-player-title" id="playerTitle">Select a track</p><p class="pf-player-artist" id="playerArtist">—</p></div>' +
    '</div>' +
    '<div class="pf-player-controls">' +
      '<button class="pf-ctrl-btn" onclick="prevTrack()" title="Previous"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>' +
      '<button class="pf-ctrl-btn play" id="playPauseBtn" onclick="togglePlay()" title="Play/Pause"><svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>' +
      '<button class="pf-ctrl-btn" onclick="nextTrack()" title="Next"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>' +
      '<div class="pf-progress-wrap">' +
        '<input type="range" class="pf-progress" id="progressBar" value="0" min="0" max="100" step="0.1" oninput="seekTo(this.value)">' +
        '<div class="pf-time-row"><span id="timeElapsed">0:00</span><span id="timeDuration">0:00</span></div>' +
      '</div>' +
      '<div class="pf-volume-wrap"><span class="pf-vol-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span><input type="range" class="pf-volume" id="volumeBar" value="80" min="0" max="100" step="1" oninput="setVolume(this.value)"></div>' +
    '</div>' +
    '<div class="pf-track-list" id="trackList"></div>' +
  '</div>';
  renderTrackList();
  initAudio();
}

function renderTrackList() {
  var list = document.getElementById("trackList");
  if (!list) return;
  list.innerHTML = tracks.map(function(t, i) {
    var coverHtml = t.cover_url ? '<div class="pf-track-thumb"><img src="'+esc(t.cover_url)+'" alt=""></div>' : '<div class="pf-track-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>';
    var dur = t.duration_secs ? formatTime(t.duration_secs) : "";
    var actHtml = isOwner && editMode ? '<div class="pf-track-actions"><button class="pf-item-edit-btn" onclick="event.stopPropagation();openMusicModal(\''+t.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="pf-item-del-btn" onclick="event.stopPropagation();deleteTrack(\''+t.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div>' : '';
    return '<div class="pf-track-item'+(i===currentTrackIdx?' active':'')+'" data-idx="'+i+'" onclick="playTrack('+i+')"><div class="pf-track-num">'+(i+1)+'</div>'+coverHtml+'<div class="pf-track-info"><div class="pf-track-title">'+esc(t.title)+'</div>'+(t.artist?'<div class="pf-track-artist">'+esc(t.artist)+'</div>':'')+'</div>'+(dur?'<div class="pf-track-dur">'+dur+'</div>':'')+actHtml+'</div>';
  }).join("");
}

function initAudio() {
  if (!audioEl) { audioEl = new Audio(); audioEl.volume = 0.8; }
  audioEl.ontimeupdate = function() {
    if (!audioEl.duration) return;
    var prog = (audioEl.currentTime / audioEl.duration) * 100;
    var pb = document.getElementById("progressBar"); if (pb) pb.value = prog;
    var te = document.getElementById("timeElapsed"); if (te) te.textContent = formatTime(audioEl.currentTime);
    var td = document.getElementById("timeDuration"); if (td) td.textContent = formatTime(audioEl.duration);
  };
  audioEl.onended = function() { nextTrack(); };
  audioEl.onplay  = function() { isPlaying = true;  updatePlayIcon(); };
  audioEl.onpause = function() { isPlaying = false; updatePlayIcon(); };
}

function playTrack(idx) {
  if (idx < 0 || idx >= tracks.length) return;
  var t = tracks[idx];
  currentTrackIdx = idx;
  if (!audioEl) initAudio();
  audioEl.src = t.audio_url;
  audioEl.play().catch(function(){});
  // update header
  var titleEl = document.getElementById("playerTitle"); if (titleEl) titleEl.textContent = t.title;
  var artistEl = document.getElementById("playerArtist"); if (artistEl) artistEl.textContent = t.artist || "—";
  var coverEl = document.getElementById("playerCover");
  if (coverEl) coverEl.innerHTML = t.cover_url ? '<img src="'+esc(t.cover_url)+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:12px">' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
  renderTrackList();
}
function togglePlay() {
  if (!audioEl) return;
  if (currentTrackIdx < 0 && tracks.length) { playTrack(0); return; }
  if (isPlaying) audioEl.pause(); else audioEl.play().catch(function(){});
}
function nextTrack() { playTrack((currentTrackIdx + 1) % tracks.length); }
function prevTrack() { playTrack((currentTrackIdx - 1 + tracks.length) % tracks.length); }
function seekTo(val) { if (audioEl && audioEl.duration) audioEl.currentTime = (val/100)*audioEl.duration; }
function setVolume(val) { if (audioEl) audioEl.volume = val/100; }
function updatePlayIcon() {
  var icon = document.getElementById("playIcon");
  if (!icon) return;
  icon.outerHTML = isPlaying
    ? '<svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
}
function formatTime(s) { s = Math.floor(s||0); return Math.floor(s/60)+":"+(s%60<10?"0":""+(s%60)); }

function openMusicModal(id) {
  editingMusicId = id;
  document.getElementById("musicModalTitle").textContent = id ? "Edit Track" : "Add Track";
  document.getElementById("musicModalStatus").textContent = "";
  document.getElementById("musicModalStatus").className = "pf-modal-status";
  if (id) {
    var t = tracks.find(function(x){ return x.id === id; });
    if (t) {
      document.getElementById("mTitle").value    = t.title     || "";
      document.getElementById("mArtist").value   = t.artist    || "";
      document.getElementById("mAudioUrl").value = t.audio_url || "";
      document.getElementById("mCoverUrl").value = t.cover_url || "";
      var prev = document.getElementById("mCoverPreview");
      if (t.cover_url) { prev.src = t.cover_url; prev.style.display="block"; } else { prev.style.display="none"; }
    }
  } else {
    ["mTitle","mArtist","mAudioUrl"].forEach(function(id){ document.getElementById(id).value=""; });
    document.getElementById("mCoverUrl").value = "";
    document.getElementById("mCoverPreview").style.display = "none";
  }
  openModal("musicModal");
}
async function saveTrack() {
  var btn = document.getElementById("musicSaveBtn");
  var status = document.getElementById("musicModalStatus");
  var title = document.getElementById("mTitle").value.trim();
  var audioUrl = document.getElementById("mAudioUrl").value.trim();
  if (!title)    { status.textContent = "Title is required";     status.className="pf-modal-status err"; return; }
  if (!audioUrl) { status.textContent = "Audio URL is required"; status.className="pf-modal-status err"; return; }
  btn.disabled = true; status.textContent = "Saving…"; status.className = "pf-modal-status";
  try {
    var body = { title, artist:document.getElementById("mArtist").value.trim(), audio_url:audioUrl, cover_url:document.getElementById("mCoverUrl").value||null };
    var url    = editingMusicId ? API_URL+"/api/bfp/music/"+editingMusicId : API_URL+"/api/bfp/music";
    var method = editingMusicId ? "PUT" : "POST";
    var res = await fetch(url, { method, headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}, body:JSON.stringify(body) });
    if (!res.ok) throw new Error((await res.json()).error || "Save failed");
    var d = await res.json();
    if (editingMusicId) { tracks = tracks.map(function(t){ return t.id===editingMusicId ? d.track : t; }); }
    else { tracks.push(d.track); }
    renderMusic(); closeModal("musicModal"); showToast(editingMusicId ? "Track updated!" : "Track added!");
  } catch(e) { status.textContent = e.message; status.className = "pf-modal-status err"; }
  btn.disabled = false;
}
async function deleteTrack(id) {
  if (!confirm("Delete this track?")) return;
  var wasPlaying = currentTrackIdx >= 0 && tracks[currentTrackIdx] && tracks[currentTrackIdx].id === id;
  if (wasPlaying && audioEl) audioEl.pause();
  try {
    await fetch(API_URL+"/api/bfp/music/"+id, { method:"DELETE", headers:{"Authorization":"Bearer "+token} });
    tracks = tracks.filter(function(t){ return t.id !== id; });
    if (wasPlaying) currentTrackIdx = -1;
    renderMusic(); showToast("Track deleted!");
  } catch(e) { showToast(e.message, true); }
}

// ── Shareable card ────────────────────────────────────────────────────────────
function renderShareCard() {
  if (!profileData) return;
  var p = profileData;
  var sl = p.social_links || {};
  document.getElementById("scName").textContent    = p.display_name || "Your Name";
  document.getElementById("scTagline").textContent = p.tagline      || "";
  var rows = [];
  if (p.location) rows.push({icon:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',text:p.location});
  if (p.website)  rows.push({icon:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',text:p.website.replace(/^https?:\/\//,"")});
  if (sl.twitter) rows.push({icon:'<path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>',text:sl.twitter});
  document.getElementById("scContact").innerHTML = rows.map(function(r){
    return '<div class="pf-share-card-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+r.icon+'</svg>'+esc(r.text)+'</div>';
  }).join("");
  var profileUrl = window.location.origin + "/profile.html?id=" + publicUserId;
  document.getElementById("embedCode").textContent = '<iframe src="'+profileUrl+'" width="320" height="240" frameborder="0" style="border-radius:12px"></iframe>';
}

// ── Share / copy link ─────────────────────────────────────────────────────────
function copyProfileLink() {
  var url = window.location.origin + "/profile.html?id=" + publicUserId;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function(){ showToast("Profile link copied!"); }).catch(function(){ fallbackCopy(url); });
  } else { fallbackCopy(url); }
}
function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); showToast("Profile link copied!"); } catch(e) { showToast("Copy failed", true); }
  document.body.removeChild(ta);
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
document.querySelectorAll(".pf-modal-overlay").forEach(function(el){
  el.addEventListener("click", function(e){ if(e.target===el) el.classList.remove("open"); });
});

// ── Toast ─────────────────────────────────────────────────────────────────────
var toastTimer = null;
function showToast(msg, isErr) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "pf-toast show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 3000);
}

// ── Escape ────────────────────────────────────────────────────────────────────
function esc(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
</script>
