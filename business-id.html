<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Business Identity</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(0,229,255,.14),transparent 38%),radial-gradient(circle at 85% 90%,rgba(52,211,153,.14),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 24px 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:48px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(0,229,255,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(0,229,255,.55);box-shadow:0 0 20px rgba(0,229,255,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(90deg,#22d3ee,#34d399);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero{text-align:center;margin-bottom:48px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(52,211,153,.3);background:rgba(52,211,153,.08);color:#34d399;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
    .hero-title{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#00e5ff 0%,#7b2ff7 60%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero-sub{margin:0;color:#8892b8;font-size:1rem;line-height:1.6}

    /* ID Card visual */
    .id-card-wrap{margin-bottom:48px}
    .id-card{background:linear-gradient(135deg,rgba(14,22,48,.95),rgba(8,14,32,.98));border:1px solid rgba(52,211,153,.25);border-radius:20px;padding:0;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .id-card-accent{height:5px;background:linear-gradient(90deg,#22d3ee,#34d399,#a855f7);position:absolute;top:0;left:0;right:0}
    .id-card-body{padding:40px 40px 32px;display:flex;align-items:flex-start;gap:32px}
    .id-card-avatar{width:80px;height:80px;border-radius:18px;background:linear-gradient(135deg,rgba(52,211,153,.2),rgba(34,211,238,.1));border:1.5px solid rgba(52,211,153,.35);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;color:#34d399;flex-shrink:0;letter-spacing:-.02em}
    .id-card-info{flex:1;min-width:0}
    .id-card-company{font-size:1.3rem;font-weight:900;color:#f4f7ff;margin-bottom:4px;letter-spacing:-.01em}
    .id-card-industry{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#34d399;margin-bottom:16px}
    .id-card-bio{font-size:.88rem;color:#8892b8;line-height:1.6;margin-bottom:20px;font-style:italic}
    .id-card-contacts{display:flex;flex-direction:column;gap:8px}
    .id-card-row{display:flex;align-items:center;gap:10px;font-size:.84rem;color:#8892b8}
    .id-card-row svg{width:14px;height:14px;flex-shrink:0;color:#34d399;opacity:.7}
    .id-card-row a{color:#22d3ee;text-decoration:none}
    .id-card-row a:hover{text-decoration:underline}
    .id-card-watermark{position:absolute;bottom:18px;right:24px;font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(52,211,153,.3)}
    .id-card-verified{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:#34d399;font-size:.65rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:8px}
    .id-card-verified svg{width:11px;height:11px}

    /* Edit form */
    .edit-section{background:rgba(10,15,35,.78);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:32px}
    .edit-heading{font-size:1.05rem;font-weight:800;color:#f4f7ff;margin:0 0 28px;display:flex;align-items:center;gap:10px}
    .edit-heading svg{width:18px;height:18px;color:#34d399}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .form-group{display:flex;flex-direction:column;gap:7px}
    .form-group.full{grid-column:1/-1}
    .form-label{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8892b8}
    .form-input,.form-textarea{padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8ff;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s}
    .form-input::placeholder,.form-textarea::placeholder{color:#4a5280}
    .form-input:focus,.form-textarea:focus{border-color:rgba(52,211,153,.45)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:28px;flex-wrap:wrap}
    .save-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:12px;border:1px solid rgba(52,211,153,.45);background:rgba(52,211,153,.14);color:#34d399;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
    .save-btn:hover{background:rgba(52,211,153,.24);box-shadow:0 0 20px rgba(52,211,153,.2)}
    .save-btn:disabled{opacity:.5;cursor:not-allowed}
    .save-btn svg{width:16px;height:16px}
    .save-status{font-size:.82rem;color:#8892b8}
    .save-status.ok{color:#34d399}
    .save-status.err{color:#f87171}
    .loading-state{text-align:center;padding:60px 24px;color:#8892b8}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}.id-card-body{flex-direction:column;gap:20px;padding:28px 24px 24px}}
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">BUSINESS IDENTITY</div>
    <h1 class="hero-title">Business ID Card</h1>
    <p class="hero-sub">Your official BizForce AI business identity. Keep it complete and up to date.</p>
  </div>

  <div class="id-card-wrap" id="cardWrap">
    <div class="loading-state">Loading profile...</div>
  </div>

  <div class="edit-section">
    <div class="edit-heading">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit Business Profile
    </div>
    <div class="form-grid" id="editForm">
      <div class="form-group">
        <label class="form-label">Business Name</label>
        <input class="form-input" id="fBizName" type="text" placeholder="Your company name" maxlength="120">
      </div>
      <div class="form-group">
        <label class="form-label">Industry</label>
        <input class="form-input" id="fIndustry" type="text" placeholder="e.g. Technology, Marketing" maxlength="120">
      </div>
      <div class="form-group full">
        <label class="form-label">Tagline / Bio</label>
        <textarea class="form-textarea" id="fBio" placeholder="A short description of your business..." maxlength="500"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Website</label>
        <input class="form-input" id="fWebsite" type="url" placeholder="https://yoursite.com" maxlength="200">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="fPhone" type="tel" placeholder="+1 (555) 000-0000" maxlength="40">
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input class="form-input" id="fLocation" type="text" placeholder="City, State / Country" maxlength="120">
      </div>
      <div class="form-group">
        <label class="form-label">Contact Email</label>
        <input class="form-input" id="fContactEmail" type="email" placeholder="hello@yoursite.com" maxlength="200">
      </div>
    </div>
    <div class="form-footer">
      <span class="save-status" id="saveStatus"></span>
      <button class="save-btn" id="saveBtn" onclick="saveProfile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Profile
      </button>
    </div>
  </div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var token = localStorage.getItem("bf_token");
var profile = null;

async function loadProfile() {
  try {
    var res = await fetch(API_URL + "/api/profile/me", {
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error("fetch failed");
    var data = await res.json();
    profile = data.profile;
    renderCard(profile);
    fillForm(profile);
  } catch (e) {
    document.getElementById("cardWrap").innerHTML = '<div class="loading-state">Unable to load profile.</div>';
  }
}

function getInitials(name) {
  if (!name) return "BF";
  var words = name.trim().split(/\s+/);
  if (words.length === 1) return name.slice(0, 2).toUpperCase();
  return (words[0][0] + words[words.length - 1][0]).toUpperCase();
}

function renderCard(p) {
  if (!p) { document.getElementById("cardWrap").innerHTML = '<div class="loading-state">No profile found.</div>'; return; }
  var initials = getInitials(p.business_name || p.full_name || "BF");
  var websiteDisplay = p.website ? p.website.replace(/^https?:\/\//, "") : "";
  var html = '<div class="id-card">' +
    '<div class="id-card-accent"></div>' +
    '<div class="id-card-body">' +
      '<div class="id-card-avatar">' + initials + '</div>' +
      '<div class="id-card-info">' +
        '<div class="id-card-company">' + (p.business_name || "Your Business Name") + '</div>' +
        (p.industry ? '<div class="id-card-industry">' + p.industry + '</div>' : '<div class="id-card-industry" style="color:#4a5280">Industry not set</div>') +
        (p.bio ? '<div class="id-card-bio">&ldquo;' + p.bio.slice(0, 160) + '&rdquo;</div>' : '') +
        '<div class="id-card-contacts">' +
          (p.website ? '<div class="id-card-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><a href="' + p.website + '" target="_blank" rel="noopener">' + websiteDisplay + '</a></div>' : '') +
          (p.contact_phone ? '<div class="id-card-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 5.92 5.92l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>' + p.contact_phone + '</div>' : '') +
          (p.contact_email ? '<div class="id-card-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' + p.contact_email + '</div>' : '') +
          (p.location ? '<div class="id-card-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + p.location + '</div>' : '') +
        '</div>' +
        '<div class="id-card-verified"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>BizForce AI Member</div>' +
      '</div>' +
    '</div>' +
    '<div class="id-card-watermark">BIZFORCE AI</div>' +
  '</div>';
  document.getElementById("cardWrap").innerHTML = html;
}

function fillForm(p) {
  if (!p) return;
  document.getElementById("fBizName").value      = p.business_name    || "";
  document.getElementById("fIndustry").value     = p.industry         || "";
  document.getElementById("fBio").value          = p.bio              || "";
  document.getElementById("fWebsite").value      = p.website          || "";
  document.getElementById("fPhone").value        = p.contact_phone    || "";
  document.getElementById("fLocation").value     = p.location         || "";
  document.getElementById("fContactEmail").value = p.contact_email    || "";
}

async function saveProfile() {
  var btn = document.getElementById("saveBtn");
  var status = document.getElementById("saveStatus");
  btn.disabled = true;
  status.textContent = "Saving...";
  status.className = "save-status";
  var body = {
    business_name:  document.getElementById("fBizName").value.trim(),
    industry:       document.getElementById("fIndustry").value.trim(),
    bio:            document.getElementById("fBio").value.trim(),
    website:        document.getElementById("fWebsite").value.trim(),
    contact_phone:  document.getElementById("fPhone").value.trim(),
    location:       document.getElementById("fLocation").value.trim(),
    contact_email:  document.getElementById("fContactEmail").value.trim()
  };
  try {
    var res = await fetch(API_URL + "/api/profile/me", {
      method: "PUT",
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok) { var e = await res.json(); throw new Error(e.error || "Save failed"); }
    var data = await res.json();
    profile = data.profile;
    renderCard(profile);
    status.textContent = "Saved successfully!";
    status.className = "save-status ok";
    setTimeout(function() { status.textContent = ""; }, 3000);
  } catch (e) {
    status.textContent = e.message || "Save failed";
    status.className = "save-status err";
  }
  btn.disabled = false;
}

loadProfile();
</script>
<script src="/scripts/termaximus-presence.js"></script>
</body>
</html>
