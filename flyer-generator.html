<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Flyer Generator</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(0,229,255,.12),transparent 38%),radial-gradient(circle at 80% 90%,rgba(168,85,247,.16),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:32px 24px 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:48px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(0,229,255,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(0,229,255,.55);box-shadow:0 0 20px rgba(0,229,255,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(90deg,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero{text-align:center;margin-bottom:40px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.08);color:#22d3ee;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
    .hero-title{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#00e5ff 0%,#7b2ff7 60%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero-sub{margin:0;color:#8892b8;font-size:1rem;line-height:1.6}

    /* Template selector */
    .tpl-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px}
    .tpl-card{background:rgba(10,15,35,.78);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 16px;cursor:pointer;transition:all .22s;text-align:left;font-family:inherit;display:flex;flex-direction:column;gap:10px;align-items:flex-start}
    .tpl-card:hover{border-color:rgba(0,229,255,.28);transform:translateY(-2px)}
    .tpl-card.active{border-color:rgba(0,229,255,.55);background:rgba(0,229,255,.06);box-shadow:0 0 24px rgba(0,229,255,.1)}
    .tpl-thumb-wrap{width:100%;display:flex;justify-content:center}
    .tpl-thumb{width:58px;height:82px;border-radius:4px;overflow:hidden;flex-shrink:0;position:relative}
    /* Professional thumb */
    .tth-pro{background:#0c1228;display:flex;flex-direction:column}
    .tth-pro-hdr{height:14px;background:#0a0f2a;border-bottom:1px solid rgba(34,211,238,.35);display:flex;align-items:center;padding:0 5px;flex-shrink:0}
    .tth-pro-body{flex:1;padding:6px 5px;display:flex;flex-direction:column;gap:3px}
    .tth-pro-ftr{height:15px;background:rgba(34,211,238,.1);border-top:1px solid rgba(34,211,238,.2);flex-shrink:0}
    /* Bold thumb */
    .tth-bold{background:#0a0820;display:flex;flex-direction:column}
    .tth-bold-bar{height:4px;background:linear-gradient(90deg,#22d3ee,#a855f7);flex-shrink:0}
    .tth-bold-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:4px}
    .tth-bold-ftr{height:13px;background:rgba(10,8,28,.9);border-top:1px solid rgba(168,85,247,.2);flex-shrink:0}
    /* Minimal thumb */
    .tth-min{background:#070b18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:6px 5px;border:1px solid rgba(255,255,255,.08)}
    .tpl-name{font-size:.92rem;font-weight:800;color:#f4f7ff}
    .tpl-desc{font-size:.72rem;color:#8892b8;line-height:1.4}
    .tpl-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(0,229,255,.4);background:rgba(0,229,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-start;opacity:0;transition:opacity .2s}
    .tpl-check svg{width:10px;height:10px;color:#22d3ee}
    .tpl-card.active .tpl-check{opacity:1}

    /* Builder */
    .builder{display:grid;grid-template-columns:340px 1fr;gap:28px;align-items:start}
    .form-panel{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:26px;display:flex;flex-direction:column;gap:0}
    .form-section{font-size:.64rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#4a5280;margin:18px 0 12px;padding-top:18px;border-top:1px solid rgba(255,255,255,.06)}
    .form-section:first-child{margin-top:0;padding-top:0;border-top:none}
    .form-group{margin-bottom:13px}
    .form-label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8892b8;margin-bottom:6px}
    .form-input,.form-textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:9px;color:#e8e8ff;font-size:.86rem;font-family:inherit;outline:none;transition:border-color .2s}
    .form-input::placeholder,.form-textarea::placeholder{color:#3a4268}
    .form-input:focus,.form-textarea:focus{border-color:rgba(0,229,255,.4)}
    .form-textarea{resize:vertical;min-height:72px;line-height:1.5}
    .form-name-row{display:flex;gap:8px;margin-top:22px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
    .form-name-row .form-input{flex:1}
    .btn-save-flyer{flex-shrink:0;padding:10px 16px;border-radius:9px;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.1);color:#22d3ee;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
    .btn-save-flyer:hover{background:rgba(0,229,255,.2)}
    .btn-save-flyer:disabled{opacity:.45;cursor:not-allowed}
    .btn-my-flyers{flex-shrink:0;padding:10px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#8892b8;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
    .btn-my-flyers:hover{border-color:rgba(255,255,255,.2);color:#e8e8ff}

    /* Preview panel */
    .preview-panel{display:flex;flex-direction:column;gap:18px}
    .preview-controls{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .ctrl-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8892b8}
    .color-btns{display:flex;gap:8px}
    .color-btn{padding:7px 14px;border-radius:8px;font-size:.75rem;font-weight:800;letter-spacing:.06em;cursor:pointer;font-family:inherit;border:1.5px solid transparent;transition:all .2s;text-transform:uppercase}
    .color-btn[data-color="neon"]{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.25);color:#22d3ee}
    .color-btn[data-color="neon"].active{border-color:#22d3ee;box-shadow:0 0 12px rgba(34,211,238,.25)}
    .color-btn[data-color="crimson"]{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#f43f5e}
    .color-btn[data-color="crimson"].active{border-color:#f43f5e;box-shadow:0 0 12px rgba(244,63,94,.25)}
    .color-btn[data-color="jade"]{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.25);color:#34d399}
    .color-btn[data-color="jade"].active{border-color:#34d399;box-shadow:0 0 12px rgba(52,211,153,.25)}
    .color-btn[data-color="gold"]{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.25);color:#fbbf24}
    .color-btn[data-color="gold"].active{border-color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.2)}

    /* Flyer preview container */
    .flyer-frame{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;display:flex;justify-content:center;align-items:flex-start}
    #flyerPreview{width:100%;max-width:380px;aspect-ratio:1/1.414;position:relative;overflow:hidden;border-radius:4px;box-shadow:0 16px 48px rgba(0,0,0,.7)}

    /* Download button */
    .dl-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .btn-dl-png{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:12px;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.12);color:#22d3ee;font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.02em}
    .btn-dl-png:hover{background:rgba(0,229,255,.22);box-shadow:0 0 24px rgba(0,229,255,.2)}
    .btn-dl-png:disabled{opacity:.45;cursor:not-allowed}
    .btn-dl-png svg{width:16px;height:16px}
    .status-msg{font-size:.82rem;color:#8892b8}
    .status-msg.ok{color:#34d399}
    .status-msg.err{color:#f87171}

    /* Saved flyers modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:rgba(10,15,35,.97);border:1px solid rgba(0,229,255,.2);border-radius:20px;padding:28px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .modal-title{font-size:1.05rem;font-weight:800;color:#f4f7ff;margin:0}
    .modal-close{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#8892b8;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
    .modal-close:hover{border-color:rgba(248,113,113,.4);color:#f87171}
    .saved-list{display:flex;flex-direction:column;gap:8px}
    .saved-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
    .saved-item:hover{border-color:rgba(0,229,255,.25)}
    .saved-item-info{flex:1;min-width:0}
    .saved-item-name{font-size:.9rem;font-weight:700;color:#f4f7ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .saved-item-meta{font-size:.7rem;color:#8892b8;margin-top:3px}
    .saved-item-actions{display:flex;gap:7px;flex-shrink:0}
    .si-btn{padding:6px 12px;border-radius:8px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid;transition:all .2s}
    .si-load{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3);color:#22d3ee}
    .si-load:hover{background:rgba(0,229,255,.16)}
    .si-del{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.25);color:#f87171}
    .si-del:hover{background:rgba(248,113,113,.16)}
    .empty-modal{text-align:center;padding:36px 20px;color:#8892b8;font-size:.88rem}

    @media(max-width:820px){.builder{grid-template-columns:1fr}.tpl-selector{grid-template-columns:1fr 1fr 1fr}.preview-controls{flex-direction:column;align-items:flex-start}}
    @media(max-width:540px){.tpl-selector{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">FLYER GENERATOR</div>
    <h1 class="hero-title">Create a Flyer</h1>
    <p class="hero-sub">Choose a layout, fill in your content, and download a print-ready PNG.</p>
  </div>

  <!-- Template selector -->
  <div class="tpl-selector">
    <button class="tpl-card active" data-tpl="professional" onclick="selectTemplate(this,'professional')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb tth-pro">
          <div class="tth-pro-hdr">
            <div style="width:22px;height:2px;background:#22d3ee;border-radius:1px"></div>
            <div style="flex:1"></div>
            <div style="width:10px;height:2px;background:rgba(255,255,255,.2);border-radius:1px"></div>
          </div>
          <div class="tth-pro-body">
            <div style="width:85%;height:5px;background:#f4f7ff;border-radius:1px;opacity:.9"></div>
            <div style="width:3px;height:10px;background:#22d3ee;border-radius:1px;margin:2px 0"></div>
            <div style="display:flex;flex-direction:column;gap:2px">
              <div style="width:100%;height:1.5px;background:rgba(255,255,255,.15);border-radius:1px"></div>
              <div style="width:80%;height:1.5px;background:rgba(255,255,255,.15);border-radius:1px"></div>
              <div style="width:90%;height:1.5px;background:rgba(255,255,255,.15);border-radius:1px"></div>
              <div style="width:75%;height:1.5px;background:rgba(255,255,255,.12);border-radius:1px"></div>
            </div>
          </div>
          <div class="tth-pro-ftr">
            <div style="padding:0 5px;display:flex;align-items:center;height:100%;gap:4px">
              <div style="width:22px;height:2px;background:rgba(34,211,238,.6);border-radius:1px"></div>
              <div style="width:14px;height:2px;background:rgba(255,255,255,.2);border-radius:1px"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tpl-name">Professional</div>
      <div class="tpl-desc">Header, structured body, call-to-action footer</div>
    </button>

    <button class="tpl-card" data-tpl="bold" onclick="selectTemplate(this,'bold')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb tth-bold">
          <div class="tth-bold-bar"></div>
          <div class="tth-bold-body">
            <div style="width:44px;height:8px;background:linear-gradient(90deg,#22d3ee,#a855f7);border-radius:2px;opacity:.9"></div>
            <div style="width:36px;height:5px;background:linear-gradient(90deg,#22d3ee,#a855f7);border-radius:1px;opacity:.7"></div>
            <div style="width:38px;height:2px;background:rgba(255,255,255,.12);border-radius:1px;margin-top:2px"></div>
            <div style="width:32px;height:2px;background:rgba(255,255,255,.1);border-radius:1px"></div>
            <div style="margin-top:5px;width:40px;height:9px;background:linear-gradient(90deg,#22d3ee,#a855f7);border-radius:2px"></div>
          </div>
          <div class="tth-bold-ftr">
            <div style="padding:0 5px;display:flex;justify-content:center;align-items:center;height:100%;gap:6px">
              <div style="width:14px;height:1.5px;background:rgba(255,255,255,.2);border-radius:1px"></div>
              <div style="width:10px;height:1.5px;background:rgba(255,255,255,.15);border-radius:1px"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tpl-name">Bold</div>
      <div class="tpl-desc">Centered gradient headline, full-width CTA button</div>
    </button>

    <button class="tpl-card" data-tpl="minimal" onclick="selectTemplate(this,'minimal')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb tth-min">
          <div style="width:30px;height:1.5px;background:rgba(34,211,238,.5);margin-bottom:6px"></div>
          <div style="width:40px;height:5px;background:rgba(255,255,255,.85);border-radius:1px;margin-bottom:3px"></div>
          <div style="width:44px;height:3px;background:rgba(255,255,255,.6);border-radius:1px;margin-bottom:5px"></div>
          <div style="width:20px;height:1px;background:rgba(34,211,238,.6);margin-bottom:5px"></div>
          <div style="display:flex;flex-direction:column;gap:2px;align-items:center">
            <div style="width:38px;height:1.5px;background:rgba(255,255,255,.12);border-radius:1px"></div>
            <div style="width:30px;height:1.5px;background:rgba(255,255,255,.1);border-radius:1px"></div>
          </div>
          <div style="margin-top:6px;width:28px;height:2px;background:rgba(34,211,238,.5);border-bottom:none"></div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tpl-name">Minimal</div>
      <div class="tpl-desc">Clean, centered typography with generous whitespace</div>
    </button>
  </div>

  <!-- Builder -->
  <div class="builder">
    <!-- Form panel -->
    <div class="form-panel">
      <div class="form-section" style="margin-top:0;padding-top:0;border-top:none">Content</div>
      <div class="form-group">
        <label class="form-label">Business / Brand Name</label>
        <input class="form-input" id="fBiz" type="text" placeholder="Acme Corporation" maxlength="80">
      </div>
      <div class="form-group">
        <label class="form-label">Headline <span style="color:#f43f5e;font-weight:900">*</span></label>
        <input class="form-input" id="fHeadline" type="text" placeholder="Your Main Message Here" maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label">Subheadline</label>
        <input class="form-input" id="fSub" type="text" placeholder="Supporting text or tagline" maxlength="120">
      </div>
      <div class="form-group">
        <label class="form-label">Body Text</label>
        <textarea class="form-textarea" id="fBody" placeholder="Describe your event, offer, or announcement in a few sentences..." maxlength="400"></textarea>
      </div>
      <div class="form-section">Event Details</div>
      <div class="form-group">
        <label class="form-label">Call to Action</label>
        <input class="form-input" id="fCta" type="text" placeholder="Register Now / Shop Today / Learn More" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label">Date &amp; Time</label>
        <input class="form-input" id="fDate" type="text" placeholder="Saturday, July 4, 2026 · 7:00 PM" maxlength="60">
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input class="form-input" id="fLocation" type="text" placeholder="Venue Name, City, State" maxlength="80">
      </div>
      <div class="form-section">Contact Info</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="fEmail" type="email" placeholder="hello@yoursite.com" maxlength="120">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="fPhone" type="tel" placeholder="+1 (555) 000-0000" maxlength="40">
      </div>
      <div class="form-group">
        <label class="form-label">Website</label>
        <input class="form-input" id="fWebsite" type="url" placeholder="https://yoursite.com" maxlength="100">
      </div>
      <div class="form-name-row">
        <input class="form-input" id="flyerName" type="text" placeholder="Flyer name (for saving)..." maxlength="80">
        <button class="btn-save-flyer" id="saveBtn" onclick="saveFlyer()">Save</button>
        <button class="btn-my-flyers" onclick="openSavedModal()">My Flyers</button>
      </div>
      <div class="status-msg" id="formStatus" style="margin-top:10px;min-height:18px"></div>
    </div>

    <!-- Preview panel -->
    <div class="preview-panel">
      <div class="preview-controls">
        <div>
          <div class="ctrl-label" style="margin-bottom:10px">Color Theme</div>
          <div class="color-btns">
            <button class="color-btn active" data-color="neon"    onclick="setColor(this,'neon')">Neon</button>
            <button class="color-btn"        data-color="crimson" onclick="setColor(this,'crimson')">Crimson</button>
            <button class="color-btn"        data-color="jade"    onclick="setColor(this,'jade')">Jade</button>
            <button class="color-btn"        data-color="gold"    onclick="setColor(this,'gold')">Gold</button>
          </div>
        </div>
      </div>

      <div class="flyer-frame">
        <div id="flyerPreview"></div>
      </div>

      <div class="dl-row">
        <button class="btn-dl-png" id="dlBtn" onclick="downloadPNG()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PNG
        </button>
        <span class="status-msg" id="dlStatus"></span>
      </div>
    </div>
  </div>
</div>

<!-- Saved flyers modal -->
<div class="modal-overlay" id="savedModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">My Saved Flyers</h2>
      <button class="modal-close" onclick="closeSavedModal()">✕</button>
    </div>
    <div class="saved-list" id="savedList"><div class="empty-modal">Loading...</div></div>
  </div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var token = localStorage.getItem("bf_token");

var activeTpl   = "professional";
var activeColor = "neon";
var activeFlyerId = null;
var updateTimer = null;

/* ── Color palettes ── */
var COLORS = {
  neon:    { bg:"#070b18", bg2:"#0a0f28", accent:"#22d3ee", accent2:"#a855f7", text:"#f4f7ff", sub:"#8892b8", line:"rgba(34,211,238,.22)", ctaText:"#050c1a" },
  crimson: { bg:"#0f0808", bg2:"#180b0b", accent:"#f43f5e", accent2:"#f97316", text:"#fff4f4", sub:"#c09090", line:"rgba(244,63,94,.22)",  ctaText:"#fff4f4" },
  jade:    { bg:"#060f09", bg2:"#091a0e", accent:"#34d399", accent2:"#22d3ee", text:"#f0fff8", sub:"#80b09a", line:"rgba(52,211,153,.22)",  ctaText:"#041409" },
  gold:    { bg:"#100c02", bg2:"#1a1204", accent:"#fbbf24", accent2:"#f97316", text:"#fffaf0", sub:"#b09878", line:"rgba(251,191,36,.22)",  ctaText:"#100c02" }
};

/* ── Collect form fields ── */
function getF() {
  return {
    biz:      document.getElementById("fBiz").value.trim(),
    headline: document.getElementById("fHeadline").value.trim(),
    sub:      document.getElementById("fSub").value.trim(),
    body:     document.getElementById("fBody").value.trim(),
    cta:      document.getElementById("fCta").value.trim(),
    date:     document.getElementById("fDate").value.trim(),
    location: document.getElementById("fLocation").value.trim(),
    email:    document.getElementById("fEmail").value.trim(),
    phone:    document.getElementById("fPhone").value.trim(),
    website:  document.getElementById("fWebsite").value.trim().replace(/^https?:\/\//, "")
  };
}

/* ── Sanitize for HTML injection ── */
function esc(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ─────────────────────────────────
   TEMPLATE: PROFESSIONAL
───────────────────────────────── */
function renderProfessional(f, c) {
  var hasContact = f.email || f.phone || f.website;
  var contactParts = [f.email, f.phone, f.website].filter(Boolean).map(esc);
  return '<div style="width:100%;height:100%;background:' + c.bg + ';display:flex;flex-direction:column;font-family:system-ui,-apple-system,sans-serif;color:' + c.text + ';position:relative;overflow:hidden">' +
    /* header */
    '<div style="padding:20px 26px 14px;background:' + c.bg2 + ';border-bottom:1px solid ' + c.line + ';display:flex;align-items:center;justify-content:space-between;flex-shrink:0">' +
      '<span style="font-size:9px;font-weight:900;letter-spacing:.22em;text-transform:uppercase;color:' + c.accent + '">' + esc(f.biz || "BIZFORCE AI") + '</span>' +
      (f.date ? '<span style="font-size:8px;color:' + c.sub + ';font-weight:600">' + esc(f.date) + '</span>' : '') +
    '</div>' +
    /* body */
    '<div style="flex:1;padding:24px 26px 18px;display:flex;flex-direction:column">' +
      '<div style="font-size:8px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:' + c.accent + ';margin-bottom:12px;display:flex;align-items:center;gap:8px"><span>' + (f.cta ? "SPECIAL OFFER" : "ANNOUNCEMENT") + '</span></div>' +
      '<h1 style="font-size:clamp(18px,3.6vw,28px);font-weight:900;line-height:1.1;margin:0 0 10px;color:' + c.text + ';word-break:break-word">' + esc(f.headline || "Your Headline") + '</h1>' +
      (f.sub ? '<p style="font-size:11px;color:' + c.accent2 + ';margin:0 0 12px;font-style:italic;font-weight:600;line-height:1.4">' + esc(f.sub) + '</p>' : '') +
      '<div style="width:40px;height:3px;background:linear-gradient(90deg,' + c.accent + ',' + c.accent2 + ');margin-bottom:14px;border-radius:2px;flex-shrink:0"></div>' +
      (f.body ? '<p style="font-size:10px;line-height:1.75;color:' + c.sub + ';margin:0 0 auto;word-break:break-word">' + esc(f.body) + '</p>' : '<div style="flex:1"></div>') +
      ((f.location) ? '<div style="margin-top:14px;display:flex;flex-direction:column;gap:6px;flex-shrink:0">' +
        (f.location ? '<div style="display:flex;align-items:center;gap:7px;font-size:9.5px;color:' + c.text + ';font-weight:600"><span style="width:16px;height:16px;border-radius:4px;background:' + c.accent + '22;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px">&#x1F4CD;</span>' + esc(f.location) + '</div>' : '') +
      '</div>' : '') +
    '</div>' +
    /* footer */
    '<div style="background:linear-gradient(135deg,' + c.accent + '18,' + c.accent2 + '14);border-top:1px solid ' + c.line + ';padding:14px 26px;flex-shrink:0">' +
      (f.cta ? '<div style="font-size:13px;font-weight:900;color:' + c.accent + ';margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase">' + esc(f.cta) + '</div>' : '') +
      (hasContact ? '<div style="display:flex;flex-wrap:wrap;gap:12px">' + contactParts.map(function(p){ return '<span style="font-size:8.5px;color:' + c.sub + '">' + p + '</span>'; }).join("") + '</div>' : '') +
    '</div>' +
  '</div>';
}

/* ─────────────────────────────────
   TEMPLATE: BOLD
───────────────────────────────── */
function renderBold(f, c) {
  var hasContact = f.email || f.phone || f.website;
  var contactParts = [f.email, f.phone, f.website].filter(Boolean).map(esc);
  return '<div style="width:100%;height:100%;background:' + c.bg + ';display:flex;flex-direction:column;font-family:system-ui,-apple-system,sans-serif;color:' + c.text + ';position:relative;overflow:hidden">' +
    /* top gradient bar */
    '<div style="height:5px;background:linear-gradient(90deg,' + c.accent + ',' + c.accent2 + ');flex-shrink:0"></div>' +
    /* decorative glow circles */
    '<div style="position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,' + c.accent + '14,transparent 70%);pointer-events:none"></div>' +
    '<div style="position:absolute;bottom:-40px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,' + c.accent2 + '10,transparent 70%);pointer-events:none"></div>' +
    /* main body */
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px 30px;position:relative;z-index:1">' +
      (f.biz ? '<div style="font-size:7.5px;font-weight:900;letter-spacing:.24em;text-transform:uppercase;color:' + c.accent + ';margin-bottom:18px">' + esc(f.biz) + '</div>' : '') +
      '<h1 style="font-size:clamp(22px,4.5vw,38px);font-weight:900;line-height:1.05;margin:0 0 14px;word-break:break-word;background:linear-gradient(135deg,' + c.accent + ',' + c.accent2 + ');-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:' + c.accent + '">' + esc(f.headline || "YOUR HEADLINE") + '</h1>' +
      (f.sub ? '<p style="font-size:12px;color:' + c.text + ';opacity:.85;margin:0 0 16px;font-weight:600;line-height:1.4">' + esc(f.sub) + '</p>' : '') +
      '<div style="width:48px;height:2.5px;background:linear-gradient(90deg,' + c.accent + ',' + c.accent2 + ');margin:0 auto 16px;border-radius:2px;flex-shrink:0"></div>' +
      (f.body ? '<p style="font-size:10px;line-height:1.75;color:' + c.sub + ';margin:0 auto 18px;max-width:320px;word-break:break-word">' + esc(f.body) + '</p>' : '') +
      ((f.date || f.location) ? '<div style="display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:20px">' +
        (f.date ? '<span style="font-size:9.5px;font-weight:700;color:' + c.text + '">' + esc(f.date) + '</span>' : '') +
        (f.location ? '<span style="font-size:9.5px;font-weight:700;color:' + c.text + '">' + esc(f.location) + '</span>' : '') +
      '</div>' : '') +
      (f.cta ? '<div style="display:inline-block;padding:12px 32px;background:linear-gradient(135deg,' + c.accent + ',' + c.accent2 + ');border-radius:8px;font-size:12px;font-weight:900;color:' + c.ctaText + ';letter-spacing:.08em;text-transform:uppercase">' + esc(f.cta) + '</div>' : '') +
    '</div>' +
    /* footer contact */
    (hasContact ? '<div style="background:' + c.bg2 + ';border-top:1px solid ' + c.line + ';padding:11px 26px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap;flex-shrink:0">' + contactParts.map(function(p){ return '<span style="font-size:8.5px;color:' + c.sub + '">' + p + '</span>'; }).join("") + '</div>' : '') +
  '</div>';
}

/* ─────────────────────────────────
   TEMPLATE: MINIMAL
───────────────────────────────── */
function renderMinimal(f, c) {
  var hasContact = f.email || f.phone || f.website;
  return '<div style="width:100%;height:100%;background:' + c.bg + ';display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 36px;font-family:system-ui,-apple-system,sans-serif;color:' + c.text + ';position:relative;overflow:hidden">' +
    /* top/bottom accent lines */
    '<div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,' + c.accent + ',transparent)"></div>' +
    '<div style="position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,' + c.accent + ',transparent)"></div>' +
    /* content */
    (f.biz ? '<div style="font-size:7px;font-weight:900;letter-spacing:.28em;text-transform:uppercase;color:' + c.accent + ';margin-bottom:28px">' + esc(f.biz) + '</div>' : '<div style="margin-bottom:28px"></div>') +
    '<h1 style="font-size:clamp(20px,3.8vw,30px);font-weight:800;line-height:1.15;margin:0 0 14px;color:' + c.text + ';max-width:320px;word-break:break-word">' + esc(f.headline || "Your Headline") + '</h1>' +
    '<div style="width:32px;height:1px;background:' + c.accent + ';margin:0 auto 14px;flex-shrink:0"></div>' +
    (f.sub ? '<p style="font-size:11px;color:' + c.accent + ';margin:0 0 16px;font-weight:700;line-height:1.4">' + esc(f.sub) + '</p>' : '') +
    (f.body ? '<p style="font-size:10px;line-height:1.8;color:' + c.sub + ';margin:0 0 20px;max-width:290px;word-break:break-word">' + esc(f.body) + '</p>' : '') +
    ((f.date || f.location) ? '<div style="display:flex;flex-direction:column;gap:5px;align-items:center;margin-bottom:20px">' +
      (f.date ? '<span style="font-size:9.5px;letter-spacing:.06em;color:' + c.text + '">' + esc(f.date) + '</span>' : '') +
      (f.location ? '<span style="font-size:9.5px;color:' + c.sub + '">' + esc(f.location) + '</span>' : '') +
    '</div>' : '') +
    (f.cta ? '<div style="font-size:11px;font-weight:900;color:' + c.accent + ';letter-spacing:.12em;text-transform:uppercase;border-bottom:1.5px solid ' + c.accent + ';padding-bottom:3px;margin-bottom:20px">' + esc(f.cta) + '</div>' : '') +
    (hasContact ? '<div style="display:flex;flex-direction:column;gap:4px;align-items:center">' +
      [f.email, f.phone, f.website].filter(Boolean).map(function(p){ return '<span style="font-size:8.5px;color:' + c.sub + '">' + esc(p) + '</span>'; }).join("") +
    '</div>' : '') +
  '</div>';
}

/* ── Render dispatcher ── */
function renderFlyer() {
  var f = getF();
  var c = COLORS[activeColor];
  var html = "";
  if      (activeTpl === "professional") html = renderProfessional(f, c);
  else if (activeTpl === "bold")         html = renderBold(f, c);
  else                                   html = renderMinimal(f, c);
  document.getElementById("flyerPreview").innerHTML = html;
}

/* ── Controls ── */
function selectTemplate(btn, tpl) {
  document.querySelectorAll(".tpl-card").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  activeTpl = tpl;
  renderFlyer();
}

function setColor(btn, color) {
  document.querySelectorAll(".color-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  activeColor = color;
  renderFlyer();
}

/* ── Input listeners ── */
var FIELD_IDS = ["fBiz","fHeadline","fSub","fBody","fCta","fDate","fLocation","fEmail","fPhone","fWebsite"];
FIELD_IDS.forEach(function(id) {
  document.getElementById(id).addEventListener("input", function() {
    clearTimeout(updateTimer);
    updateTimer = setTimeout(renderFlyer, 180);
  });
});

/* ── Download PNG ── */
async function downloadPNG() {
  var btn = document.getElementById("dlBtn");
  var status = document.getElementById("dlStatus");
  btn.disabled = true;
  status.textContent = "Rendering...";
  status.className = "status-msg";
  try {
    var el = document.getElementById("flyerPreview");
    var canvas = await html2canvas(el, {
      scale: 3,
      useCORS: true,
      allowTaint: false,
      backgroundColor: null,
      logging: false
    });
    var name = (document.getElementById("flyerName").value.trim() || document.getElementById("fHeadline").value.trim() || "flyer").replace(/[^a-z0-9\-_\s]/gi,"").replace(/\s+/g,"-").toLowerCase() || "flyer";
    var link = document.createElement("a");
    link.download = name + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    status.textContent = "Downloaded!";
    status.className = "status-msg ok";
  } catch(e) {
    status.textContent = "Download failed. Try again.";
    status.className = "status-msg err";
    console.error("html2canvas error:", e);
  }
  btn.disabled = false;
  setTimeout(function() { status.textContent = ""; status.className = "status-msg"; }, 3500);
}

/* ── Save flyer ── */
async function saveFlyer() {
  var btn = document.getElementById("saveBtn");
  var status = document.getElementById("formStatus");
  btn.disabled = true;
  status.textContent = "Saving...";
  status.className = "status-msg";
  var f = getF();
  var name = document.getElementById("flyerName").value.trim() || f.headline || "Untitled Flyer";
  var body = { name: name, template: activeTpl, color_theme: activeColor, content: f };
  try {
    var url    = activeFlyerId ? API_URL + "/api/flyers/" + activeFlyerId : API_URL + "/api/flyers";
    var method = activeFlyerId ? "PUT" : "POST";
    var res = await fetch(url, {
      method: method,
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok) { var e = await res.json(); throw new Error(e.error || "Save failed"); }
    var d = await res.json();
    if (d.flyer) activeFlyerId = d.flyer.id;
    status.textContent = "Saved!";
    status.className = "status-msg ok";
  } catch(e) {
    status.textContent = e.message || "Save failed";
    status.className = "status-msg err";
  }
  btn.disabled = false;
  setTimeout(function() { status.textContent = ""; status.className = "status-msg"; }, 3000);
}

/* ── My Flyers modal ── */
async function openSavedModal() {
  document.getElementById("savedModal").classList.add("open");
  document.getElementById("savedList").innerHTML = '<div class="empty-modal">Loading...</div>';
  try {
    var res = await fetch(API_URL + "/api/flyers", { headers: { "Authorization": "Bearer " + token } });
    if (!res.ok) throw new Error("Load failed");
    var d = await res.json();
    renderSavedList(d.flyers || []);
  } catch(e) {
    document.getElementById("savedList").innerHTML = '<div class="empty-modal">Unable to load saved flyers.</div>';
  }
}

function closeSavedModal() {
  document.getElementById("savedModal").classList.remove("open");
}

document.getElementById("savedModal").addEventListener("click", function(e) {
  if (e.target === this) closeSavedModal();
});

function renderSavedList(flyers) {
  var list = document.getElementById("savedList");
  if (!flyers.length) {
    list.innerHTML = '<div class="empty-modal">No saved flyers yet.<br>Fill in the form and click Save.</div>';
    return;
  }
  list.innerHTML = '<div class="saved-list">' + flyers.map(function(fl) {
    var d = new Date(fl.updated_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    var tplLabel = fl.template.charAt(0).toUpperCase() + fl.template.slice(1);
    var colorLabel = fl.color_theme.charAt(0).toUpperCase() + fl.color_theme.slice(1);
    return '<div class="saved-item">' +
      '<div class="saved-item-info">' +
        '<div class="saved-item-name">' + fl.name + '</div>' +
        '<div class="saved-item-meta">' + tplLabel + ' &middot; ' + colorLabel + ' &middot; ' + d + '</div>' +
      '</div>' +
      '<div class="saved-item-actions">' +
        '<button class="si-btn si-load" onclick="loadFlyer(\'' + fl.id + '\')">Load</button>' +
        '<button class="si-btn si-del"  onclick="deleteFlyer(\'' + fl.id + '\',this)">Delete</button>' +
      '</div>' +
    '</div>';
  }).join("") + '</div>';
}

var savedFlyerCache = [];
async function loadFlyer(id) {
  try {
    var res = await fetch(API_URL + "/api/flyers", { headers: { "Authorization": "Bearer " + token } });
    if (!res.ok) throw new Error();
    var d = await res.json();
    var fl = (d.flyers || []).find(function(f) { return f.id === id; });
    if (!fl) throw new Error();
    activeFlyerId = fl.id;
    document.getElementById("flyerName").value = fl.name || "";
    var c = fl.content || {};
    document.getElementById("fBiz").value      = c.biz      || "";
    document.getElementById("fHeadline").value = c.headline || "";
    document.getElementById("fSub").value      = c.sub      || "";
    document.getElementById("fBody").value     = c.body     || "";
    document.getElementById("fCta").value      = c.cta      || "";
    document.getElementById("fDate").value     = c.date     || "";
    document.getElementById("fLocation").value = c.location || "";
    document.getElementById("fEmail").value    = c.email    || "";
    document.getElementById("fPhone").value    = c.phone    || "";
    document.getElementById("fWebsite").value  = c.website  || "";
    // Set template
    document.querySelectorAll(".tpl-card").forEach(function(b) { b.classList.remove("active"); });
    var tplBtn = document.querySelector('.tpl-card[data-tpl="' + fl.template + '"]');
    if (tplBtn) tplBtn.classList.add("active");
    activeTpl = fl.template || "professional";
    // Set color
    document.querySelectorAll(".color-btn").forEach(function(b) { b.classList.remove("active"); });
    var colorBtn = document.querySelector('.color-btn[data-color="' + fl.color_theme + '"]');
    if (colorBtn) colorBtn.classList.add("active");
    activeColor = fl.color_theme || "neon";
    renderFlyer();
    closeSavedModal();
  } catch(e) {
    alert("Could not load flyer.");
  }
}

async function deleteFlyer(id, btn) {
  if (!confirm("Delete this flyer?")) return;
  btn.disabled = true;
  try {
    var res = await fetch(API_URL + "/api/flyers/" + id, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error();
    if (activeFlyerId === id) { activeFlyerId = null; document.getElementById("flyerName").value = ""; }
    openSavedModal();
  } catch(e) {
    btn.disabled = false;
    alert("Delete failed.");
  }
}

/* ── Init ── */
renderFlyer();
</script>
</body>
</html>
