<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Flyer Generator</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(0,229,255,.12),transparent 38%),radial-gradient(circle at 80% 90%,rgba(168,85,247,.16),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:32px 24px 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:48px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(0,229,255,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(0,229,255,.55);box-shadow:0 0 20px rgba(0,229,255,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(90deg,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero{text-align:center;margin-bottom:40px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.08);color:#22d3ee;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
    .hero-title{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#00e5ff 0%,#7b2ff7 60%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero-sub{margin:0;color:#8892b8;font-size:1rem;line-height:1.6}

    /* Template selector — horizontal scroll row */
    .tpl-selector{display:flex;gap:14px;margin-bottom:36px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
    .tpl-selector::-webkit-scrollbar{height:4px}.tpl-selector::-webkit-scrollbar-track{background:transparent}.tpl-selector::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
    .tpl-card{background:rgba(10,15,35,.78);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 16px;cursor:pointer;transition:all .22s;text-align:left;font-family:inherit;display:flex;flex-direction:column;gap:10px;align-items:flex-start;flex-shrink:0;width:152px}
    .tpl-card:hover{border-color:rgba(0,229,255,.28);transform:translateY(-2px)}
    .tpl-card.active{border-color:rgba(0,229,255,.55);background:rgba(0,229,255,.06);box-shadow:0 0 24px rgba(0,229,255,.1)}
    .tpl-thumb-wrap{width:100%;display:flex;justify-content:center}
    .tpl-thumb{width:58px;height:82px;border-radius:4px;overflow:hidden;flex-shrink:0;position:relative}
    .tpl-name{font-size:.92rem;font-weight:800;color:#f4f7ff}
    .tpl-desc{font-size:.72rem;color:#8892b8;line-height:1.4}
    .tpl-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(0,229,255,.4);background:rgba(0,229,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-start;opacity:0;transition:opacity .2s}
    .tpl-check svg{width:10px;height:10px;color:#22d3ee}
    .tpl-card.active .tpl-check{opacity:1}

    /* Builder */
    .builder{display:grid;grid-template-columns:340px 1fr;gap:28px;align-items:start}
    .form-panel{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:26px;display:flex;flex-direction:column;gap:0}
    .form-section{font-size:.64rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#4a5280;margin:18px 0 12px;padding-top:18px;border-top:1px solid rgba(255,255,255,.06)}
    .form-section:first-child{margin-top:0;padding-top:0;border-top:none}
    .form-group{margin-bottom:13px}
    .form-label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8892b8;margin-bottom:6px}
    .form-input,.form-textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:9px;color:#e8e8ff;font-size:.86rem;font-family:inherit;outline:none;transition:border-color .2s}
    .form-input::placeholder,.form-textarea::placeholder{color:#3a4268}
    .form-input:focus,.form-textarea:focus{border-color:rgba(0,229,255,.4)}
    .form-textarea{resize:vertical;min-height:72px;line-height:1.5}
    .form-name-row{display:flex;gap:8px;margin-top:22px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
    .form-name-row .form-input{flex:1}
    .btn-save-flyer{flex-shrink:0;padding:10px 16px;border-radius:9px;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.1);color:#22d3ee;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
    .btn-save-flyer:hover{background:rgba(0,229,255,.2)}
    .btn-save-flyer:disabled{opacity:.45;cursor:not-allowed}
    .btn-my-flyers{flex-shrink:0;padding:10px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#8892b8;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
    .btn-my-flyers:hover{border-color:rgba(255,255,255,.2);color:#e8e8ff}

    /* Preview panel */
    .preview-panel{display:flex;flex-direction:column;gap:18px}
    .preview-controls{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .ctrl-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8892b8}
    .color-btns{display:flex;gap:8px}
    .color-btn{padding:7px 14px;border-radius:8px;font-size:.75rem;font-weight:800;letter-spacing:.06em;cursor:pointer;font-family:inherit;border:1.5px solid transparent;transition:all .2s;text-transform:uppercase}
    .color-btn[data-color="neon"]{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.25);color:#22d3ee}
    .color-btn[data-color="neon"].active{border-color:#22d3ee;box-shadow:0 0 12px rgba(34,211,238,.25)}
    .color-btn[data-color="crimson"]{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#f43f5e}
    .color-btn[data-color="crimson"].active{border-color:#f43f5e;box-shadow:0 0 12px rgba(244,63,94,.25)}
    .color-btn[data-color="jade"]{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.25);color:#34d399}
    .color-btn[data-color="jade"].active{border-color:#34d399;box-shadow:0 0 12px rgba(52,211,153,.25)}
    .color-btn[data-color="gold"]{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.25);color:#fbbf24}
    .color-btn[data-color="gold"].active{border-color:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,.2)}

    /* Flyer preview container */
    .flyer-frame{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;display:flex;justify-content:center;align-items:flex-start}
    #flyerPreview{width:100%;max-width:380px;aspect-ratio:1/1.414;position:relative;overflow:hidden;border-radius:4px;box-shadow:0 16px 48px rgba(0,0,0,.7)}

    /* Download button */
    .dl-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .btn-dl-png{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:12px;border:1px solid rgba(0,229,255,.4);background:rgba(0,229,255,.12);color:#22d3ee;font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.02em}
    .btn-dl-png:hover{background:rgba(0,229,255,.22);box-shadow:0 0 24px rgba(0,229,255,.2)}
    .btn-dl-png:disabled{opacity:.45;cursor:not-allowed}
    .btn-dl-png svg{width:16px;height:16px}
    .status-msg{font-size:.82rem;color:#8892b8}
    .status-msg.ok{color:#34d399}
    .status-msg.err{color:#f87171}

    /* Saved flyers modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:rgba(10,15,35,.97);border:1px solid rgba(0,229,255,.2);border-radius:20px;padding:28px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .modal-title{font-size:1.05rem;font-weight:800;color:#f4f7ff;margin:0}
    .modal-close{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#8892b8;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
    .modal-close:hover{border-color:rgba(248,113,113,.4);color:#f87171}
    .saved-list{display:flex;flex-direction:column;gap:8px}
    .saved-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
    .saved-item:hover{border-color:rgba(0,229,255,.25)}
    .saved-item-info{flex:1;min-width:0}
    .saved-item-name{font-size:.9rem;font-weight:700;color:#f4f7ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .saved-item-meta{font-size:.7rem;color:#8892b8;margin-top:3px}
    .saved-item-actions{display:flex;gap:7px;flex-shrink:0}
    .si-btn{padding:6px 12px;border-radius:8px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid;transition:all .2s}
    .si-load{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3);color:#22d3ee}
    .si-load:hover{background:rgba(0,229,255,.16)}
    .si-del{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.25);color:#f87171}
    .si-del:hover{background:rgba(248,113,113,.16)}
    .empty-modal{text-align:center;padding:36px 20px;color:#8892b8;font-size:.88rem}

    @media(max-width:820px){.builder{grid-template-columns:1fr}.preview-controls{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">FLYER GENERATOR</div>
    <h1 class="hero-title">Create a Flyer</h1>
    <p class="hero-sub">Choose a layout, fill in your content, and download a print-ready PNG.</p>
  </div>

  <!-- Template selector — horizontal scroll -->
  <div class="tpl-selector">

    <!-- 1. Event Night -->
    <button class="tpl-card active" data-tpl="event-night" onclick="selectTemplate(this,'event-night')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb" style="background:#080612;display:flex;flex-direction:column;overflow:hidden;position:relative">
          <div style="position:absolute;top:-14px;right:-14px;width:40px;height:40px;background:radial-gradient(circle,rgba(168,85,247,.55),transparent 70%)"></div>
          <div style="height:3px;background:linear-gradient(90deg,#a855f7,#22d3ee);flex-shrink:0"></div>
          <div style="flex:1;padding:5px;display:flex;flex-direction:column;justify-content:center;gap:3px;position:relative;z-index:1">
            <div style="width:22px;height:1.5px;background:rgba(168,85,247,.7);border-radius:1px"></div>
            <div style="width:90%;height:7px;background:linear-gradient(90deg,#a855f7,#22d3ee);border-radius:2px;opacity:.9"></div>
            <div style="width:70%;height:4px;background:linear-gradient(90deg,#7c3aed,#06b6d4);border-radius:1px;opacity:.65"></div>
            <div style="width:50%;height:2px;background:rgba(255,255,255,.2);border-radius:1px;margin-top:3px"></div>
            <div style="width:38%;height:2px;background:rgba(255,255,255,.13);border-radius:1px"></div>
          </div>
          <div style="height:12px;background:linear-gradient(90deg,rgba(168,85,247,.35),rgba(34,211,238,.25));border-top:1px solid rgba(168,85,247,.25);display:flex;align-items:center;padding:0 5px;flex-shrink:0">
            <div style="width:28px;height:2px;background:rgba(168,85,247,.75);border-radius:1px"></div>
          </div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tpl-name">Event Night</div>
      <div class="tpl-desc">Dark concert poster, gradient headline</div>
    </button>

    <!-- 2. Grand Opening -->
    <button class="tpl-card" data-tpl="grand-opening" onclick="selectTemplate(this,'grand-opening')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb" style="background:#030b1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 5px;position:relative;overflow:hidden">
          <div style="position:absolute;top:4px;left:4px;width:8px;height:8px;border-top:1.5px solid rgba(251,191,36,.6);border-left:1.5px solid rgba(251,191,36,.6)"></div>
          <div style="position:absolute;top:4px;right:4px;width:8px;height:8px;border-top:1.5px solid rgba(251,191,36,.6);border-right:1.5px solid rgba(251,191,36,.6)"></div>
          <div style="position:absolute;bottom:4px;left:4px;width:8px;height:8px;border-bottom:1.5px solid rgba(251,191,36,.6);border-left:1.5px solid rgba(251,191,36,.6)"></div>
          <div style="position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-bottom:1.5px solid rgba(251,191,36,.6);border-right:1.5px solid rgba(251,191,36,.6)"></div>
          <div style="border:1px solid rgba(251,191,36,.55);border-radius:2px;padding:2px 4px;font-size:4px;font-weight:900;color:rgba(251,191,36,.9);letter-spacing:.1em;white-space:nowrap;background:rgba(251,191,36,.1)">GRAND OPENING</div>
          <div style="width:80%;height:5px;background:rgba(255,255,255,.85);border-radius:1px"></div>
          <div style="width:60%;height:3px;background:rgba(255,255,255,.45);border-radius:1px"></div>
          <div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:1px;background:rgba(251,191,36,.5)"></div><div style="width:3px;height:3px;border-radius:50%;background:rgba(251,191,36,.7)"></div><div style="width:12px;height:1px;background:rgba(251,191,36,.5)"></div></div>
          <div style="width:38px;height:7px;background:rgba(251,191,36,.25);border:1px solid rgba(251,191,36,.45);border-radius:2px"></div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tpl-name">Grand Opening</div>
      <div class="tpl-desc">Celebratory, corner accents, badge</div>
    </button>

    <!-- 3. Business Promo -->
    <button class="tpl-card" data-tpl="business-promo" onclick="selectTemplate(this,'business-promo')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb" style="background:#060c1e;display:flex;flex-direction:row;overflow:hidden">
          <div style="width:3px;background:linear-gradient(180deg,#22d3ee,#a855f7);flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column">
            <div style="height:12px;background:rgba(4,8,20,.85);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 5px;flex-shrink:0">
              <div style="width:28px;height:2px;background:rgba(34,211,238,.7);border-radius:1px"></div>
            </div>
            <div style="flex:1;padding:5px;display:flex;flex-direction:column;gap:2.5px">
              <div style="width:85%;height:5px;background:rgba(255,255,255,.82);border-radius:1px"></div>
              <div style="width:65%;height:3px;background:rgba(34,211,238,.55);border-radius:1px"></div>
              <div style="width:24px;height:1.5px;background:linear-gradient(90deg,#22d3ee,#a855f7);border-radius:1px;margin:1px 0"></div>
              <div style="width:90%;height:1.5px;background:rgba(255,255,255,.15);border-radius:1px"></div>
              <div style="width:75%;height:1.5px;background:rgba(255,255,255,.12);border-radius:1px"></div>
              <div style="width:80%;height:1.5px;background:rgba(255,255,255,.1);border-radius:1px"></div>
              <div style="margin-top:3px;width:32px;height:7px;border:1px solid rgba(34,211,238,.5);border-radius:2px"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tpl-name">Business Promo</div>
      <div class="tpl-desc">Clean corporate, left accent bar</div>
    </button>

    <!-- 4. Real Estate -->
    <button class="tpl-card" data-tpl="real-estate" onclick="selectTemplate(this,'real-estate')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb" style="background:#07050d;display:flex;flex-direction:column;padding:5px;position:relative;overflow:hidden">
          <div style="position:absolute;inset:4px;border:1px solid rgba(251,191,36,.22);pointer-events:none"></div>
          <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(251,191,36,.6),transparent);margin-bottom:4px"></div>
          <div style="text-align:center;font-size:4px;font-weight:900;color:rgba(251,191,36,.8);letter-spacing:.15em;margin-bottom:3px">LISTING</div>
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">
            <div style="width:80%;height:5px;background:rgba(255,255,255,.82);border-radius:1px"></div>
            <div style="width:55%;height:3px;background:rgba(255,255,255,.45);border-radius:1px"></div>
            <div style="display:flex;align-items:center;gap:3px;margin:3px 0"><div style="width:14px;height:1px;background:rgba(251,191,36,.5)"></div><div style="width:3px;height:3px;border:1px solid rgba(251,191,36,.7);transform:rotate(45deg)"></div><div style="width:14px;height:1px;background:rgba(251,191,36,.5)"></div></div>
            <div style="width:65%;height:1.5px;background:rgba(255,255,255,.18);border-radius:1px"></div>
            <div style="width:48%;height:1.5px;background:rgba(255,255,255,.12);border-radius:1px"></div>
          </div>
          <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(251,191,36,.6),transparent);margin-top:4px"></div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tpl-name">Real Estate</div>
      <div class="tpl-desc">Luxury listing, gold accents, border frame</div>
    </button>

    <!-- 5. Fitness / Gym -->
    <button class="tpl-card" data-tpl="fitness" onclick="selectTemplate(this,'fitness')">
      <div class="tpl-thumb-wrap">
        <div class="tpl-thumb" style="background:#050505;display:flex;flex-direction:column;overflow:hidden;position:relative">
          <div style="position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(249,115,22,.07) 4px,rgba(249,115,22,.07) 5px)"></div>
          <div style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:60px;height:40px;background:radial-gradient(circle,rgba(249,115,22,.25),transparent 70%)"></div>
          <div style="height:4px;background:linear-gradient(90deg,#f97316,#ef4444);flex-shrink:0"></div>
          <div style="flex:1;padding:5px;display:flex;flex-direction:column;justify-content:center;gap:3px;position:relative;z-index:1">
            <div style="width:90%;height:9px;background:rgba(255,255,255,.9);border-radius:1px"></div>
            <div style="width:65%;height:5px;background:linear-gradient(90deg,#f97316,#ef4444);border-radius:1px;opacity:.85"></div>
            <div style="width:48%;height:2px;background:rgba(255,255,255,.22);border-radius:1px;margin-top:2px"></div>
          </div>
          <div style="height:13px;background:linear-gradient(90deg,#f97316,#ef4444);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1">
            <div style="width:32px;height:2.5px;background:rgba(255,255,255,.82);border-radius:1px"></div>
          </div>
        </div>
      </div>
      <div class="tpl-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>

/* ── Render dispatcher ── */
function renderFlyer() {
  var f = getF();
  var c = COLORS[activeColor];
  var html = "";
  if      (activeTpl === "event-night")    html = renderEventNight(f, c);
  else if (activeTpl === "grand-opening")  html = renderGrandOpening(f, c);
  else if (activeTpl === "business-promo") html = renderBusinessPromo(f, c);
  else if (activeTpl === "real-estate")    html = renderRealEstate(f, c);
  else if (activeTpl === "fitness")        html = renderFitness(f, c);
  else                                      html = renderFoodRestaurant(f, c);
  document.getElementById("flyerPreview").innerHTML = html;
}

/* ── Controls ── */
function selectTemplate(btn, tpl) {
  document.querySelectorAll(".tpl-card").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  activeTpl = tpl;
  renderFlyer();
}

function setColor(btn, color) {
  document.querySelectorAll(".color-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  activeColor = color;
  renderFlyer();
}

/* ── Input listeners ── */
var FIELD_IDS = ["fBiz","fHeadline","fSub","fBody","fCta","fDate","fLocation","fEmail","fPhone","fWebsite"];
FIELD_IDS.forEach(function(id) {
  document.getElementById(id).addEventListener("input", function() {
    clearTimeout(updateTimer);
    updateTimer = setTimeout(renderFlyer, 180);
  });
});

/* ── Download PNG ── */
async function downloadPNG() {
  var btn = document.getElementById("dlBtn");
  var status = document.getElementById("dlStatus");
  btn.disabled = true;
  status.textContent = "Rendering...";
  status.className = "status-msg";
  try {
    var el = document.getElementById("flyerPreview");
    var canvas = await html2canvas(el, {
      scale: 3,
      useCORS: true,
      allowTaint: false,
      backgroundColor: null,
      logging: false
    });
    var name = (document.getElementById("flyerName").value.trim() || document.getElementById("fHeadline").value.trim() || "flyer").replace(/[^a-z0-9\-_\s]/gi,"").replace(/\s+/g,"-").toLowerCase() || "flyer";
    var link = document.createElement("a");
    link.download = name + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    status.textContent = "Downloaded!";
    status.className = "status-msg ok";
  } catch(e) {
    status.textContent = "Download failed. Try again.";
    status.className = "status-msg err";
    console.error("html2canvas error:", e);
  }
  btn.disabled = false;
  setTimeout(function() { status.textContent = ""; status.className = "status-msg"; }, 3500);
}

/* ── Save flyer ── */
async function saveFlyer() {
  var btn = document.getElementById("saveBtn");
  var status = document.getElementById("formStatus");
  btn.disabled = true;
  status.textContent = "Saving...";
  status.className = "status-msg";
  var f = getF();
  var name = document.getElementById("flyerName").value.trim() || f.headline || "Untitled Flyer";
  var body = { name: name, template: activeTpl, color_theme: activeColor, content: f };
  try {
    var url    = activeFlyerId ? API_URL + "/api/flyers/" + activeFlyerId : API_URL + "/api/flyers";
    var method = activeFlyerId ? "PUT" : "POST";
    var res = await fetch(url, {
      method: method,
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok) { var e = await res.json(); throw new Error(e.error || "Save failed"); }
    var d = await res.json();
    if (d.flyer) activeFlyerId = d.flyer.id;
    status.textContent = "Saved!";
    status.className = "status-msg ok";
  } catch(e) {
    status.textContent = e.message || "Save failed";
    status.className = "status-msg err";
  }
  btn.disabled = false;
  setTimeout(function() { status.textContent = ""; status.className = "status-msg"; }, 3000);
}

/* ── My Flyers modal ── */
async function openSavedModal() {
  document.getElementById("savedModal").classList.add("open");
  document.getElementById("savedList").innerHTML = '<div class="empty-modal">Loading...</div>';
  try {
    var res = await fetch(API_URL + "/api/flyers", { headers: { "Authorization": "Bearer " + token } });
    if (!res.ok) throw new Error("Load failed");
    var d = await res.json();
    renderSavedList(d.flyers || []);
  } catch(e) {
    document.getElementById("savedList").innerHTML = '<div class="empty-modal">Unable to load saved flyers.</div>';
  }
}

function closeSavedModal() {
  document.getElementById("savedModal").classList.remove("open");
}

document.getElementById("savedModal").addEventListener("click", function(e) {
  if (e.target === this) closeSavedModal();
});

function renderSavedList(flyers) {
  var list = document.getElementById("savedList");
  if (!flyers.length) {
    list.innerHTML = '<div class="empty-modal">No saved flyers yet.<br>Fill in the form and click Save.</div>';
    return;
  }
  list.innerHTML = '<div class="saved-list">' + flyers.map(function(fl) {
    var d = new Date(fl.updated_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    var tplLabel = fl.template.charAt(0).toUpperCase() + fl.template.slice(1);
    var colorLabel = fl.color_theme.charAt(0).toUpperCase() + fl.color_theme.slice(1);
    return '<div class="saved-item">' +
      '<div class="saved-item-info">' +
        '<div class="saved-item-name">' + fl.name + '</div>' +
        '<div class="saved-item-meta">' + tplLabel + ' &middot; ' + colorLabel + ' &middot; ' + d + '</div>' +
      '</div>' +
      '<div class="saved-item-actions">' +
        '<button class="si-btn si-load" onclick="loadFlyer(\'' + fl.id + '\')">Load</button>' +
        '<button class="si-btn si-del"  onclick="deleteFlyer(\'' + fl.id + '\',this)">Delete</button>' +
      '</div>' +
    '</div>';
  }).join("") + '</div>';
}

var savedFlyerCache = [];
async function loadFlyer(id) {
  try {
    var res = await fetch(API_URL + "/api/flyers", { headers: { "Authorization": "Bearer " + token } });
    if (!res.ok) throw new Error();
    var d = await res.json();
    var fl = (d.flyers || []).find(function(f) { return f.id === id; });
    if (!fl) throw new Error();
    activeFlyerId = fl.id;
    document.getElementById("flyerName").value = fl.name || "";
    var c = fl.content || {};
    document.getElementById("fBiz").value      = c.biz      || "";
    document.getElementById("fHeadline").value = c.headline || "";
    document.getElementById("fSub").value      = c.sub      || "";
    document.getElementById("fBody").value     = c.body     || "";
    document.getElementById("fCta").value      = c.cta      || "";
    document.getElementById("fDate").value     = c.date     || "";
    document.getElementById("fLocation").value = c.location || "";
    document.getElementById("fEmail").value    = c.email    || "";
    document.getElementById("fPhone").value    = c.phone    || "";
    document.getElementById("fWebsite").value  = c.website  || "";
    // Set template
    document.querySelectorAll(".tpl-card").forEach(function(b) { b.classList.remove("active"); });
    var tplBtn = document.querySelector('.tpl-card[data-tpl="' + fl.template + '"]');
    if (tplBtn) tplBtn.classList.add("active");
    activeTpl = fl.template || "professional";
    // Set color
    document.querySelectorAll(".color-btn").forEach(function(b) { b.classList.remove("active"); });
    var colorBtn = document.querySelector('.color-btn[data-color="' + fl.color_theme + '"]');
    if (colorBtn) colorBtn.classList.add("active");
    activeColor = fl.color_theme || "neon";
    renderFlyer();
    closeSavedModal();
  } catch(e) {
    alert("Could not load flyer.");
  }
}

async function deleteFlyer(id, btn) {
  if (!confirm("Delete this flyer?")) return;
  btn.disabled = true;
  try {
    var res = await fetch(API_URL + "/api/flyers/" + id, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error();
    if (activeFlyerId === id) { activeFlyerId = null; document.getElementById("flyerName").value = ""; }
    openSavedModal();
  } catch(e) {
    btn.disabled = false;
    alert("Delete failed.");
  }
}

/* ── Init ── */
renderFlyer();
</script>
