<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Messages</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e6edf3;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(0,229,255,.14),transparent 38%),radial-gradient(circle at 85% 90%,rgba(168,85,247,.18),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px 40px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(0,229,255,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(0,229,255,.55);box-shadow:0 0 20px rgba(0,229,255,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(90deg,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero{text-align:center;margin-bottom:28px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(34,211,238,.3);background:rgba(34,211,238,.08);color:#22d3ee;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px}
    .hero-title{margin:0 0 8px;font-size:clamp(1.8rem,4.5vw,2.6rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#00e5ff 0%,#7b2ff7 60%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero-sub{margin:0;color:#8892b8;font-size:.95rem;line-height:1.6}
    .inbox-shell{display:flex;gap:20px;height:calc(100vh - 300px);min-height:520px}
    .conv-pane{width:320px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden}
    .conv-pane-header{padding:18px 20px;font-size:1rem;font-weight:800;color:#f4f7ff;border-bottom:1px solid rgba(255,255,255,.08)}
    .conv-list{flex:1;overflow-y:auto;padding:8px}
    .conv-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;transition:background .2s,border-color .2s;border:1px solid transparent}
    .conv-item:hover{background:rgba(255,255,255,.04)}
    .conv-item.active{background:rgba(34,211,238,.08);border-color:rgba(34,211,238,.28)}
    .conv-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06)}
    .conv-avatar-fallback{display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;color:#22d3ee;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.25)}
    .conv-info{flex:1;min-width:0}
    .conv-name{font-size:.88rem;font-weight:700;color:#f4f7ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-preview{font-size:.78rem;color:#8892b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .thread-pane{flex:1;display:flex;flex-direction:column;background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;min-width:0}
    .thread-header{display:none;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
    .thread-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,.06)}
    .thread-avatar-fallback{display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:#a855f7;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25)}
    .thread-name{font-size:.95rem;font-weight:800;color:#f4f7ff}
    .thread-messages{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px}
    .msg-row{display:flex;flex-direction:column;max-width:70%}
    .msg-mine{align-self:flex-end;align-items:flex-end}
    .msg-theirs{align-self:flex-start;align-items:flex-start}
    .msg-bubble{padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.5;word-break:break-word}
    .msg-mine .msg-bubble{background:linear-gradient(135deg,rgba(0,229,255,.22),rgba(123,47,247,.22));border:1px solid rgba(34,211,238,.3);color:#f4f7ff;border-bottom-right-radius:4px}
    .msg-theirs .msg-bubble{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#e6edf3;border-bottom-left-radius:4px}
    .msg-time{font-size:.68rem;color:#4a5280;margin-top:4px;padding:0 4px}
    .compose-bar{display:flex;gap:10px;padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
    #composeInput{flex:1;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e6edf3;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s}
    #composeInput::placeholder{color:#4a5280}
    #composeInput:focus{border-color:rgba(34,211,238,.5)}
    #sendBtn{padding:12px 22px;border:none;border-radius:12px;font-size:.85rem;font-weight:700;letter-spacing:.03em;color:#fff;background:linear-gradient(135deg,#00e5ff,#7b2ff7);cursor:pointer;transition:all .2s;flex-shrink:0;font-family:inherit}
    #sendBtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,255,.3)}
    #sendBtn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .compose-error{min-height:16px;padding:0 20px 12px;font-size:.78rem;color:#8892b8}
    .compose-error.show{color:#f87171}
    .empty-state{text-align:center;padding:40px 20px;color:#8892b8;font-size:.88rem;line-height:1.6;margin:auto}
    @media(max-width:760px){
      .inbox-shell{flex-direction:column;height:auto}
      .conv-pane{width:100%;height:260px}
      .thread-pane{height:520px}
    }
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">DIRECT MESSAGES</div>
    <h1 class="hero-title">Messages</h1>
    <p class="hero-sub">Talk directly with buyers and sellers across the BizForce AI network.</p>
  </div>

  <div class="inbox-shell">
    <div class="conv-pane">
      <div class="conv-pane-header">Messages</div>
      <div id="conversationList" class="conv-list"><div class="empty-state">Loading conversations...</div></div>
    </div>
    <div class="thread-pane">
      <div id="threadHeader" class="thread-header"></div>
      <div id="threadMessages" class="thread-messages"><div class="empty-state">Select a conversation to start messaging.</div></div>
      <div class="compose-bar">
        <input id="composeInput" type="text" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn" type="button">Send</button>
      </div>
      <div id="composeError" class="compose-error"></div>
    </div>
  </div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var token = localStorage.getItem("bf_token");
var currentUserId = (function(){ try { return JSON.parse(atob(token.split(".")[1])).id; } catch(e){ return null; } })();

var conversations = [];
var activeThreadUserId = null;
var threadMessages = [];
var profileCache = {};

function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatTime(iso) {
  try {
    return new Date(iso).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  } catch (e) {
    return "";
  }
}

async function getProfile(userId) {
  if (profileCache[userId]) return profileCache[userId];
  try {
    var res = await fetch(API_URL + "/api/profile/by-id/" + userId, {
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error("Profile fetch failed");
    var d = await res.json();
    profileCache[userId] = d.profile;
    return d.profile;
  } catch (e) {
    var fallback = { user_id: userId, full_name: null, business_name: null, username: null, logo_url: null };
    profileCache[userId] = fallback;
    return fallback;
  }
}

async function loadConversations() {
  try {
    var res = await fetch(API_URL + "/api/conversations", {
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error("Could not load conversations");
    var d = await res.json();
    var rows = d.conversations || [];

    var latestByUser = {};
    rows.forEach(function (row) {
      var otherId = row.sender_id === currentUserId ? row.receiver_id : row.sender_id;
      var existing = latestByUser[otherId];
      if (!existing || new Date(row.created_at) > new Date(existing.created_at)) {
        latestByUser[otherId] = row;
      }
    });

    var otherIds = Object.keys(latestByUser);
    var list = await Promise.all(otherIds.map(async function (otherId) {
      var profile = await getProfile(otherId);
      var row = latestByUser[otherId];
      return {
        otherUserId: otherId,
        profile: profile,
        lastMessageContent: row.content,
        lastMessageTime: row.created_at
      };
    }));

    list.sort(function (a, b) { return new Date(b.lastMessageTime) - new Date(a.lastMessageTime); });

    conversations = list;
    renderConversationList();
  } catch (e) {
    conversations = [];
    renderConversationList();
  }
}

function renderConversationList() {
  var container = document.getElementById("conversationList");
  if (!conversations.length) {
    container.innerHTML = '<div class="empty-state">No conversations yet.</div>';
    return;
  }
  container.innerHTML = conversations.map(function (c) {
    var p = c.profile || {};
    var name = p.business_name || p.full_name || p.username || "User";
    var initial = name.charAt(0).toUpperCase();
    var avatar = p.logo_url
      ? '<img class="conv-avatar" src="' + escapeHtml(p.logo_url) + '" alt="">'
      : '<div class="conv-avatar conv-avatar-fallback">' + escapeHtml(initial) + '</div>';
    var preview = c.lastMessageContent ? c.lastMessageContent.slice(0, 60) : "";
    var activeClass = c.otherUserId === activeThreadUserId ? " active" : "";
    return '<div class="conv-item' + activeClass + '" onclick="openThread(\'' + c.otherUserId + '\')">' +
      avatar +
      '<div class="conv-info">' +
        '<div class="conv-name">' + escapeHtml(name) + '</div>' +
        '<div class="conv-preview">' + escapeHtml(preview) + '</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

function openThread(otherUserId) {
  activeThreadUserId = otherUserId;
  renderConversationList();
  loadThread(otherUserId);
}

async function loadThread(otherUserId) {
  try {
    var res = await fetch(API_URL + "/api/messages/" + otherUserId, {
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error("Could not load thread");
    var d = await res.json();
    threadMessages = d.messages || [];
  } catch (e) {
    threadMessages = [];
  }
  var profile = await getProfile(otherUserId);
  renderThreadHeader(profile);
  renderThread();
}

function renderThreadHeader(profile) {
  var header = document.getElementById("threadHeader");
  var p = profile || {};
  var name = p.business_name || p.full_name || p.username || "User";
  var initial = name.charAt(0).toUpperCase();
  var avatar = p.logo_url
    ? '<img class="thread-avatar" src="' + escapeHtml(p.logo_url) + '" alt="">'
    : '<div class="thread-avatar thread-avatar-fallback">' + escapeHtml(initial) + '</div>';
  header.innerHTML = avatar + '<div class="thread-name">' + escapeHtml(name) + '</div>';
  header.style.display = "flex";
}

function renderThread() {
  var container = document.getElementById("threadMessages");
  if (!threadMessages.length) {
    container.innerHTML = '<div class="empty-state">No messages yet. Say hello!</div>';
    return;
  }
  container.innerHTML = threadMessages.map(function (m) {
    var isMine = m.sender_id === currentUserId;
    return '<div class="msg-row ' + (isMine ? "msg-mine" : "msg-theirs") + '">' +
      '<div class="msg-bubble">' + escapeHtml(m.content) + '</div>' +
      '<div class="msg-time">' + formatTime(m.created_at) + '</div>' +
    '</div>';
  }).join("");
  container.scrollTop = container.scrollHeight;
}

function showSendError(msg) {
  var el = document.getElementById("composeError");
  el.textContent = msg;
  el.className = "compose-error show";
  setTimeout(function () { el.className = "compose-error"; }, 3200);
}

async function sendMessage() {
  var input = document.getElementById("composeInput");
  var text = input.value.trim();
  if (!text || !activeThreadUserId) return;

  var btn = document.getElementById("sendBtn");
  btn.disabled = true;

  try {
    var res = await fetch(API_URL + "/api/messages", {
      method: "POST",
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify({ receiver_id: activeThreadUserId, content: text })
    });
    if (!res.ok) { var e = await res.json(); throw new Error(e.error || "Could not send message"); }
    input.value = "";
    await loadThread(activeThreadUserId);
    await loadConversations();
  } catch (e) {
    showSendError(e.message || "Could not send message");
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("composeInput").addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

setInterval(function () {
  if (activeThreadUserId) {
    loadThread(activeThreadUserId);
    loadConversations();
  }
}, 8000);

loadConversations().then(function () {
  var toParam = new URLSearchParams(window.location.search).get("to");
  if (toParam) {
    openThread(toParam);
  }
});
</script>
</body>
</html>
