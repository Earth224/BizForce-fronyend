<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Digital Business Cards</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(0,229,255,.14),transparent 38%),radial-gradient(circle at 85% 90%,rgba(244,114,182,.16),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1040px;margin:0 auto;padding:32px 24px 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:48px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(0,229,255,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(0,229,255,.55);box-shadow:0 0 20px rgba(0,229,255,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(90deg,#f472b6,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero{text-align:center;margin-bottom:48px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(244,114,182,.3);background:rgba(244,114,182,.08);color:#f472b6;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
    .hero-title{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#00e5ff 0%,#7b2ff7 60%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero-sub{margin:0;color:#8892b8;font-size:1rem;line-height:1.6}

    /* 2-col layout */
    .builder{display:grid;grid-template-columns:340px 1fr;gap:32px;align-items:start}
    .form-panel{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:28px}
    .form-panel-title{font-size:.9rem;font-weight:800;color:#f4f7ff;margin:0 0 22px;display:flex;align-items:center;gap:8px}
    .form-panel-title svg{width:16px;height:16px;color:#f472b6}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8892b8;margin-bottom:7px}
    .form-input{width:100%;padding:11px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8ff;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s}
    .form-input::placeholder{color:#4a5280}
    .form-input:focus{border-color:rgba(244,114,182,.45)}

    /* Card preview */
    .preview-panel{display:flex;flex-direction:column;gap:20px}
    .preview-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8892b8;margin-bottom:0}
    .card-preview{width:100%;max-width:520px;aspect-ratio:1.75;border-radius:14px;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 12px 40px rgba(0,0,0,.5)}
    .card-preview[data-theme="dark"]{background:linear-gradient(135deg,#0c1228,#070b18);border:1.5px solid rgba(34,211,238,.3)}
    .card-preview[data-theme="midnight"]{background:linear-gradient(135deg,#1a1040,#0f1729);border:1.5px solid rgba(168,85,247,.35)}
    .card-preview[data-theme="forest"]{background:linear-gradient(135deg,#0a1f14,#061a12);border:1.5px solid rgba(52,211,153,.32)}
    .card-preview[data-theme="ember"]{background:linear-gradient(135deg,#220e06,#1a0a06);border:1.5px solid rgba(249,115,22,.32)}
    .card-inner{display:flex;height:100%;padding:24px 22px}
    .card-left{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;padding-right:16px}
    .card-company{font-size:.65rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:auto}
    .card-preview[data-theme="dark"] .card-company{color:#22d3ee}
    .card-preview[data-theme="midnight"] .card-company{color:#c084fc}
    .card-preview[data-theme="forest"] .card-company{color:#34d399}
    .card-preview[data-theme="ember"] .card-company{color:#fb923c}
    .card-name-block{margin:auto 0}
    .card-name{font-size:clamp(.9rem,2.5vw,1.2rem);font-weight:900;line-height:1.1;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-preview[data-theme="dark"] .card-name{background:linear-gradient(135deg,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .card-preview[data-theme="midnight"] .card-name{background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent}
    .card-preview[data-theme="forest"] .card-name{background:linear-gradient(135deg,#34d399,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
    .card-preview[data-theme="ember"] .card-name{background:linear-gradient(135deg,#f97316,#fbbf24);-webkit-background-clip:text;background-clip:text;color:transparent}
    .card-job{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-contacts-block{display:flex;flex-direction:column;gap:4px;margin-top:auto}
    .card-contact-line{font-size:.58rem;color:rgba(255,255,255,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
    .card-contact-line:not(:empty)::before{content:"· ";color:rgba(255,255,255,.25)}
    .card-right{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;flex-shrink:0}
    .card-qr-wrap{background:rgba(255,255,255,.06);border-radius:8px;padding:6px;border:1px solid rgba(255,255,255,.08)}
    #qrCanvas{display:block;border-radius:4px}
    .card-qr-label{font-size:.48rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);text-align:center;white-space:nowrap}
    .card-watermark{position:absolute;bottom:8px;right:12px;font-size:.45rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.18)}

    /* Theme selector */
    .theme-selector{display:flex;gap:10px;flex-wrap:wrap}
    .theme-btn{width:38px;height:38px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative}
    .theme-btn.active{border-color:#ffffff;box-shadow:0 0 12px rgba(255,255,255,.3)}
    .theme-btn[data-theme="dark"]{background:linear-gradient(135deg,#0c1228,#070b18)}
    .theme-btn[data-theme="midnight"]{background:linear-gradient(135deg,#1a1040,#0f1729)}
    .theme-btn[data-theme="forest"]{background:linear-gradient(135deg,#0a1f14,#061a12)}
    .theme-btn[data-theme="ember"]{background:linear-gradient(135deg,#220e06,#1a0a06)}
    .theme-btn::after{content:"";position:absolute;inset:4px;border-radius:6px;opacity:.5}
    .theme-btn[data-theme="dark"]::after{background:linear-gradient(135deg,#22d3ee,#a855f7)}
    .theme-btn[data-theme="midnight"]::after{background:linear-gradient(135deg,#a855f7,#ec4899)}
    .theme-btn[data-theme="forest"]::after{background:linear-gradient(135deg,#34d399,#22d3ee)}
    .theme-btn[data-theme="ember"]::after{background:linear-gradient(135deg,#f97316,#fbbf24)}

    /* Action buttons */
    .action-row{display:flex;gap:10px;flex-wrap:wrap}
    .action-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 18px;border-radius:11px;font-size:.82rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;border:1px solid}
    .btn-save{background:rgba(244,114,182,.12);border-color:rgba(244,114,182,.4);color:#f472b6}
    .btn-save:hover{background:rgba(244,114,182,.22)}
    .btn-save:disabled{opacity:.5;cursor:not-allowed}
    .btn-dl{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.35);color:#22d3ee}
    .btn-dl:hover{background:rgba(34,211,238,.18)}
    .btn-vcf{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:#8892b8}
    .btn-vcf:hover{background:rgba(255,255,255,.1);color:#e8e8ff}
    .action-btn svg{width:15px;height:15px}
    .save-status{font-size:.8rem;padding:10px 0;min-height:24px}
    .save-status.ok{color:#34d399}
    .save-status.err{color:#f87171}
    .save-status.info{color:#8892b8}

    @media(max-width:760px){.builder{grid-template-columns:1fr}.card-preview{max-width:100%}}
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">DIGITAL CARDS</div>
    <h1 class="hero-title">Business Card Builder</h1>
    <p class="hero-sub">Create a shareable digital business card with built-in QR code. Download as PNG or copy your vCard.</p>
  </div>

  <div class="builder">
    <!-- Form -->
    <div class="form-panel">
      <div class="form-panel-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Card Details
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="fName" type="text" placeholder="Jane Smith" maxlength="80">
      </div>
      <div class="form-group">
        <label class="form-label">Job Title</label>
        <input class="form-input" id="fTitle" type="text" placeholder="Chief Executive Officer" maxlength="80">
      </div>
      <div class="form-group">
        <label class="form-label">Company</label>
        <input class="form-input" id="fCompany" type="text" placeholder="Acme Corporation" maxlength="80">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="fEmail" type="email" placeholder="jane@acme.com" maxlength="120">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="fPhone" type="tel" placeholder="+1 (555) 000-0000" maxlength="40">
      </div>
      <div class="form-group">
        <label class="form-label">Website</label>
        <input class="form-input" id="fWebsite" type="url" placeholder="https://acme.com" maxlength="200">
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-panel">
      <div class="preview-label">Live Preview</div>

      <div class="card-preview" id="cardPreview" data-theme="dark">
        <div class="card-inner">
          <div class="card-left">
            <div class="card-company" id="pCompany">YOUR COMPANY</div>
            <div class="card-name-block">
              <div class="card-name" id="pName">Your Name</div>
              <div class="card-job" id="pTitle">Job Title</div>
            </div>
            <div class="card-contacts-block">
              <div class="card-contact-line" id="pEmail"></div>
              <div class="card-contact-line" id="pPhone"></div>
              <div class="card-contact-line" id="pWebsite"></div>
            </div>
          </div>
          <div class="card-right">
            <div class="card-qr-wrap">
              <canvas id="qrCanvas" width="90" height="90"></canvas>
            </div>
            <div class="card-qr-label">Scan to connect</div>
          </div>
        </div>
        <div class="card-watermark">BIZFORCE AI</div>
      </div>

      <div>
        <div class="preview-label" style="margin-bottom:10px">Theme</div>
        <div class="theme-selector">
          <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')" title="Dark Neon"></button>
          <button class="theme-btn" data-theme="midnight" onclick="setTheme('midnight')" title="Midnight"></button>
          <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')" title="Forest"></button>
          <button class="theme-btn" data-theme="ember" onclick="setTheme('ember')" title="Ember"></button>
        </div>
      </div>

      <div class="action-row">
        <button class="action-btn btn-save" id="saveBtn" onclick="saveCard()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          Save Card
        </button>
        <button class="action-btn btn-dl" onclick="downloadCard()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PNG
        </button>
        <button class="action-btn btn-vcf" onclick="copyVCard()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy vCard
        </button>
      </div>
      <div class="save-status info" id="saveStatus"></div>
    </div>
  </div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var token = localStorage.getItem("bf_token");
var activeCardId = null;
var activeTheme = "dark";
var qrTimer = null;

var THEME_QR = {
  dark:     { dark: "#e8e8ff", light: "#070b18" },
  midnight: { dark: "#e8e8ff", light: "#0f1729" },
  forest:   { dark: "#e8e8ff", light: "#061a12" },
  ember:    { dark: "#e8e8ff", light: "#1a0a06" }
};

function getFields() {
  return {
    full_name: document.getElementById("fName").value.trim(),
    job_title: document.getElementById("fTitle").value.trim(),
    company:   document.getElementById("fCompany").value.trim(),
    email:     document.getElementById("fEmail").value.trim(),
    phone:     document.getElementById("fPhone").value.trim(),
    website:   document.getElementById("fWebsite").value.trim(),
    theme:     activeTheme
  };
}

function updatePreview() {
  var f = getFields();
  document.getElementById("pCompany").textContent = (f.company || "YOUR COMPANY").toUpperCase();
  document.getElementById("pName").textContent    = f.full_name || "Your Name";
  document.getElementById("pTitle").textContent   = f.job_title || "Job Title";
  document.getElementById("pEmail").textContent   = f.email   || "";
  document.getElementById("pPhone").textContent   = f.phone   || "";
  var ws = f.website.replace(/^https?:\/\//, "");
  document.getElementById("pWebsite").textContent = ws || "";
  clearTimeout(qrTimer);
  qrTimer = setTimeout(generateQR, 400);
}

async function generateQR() {
  var f = getFields();
  var vcard = buildVCard(f);
  var colors = THEME_QR[activeTheme];
  try {
    await new Promise(function(res, rej) {
      QRCode.toCanvas(document.getElementById("qrCanvas"), vcard || "BizForce AI", {
        width: 90, margin: 1, errorCorrectionLevel: "M",
        color: { dark: colors.dark, light: colors.light }
      }, function(err) { err ? rej(err) : res(); });
    });
  } catch(e) { /* silent */ }
}

function buildVCard(f) {
  return [
    "BEGIN:VCARD", "VERSION:3.0",
    "FN:" + f.full_name,
    "TITLE:" + f.job_title,
    "ORG:" + f.company,
    f.phone   ? "TEL:" + f.phone   : "",
    f.email   ? "EMAIL:" + f.email : "",
    f.website ? "URL:" + f.website : "",
    "END:VCARD"
  ].filter(Boolean).join("\n");
}

function setTheme(t) {
  activeTheme = t;
  document.getElementById("cardPreview").dataset.theme = t;
  document.querySelectorAll(".theme-btn").forEach(function(b) {
    b.classList.toggle("active", b.dataset.theme === t);
  });
  generateQR();
}

function fillForm(card) {
  document.getElementById("fName").value    = card.full_name || "";
  document.getElementById("fTitle").value   = card.job_title || "";
  document.getElementById("fCompany").value = card.company   || "";
  document.getElementById("fEmail").value   = card.email     || "";
  document.getElementById("fPhone").value   = card.phone     || "";
  document.getElementById("fWebsite").value = card.website   || "";
  if (card.theme) setTheme(card.theme);
  updatePreview();
}

async function loadCard() {
  try {
    var res = await fetch(API_URL + "/api/digital-cards", {
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) return;
    var data = await res.json();
    if (data.cards && data.cards.length) {
      activeCardId = data.cards[0].id;
      fillForm(data.cards[0]);
      setStatus("Card loaded.", "info");
    } else {
      generateQR();
    }
  } catch(e) {
    generateQR();
  }
}

async function saveCard() {
  var btn = document.getElementById("saveBtn");
  btn.disabled = true;
  setStatus("Saving...", "info");
  var body = getFields();
  try {
    var url, method;
    if (activeCardId) {
      url = API_URL + "/api/digital-cards/" + activeCardId;
      method = "PUT";
    } else {
      url = API_URL + "/api/digital-cards";
      method = "POST";
    }
    var res = await fetch(url, {
      method: method,
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok) { var e = await res.json(); throw new Error(e.error || "Save failed"); }
    var d = await res.json();
    var saved = d.card;
    if (saved) activeCardId = saved.id;
    setStatus("Card saved!", "ok");
  } catch(e) {
    setStatus(e.message || "Save failed", "err");
  }
  btn.disabled = false;
}

async function downloadCard() {
  setStatus("Generating download...", "info");
  try {
    var el = document.getElementById("cardPreview");
    var canvas = await html2canvas(el, { scale: 3, useCORS: true, allowTaint: false });
    var link = document.createElement("a");
    link.download = "bizforce-card.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    setStatus("Downloaded!", "ok");
  } catch(e) {
    setStatus("Download failed. Try again.", "err");
  }
}

function copyVCard() {
  var f = getFields();
  var vcard = buildVCard(f);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(vcard).then(function() {
      setStatus("vCard copied to clipboard!", "ok");
    }).catch(function() {
      fallbackCopy(vcard);
    });
  } else {
    fallbackCopy(vcard);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  setStatus("vCard copied!", "ok");
}

function setStatus(msg, type) {
  var el = document.getElementById("saveStatus");
  el.textContent = msg;
  el.className = "save-status " + type;
  if (type !== "info") {
    setTimeout(function() { el.textContent = ""; el.className = "save-status info"; }, 3500);
  }
}

["fName","fTitle","fCompany","fEmail","fPhone","fWebsite"].forEach(function(id) {
  document.getElementById(id).addEventListener("input", updatePreview);
});

loadCard();
</script>
</body>
</html>
