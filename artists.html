<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Artist Directory</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(34,211,238,.14),transparent 38%),radial-gradient(circle at 85% 90%,rgba(251,191,36,.10),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:32px 24px 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:48px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(34,211,238,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(34,211,238,.55);box-shadow:0 0 20px rgba(34,211,238,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#22d3ee}
    .hero{text-align:center;margin-bottom:44px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:#fbbf24;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
    .hero-title{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.03em;color:#e8e8ff}
    .hero-sub{margin:0;color:#8892b8;font-size:1rem;line-height:1.6}

    .art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .art-card{display:block;background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:all .25s}
    a.art-card{cursor:pointer}
    .art-card:hover{border-color:rgba(34,211,238,.28);transform:translateY(-2px);box-shadow:0 0 28px rgba(34,211,238,.1)}
    .art-banner{position:relative;height:88px;background-size:cover;background-position:center;background-color:rgba(255,255,255,.04)}
    .art-banner.no-image{background-image:radial-gradient(circle at 20% 30%,rgba(34,211,238,.22),transparent 55%),radial-gradient(circle at 85% 75%,rgba(251,191,36,.16),transparent 55%)}
    .art-avatar-row{display:flex;align-items:flex-end;gap:12px;padding:0 16px;margin-top:-32px;position:relative}
    .art-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;flex-shrink:0;border:3px solid rgba(10,15,35,.95);background:rgba(10,15,35,.95)}
    .art-avatar-fallback{width:64px;height:64px;border-radius:50%;flex-shrink:0;border:3px solid rgba(10,15,35,.95);background:rgba(34,211,238,.1);display:flex;align-items:center;justify-content:center;color:#22d3ee;font-size:1.1rem;font-weight:800}
    .art-identity{flex:1;min-width:0;padding-bottom:6px}
    .art-name{font-size:1rem;font-weight:700;color:#f4f7ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
    .art-tagline{font-size:.78rem;color:#8892b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .art-body{padding:14px 16px 16px}
    .art-count{display:inline-block;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:999px;padding:4px 10px;margin-bottom:12px}
    .art-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
    .art-strip::-webkit-scrollbar{height:4px}
    .art-strip::-webkit-scrollbar-thumb{background:rgba(34,211,238,.25);border-radius:4px}
    .art-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .art-thumb-fallback{width:52px;height:52px;border-radius:8px;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:#8892b8}
    .art-thumb-fallback svg{width:18px;height:18px;opacity:.5}
    .empty-msg{text-align:center;padding:52px 24px;color:#8892b8;font-size:.9rem;line-height:1.6}
    .loading{text-align:center;padding:52px 24px;color:#8892b8;font-size:.9rem}
    @media(max-width:600px){.art-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">MARKETPLACE</div>
    <h1 class="hero-title">Artists</h1>
    <p class="hero-sub">Discover sellers and creators showcasing their portfolio work.</p>
  </div>

  <div class="art-grid" id="artGrid"><div class="loading">Loading artists...</div></div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function initials(name) {
  return String(name || "").split(" ").filter(Boolean).map(function(w){ return w[0]; }).join("").toUpperCase().slice(0,2) || "?";
}

async function loadArtists() {
  var grid = document.getElementById("artGrid");
  try {
    var res = await fetch(API_URL + "/api/bfp/artists/browse");
    if (!res.ok) throw new Error("fetch failed");
    var data = await res.json();
    renderArtists(data.artists || []);
  } catch (e) {
    grid.innerHTML = '<div class="empty-msg">Unable to load artists. Please try again.</div>';
  }
}

function renderArtists(artists) {
  var grid = document.getElementById("artGrid");
  if (!artists.length) {
    grid.innerHTML = '<div class="empty-msg">No artists yet — add portfolio work to your profile to appear here.</div>';
    return;
  }
  grid.innerHTML = artists.map(function(a) {
    var tag = a.username ? "a" : "div";
    var hrefAttr = a.username ? (' href="seller.html?u=' + esc(a.username) + '"') : "";

    var banner = a.banner_url
      ? '<div class="art-banner" style="background-image:url(\'' + esc(a.banner_url) + '\')"></div>'
      : '<div class="art-banner no-image"></div>';

    var avatar = a.avatar_url
      ? '<img class="art-avatar" src="' + esc(a.avatar_url) + '" alt="">'
      : '<div class="art-avatar-fallback">' + esc(initials(a.display_name)) + '</div>';

    var tagline = a.tagline ? '<div class="art-tagline">' + esc(a.tagline) + '</div>' : "";

    var workCount = Number(a.work_count) || 0;
    var countLabel = workCount + (workCount === 1 ? " work" : " works");

    var works = Array.isArray(a.works) ? a.works : [];
    var stripHtml = works.map(function(w) {
      return w.image_url
        ? '<img class="art-thumb" src="' + esc(w.image_url) + '" alt="">'
        : '<div class="art-thumb-fallback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
    }).join("");

    return "<" + tag + ' class="art-card"' + hrefAttr + ">" +
      banner +
      '<div class="art-avatar-row">' +
        avatar +
        '<div class="art-identity"><div class="art-name">' + esc(a.display_name || "Unnamed artist") + '</div>' + tagline + '</div>' +
      '</div>' +
      '<div class="art-body">' +
        '<span class="art-count">' + countLabel + '</span>' +
        '<div class="art-strip">' + stripHtml + '</div>' +
      '</div>' +
    "</" + tag + ">";
  }).join("");
}

loadArtists();
</script>
<script src="/scripts/termaximus-presence.js"></script>
<script src="/scripts/termaximus-guide.js"></script>
</body>
</html>
