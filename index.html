.form-group input:focus,.form-group select:focus{border-color:var(--cyan)}

<div id="auth-screen">
<div class="auth-box">
<div class="logo"><h1>BizForce AI</h1><p>Your AI-powered business network</p></div>
<div class="auth-tabs">
<button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
<button class="auth-tab" onclick="switchTab('register')">Create Account</button>
</div>
<div id="login-form">
<div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@business.com"></div>
<div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
<button class="btn-primary" onclick="login()">Sign In</button>
<p class="error-msg" id="login-error"></p>
</div>
<div id="register-form" style="display:none">
<div class="form-group"><label>Business Name</label><input type="text" id="reg-business" placeholder="Your Business Name"></div>
<div class="form-group"><label>Industry</label>
<select id="reg-industry">
<option value="">Select Industry</option>
<option>Technology</option><option>E-Commerce</option><option>Health and Wellness</option>
<option>Finance</option><option>Real Estate</option><option>Food and Beverage</option>
<option>Marketing</option><option>Education</option><option>Entertainment</option><option>Other</option>
</select></div>
<div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@business.com"></div>
<div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="Min 8 characters"></div>
<button class="btn-primary" onclick="register()">Create Account</button>
<p class="error-msg" id="register-error"></p>
</div>
</div>
</div><div class="modal-overlay" id="deal-modal">
<div class="modal">
<h3>Post a Deal</h3>
<div class="form-group"><label>Deal Title</label><input type="text" id="deal-title" placeholder="e.g. Looking for distribution partner"></div>
<div class="form-group"><label>Deal Type</label>
<select id="deal-type">
<option value="Partnership">Partnership</option>
<option value="Investment">Investment</option>
<option value="Acquisition">Acquisition</option>
<option value="Joint Venture">Joint Venture</option>
<option value="Franchise">Franchise</option>
</select></div>
<div class="form-group"><label>Description</label><textarea id="deal-description" placeholder="Describe the opportunity..."></textarea></div>
<div class="modal-actions">
<button class="btn-cancel" onclick="closeDealModal()">Cancel</button>
<button class="btn-small" onclick="postDeal()">Post Deal</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const API='https://dynamic-prosperity-production-5382.up.railway.app';
let token=localStorage.getItem('bf_token');
let currentUser=JSON.parse(localStorage.getItem('bf_user')||'null');
let currentAgent=null;
let chatHistory=[];
let currentDealFilter='';
const STAFF=[
{id:'alex',name:'Alex',role:'SEO',emoji:'🔍',color:'#00e5ff'},
{id:'jordan',name:'Jordan',role:'Community',emoji:'👥',color:'#9f6bff'},
{id:'morgan',name:'Morgan',role:'Content',emoji:'✍️',color:'#ff2d78'},
{id:'casey',name:'Casey',role:'Email',emoji:'📧',color:'#ffc800'},
{id:'riley',name:'Riley',role:'Sales',emoji:'💰',color:'#00ff96'},
{id:'sam',name:'Sam',role:'Reputation',emoji:'⭐',color:'#ff6b35'},
{id:'dana',name:'Dana',role:'Analytics',emoji:'📊',color:'#00e5ff'},
{id:'taylor',name:'Taylor',role:'Ads',emoji:'📢',color:'#9f6bff'},
{id:'blake',name:'Blake',role:'Influencer',emoji:'🌟',color:'#ff2d78'}
];
if(token&&currentUser){showApp();}
function showApp(){
document.getElementById('auth-screen').style.display='none';
document.getElementById('app').style.display='block';
updateUserUI();loadFeed();loadStaffGrid();loadDeals();loadNetwork();
}
function updateUserUI(){
if(!currentUser)return;
const i=(currentUser.business_name||currentUser.email||'?')[0].toUpperCase();
document.getElementById('user-avatar').textContent=i;
document.getElementById('composer-avatar').textContent=i;
document.getElementById('profile-avatar').textContent=i;
document.getElementById('profile-name').textContent=currentUser.business_name||'Your Business';
document.getElementById('profile-industry').textContent=currentUser.industry||'';
}
function switchTab(tab){
document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
document.getElementById('login-form').style.display=tab==='login'?'block':'none';
document.getElementById('register-form').style.display=tab==='register'?'block':'none';
}
async function login(){
const email=document.getElementById('login-email').value;
const password=document.getElementById('login-password').value;
if(!email||!password)return showError('login-error','Please fill all fields');
try{
const res=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
const data=await res.json();
if(!res.ok)return showError('login-error',data.error||'Login failed');
token=data.token;currentUser=data.user;
localStorage.setItem('bf_token',token);
localStorage.setItem('bf_user',JSON.stringify(currentUser));
showApp();
}catch(e){showError('login-error','Connection error');}
}
async function register(){
const business_name=document.getElementById('reg-business').value;
const industry=document.getElementById('reg-industry').value;
const email=document.getElementById('reg-email').value;
const password=document.getElementById('reg-password').value;
if(!business_name||!email||!password)return showError('register-error','Please fill all fields');
try{
const res=await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,business_name,industry})});
const data=await res.json();
if(!res.ok)return showError('register-error',data.error||'Registration failed');
token=data.token;currentUser=data.user;
localStorage.setItem('bf_token',token);
localStorage.setItem('bf_user',JSON.stringify(currentUser));
showApp();
}catch(e){showError('register-error','Connection error');}
}
function logout(){
token=null;currentUser=null;
localStorage.removeItem('bf_token');
localStorage.removeItem('bf_user');
location.reload();
}
function showError(id,msg){
const el=document.getElementById(id);
el.textContent=msg;el.style.display='block';
setTimeout(()=>el.style.display='none',3000);
}
function showPage(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
document.getElementById('page-'+page).classList.add('active');
document.getElementById('nav-'+page).classList.add('active');
if(page==='profile')loadProfile();
}
async function loadFeed(){
try{
const res=await fetch(API+'/api/feed',{headers:{Authorization:'Bearer '+token}});
const posts=await res.json();
renderPosts(posts);
}catch(e){document.getElementById('feed-posts').innerHTML='<div class="empty-state"><p>Could not load feed</p></div>';}
}
function renderPosts(posts){
const el=document.getElementById('feed-posts');
if(!posts.length){el.innerHTML='<div class="empty-state"><div style="font-size:2rem">🌐</div><p>No posts yet. Be the first to share!</p></div>';return;}
el.innerHTML=posts.map(p=>`<div class="post"><div class="post-header"><div class="avatar" style="width:36px;height:36px;font-size:0.85rem">${(p.users&&p.users.business_name||'?')[0].toUpperCase()}</div><div class="post-meta"><strong>${p.users&&p.users.business_name||'Business'}</strong><span>${p.users&&p.users.industry||''} · ${timeAgo(p.created_at)}</span></div></div><div class="post-content">${p.content}</div><div class="post-actions"><button class="post-action-btn" onclick="showToast('Coming soon!')">👍 Like</button><button class="post-action-btn" onclick="showToast('Coming soon!')">💬 Comment</button><button class="post-action-btn" onclick="showToast('Coming soon!')">🔗 Share</button></div></div>`).join('');
}
async function createPost(){
const content=document.getElementById('post-content').value.trim();
if(!content)return;
try{
const res=await fetch(API+'/api/posts',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({content})});
if(res.ok){document.getElementById('post-content').value='';showToast('Posted!');loadFeed();}
}catch(e){showToast('Error posting');}
}
function loadStaffGrid(){
document.getElementById('staff-grid').innerHTML=STAFF.map(s=>`<div class="staff-card" onclick="selectAgent('${s.id}')" id="staff-${s.id}"><div class="staff-avatar" style="background:${s.color}22;color:${s.color}">${s.emoji}</div><div class="staff-name">${s.name}</div><div class="staff-role">${s.role}</div></div>`).join('');
}
function selectAgent(agentId){
currentAgent=STAFF.find(s=>s.id===agentId);
chatHistory=[];
document.querySelectorAll('.staff-card').forEach(c=>c.classList.remove('active'));
document.getElementById('staff-'+agentId).classList.add('active');
document.getElementById('chat-box').style.display='block';
document.getElementById('chat-agent-avatar').textContent=currentAgent.emoji;
document.getElementById('chat-agent-avatar').style.background=currentAgent.color+'22';
document.getElementById('chat-agent-name').textContent=currentAgent.name;
document.getElementById('chat-agent-role').textContent=currentAgent.role;
document.getElementById('chat-messages').innerHTML=`<div class="msg ai">Hi! I'm ${currentAgent.name}, your ${currentAgent.role} specialist. How can I help?</div>`;
document.getElementById('chat-box').scrollIntoView({behavior:'smooth'});
}
async function sendMessage(){
if(!currentAgent)return;
const input=document.getElementById('chat-input');
const message=input.value.trim();
if(!message)return;
input.value='';
const el=document.getElementById('chat-messages');
el.innerHTML+=`<div class="msg user">${message}</div>`;
el.innerHTML+=`<div class="loading" id="ai-loading"><div class="spinner"></div> Thinking...</div>`;
el.scrollTop=el.scrollHeight;
try{
const res=await fetch(API+'/api/ai/'+currentAgent.id,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({message,history:chatHistory})});
const data=await res.json();
document.getElementById('ai-loading')&&document.getElementById('ai-loading').remove();
const reply=data.response||'Sorry, try again.';
chatHistory.push({role:'user',content:message},{role:'assistant',content:reply});
el.innerHTML+=`<div class="msg ai">${reply}</div>`;
el.scrollTop=el.scrollHeight;
}catch(e){
document.getElementById('ai-loading')&&document.getElementById('ai-loading').remove();
el.innerHTML+=`<div class="msg ai">Connection error.</div>`;
}
}
async function loadDeals(filter=''){
try{
const url=API+'/api/deals'+(filter?'?type='+filter:'');
const res=await fetch(url,{headers:{Authorization:'Bearer '+token}});
const deals=await res.json();
renderDeals(deals);
}catch(e){}
}
function renderDeals(deals){
const el=document.getElementById('deals-list');
if(!deals.length){el.innerHTML='<div class="empty-state"><div style="font-size:2rem">🤝</div><p>No deals yet. Post the first opportunity!</p></div>';return;}
el.innerHTML=deals.map(d=>`<div class="deal-card"><span class="deal-type-badge badge-${(d.deal_type||'').toLowerCase().replace(' ','')}">${d.deal_type||'Deal'}</span><div style="font-weight:700;margin-bottom:6px">${d.title}</div><div style="font-size:0.85rem;color:var(--text2);margin-bottom:8px">${d.description||''}</div><div style="font-size:0.75rem;color:var(--text2)">By ${d.users&&d.users.business_name||'Business'} · ${timeAgo(d.created_at)}</div></div>`).join('');
}
function filterDeals(type){
currentDealFilter=type;
document.querySelectorAll('.deal-type-btn').forEach(b=>b.classList.toggle('active',b.textContent===(type||'All')));
loadDeals(type);
}
function openDealModal(){document.getElementById('deal-modal').classList.add('open');}
function closeDealModal(){document.getElementById('deal-modal').classList.remove('open');}
async function postDeal(){
const title=document.getElementById('deal-title').value.trim();
const deal_type=document.getElementById('deal-type').value;
const description=document.getElementById('deal-description').value.trim();
if(!title)return showToast('Enter a deal title');
try{
const res=await fetch(API+'/api/deals',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({title,deal_type,description})});
if(res.ok){closeDealModal();showToast('Deal posted!');loadDeals(currentDealFilter);}
}catch(e){showToast('Error posting deal');}
}
async function loadNetwork(){
try{
const res=await fetch(API+'/api/search',{headers:{Authorization:'Bearer '+token}});
const users=await res.json();
renderNetwork(users);
}catch(e){}
}
function renderNetwork(users){
const el=document.getElementById('network-list');
const filtered=users.filter(u=>u.id!==currentUser&&currentUser.id);
if(!filtered.length){el.innerHTML='<div class="empty-state"><div style="font-size:2rem">🌐</div><p>No businesses yet!</p></div>';return;}
el.innerHTML=filtered.map(u=>`<div class="user-card"><div class="avatar">${(u.business_name||'?')[0].toUpperCase()}</div><div class="user-info"><strong>${u.business_name||'Business'}</strong><span>${u.industry||'Industry'}</span></div><button class="follow-btn" onclick="followUser('${u.id}',this)">Follow</button></div>`).join('');
}
async function followUser(userId,btn){
try{
const following=btn.classList.contains('following');
await fetch(API+'/api/follow/'+userId,{method:following?'DELETE':'POST',headers:{Authorization:'Bearer '+token}});
btn.classList.toggle('following');
btn.textContent=following?'Follow':'Following';
showToast(following?'Unfollowed':'Following!');
}catch(e){}
}
async function searchUsers(){
const q=document.getElementById('search-input').value.trim();
if(!q){loadNetwork();return;}
try{
const res=await fetch(API+'/api/search?q='+encodeURIComponent(q),{headers:{Authorization:'Bearer '+token}});
const users=await res.json();
renderNetwork(users);showPage('network');
}catch(e){}
}
async function loadProfile(){
if(!currentUser)return;
try{
const res=await fetch(API+'/api/users/'+currentUser.id,{headers:{Authorization:'Bearer '+token}});
const data=await res.json();
document.getElementById('profile-posts').textContent=data.posts&&data.posts.length||0;
document.getElementById('profile-followers').textContent=data.followers||0;
document.getElementById('profile-following').textContent=data.following||0;
}catch(e){}
}
async function subscribe(priceId){
try{
const res=await fetch(API+'/api/stripe/checkout',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({priceId})});
const data=await res.json();
if(data.url)window.location.href=data.url;
}catch(e){showToast('Error starting checkout');}
}
function timeAgo(date){
const s=Math.floor((Date.now()-new Date(date))/1000);
if(s<60)return 'just now';
if(s<3600)return Math.floor(s/60)+'m ago';
if(s<86400)return Math.floor(s/3600)+'h ago';
return Math.floor(s/86400)+'d ago';
}
function showToast(msg){
const t=document.getElementById('toast');
t.textContent=msg;t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
