<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BizForce AI</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#030308;color:#e8e8ff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#030308}.auth-box{background:#080812;border:1px solid rgba(0,229,255,0.15);border-radius:24px;padding:48px;width:100%;max-width:420px}.logo{text-align:center;margin-bottom:32px}.logo h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#00e5ff,#9f6bff,#ff2d78);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.logo p{color:#8888aa;font-size:0.85rem;margin-top:6px}.auth-tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:28px}.auth-tab{flex:1;padding:10px;border:none;background:transparent;color:#8888aa;cursor:pointer;border-radius:9px;font-size:0.9rem}.auth-tab.active{background:linear-gradient(135deg,#00e5ff,#9f6bff);color:#000;font-weight:700}.form-group{margin-bottom:16px}.form-group label{display:block;color:#8888aa;font-size:0.8rem;margin-bottom:6px;text-transform:uppercase}.form-group input,.form-group select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(0,229,255,0.15);border-radius:10px;padding:12px 14px;color:#e8e8ff;font-size:0.95rem;outline:none}.form-group input:focus,.form-group select:focus{border-color:#00e5ff}.form-group select option{background:#0d0d1a}.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#00e5ff,#9f6bff);border:none;border-radius:12px;color:#000;font-weight:800;font-size:1rem;cursor:pointer;margin-top:8px}.error-msg{color:#ff2d78;font-size:0.85rem;text-align:center;margin-top:12px;display:none}</style></head><body>
<div id="auth-screen"><div class="auth-box"><div class="logo"><h1>BizForce AI</h1><p>Your AI-powered business network</p></div><div class="auth-tabs"><button class="auth-tab active" onclick="switchTab('login')">Sign In</button><button class="auth-tab" onclick="switchTab('register')">Create Account</button></div><div id="login-form"><div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@business.com"></div><div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div><button class="btn-primary" onclick="login()">Sign In</button><p class="error-msg" id="login-error"></p></div><div id="register-form" style="display:none"><div class="form-group"><label>Business Name</label><input type="text" id="reg-business" placeholder="Your Business Name"></div><div class="form-group"><label>Industry</label><select id="reg-industry"><option value="">Select Industry</option><option>Technology</option><option>E-Commerce</option><option>Health and Wellness</option><option>Finance</option><option>Real Estate</option><option>Marketing</option><option>Education</option><option>Entertainment</option><option>Other</option></select></div><div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@business.com"></div><div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="Min 8 characters"></div><button class="btn-primary" onclick="register()">Create Account</button><p class="error-msg" id="register-error"></p></div></div></div>
<script>
const API='https://dynamic-prosperity-production-5382.up.railway.app';
let token=localStorage.getItem('bf_token');
let currentUser=JSON.parse(localStorage.getItem('bf_user')||'null');
if(token&&currentUser){window.location.href='/app.html';}
function switchTab(tab){document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));document.getElementById('login-form').style.display=tab==='login'?'block':'none';document.getElementById('register-form').style.display=tab==='register'?'block':'none';}
async function login(){const email=document.getElementById('login-email').value;const password=document.getElementById('login-password').value;if(!email||!password)return showError('login-error','Please fill all fields');try{const res=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await res.json();if(!res.ok)return showError('login-error',data.error||'Login failed');localStorage.setItem('bf_token',data.token);localStorage.setItem('bf_user',JSON.stringify(data.user));window.location.href='/app.html';}catch(e){showError('login-error','Connection error');}}
async function register(){const business_name=document.getElementById('reg-business').value;const industry=document.getElementById('reg-industry').value;const email=document.getElementById('reg-email').value;const password=document.getElementById('reg-password').value;if(!business_name||!email||!password)return showError('register-error','Please fill all fields');try{const res=await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,business_name,industry})});const data=await res.json();if(!res.ok)return showError('register-error',data.error||'Registration failed');localStorage.setItem('bf_token',data.token);localStorage.setItem('bf_user',JSON.stringify(data.user));window.location.href='/app.html';}catch(e){showError('register-error','Connection error');}}
function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',3000);}
</script>
</body></html>
