<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — Lead Radar</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("/app.html");})();</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: #e8e8ff;
      background: #070b18;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 229, 255, 0.14), transparent 38%),
        radial-gradient(circle at 85% 90%, rgba(168, 85, 247, 0.18), transparent 40%),
        #070b18;
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid rgba(0, 229, 255, 0.25);
      background: rgba(12, 18, 38, 0.6);
      color: #22d3ee;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.25s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .back-link:hover {
      border-color: rgba(0, 229, 255, 0.55);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
      transform: translateY(-1px);
    }

    .brand-badge {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .agent-header {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .agent-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 229, 255, 0.18), rgba(168, 85, 247, 0.22));
      border: 2px solid rgba(0, 229, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(0, 229, 255, 0.18), 0 0 32px rgba(168, 85, 247, 0.12);
      flex-shrink: 0;
    }

    .agent-avatar svg {
      width: 34px;
      height: 34px;
      opacity: 0.85;
    }

    .agent-header-text { flex: 1; min-width: 220px; }

    .agent-title {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00e5ff 0%, #7b2ff7 60%, #a855f7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .agent-subtitle {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #8892b8;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8892b8;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #00d9ff, #7d5cff);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #leadsList {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      border-radius: 20px;
      background: rgba(12, 18, 38, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.07);
      color: #8892b8;
      font-size: 0.95rem;
    }

    .lead-card {
      padding: 20px 24px;
      border-radius: 18px;
      background: rgba(12, 18, 38, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .lead-card:hover {
      border-color: rgba(0, 229, 255, 0.25);
    }

    .lead-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .lead-handle {
      font-size: 0.85rem;
      font-weight: 700;
      color: #22d3ee;
    }

    .lead-keyword {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(168, 85, 247, 0.35);
      background: rgba(168, 85, 247, 0.1);
      color: #c4b5fd;
      white-space: nowrap;
    }

    .lead-text {
      font-size: 0.92rem;
      line-height: 1.65;
      color: #ccd0e8;
      margin: 0;
    }

    .lead-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .score-badge.score-green {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.45);
      color: #34d399;
    }

    .score-badge.score-amber {
      background: rgba(245, 158, 11, 0.13);
      border: 1px solid rgba(245, 158, 11, 0.4);
      color: #fbbf24;
    }

    .score-badge.score-gray {
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.25);
      color: #94a3b8;
    }

    .lead-product {
      font-size: 0.78rem;
      font-weight: 600;
      color: #a855f7;
    }

    .lead-reason {
      font-size: 0.8rem;
      color: #8892b8;
      font-style: italic;
    }

    .draft-btn {
      align-self: flex-start;
      padding: 7px 16px;
      border-radius: 10px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      background: rgba(8, 8, 18, 0.85);
      color: #00e5ff;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .draft-btn:hover {
      border-color: rgba(0, 229, 255, 0.6);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.18);
    }

    .draft-area {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .draft-box {
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(0, 229, 255, 0.06);
      border: 1px solid rgba(0, 229, 255, 0.2);
      font-size: 0.88rem;
      line-height: 1.65;
      color: #e8e8ff;
      white-space: pre-wrap;
    }

    .draft-box.draft-error {
      background: rgba(239, 68, 68, 0.07);
      border-color: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .copy-btn {
      align-self: flex-end;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid rgba(0, 229, 255, 0.28);
      background: rgba(8, 8, 18, 0.85);
      color: #00e5ff;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: rgba(0, 229, 255, 0.6);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
    }

    .copy-btn.copied {
      color: #34d399;
      border-color: rgba(16, 185, 129, 0.45);
    }

    #intel-header {
      margin-bottom: 24px;
    }

    .stat-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .stat-card {
      flex: 1;
      min-width: 120px;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(12, 18, 38, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
    }

    .stat-number {
      display: block;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #00e5ff 0%, #a855f7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .stat-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8892b8;
    }

    .charts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 16px;
    }

    .chart-panel {
      flex: 1;
      min-width: 280px;
      padding: 20px 20px 16px;
      border-radius: 18px;
      background: rgba(12, 18, 38, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .chart-title {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8892b8;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="page">

    <nav class="top-nav">
      <a class="back-link" href="/agents-hub.html">&#8592; Agents Hub</a>
      <span class="brand-badge">BizForce AI</span>
    </nav>

    <header class="agent-header">
      <div class="agent-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <div class="agent-header-text">
        <h1 class="agent-title">Competitor Radar</h1>
        <p class="agent-subtitle">Live intelligence on competitors and sellers in your market — captured from Bluesky every 5 minutes.</p>
      </div>
    </header>

    <div id="intel-header"></div>

    <div class="toolbar">
      <span class="toolbar-label" id="leadsCount">Loading leads...</span>
      <button class="btn-primary" id="noiseBtn" onclick="toggleNoise()" style="display:none">Show Noise</button>
      <button class="btn-primary" id="refreshBtn" onclick="loadLeads()">Refresh</button>
    </div>

    <div id="leadsList"></div>

  </div>

  <script>
    var API = "https://dynamic-prosperity-production-5382.up.railway.app";
    function tok() { return localStorage.getItem("bf_token") || ""; }

    function toggleNoise() {
      var btn = document.getElementById("noiseBtn");
      var showing = btn.dataset.showing === "1";
      showing = !showing;
      btn.dataset.showing = showing ? "1" : "0";
      var noiseCount = (window._currentLeads || []).filter(function (l) { return (l.intent_score || 0) < 15; }).length;
      btn.textContent = showing ? "Hide Noise (" + noiseCount + ")" : "Show Noise (" + noiseCount + ")";
      window._visibleCount = 25;
      if (window._renderCards) window._renderCards(showing, 25);
    }

    function renderStatStrip(leads) {
      try {
        var todayStr = new Date().toISOString().slice(0, 10);
        var total      = leads.length;
        var scoredToday = leads.filter(function (l) {
          return (l.created_at || "").slice(0, 10) === todayStr;
        }).length;
        var highIntent = leads.filter(function (l) {
          return (l.intent_score || 0) >= 60;
        }).length;
        var buyers = leads.filter(function (l) {
          return l.suggested_product && l.suggested_product !== "none" && (l.intent_score || 0) >= 40;
        }).length;
        var competitors = leads.filter(function (l) {
          return l.suggested_product && l.suggested_product !== "none" && (l.intent_score || 0) < 40;
        }).length;

        var stats = [
          { number: total,                      label: "Total Tracked"      },
          { number: scoredToday,                label: "Scored Today"       },
          { number: highIntent,                 label: "High-Intent"        },
          { number: buyers + " / " + competitors, label: "Buyers / Competitors" }
        ];

        var html = "<div class=\"stat-strip\">" +
          stats.map(function (s) {
            return "<div class=\"stat-card\">" +
              "<span class=\"stat-number\">" + s.number + "</span>" +
              "<span class=\"stat-label\">" + s.label + "</span>" +
              "</div>";
          }).join("") +
          "</div>";

        document.getElementById("intel-header").innerHTML = html;
      } catch (err) {
        console.error("[LeadRadar] renderStatStrip error:", err);
      }
    }

    var chartScoresInstance   = null;
    var chartProductsInstance = null;
    var chartTimelineInstance = null;

    function renderCharts(leads) {
      try {
        var header = document.getElementById("intel-header");

        var existingRow = document.getElementById("charts-row");
        if (existingRow) existingRow.remove();

        var rowDiv = document.createElement("div");
        rowDiv.className = "charts-row";
        rowDiv.id = "charts-row";
        rowDiv.innerHTML =
          "<div class=\"chart-panel\">" +
            "<span class=\"chart-title\">Score Distribution</span>" +
            "<canvas id=\"chartScores\"></canvas>" +
          "</div>" +
          "<div class=\"chart-panel\">" +
            "<span class=\"chart-title\">Product Breakdown</span>" +
            "<canvas id=\"chartProducts\"></canvas>" +
          "</div>" +
          "<div class=\"chart-panel\">" +
            "<span class=\"chart-title\">Captures Over Time</span>" +
            "<canvas id=\"chartTimeline\"></canvas>" +
          "</div>";
        header.appendChild(rowDiv);

        var bands     = ["0-15", "16-29", "30-44", "45-59", "60-74", "75-100"];
        var bandColors = [
          "rgba(148,163,184,0.7)",
          "rgba(148,163,184,0.5)",
          "rgba(251,191,36,0.7)",
          "rgba(251,191,36,0.9)",
          "rgba(52,211,153,0.8)",
          "rgba(0,229,255,0.85)"
        ];
        var counts = [0, 0, 0, 0, 0, 0];
        leads.forEach(function (l) {
          var s = l.intent_score || 0;
          if      (s <= 15) counts[0]++;
          else if (s <= 29) counts[1]++;
          else if (s <= 44) counts[2]++;
          else if (s <= 59) counts[3]++;
          else if (s <= 74) counts[4]++;
          else              counts[5]++;
        });

        if (chartScoresInstance) { chartScoresInstance.destroy(); chartScoresInstance = null; }

        chartScoresInstance = new Chart(
          document.getElementById("chartScores"),
          {
            type: "bar",
            data: {
              labels: bands,
              datasets: [{
                data:            counts,
                backgroundColor: bandColors,
                borderRadius:    6,
                borderSkipped:   false
              }]
            },
            options: {
              plugins: { legend: { display: false } },
              scales: {
                x: { ticks: { color: "#8892b8" }, grid: { color: "rgba(255,255,255,0.05)" } },
                y: { ticks: { color: "#8892b8", stepSize: 1 }, grid: { color: "rgba(255,255,255,0.05)" }, beginAtZero: true }
              }
            }
          }
        );

        // Product breakdown doughnut
        var productCounts = {};
        leads.forEach(function (l) {
          var p = (l.suggested_product && l.suggested_product.trim()) || "none";
          productCounts[p] = (productCounts[p] || 0) + 1;
        });
        var productLabels = Object.keys(productCounts);
        var productData   = productLabels.map(function (k) { return productCounts[k]; });
        var productPalette = [
          "rgba(0,229,255,0.8)",
          "rgba(168,85,247,0.8)",
          "rgba(52,211,153,0.8)",
          "rgba(251,191,36,0.8)",
          "rgba(148,163,184,0.55)"
        ];
        var productColors = productLabels.map(function (_, i) {
          return productPalette[i % productPalette.length];
        });

        if (chartProductsInstance) { chartProductsInstance.destroy(); chartProductsInstance = null; }

        chartProductsInstance = new Chart(
          document.getElementById("chartProducts"),
          {
            type: "doughnut",
            data: {
              labels: productLabels,
              datasets: [{
                data:            productData,
                backgroundColor: productColors,
                borderWidth:     2,
                borderColor:     "rgba(7,11,24,0.9)"
              }]
            },
            options: {
              plugins: {
                legend: {
                  display: true,
                  position: "bottom",
                  labels: { color: "#8892b8", font: { size: 11 }, padding: 12 }
                }
              },
              cutout: "62%"
            }
          }
        );

        // Captures over time — last 14 days
        var dayLabels = [];
        var dayCounts = {};
        for (var d = 13; d >= 0; d--) {
          var dt = new Date();
          dt.setDate(dt.getDate() - d);
          var dayStr = dt.toISOString().slice(0, 10);
          dayLabels.push(dayStr.slice(5)); // MM-DD
          dayCounts[dayStr] = 0;
        }
        leads.forEach(function (l) {
          var day = (l.created_at || "").slice(0, 10);
          if (dayCounts.hasOwnProperty(day)) dayCounts[day]++;
        });
        var timelineData = Object.keys(dayCounts).map(function (k) { return dayCounts[k]; });

        if (chartTimelineInstance) { chartTimelineInstance.destroy(); chartTimelineInstance = null; }

        chartTimelineInstance = new Chart(
          document.getElementById("chartTimeline"),
          {
            type: "line",
            data: {
              labels: dayLabels,
              datasets: [{
                data:            timelineData,
                borderColor:     "rgba(0,229,255,0.85)",
                backgroundColor: "rgba(0,229,255,0.08)",
                pointBackgroundColor: "rgba(0,229,255,0.9)",
                pointRadius:     4,
                tension:         0.35,
                fill:            true
              }]
            },
            options: {
              plugins: { legend: { display: false } },
              scales: {
                x: { ticks: { color: "#8892b8", maxRotation: 45 }, grid: { color: "rgba(255,255,255,0.05)" } },
                y: { ticks: { color: "#8892b8", stepSize: 1 }, grid: { color: "rgba(255,255,255,0.05)" }, beginAtZero: true }
              }
            }
          }
        );
      } catch (err) {
        console.error("[LeadRadar] renderCharts error:", err);
      }
    }

    function loadLeads() {
      var refreshBtn = document.getElementById("refreshBtn");
      var countEl    = document.getElementById("leadsCount");
      var list       = document.getElementById("leadsList");

      refreshBtn.disabled = true;
      countEl.textContent = "Loading leads...";
      list.innerHTML = "";

      fetch(API + "/api/leads", {
        headers: { "Authorization": "Bearer " + tok() }
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var leads = data.leads || [];
          countEl.textContent = leads.length + " competitor" + (leads.length !== 1 ? "s" : "") + " tracked";

          renderStatStrip(leads);
          renderCharts(leads);

          if (!leads.length) {
            list.innerHTML = "<div class=\"empty-state\">No scored leads yet. The radar runs every 5 minutes.</div>";
            return;
          }

          // Sort by score descending
          leads.sort(function (a, b) { return (b.intent_score || 0) - (a.intent_score || 0); });

          var noiseCount = leads.filter(function (l) { return (l.intent_score || 0) < 15; }).length;
          var noiseBtn = document.getElementById("noiseBtn");
          if (noiseCount > 0) {
            noiseBtn.textContent = "Show Noise (" + noiseCount + ")";
            noiseBtn.style.display = "inline-flex";
            noiseBtn.dataset.showing = "0";
          } else {
            noiseBtn.style.display = "none";
          }

          var PAGE_SIZE = 25;

          function buildCard(lead, idx) {
            var score      = typeof lead.intent_score === "number" ? lead.intent_score : 0;
            var handle     = lead.author_handle ? "@" + lead.author_handle : lead.author_did || "unknown";
            var keyword    = lead.matched_keyword || "";
            var text       = lead.post_text || "";
            var product    = lead.suggested_product || "none";
            var reason     = lead.intent_reason || "";
            var scoreClass = score >= 60 ? "score-green" : score >= 30 ? "score-amber" : "score-gray";
            return [
              "<div class=\"lead-card\" id=\"card-" + idx + "\">",
              "  <div class=\"lead-card-top\">",
              "    <span class=\"lead-handle\">" + escHtml(handle) + "</span>",
              "    <span class=\"lead-keyword\">" + escHtml(keyword) + "</span>",
              "  </div>",
              "  <p class=\"lead-text\">" + escHtml(text) + "</p>",
              "  <div class=\"lead-meta\">",
              "    <span class=\"score-badge " + scoreClass + "\">" + score + "</span>",
              "    <span class=\"lead-product\">" + escHtml(product) + "</span>",
              "    <span class=\"lead-reason\">" + escHtml(reason) + "</span>",
              "  </div>",
              "  <button class=\"draft-btn\" data-idx=\"" + idx + "\">Draft Engagement</button>",
              "  <div class=\"draft-area\" id=\"draft-area-" + idx + "\">",
              "    <div class=\"draft-box\" id=\"draft-" + idx + "\"></div>",
              "    <button class=\"copy-btn\" id=\"copy-" + idx + "\" data-idx=\"" + idx + "\">Copy</button>",
              "  </div>",
              "</div>"
            ].join("\n");
          }

          function renderCards(showNoise, visibleCount) {
            var filtered = showNoise ? leads : leads.filter(function (l) { return (l.intent_score || 0) >= 15; });
            var count    = visibleCount || PAGE_SIZE;
            var page     = filtered.slice(0, count);
            var remaining = filtered.length - page.length;

            var html = page.map(function (lead, idx) { return buildCard(lead, idx); }).join("\n");

            if (remaining > 0) {
              html += "<button class=\"btn-primary\" id=\"loadMoreBtn\" " +
                "style=\"width:100%;margin-top:12px;justify-content:center;\" " +
                "onclick=\"loadMore()\">Load More (" + remaining + " remaining)</button>";
            }

            list.innerHTML = html;
            window._visibleCount = count;
            window._renderedLeads = page;
          }

          window.loadMore = function () {
            var showing   = document.getElementById("noiseBtn").dataset.showing === "1";
            window._visibleCount = (window._visibleCount || PAGE_SIZE) + PAGE_SIZE;
            renderCards(showing, window._visibleCount);
          };

          renderCards(false, PAGE_SIZE);

          window._currentLeads = leads;
          window._renderCards  = renderCards;
        })
        .catch(function (err) {
          console.error("[LeadRadar] loadLeads error:", err);
          countEl.textContent = "Error loading leads";
          list.innerHTML = "<div class=\"empty-state\">Failed to load leads. Check console.</div>";
        })
        .finally(function () {
          refreshBtn.disabled = false;
        });
    }

    function draftReply(idx, postText, product) {
      var btn   = document.querySelector("#card-" + idx + " .draft-btn");
      var area  = document.getElementById("draft-area-" + idx);
      var box   = document.getElementById("draft-" + idx);
      var cpBtn = document.getElementById("copy-" + idx);

      btn.disabled = true;
      btn.textContent = "Drafting...";
      area.style.display = "none";
      box.textContent = "";
      box.classList.remove("draft-error");
      cpBtn.style.display = "inline-flex";

      fetch(API + "/api/leads/draft-reply", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + tok(),
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ post_text: postText, suggested_product: product })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.reply) {
            box.textContent = data.reply;
            cpBtn.style.display = "inline-flex";
          } else {
            box.textContent = "No reply was generated.";
            box.classList.add("draft-error");
            cpBtn.style.display = "none";
          }
          area.style.display = "flex";
        })
        .catch(function (err) {
          console.error("[LeadRadar] draftReply error:", err);
          box.textContent = "Error generating reply. Please try again.";
          box.classList.add("draft-error");
          cpBtn.style.display = "none";
          area.style.display = "flex";
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = "Draft Engagement";
        });
    }

    function copyReply(idx) {
      var box   = document.getElementById("draft-" + idx);
      var cpBtn = document.getElementById("copy-" + idx);
      var text  = box.textContent || "";
      if (!text) return;
      navigator.clipboard.writeText(text).then(function () {
        cpBtn.textContent = "Copied!";
        cpBtn.classList.add("copied");
        setTimeout(function () {
          cpBtn.textContent = "Copy";
          cpBtn.classList.remove("copied");
        }, 2000);
      }).catch(function () {
        cpBtn.textContent = "Failed";
        setTimeout(function () { cpBtn.textContent = "Copy"; }, 2000);
      });
    }

    function escHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    loadLeads();

    document.getElementById("leadsList").addEventListener("click", function (e) {
      var draftBtn = e.target.closest(".draft-btn");
      if (draftBtn) {
        var idx  = parseInt(draftBtn.dataset.idx, 10);
        var lead = (window._renderedLeads || [])[idx];
        if (!lead) return;
        draftReply(idx, lead.post_text || "", lead.suggested_product || "none");
        return;
      }
      var copyBtn = e.target.closest(".copy-btn");
      if (copyBtn) {
        var idx = parseInt(copyBtn.dataset.idx, 10);
        copyReply(idx);
      }
    });
  </script>
</body>
</html>
