<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Services Marketplace</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(34,211,238,.14),transparent 38%),radial-gradient(circle at 85% 90%,rgba(251,191,36,.10),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:32px 24px 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:48px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(34,211,238,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(34,211,238,.55);box-shadow:0 0 20px rgba(34,211,238,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#22d3ee}
    .hero{text-align:center;margin-bottom:44px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:#fbbf24;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
    .hero-title{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.03em;color:#e8e8ff}
    .hero-sub{margin:0;color:#8892b8;font-size:1rem;line-height:1.6}

    .svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .svc-card{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:all .25s}
    .svc-card:hover{border-color:rgba(34,211,238,.28);transform:translateY(-2px);box-shadow:0 0 28px rgba(34,211,238,.1)}
    .svc-img-wrap{width:100%;aspect-ratio:16/10;overflow:hidden;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center}
    .svc-img{width:100%;height:100%;object-fit:cover;display:block}
    .svc-img-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#8892b8;font-size:.65rem}
    .svc-img-fallback svg{width:28px;height:28px;opacity:.5}
    .svc-body{padding:16px 18px;display:flex;flex-direction:column;gap:8px;flex:1}
    .svc-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .svc-name{font-size:1rem;font-weight:700;color:#f4f7ff;line-height:1.3;margin:0}
    .svc-category{flex-shrink:0;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:999px;padding:4px 10px;white-space:nowrap}
    .svc-desc{font-size:.82rem;color:#8892b8;line-height:1.5;margin:0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .svc-price{font-size:1.15rem;font-weight:800;color:#34d399;margin-top:2px}
    .svc-seller-row{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
    .svc-seller-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
    .svc-seller-avatar-fallback{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);display:flex;align-items:center;justify-content:center;color:#22d3ee;font-size:.75rem;font-weight:700}
    .svc-seller-info{flex:1;min-width:0}
    .svc-seller-name{font-size:.82rem;font-weight:600;color:#e8e8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .svc-seller-link{font-size:.72rem;color:#22d3ee;text-decoration:none}
    .svc-seller-link:hover{text-decoration:underline}
    .svc-buy-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:10px;border:1px solid rgba(52,211,153,.4);background:rgba(52,211,153,.12);color:#34d399;font-size:.8rem;font-weight:700;text-decoration:none;transition:all .2s;flex-shrink:0}
    .svc-buy-btn:hover{background:rgba(52,211,153,.2);box-shadow:0 0 16px rgba(52,211,153,.2)}
    .empty-msg{text-align:center;padding:52px 24px;color:#8892b8;font-size:.9rem;line-height:1.6}
    .loading{text-align:center;padding:52px 24px;color:#8892b8;font-size:.9rem}
    @media(max-width:600px){.svc-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">MARKETPLACE</div>
    <h1 class="hero-title">Services</h1>
    <p class="hero-sub">Browse services offered by BizForce AI members.</p>
  </div>

  <div class="svc-grid" id="svcGrid"><div class="loading">Loading services...</div></div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function formatPrice(price, currency) {
  var n = Number(price);
  if (price == null || !isFinite(n) || n === 0) return "Free";
  var cur = (currency || "USD").toUpperCase();
  return cur + " " + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function initials(name) {
  return String(name || "").split(" ").filter(Boolean).map(function(w){ return w[0]; }).join("").toUpperCase().slice(0,2) || "?";
}

async function loadServices() {
  var grid = document.getElementById("svcGrid");
  try {
    var res = await fetch(API_URL + "/api/bfp/services/browse");
    if (!res.ok) throw new Error("fetch failed");
    var data = await res.json();
    renderServices(data.services || []);
  } catch (e) {
    grid.innerHTML = '<div class="empty-msg">Unable to load services. Please try again.</div>';
  }
}

function renderServices(services) {
  var grid = document.getElementById("svcGrid");
  if (!services.length) {
    grid.innerHTML = '<div class="empty-msg">No services listed yet.<br>Check back soon — sellers are just getting started.</div>';
    return;
  }
  grid.innerHTML = services.map(function(s) {
    var img = s.image_url
      ? '<img class="svc-img" src="' + esc(s.image_url) + '" alt="">'
      : '<div class="svc-img-fallback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span>No image</span></div>';

    var categoryTag = s.category ? '<span class="svc-category">' + esc(s.category) + '</span>' : "";

    var seller = s.seller || null;
    var sellerAvatar = seller && seller.avatar_url
      ? '<img class="svc-seller-avatar" src="' + esc(seller.avatar_url) + '" alt="">'
      : '<div class="svc-seller-avatar-fallback">' + esc(initials(seller ? seller.display_name : "")) + '</div>';
    var sellerName = esc((seller && seller.display_name) || "Unknown seller");
    var sellerLink = (seller && seller.username)
      ? '<a class="svc-seller-link" href="profile.html?u=' + esc(seller.username) + '">@' + esc(seller.username) + '</a>'
      : "";

    var buyBtn = s.buy_link
      ? '<a class="svc-buy-btn" href="' + esc(s.buy_link) + '" target="_blank" rel="noopener">View / Buy</a>'
      : "";

    return '<div class="svc-card">' +
      '<div class="svc-img-wrap">' + img + '</div>' +
      '<div class="svc-body">' +
        '<div class="svc-top-row"><h3 class="svc-name">' + esc(s.name) + '</h3>' + categoryTag + '</div>' +
        '<p class="svc-desc">' + esc(s.description || "") + '</p>' +
        '<div class="svc-price">' + formatPrice(s.price, s.currency) + '</div>' +
        '<div class="svc-seller-row">' +
          sellerAvatar +
          '<div class="svc-seller-info"><div class="svc-seller-name">' + sellerName + '</div>' + sellerLink + '</div>' +
          buyBtn +
        '</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

loadServices();
</script>
<script src="/scripts/termaximus-presence.js"></script>
<script src="/scripts/termaximus-guide.js"></script>
</body>
</html>
