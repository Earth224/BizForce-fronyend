<!DOCTYPE html>
<html lang="en">
<head>
  <style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 30px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

.brand-title {
  background: linear-gradient(135deg, #00c6ff, #7b2ff7);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
  font-weight: 800;
}

select, textarea, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

textarea {
    min-height: 120px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  color: white;
  background: linear-gradient(135deg, #00c6ff, #7b2ff7);
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 14px rgba(0, 198, 255, 0.25);
}

button:hover {
  opacity: 0.95;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(123, 47, 247, 0.35);
}



.result-box {
    width: 100%;
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(59, 130, 246, 0.35);
    color: #ffffff;
    overflow-x: hidden;
    overflow-y: auto;
    max-height: 650px;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.6;
    font-size: 14px;
    box-sizing: border-box;
}
.task-card {
    margin-bottom: 16px;
    padding: 16px;
    border-radius: 14px;
    background: rgba(2, 6, 23, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.25);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
}

.task-card-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
}

.agent-pill {
    padding: 5px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, #00c6ff, #7b2ff7);
    color: #ffffff;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
}

.status-pill {
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
}

.status-completed {
    background: rgba(34, 197, 94, 0.16);
    color: #22c55e;
    border: 1px solid rgba(34, 197, 94, 0.4);
}

.status-processing,
.status-running {
    background: rgba(234, 179, 8, 0.16);
    color: #facc15;
    border: 1px solid rgba(234, 179, 8, 0.4);
}

.status-failed {
    background: rgba(239, 68, 68, 0.16);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.4);
}

.status-queued {
    background: rgba(59, 130, 246, 0.16);
    color: #60a5fa;
    border: 1px solid rgba(59, 130, 246, 0.4);
}

.task-label {
    color: #22c55e;
    font-size: 12px;
    font-weight: 700;
    margin-top: 10px;
    text-transform: uppercase;
}

.task-text {
    margin-top: 5px;
    color: #e2e8f0;
    font-size: 13px;
    line-height: 1.45;
    white-space: pre-wrap;
    overflow-wrap: break-word;
}

.task-preview {
    max-height: 120px;
    overflow: hidden;
}

.task-details {
    margin-top: 12px;
}

.task-details summary {
    cursor: pointer;
    color: #00c6ff;
    font-weight: 700;
    margin-bottom: 10px;
}

.task-full-report {
    padding: 12px;
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(59, 130, 246, 0.25);
    max-height: 420px;
    overflow-y: auto;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    font-size: 13px;
    line-height: 1.5;
}
strong {
    color: #22c55e;
}
</style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI - AI Staff</title>
</head>
<body>
<div class="container">
  <h1><span class="brand-title">BizForce AI</span> Staff</h1>

  <button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>

  <hr />

  <label>Choose Agent</label>
  <select id="agentType">
    <option value="seo">SEO Agent</option>
    <option value="sales">Sales Agent</option>
    <option value="content">Content Agent</option>
    <option value="ads">Ads Agent</option>
    <option value="reputation">Reputation Agent</option>
    <option value="analytics">Analytics Agent</option>
    <option value="email">Email Agent</option>
    <option value="community">Community Agent</option>
    <option value="influencer">Influencer Agent</option>
    <option value="operations">Operations Agent</option>
    <option value="executive">Executive Coordinator</option>
  </select>

  <br /><br />

  <label>Task Prompt</label>
  <br />
  <textarea id="prompt" rows="8" cols="60" placeholder="Tell your AI agent what to do..."></textarea>

  <br /><br />

  <button id="runAgentBtn" onclick="runAgent()">Run AI Agent</button>

  <h2>Result</h2>
  <div id="result">Waiting for task...</div>
  <div id="taskHistory" style="margin-top:30px;">
  <h3>Task History</h3>
  <div id="taskList"></div>
</div>
  <script>
    var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
function cleanAiText(value) {
      return String(value || "")
            .replace(/#{1,6}\s?/g, "")
            .replace(/\*\*/g, "")
            .replace(/\|/g, " · ")
            .replace(/---/g, "")
            .replace(/\n{3,}/g, "\n\n")
            .trim();
}
    async function runAgent() {
      var token = localStorage.getItem("bf_token");
      var agentType = document.getElementById("agentType").value;
      var prompt = document.getElementById("prompt").value;
      var runButton = document.getElementById("runAgentBtn");
      var resultBox = document.getElementById("result");
      if (!token) {
        resultBox.textContent = "You are not logged in.";
        return;
      }

      if (!prompt) {
        resultBox.textContent = "Enter a task prompt first.";
        return;
      }

      resultBox.innerHTML = "⏳ Running AI Agent... (this can take up to 30–45 seconds)";
runButton.disabled = true;
runButton.textContent = "Running...";
      try {
        var controller = new AbortController();
var timeout = setTimeout(function() {
  controller.abort();
}, 45000); // 45 sec timeout
var response = await fetch(API_URL + "/api/ai/tasks", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
  },
  body: JSON.stringify({
    agent_type: agentType,
    task_type: agentType === "seo" ? "seo_audit" : agentType === "sales" ? "sales_funnel" : agentType === "content" ? "content_plan" : agentType === "ads" ? "ad_campaign" : "general",
    prompt: prompt
  }),
  signal: controller.signal
});

clearTimeout(timeout);

        var data = await response.json();

if (!response.ok) {
    resultBox.innerHTML = "❌ Request failed: " + (data.error || "Unknown error");
    runButton.disabled = false;
    runButton.textContent = "Run AI Agent";
    return;
}

var taskId = data.task && data.task.id;

if (!taskId) {
    resultBox.innerHTML = "⚠️ Task queued but no task ID returned.";
    runButton.disabled = false;
    runButton.textContent = "Run AI Agent";
    return;
}

resultBox.innerHTML = "⏳ Task queued. Waiting for result...";

await pollTaskResult(taskId, resultBox, runButton);
return;


     } catch (error) {
  if (error.name === "AbortError") {
    resultBox.innerHTML = "⏱️ Request timed out. Try again.";
  } else {
    resultBox.innerHTML = "❌ Error: " + error.message;
  }

  runButton.disabled = false;
  runButton.textContent = "Run AI Agent";
}
      }
async function pollTaskResult(taskId, resultBox, runButton) {

    var token = localStorage.getItem("bf_token");

    for (var i = 0; i < 30; i++) {

        await new Promise(function(resolve) {
            setTimeout(resolve, 2000);
        });

        try {

            var response = await fetch(API_URL + "/api/ai/tasks", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            var data = await response.json();

            if (!data.tasks || !Array.isArray(data.tasks)) {
                continue;
            }

            var task = data.tasks.find(function(t) {
                return t.id === taskId;
            });

            if (!task) {
                continue;
            }

            if (task.status === "completed") {

                resultBox.innerHTML = (task.result || "No result returned.")
                    .replace(/\n\n/g, "<br><br>")
                    .replace(/\n/g, "<br>")
                    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

                runButton.disabled = false;
                runButton.textContent = "Run AI Agent";

                loadTasks();

                return;
            }

            if (task.status === "failed") {

                resultBox.innerHTML = "❌ Task failed.";

                runButton.disabled = false;
                runButton.textContent = "Run AI Agent";

                return;
            }

        } catch (error) {
            console.error(error);
        }

    }

    resultBox.innerHTML = "⚠️ Task timed out.";

    runButton.disabled = false;
    runButton.textContent = "Run AI Agent";
}    
async function loadTasks() {
  try {
    var token = localStorage.getItem("bf_token");

    var res = await fetch(API_URL + "/api/ai/tasks", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    var data = await res.json();

    var container = document.getElementById("taskList");
    container.innerHTML = "";

    if (!data.tasks || data.tasks.length === 0) {
  container.innerHTML = "<div>No tasks yet</div>";
  return;
}

data.tasks.forEach(function(task) {

      var statusClass = "status-queued";

      if (task.status === "completed") {
            statusClass = "status-completed";
      }

      if (task.status === "running" || task.status === "processing") {
            statusClass = "status-running";
      }

      if (task.status === "failed") {
            statusClass = "status-failed";
      }

      var shortResult = task.result || "Processing...";

      if (shortResult.length > 320) {
            shortResult = shortResult.substring(0, 320) + "...";
      }

      var div = document.createElement("div");

      div.className = "task-card";

      div.innerHTML = `
            <div class="task-card-header">

                  <div class="agent-pill">
                        ${task.agent_type || "agent"}
                  </div>

                  <div class="status-pill ${statusClass}">
                        ${task.status || "queued"}
                  </div>

            </div>

            <div class="task-label">
                  Prompt
            </div>

            <div class="task-text">
                  ${task.prompt || "No prompt"}
            </div>

            <div class="task-label">
                  Quick Result
            </div>

            <div class="task-text task-preview">
                  ${shortResult}
            </div>

            <details class="task-details">

                  <summary>
                        View Full Report
                  </summary>

                  <div class="task-full-report">
                        ${cleanAiText(task.result || "Processing..."}
                  </div>

            </details>
      `;

      container.appendChild(div);

});

  } catch (err) {
    console.error("LOAD TASKS ERROR:", err);
  }
}

loadTasks();
</script> 

</div>
</body>
</html>
