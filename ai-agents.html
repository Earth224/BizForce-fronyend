<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — Agent Directory</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: #e8e8ff;
      background: #070b18;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 229, 255, 0.14), transparent 38%),
        radial-gradient(circle at 85% 90%, rgba(168, 85, 247, 0.18), transparent 40%),
        #070b18;
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Nav ── */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid rgba(0, 229, 255, 0.25);
      background: rgba(12, 18, 38, 0.6);
      color: #22d3ee;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.25s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .back-link:hover {
      border-color: rgba(0, 229, 255, 0.55);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
      transform: translateY(-1px);
    }

    .brand-badge {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      margin-bottom: 52px;
    }

    .hero-eyebrow {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      background: rgba(0, 229, 255, 0.08);
      color: #22d3ee;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-title {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(135deg, #00e5ff 0%, #7b2ff7 60%, #a855f7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.25));
    }

    .hero-subtitle {
      margin: 0 0 14px;
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      font-weight: 600;
      color: #c4b5fd;
    }

    .hero-description {
      margin: 0 auto 28px;
      max-width: 560px;
      font-size: 1rem;
      line-height: 1.65;
      color: #8892b8;
    }

    .agent-count {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(12, 18, 38, 0.75);
      border: 1px solid rgba(168, 85, 247, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 0 24px rgba(168, 85, 247, 0.12);
    }

    .agent-count-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .agent-count-value {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ── Agent Grid ── */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .agent-card {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 28px 24px 24px;
      border-radius: 20px;
      background: rgba(12, 18, 38, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .agent-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(0, 229, 255, 0.06), rgba(168, 85, 247, 0.06));
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .agent-card:hover {
      transform: translateY(-6px);
      border-color: rgba(0, 229, 255, 0.35);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.45),
        0 0 40px rgba(0, 229, 255, 0.12),
        0 0 60px rgba(168, 85, 247, 0.08);
    }

    .agent-card:hover::before {
      opacity: 1;
    }

    .agent-card > * {
      position: relative;
      z-index: 1;
    }

    .agent-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(168, 85, 247, 0.2));
      border: 2px solid rgba(0, 229, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(0, 229, 255, 0.15);
      flex-shrink: 0;
    }

    .agent-avatar svg {
      width: 34px;
      height: 34px;
      opacity: 0.7;
    }

    .agent-name {
      margin: 0 0 10px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .agent-description {
      margin: 0 0 24px;
      flex: 1;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #8892b8;
    }

    .open-agent-btn {
      display: block;
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      color: #ffffff;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(0, 198, 255, 0.25);
    }

    .open-agent-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 28px rgba(0, 198, 255, 0.35),
        0 0 20px rgba(168, 85, 247, 0.25);
    }

    .open-agent-btn:active {
      transform: translateY(0);
    }

    /* ── Accent variants per card ── */
    .agent-card--seo .agent-avatar { border-color: rgba(34, 211, 238, 0.45); }
    .agent-card--sales .agent-avatar { border-color: rgba(168, 85, 247, 0.45); }
    .agent-card--content .agent-avatar { border-color: rgba(52, 211, 153, 0.45); }
    .agent-card--analytics .agent-avatar { border-color: rgba(96, 165, 250, 0.45); }
    .agent-card--social .agent-avatar { border-color: rgba(244, 114, 182, 0.45); }
    .agent-card--email .agent-avatar { border-color: rgba(251, 191, 36, 0.5); background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(168, 85, 247, 0.18)); }
    .agent-card--reputation .agent-avatar { border-color: rgba(248, 113, 113, 0.5); background: linear-gradient(135deg, rgba(248, 113, 113, 0.15), rgba(168, 85, 247, 0.18)); }
    .agent-card--community .agent-avatar { border-color: rgba(74, 222, 128, 0.5); background: linear-gradient(135deg, rgba(74, 222, 128, 0.15), rgba(168, 85, 247, 0.18)); }
    .agent-card--influencer .agent-avatar { border-color: rgba(232, 121, 249, 0.5); background: linear-gradient(135deg, rgba(232, 121, 249, 0.15), rgba(168, 85, 247, 0.18)); }
    .agent-card--operations .agent-avatar { border-color: rgba(148, 163, 184, 0.55); background: linear-gradient(135deg, rgba(148, 163, 184, 0.18), rgba(168, 85, 247, 0.15)); }
    .agent-card--etsy .agent-avatar { border-color: rgba(251, 146, 60, 0.55); background: linear-gradient(135deg, rgba(251, 146, 60, 0.18), rgba(168, 85, 247, 0.15)); }
    .agent-card--store .agent-avatar { border-color: rgba(56, 189, 248, 0.55); background: linear-gradient(135deg, rgba(56, 189, 248, 0.18), rgba(168, 85, 247, 0.15)); }
    .agent-card--broker .agent-avatar { border-color: rgba(192, 132, 252, 0.55); background: linear-gradient(135deg, rgba(192, 132, 252, 0.18), rgba(168, 85, 247, 0.15)); }
    .agent-card--publicist .agent-avatar { border-color: rgba(252, 211, 77, 0.55); background: linear-gradient(135deg, rgba(252, 211, 77, 0.18), rgba(168, 85, 247, 0.15)); }
    .agent-card--rd .agent-avatar {
      border-color: rgba(0, 229, 255, 0.5);
      background: linear-gradient(135deg, rgba(0, 229, 255, 0.18), rgba(168, 85, 247, 0.22));
      box-shadow: 0 0 24px rgba(0, 229, 255, 0.18), 0 0 32px rgba(168, 85, 247, 0.12);
    }

    @media (max-width: 600px) {
      .page {
        padding: 24px 16px 48px;
      }

      .top-nav {
        margin-bottom: 36px;
      }

      .agents-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="page">

    <nav class="top-nav">
      <a class="back-link" href="dashboard.html">← Back to Dashboard</a>
      <span class="brand-badge">BizForce AI</span>
    </nav>

    <header class="hero">
      <span class="hero-eyebrow">Agent Directory</span>
      <h1 class="hero-title">AGENTS</h1>
      <p class="hero-subtitle">Your AI Business Team</p>
      <p class="hero-description">
        Build your own customizable team of AI business specialists.
      </p>
      <div class="agent-count">
        <span class="agent-count-label">Total Agents</span>
        <span class="agent-count-value">15</span>
      </div>
    </header>

    <section class="agents-grid" aria-label="AI Agent Directory">
    </section>

  </div>

<script>
(function renderLiveAgents() {
  var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
  var LINK_MAP = {
    seo: "agents/seo.html",
    sales: "agents/sales.html",
    content: "agents/content.html",
    analytics: "agents/analytics.html",
    social: "agents/social.html",
    email: "email-agent.html",
    reputation: "reputation-agent.html",
    community: "community-agent.html",
    influencer: "influencer-agent.html",
    operations: "operations-agent.html",
    etsy: "etsy-agent.html",
    store: "store-agent.html",
    broker: "broker-agent.html",
    publicist: "publicist-agent.html",
    rd: "rd-agent.html",
    executive: "executive-agent.html",
    ads: "ads-agent.html"
  };
  var GENERIC_AVATAR_SVG =
    '<svg viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
    '<circle cx="12" cy="12" r="9"/>' +
    '<circle cx="12" cy="12" r="3"/>' +
    "</svg>";

  var grid = document.querySelector(".agents-grid");
  if (!grid) { return; }

  function renderMessage(text) {
    grid.textContent = "";
    var msg = document.createElement("p");
    msg.className = "agents-grid-message";
    msg.textContent = text;
    grid.appendChild(msg);
  }

  function renderCards(agents) {
    grid.textContent = "";
    agents.forEach(function (agent) {
      var type = String(agent.agent_type || agent.type || "").toLowerCase();
      var href = LINK_MAP[type] || "agents-hub.html";

      var article = document.createElement("article");
      article.className = "agent-card agent-card--" + (type || "unknown");

      var avatar = document.createElement("div");
      avatar.className = "agent-avatar";
      avatar.setAttribute("aria-hidden", "true");
      avatar.innerHTML = GENERIC_AVATAR_SVG;

      var name = document.createElement("h2");
      name.className = "agent-name";
      name.textContent = agent.display_name || "";

      var description = document.createElement("p");
      description.className = "agent-description";
      description.textContent = agent.description || "";

      var link = document.createElement("a");
      link.className = "open-agent-btn";
      link.href = href;
      link.textContent = "Open Agent";

      article.appendChild(avatar);
      article.appendChild(name);
      article.appendChild(description);
      article.appendChild(link);
      grid.appendChild(article);
    });
  }

  var token = localStorage.getItem("bf_token");
  if (!token) {
    renderMessage("Unable to load your agents — please sign in again.");
    return;
  }

  fetch(API_URL + "/api/agents", {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
    .then(function (response) {
      return response.ok ? response.json() : null;
    })
    .then(function (data) {
      var list = Array.isArray(data) ? data : (data && Array.isArray(data.agents) ? data.agents : null);
      if (!list) {
        renderMessage("Unable to load your agents — please sign in again.");
        return;
      }
      var activeAgents = list.filter(function (a) { return a.active === true; });
      activeAgents.sort(function (a, b) {
        var nameA = String(a.display_name || "");
        var nameB = String(b.display_name || "");
        return nameA.localeCompare(nameB);
      });
      renderCards(activeAgents);
    })
    .catch(function () {
      renderMessage("Unable to load your agents — please sign in again.");
    });
})();
</script>
<script src="/scripts/termaximus-presence.js"></script>
<script src="/scripts/termaximus-guide.js"></script>
</body>
</html>
