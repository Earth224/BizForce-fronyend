<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — My Chart</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --mirror-f-clr: #c8a84b;
    }

    /* ── BizForce page chrome — same recipe as oracle.html ── */
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: #e8e8ff;
      background: #070b18;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: #070b18;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Abyss — copied verbatim from oracle.html's .scene/.star-canvas/
       .abyss-moon rules so the background is pixel-identical. ── */
    .scene {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .star-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      display: block;
    }
    .abyss-moon {
      position: absolute;
      top: 8%;
      right: 12%;
      width: 260px;
      height: 260px;
      z-index: 0;
      pointer-events: none;
      filter: blur(0.3px);
      animation: abyss-moon-drift 120s ease-in-out infinite alternate;
    }
    .abyss-moon svg { width: 100%; height: 100%; display: block; }
    @keyframes abyss-moon-drift {
      0%   { transform: translate(0px, 0px); }
      100% { transform: translate(-10px, 8px); }
    }

    /* ── Shooting star — copied verbatim from oracle.html ── */
    .shoot-star {
      position: absolute;
      top: 0; left: 0;
      width: 90px;
      height: 1px;
      border-radius: 1px;
      pointer-events: none;
      opacity: 0;
      z-index: 0;
      transform-origin: right center;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(200,210,255,0.05) 18%,
        rgba(220,228,255,0.55) 52%,
        rgba(210,220,255,0.10) 82%,
        transparent 100%
      );
    }
    @keyframes shoot-fly {
      0%   { opacity: 0;    transform: translateX(0);                       }
      8%   { opacity: 0.65;                                                 }
      75%  { opacity: 0.45;                                                 }
      100% { opacity: 0;    transform: translateX(var(--shoot-dist,260px)); }
    }

    /* ── Page content — sits above the abyss, transparent so it shows
       through everywhere except the info panel's own tinted background. ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid rgba(0, 229, 255, 0.25);
      background: rgba(12, 18, 38, 0.6);
      color: #22d3ee;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.25s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .back-link:hover {
      border-color: rgba(0, 229, 255, 0.55);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
      transform: translateY(-1px);
    }
    .brand-badge {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .mychart-title-row {
      text-align: center;
      margin-bottom: 28px;
    }
    .mychart-title {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
    }
    .mychart-subtitle {
      margin: 8px 0 0;
      font-size: 0.85rem;
      color: rgba(232,220,255,0.5);
      letter-spacing: 0.02em;
    }
    /* Sun/Moon/Rising headline — the core identity of the chart, meant to
       be the first thing the eye catches after the title. Renders only
       once natal data resolves; gracefully absent (no birth time synced,
       fetch failed) rather than showing a broken/partial line. */
    .mychart-natal-summary {
      margin-top: 16px;
      font-size: clamp(0.95rem, 2.3vw, 1.2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(232,220,255,0.92);
    }
    .mychart-natal-summary:empty { display: none; margin-top: 0; }
    .mychart-natal-summary .mc-natal-sign {
      background: linear-gradient(90deg, #f4e4b8, #ffe9b0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
    }

    /* ── Chart stage — main content, centered, transparent so the abyss
       shows through. Not an overlay here (unlike oracle.html's My Chart
       panel) — this IS the page. ── */
    .my-chart-stage {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      padding-bottom: 24px;
    }
    /* ── Natal orbit — Stage D1, visual placement only. pointer-events:
       none on the wrapper since tap interactions aren't wired yet. ── */
    .natal-orbit {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    /* Fixed, uniform, compact footprint for EVERY card — no per-card
       sizing to content anymore (that's what let long angle-card text
       balloon those chips unevenly). Two short lines only; anything
       that would overflow a line is ellipsis-truncated rather than
       stretching the chip. */
    .natal-node {
      position: absolute;
      transform: translate(-50%, -50%);
      box-sizing: border-box;
      width: 140px;
      min-height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 8px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(34,211,238,0.10), rgba(168,85,247,0.10)), rgba(10,4,20,0.8);
      border: 1px solid rgba(168,85,247,0.5);
      box-shadow: 0 0 10px rgba(168,85,247,0.2);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    /* Luminaries (Sun/Moon) and angles (ASC/MC) — the key placements,
       given a stronger accent than the other eight nodes, but the SAME
       fixed size as every other card. */
    .natal-node-luminary {
      border-color: rgba(244,228,184,0.75);
      box-shadow: 0 0 14px rgba(244,228,184,0.3);
    }
    .natal-node-angle {
      border-color: rgba(34,211,238,0.65);
      box-shadow: 0 0 14px rgba(34,211,238,0.28);
    }
    .natal-node-line1,
    .natal-node-line2 {
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .natal-node-line1 {
      font-size: 0.72rem;
      font-weight: 700;
      color: #ffe9b0;
    }
    .natal-node-line2 {
      font-size: 0.62rem;
      color: rgba(232,220,255,0.8);
      letter-spacing: 0.02em;
    }
    .my-chart-placeholder {
      font-size: 1rem;
      letter-spacing: 0.04em;
      font-style: italic;
      color: rgba(232, 220, 255, 0.45);
    }

    /* ── Interactivity — tappable blueprint elements + the fixed info
       panel, copied unchanged from oracle.html's My Chart engine. ── */
    .mc-tappable { cursor: pointer; }
    .mc-info-panel {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 340px;
      max-width: calc(100vw - 48px);
      max-height: calc(100vh - 160px);
      z-index: 2;
      background: rgba(10,4,20,0.88);
      border-left: 2px solid rgba(168,85,247,0.4);
      border-radius: 14px;
      padding: 18px 20px;
      opacity: 0;
      transform: scale(0.92) translateY(12px);
      transform-origin: bottom right;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
      display: flex;
      flex-direction: column;
    }
    .mc-info-panel.is-open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .mc-info-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: transparent;
      border: none;
      color: rgba(232,220,255,0.5);
      font-size: 0.75rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      flex-shrink: 0;
    }
    .mc-info-close:hover { color: rgba(232,220,255,0.9); }
    /* Only the content area scrolls — the close button (positioned
       absolute, a sibling of this element, not a descendant) stays
       pinned to the panel's corner regardless of scroll position.
       flex:1 + min-height:0 is what lets a flex child actually shrink
       below its content height and become the scrolling region. */
    .mc-info-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(168,85,247,0.45) rgba(10,4,20,0.35);
      font-size: 0.85em;
      color: rgba(232,220,255,0.85);
      line-height: 1.55;
      padding-right: 20px;
    }
    .mc-info-heading {
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #f4e4b8;
      margin-bottom: 8px;
    }
    .mc-info-value {
      font-size: 1.1rem;
      font-weight: 800;
      color: #9df6ff;
      margin-bottom: 8px;
    }
    .mc-info-section-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(232,220,255,0.5);
      margin: 12px 0 4px;
    }
    .mc-info-section-title:first-of-type { margin-top: 4px; }
    .mc-info-row { margin-bottom: 3px; }
    .mc-info-row-phrase { font-style: italic; color: rgba(232,220,255,0.55); }
    .mc-info-body-text { margin: 0 0 8px; }
    .mc-info-body-text:last-child { margin-bottom: 0; }
    .mc-info-wisdom { font-style: italic; color: rgba(232,220,255,0.7); }
    .mc-info-number-heading {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #9df6ff;
      margin: 12px 0 6px;
    }

    /* ── "Ask Termaximus about this" — lives INSIDE #mcInfoBody, appended
       below the authored content for whatever was tapped. (A prior pass
       moved this to a standalone floating panel in the stage's corner;
       reverted — it belongs only in the tap panel.) Button uses the
       brand cyan/violet/gold gradient border. ── */
    .mc-ask-row {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .mc-ask-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      justify-content: center;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      background:
        linear-gradient(rgba(10,4,20,0.9), rgba(10,4,20,0.9)) padding-box,
        linear-gradient(90deg, #22d3ee, #a855f7, #f4e4b8) border-box;
      color: #f4e4b8;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .mc-ask-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 0 16px rgba(168,85,247,0.3);
    }
    .mc-ask-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    /* The live reply — styled distinctly (italic, gold accent border) so
       it visibly reads as "Termaximus speaking live". Scrolls along with
       the rest of #mcInfoBody's own scroll region — no separate scroll
       handling needed now that it lives inside the tap panel again. */
    .mc-oracle-reply {
      margin-top: 10px;
      padding: 10px 12px;
      border-left: 2px solid rgba(244,228,184,0.4);
      font-style: italic;
      font-size: 0.85em;
      line-height: 1.6;
      color: rgba(244,228,184,0.92);
      white-space: pre-wrap;
    }
    .mc-oracle-reply:empty { display: none; padding: 0; border: none; margin-top: 0; }
    .mc-oracle-reply-loading {
      color: rgba(232,220,255,0.55);
      font-style: normal;
      animation: mcOraclePulse 1.4s ease-in-out infinite;
    }
    @keyframes mcOraclePulse {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 0.9; }
    }
    .mc-oracle-reply-error {
      color: rgba(232,220,255,0.6);
      font-style: normal;
      border-left-color: rgba(232,220,255,0.3);
    }

    /* ── num-info-panel family — copied from oracle.html for openNumInfo/
       NUM_MEANINGS parity; unused by the mc-tappable engine (which uses
       its own openMcInfo/#mcInfoPanel instead, since openNumInfo's DOM-
       sibling insertion doesn't work for SVG elements) but kept present
       and functional in case future compact-row UI needs it here too. ── */
    .num-info-panel {
      position: relative;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.3s ease;
      background: rgba(10,4,20,0.6);
      border-radius: 10px;
      margin: 0 0 8px;
    }
    .num-info-panel.is-open {
      max-height: 600px;
      opacity: 1;
      margin: 4px 0 8px;
    }
    .num-info-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: transparent;
      border: none;
      color: rgba(232,220,255,0.5);
      font-size: 0.7rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }
    .num-info-close:hover { color: rgba(232,220,255,0.9); }
    .num-info-section {
      padding: 12px 14px;
      font-size: 0.85em;
      color: rgba(232,220,255,0.85);
      line-height: 1.55;
    }
    .num-info-field { border-left: 2px solid rgba(232,200,116,0.4); padding-right: 26px; }
    .num-info-number { border-left: 2px solid rgba(0,255,255,0.35); }
    .num-info-heading {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #f4e4b8;
      margin-bottom: 6px;
    }
    .num-info-heading-cyan { color: #9df6ff; }
    .num-info-derived-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(232,220,255,0.45);
      margin-bottom: 3px;
    }
    .num-info-body { margin: 0 0 8px; }
    .num-info-body:last-child { margin-bottom: 0; }
    .num-info-wisdom { font-style: italic; color: rgba(232,220,255,0.7); }
    .num-info-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0 14px;
    }

    /* ── Divine Triangle blueprint sizing wrapper (from renderDivineTriangleBlueprintVisual's opts.large/maxWidth path) ── */
    .dtb-visual-large svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>

  <!-- ══════════ SCENE — the moving abyss (copied verbatim from oracle.html) ══════════ -->
  <div class="scene" aria-hidden="true">
    <canvas class="star-canvas" id="starCanvas" aria-hidden="true"></canvas>
    <div class="abyss-moon" id="abyssMoon" aria-hidden="true"></div>

    <!-- Occasional shooting star -->
    <div class="shoot-star" id="sceneShootStar"></div>
  </div>

  <div class="page">
    <nav class="top-nav">
      <a class="back-link" href="oracle.html">&#8592; Back to Oracle</a>
      <span class="brand-badge">BizForce AI</span>
    </nav>

    <div class="mychart-title-row">
      <h1 class="mychart-title">My Chart</h1>
      <p class="mychart-subtitle">Your interactive Divine Triangle blueprint</p>
      <div class="mychart-natal-summary" id="mychartNatalSummary"></div>
    </div>

    <div class="my-chart-stage" id="myChartStage">
      <div class="my-chart-placeholder">Chart loading&hellip;</div>
    </div>
  </div>

  <div class="mc-info-panel" id="mcInfoPanel" aria-hidden="true">
    <button type="button" class="mc-info-close" id="mcInfoClose" aria-label="Close">&#x2715;</button>
    <div class="mc-info-body" id="mcInfoBody"></div>
  </div>

  <!-- ══════════ Live canvas starfield — copied VERBATIM from oracle.html,
       unchanged. Only depends on #starCanvas existing. ══════════ -->
  <script>
  (function () {
    var canvas = document.getElementById("starCanvas");
    if (!canvas) return;
    var ctx = canvas.getContext("2d");
    if (!ctx) return;

    var reducedMotion = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);

    var DPR_CAP = 2;
    var cssWidth  = window.innerWidth;
    var cssHeight = window.innerHeight;

    var nebulaCanvas = document.createElement("canvas");
    var nebulaCtx     = null;

    function renderNebula() {
      nebulaCanvas.width  = canvas.width;
      nebulaCanvas.height = canvas.height;
      nebulaCtx = nebulaCanvas.getContext("2d");
      var dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
      nebulaCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      var span = Math.max(cssWidth, cssHeight);
      var clouds = [
        { x: cssWidth * 0.18, y: cssHeight * 0.22, r: span * 0.55, color: "168,85,247",  alpha: 0.06 }, /* violet */
        { x: cssWidth * 0.82, y: cssHeight * 0.68, r: span * 0.5,  color: "34,211,238",  alpha: 0.05 }, /* cyan */
        { x: cssWidth * 0.52, y: cssHeight * 0.85, r: span * 0.4,  color: "52,211,153",  alpha: 0.035 } /* emerald whisper */
      ];

      clouds.forEach(function (c) {
        var g = nebulaCtx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
        g.addColorStop(0, "rgba(" + c.color + "," + c.alpha + ")");
        g.addColorStop(1, "rgba(" + c.color + ",0)");
        nebulaCtx.fillStyle = g;
        nebulaCtx.fillRect(0, 0, cssWidth, cssHeight);
      });
    }

    function resize() {
      cssWidth  = window.innerWidth;
      cssHeight = window.innerHeight;
      var dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
      canvas.width  = Math.round(cssWidth  * dpr);
      canvas.height = Math.round(cssHeight * dpr);
      canvas.style.width  = cssWidth  + "px";
      canvas.style.height = cssHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      renderNebula();
    }
    resize();

    var resizeTimer = null;
    window.addEventListener("resize", function () {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 150);
    });

    // ── Star generation ──────────────────────────────────────────────────
    var TINTS = [
      { r: 34,  g: 211, b: 238 }, /* cyan */
      { r: 139, g: 92,  b: 246 }, /* violet-blue */
      { r: 251, g: 191, b: 36  }  /* warm gold */
    ];

    function pickTint() {
      if (Math.random() < 1 / 6) {
        return TINTS[Math.floor(Math.random() * TINTS.length)];
      }
      return { r: 255, g: 255, b: 255 };
    }

    function makeStar(minR, maxR) {
      var r = minR + Math.random() * (maxR - minR);
      var baseAlpha = 0.12 + Math.pow(Math.random(), 2) * 0.8;
      var scintillates = Math.random() < 0.25;
      return {
        x: Math.random() * cssWidth,
        y: Math.random() * cssHeight,
        r: r,
        baseAlpha: baseAlpha,
        phase: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 1.6,
        tint: pickTint(),
        spiked: (r > (minR + (maxR - minR) * 0.6)) && (baseAlpha > 0.6),
        scintillates: scintillates,
        twinkleDepth: scintillates ? 0.6 : 0.12
      };
    }

    var LAYERS = [
      { count: 240, minR: 0.4, maxR: 0.9, parallax: 0.15, offsetX: 0, offsetY: 0, stars: [] }, /* far */
      { count: 120, minR: 0.8, maxR: 1.6, parallax: 0.4,  offsetX: 0, offsetY: 0, stars: [] }, /* mid */
      { count: 50,  minR: 1.4, maxR: 2.6, parallax: 1.0,  offsetX: 0, offsetY: 0, stars: [] }  /* near */
    ];

    LAYERS.forEach(function (layer) {
      for (var i = 0; i < layer.count; i++) {
        layer.stars.push(makeStar(layer.minR, layer.maxR));
      }
    });

    var BASE_DRIFT_X   = 8;    /* px/sec at parallax factor 1 */
    var BASE_DRIFT_Y   = -4.5; /* px/sec at parallax factor 1 */
    var PARALLAX_PX    = 45;   /* max px shift at parallax factor 1 */
    var PARALLAX_EASE  = 0.05;

    // ── Parallax input — mouse (desktop) or device tilt (phone) ──────────
    var targetOffsetX = 0, targetOffsetY = 0;
    var currentOffsetX = 0, currentOffsetY = 0;

    if (!reducedMotion) {
      window.addEventListener("mousemove", function (e) {
        targetOffsetX = (e.clientX / cssWidth)  * 2 - 1;
        targetOffsetY = (e.clientY / cssHeight) * 2 - 1;
      });

      var orientationEnabled = false;
      function setTargetFromOrientation(e) {
        if (e.gamma == null || e.beta == null) return;
        var gamma = Math.max(-45, Math.min(45, e.gamma));
        var beta  = Math.max(-45, Math.min(45, e.beta - 45));
        targetOffsetX = gamma / 45;
        targetOffsetY = beta / 45;
      }
      function enableOrientation() {
        if (orientationEnabled) return;
        orientationEnabled = true;
        window.addEventListener("deviceorientation", setTargetFromOrientation);
      }

      if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
        var requestOrientationPermission = function () {
          DeviceOrientationEvent.requestPermission().then(function (state) {
            if (state === "granted") enableOrientation();
          }).catch(function () { /* fall back silently to mouse/no-parallax */ });
          document.removeEventListener("touchend", requestOrientationPermission);
          document.removeEventListener("click", requestOrientationPermission);
        };
        document.addEventListener("touchend", requestOrientationPermission, { once: true });
        document.addEventListener("click", requestOrientationPermission, { once: true });
      } else if (typeof window.DeviceOrientationEvent !== "undefined") {
        enableOrientation();
      }
    }

    // ── Rendering ──────────────────────────────────────────────────────────
    function drawStarAt(px, py, star, alpha) {
      var tint = star.tint;

      // (a) soft outer halo — the subtle bloom
      var haloR = star.r * 2.2;
      var halo = ctx.createRadialGradient(px, py, 0, px, py, haloR);
      halo.addColorStop(0, "rgba(" + tint.r + "," + tint.g + "," + tint.b + "," + (alpha * 0.5) + ")");
      halo.addColorStop(1, "rgba(" + tint.r + "," + tint.g + "," + tint.b + ",0)");
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(px, py, haloR, 0, Math.PI * 2);
      ctx.fill();

      // diffraction spikes — bright stars only, drawn under the core
      if (star.spiked && alpha > 0.35) {
        var spikeLen   = star.r * 6;
        var spikeAlpha = alpha * 0.5;
        var spikeRgb   = tint.r + "," + tint.g + "," + tint.b;

        ctx.lineWidth = 0.8;

        var vSpike = ctx.createLinearGradient(px, py - spikeLen, px, py + spikeLen);
        vSpike.addColorStop(0,   "rgba(" + spikeRgb + ",0)");
        vSpike.addColorStop(0.5, "rgba(" + spikeRgb + "," + spikeAlpha + ")");
        vSpike.addColorStop(1,   "rgba(" + spikeRgb + ",0)");
        ctx.strokeStyle = vSpike;
        ctx.beginPath();
        ctx.moveTo(px, py - spikeLen);
        ctx.lineTo(px, py + spikeLen);
        ctx.stroke();

        var hSpike = ctx.createLinearGradient(px - spikeLen, py, px + spikeLen, py);
        hSpike.addColorStop(0,   "rgba(" + spikeRgb + ",0)");
        hSpike.addColorStop(0.5, "rgba(" + spikeRgb + "," + spikeAlpha + ")");
        hSpike.addColorStop(1,   "rgba(" + spikeRgb + ",0)");
        ctx.strokeStyle = hSpike;
        ctx.beginPath();
        ctx.moveTo(px - spikeLen, py);
        ctx.lineTo(px + spikeLen, py);
        ctx.stroke();
      }

      // (b) sharp core, on top — crisp bright point rather than a fuzzy ball
      var coreR = star.r * 0.7;
      var centerColor = tint;
      if (star.baseAlpha > 0.7) {
        centerColor = {
          r: Math.round(tint.r + (255 - tint.r) * 0.6),
          g: Math.round(tint.g + (255 - tint.g) * 0.6),
          b: Math.round(tint.b + (255 - tint.b) * 0.6)
        };
      }
      var core = ctx.createRadialGradient(px, py, 0, px, py, coreR);
      core.addColorStop(0, "rgba(" + centerColor.r + "," + centerColor.g + "," + centerColor.b + "," + alpha + ")");
      core.addColorStop(1, "rgba(" + tint.r + "," + tint.g + "," + tint.b + "," + (alpha * 0.15) + ")");
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(px, py, coreR, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStarWrapped(star, px, py, alpha) {
      var glowR = star.r * 3.2;
      drawStarAt(px, py, star, alpha);
      if (px < glowR)                drawStarAt(px + cssWidth,  py, star, alpha);
      if (px > cssWidth - glowR)     drawStarAt(px - cssWidth,  py, star, alpha);
      if (py < glowR)                drawStarAt(px, py + cssHeight, star, alpha);
      if (py > cssHeight - glowR)    drawStarAt(px, py - cssHeight, star, alpha);
    }

    // ── Animation loop ────────────────────────────────────────────────────
    var running  = false;
    var rafId    = null;
    var lastTime = null;
    var elapsed  = 0;

    function frame(now) {
      if (!running) return;
      if (lastTime == null) lastTime = now;
      var dt = (now - lastTime) / 1000;
      lastTime = now;
      if (!reducedMotion) elapsed += dt;

      if (!reducedMotion) {
        currentOffsetX += (targetOffsetX - currentOffsetX) * PARALLAX_EASE;
        currentOffsetY += (targetOffsetY - currentOffsetY) * PARALLAX_EASE;
      }

      ctx.clearRect(0, 0, cssWidth, cssHeight);
      if (nebulaCtx) {
        ctx.drawImage(nebulaCanvas, 0, 0, canvas.width, canvas.height, 0, 0, cssWidth, cssHeight);
      }

      LAYERS.forEach(function (layer) {
        if (!reducedMotion) {
          layer.offsetX += BASE_DRIFT_X * layer.parallax * dt;
          layer.offsetY += BASE_DRIFT_Y * layer.parallax * dt;
        }

        var parallaxShiftX = currentOffsetX * layer.parallax * PARALLAX_PX;
        var parallaxShiftY = currentOffsetY * layer.parallax * PARALLAX_PX;

        layer.stars.forEach(function (star) {
          var px = ((star.x + layer.offsetX + parallaxShiftX) % cssWidth  + cssWidth)  % cssWidth;
          var py = ((star.y + layer.offsetY + parallaxShiftY) % cssHeight + cssHeight) % cssHeight;

          var alpha = star.baseAlpha;
          if (!reducedMotion) {
            var tw = Math.sin(elapsed * star.speed + star.phase);
            alpha = Math.max(0, Math.min(1, star.baseAlpha + tw * star.baseAlpha * star.twinkleDepth));
          }

          drawStarWrapped(star, px, py, alpha);
        });
      });

      rafId = requestAnimationFrame(frame);
    }

    function start() {
      if (running) return;
      running = true;
      lastTime = null;
      rafId = requestAnimationFrame(frame);
    }

    function stop() {
      running = false;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
    }

    document.addEventListener("visibilitychange", function () {
      if (document.hidden) stop(); else start();
    });

    if (!document.hidden) start();
  }());
  </script>

  <!-- Independent shooting-star driver — copied verbatim from oracle.html,
       scene background only. -->
  <script>
  (function () {
    var star = document.getElementById("sceneShootStar");
    if (!star) return;

    function fireSceneShoot() {
      var W = window.innerWidth;
      var H = window.innerHeight;
      var edge = Math.floor(Math.random() * 4);
      var top, left, angle;

      if (edge === 0) {        /* top edge — travel downward, 55–125° */
        top   = -20;
        left  = -40 + Math.random() * (W + 80);
        angle = 55 + Math.random() * 70;
      } else if (edge === 1) { /* right edge — travel leftward, 145–215° */
        top   = -40 + Math.random() * (H + 80);
        left  = W + 20;
        angle = 145 + Math.random() * 70;
      } else if (edge === 2) { /* bottom edge — travel upward, 235–305° */
        top   = H + 20;
        left  = -40 + Math.random() * (W + 80);
        angle = 235 + Math.random() * 70;
      } else {                 /* left edge — travel rightward, -35 to 35° */
        top   = -40 + Math.random() * (H + 80);
        left  = -20;
        angle = -35 + Math.random() * 70;
      }

      var t    = Math.random();
      var dur  = (1.2 + t * 1.6).toFixed(2);
      var len  = Math.round(60 + t * 70);
      var dist = Math.round(220 + t * 280);

      star.style.animation = "none";
      star.offsetHeight; /* force reflow to restart */
      star.style.top    = top   + "px";
      star.style.left   = left  + "px";
      star.style.rotate = angle + "deg";
      star.style.width  = len   + "px";
      star.style.setProperty("--shoot-dist", dist + "px");
      star.style.animation = "shoot-fly " + dur + "s ease-out forwards";

      setTimeout(fireSceneShoot, 6000 + Math.random() * 10000);
    }

    setTimeout(fireSceneShoot, 3000 + Math.random() * 4000);
  }());
  </script>

  <script>
  (function () {
    var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
    var token = localStorage.getItem("bf_token");

    /* ═══ Moon — copied from oracle.html's celestial IIFE, trimmed of the
       Celestial panel's clock/calendar/eclipse/date-picker/drag code,
       which this page has none of. getActiveMoment() always returns
       "now" here since there's no date/time picker to override it. ═══ */
    var MOON_IMG_URL = "https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg";

    function getActiveMoment() {
      return new Date();
    }

    var SYNODIC_MONTH = 29.53058867;
    var KNOWN_NEW_MOON_UTC = Date.UTC(2000, 0, 6, 18, 14, 0);

    function getMoonData(date) {
      var daysSinceNew = (date.getTime() - KNOWN_NEW_MOON_UTC) / 86400000;
      var cycles = daysSinceNew / SYNODIC_MONTH;
      var phaseFraction = cycles - Math.floor(cycles);
      if (phaseFraction < 0) phaseFraction += 1;

      var illumPercent = Math.round((1 - Math.cos(phaseFraction * 2 * Math.PI)) / 2 * 100);

      return {
        illumPercent: illumPercent,
        phaseFraction: phaseFraction,
        waxing: phaseFraction < 0.5
      };
    }

    /* Real moon phase from GET /api/moon (astronomy-engine) — fetched once
       on load and every 30 minutes thereafter. Falls back to the local
       synodic approximation above on any network/response failure. */
    var cachedRealMoonPhase = null;

    function fetchRealMoonPhase() {
      if (typeof API_URL === "undefined") return Promise.resolve(null);
      return fetch(API_URL + "/api/moon")
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data || data.error || data.illuminatedFraction == null) return null;
          return {
            illuminatedFraction: data.illuminatedFraction,
            waxing: !!data.waxing,
            phaseAngle: data.phaseAngle,
            phaseName: data.phaseName || null
          };
        })
        .catch(function () { return null; });
    }

    function refreshRealMoonPhase() {
      fetchRealMoonPhase().then(function (result) {
        if (result) {
          cachedRealMoonPhase = result;
          renderAbyssMoon(); /* repaint immediately once real data lands */
        }

    /* Elliptical terminator path — identical geometry to oracle.html's
       buildMoonTerminatorPath. See oracle.html for the full derivation
       notes (crescent/gibbous bulge-direction logic). */
    function buildMoonTerminatorPath(cx, cy, r, phaseAngleDeg, waxing) {
      var theta = (phaseAngleDeg * Math.PI) / 180;
      var cosTheta = Math.cos(theta);
      var rx = Math.abs(r * cosTheta);
      var bulgeTowardLit = cosTheta > 0;

      var topX = cx, topY = cy - r;
      var bottomX = cx, bottomY = cy + r;

      var limbSweep = waxing ? 0 : 1;
      var terminatorSweep = waxing
        ? (bulgeTowardLit ? 0 : 1)
        : (bulgeTowardLit ? 1 : 0);

      return "M " + topX + " " + topY + " " +
        "A " + r + " " + r + " 0 0 " + limbSweep + " " + bottomX + " " + bottomY + " " +
        "A " + rx + " " + r + " 0 0 " + terminatorSweep + " " + topX + " " + topY + " Z";
    }

    var openNumInfoPanel  = null;

    function closeNumInfo() {

      openNumInfoPanel  = null;
      openNumInfoAnchor = null;

    function buildNumInfoHtml(systemKey, fieldKey, numberValue) {
      var fieldMeta  = NUM_MEANINGS[systemKey] && NUM_MEANINGS[systemKey][fieldKey];
      var numberMeta = NUM_MEANINGS.numbers && NUM_MEANINGS.numbers[String(numberValue)];

      var html = '<button type="button" class="num-info-close" aria-label="Close">&#x2715;</button>';

      if (fieldMeta) {
        html +=
          '<div class="num-info-section num-info-field">' +
            '<div class="num-info-heading">' + fieldMeta.title + '</div>' +
            '<div class="num-info-derived-label">How it&rsquo;s derived</div>' +
            '<div class="num-info-body">' + fieldMeta.derivation + '</div>' +
            '<div class="num-info-body num-info-wisdom">' + fieldMeta.wisdom + '</div>' +
          '</div>';
      }

      if (fieldMeta && numberMeta) {
        html += '<div class="num-info-divider"></div>';
      }

      if (numberMeta) {
        html +=
          '<div class="num-info-section num-info-number">' +
            '<div class="num-info-heading num-info-heading-cyan">The Number ' + numberValue + '</div>' +
            '<div class="num-info-body">' + numberMeta.essence + '</div>' +
            '<div class="num-info-body">' + numberMeta.shadow + '</div>' +
            '<div class="num-info-body num-info-wisdom">' + numberMeta.wisdom + '</div>' +
          '</div>';
      }

      if (!fieldMeta && !numberMeta) {
        html += '<div class="num-info-section"><div class="num-info-body">No meaning recorded yet for this number.</div></div>';
      }

      return html;
    }

    function openNumInfo(anchorEl, systemKey, fieldKey, numberValue) {
      var isSameAnchor = (openNumInfoAnchor === anchorEl);

      closeNumInfo();

      if (isSameAnchor) return;

      var panel = document.createElement("div");
      panel.className = "num-info-panel";
      panel.innerHTML = buildNumInfoHtml(systemKey, fieldKey, numberValue);

      if (anchorEl.nextSibling) {
        anchorEl.parentNode.insertBefore(panel, anchorEl.nextSibling);
      } else {
        anchorEl.parentNode.appendChild(panel);
      }

      var closeBtn = panel.querySelector(".num-info-close");
      if (closeBtn) {
        closeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          closeNumInfo();
        });
      }

      openNumInfoPanel  = panel;
      openNumInfoAnchor = anchorEl;

      requestAnimationFrame(function () {
        panel.classList.add("is-open");
      });
    }

    function escapeXml(str) {
      return String(str == null ? "" : str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    /* ═══ Divine Triangle blueprint — copied verbatim from oracle.html,
       including the interactive:true / mc-tappable hook path. ═══ */
    function renderDivineTriangleBlueprintVisual(opts) {
      opts = opts || {};
      var blueprint = numerologyData && numerologyData.systems && numerologyData.systems.divineTriangleBlueprint;
      if (!blueprint) return "";

      var linesById = {};
      (blueprint.lines || []).forEach(function (l) { linesById[l.id] = l; });
      var interior = blueprint.interior || {};
      var centers  = blueprint.centers  || {};

      function centerDisplay(obj) {
        if (!obj || obj.reduced == null) return "—";
        return (obj.unreduced === obj.reduced) ? String(obj.reduced) : (obj.unreduced + "/" + obj.reduced);
      }

      function lineDisplay(line) {
        if (!line) return "";
        var letter = (line.letter || "?").toUpperCase();
        var nums = (line.ordinal === line.reduced) ? String(line.reduced) : (line.ordinal + "/" + line.reduced);
        return letter + " " + nums;
      }

      function labelPosAway(p1, p2, ref, dist) {
        var mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        var dx = mx - ref.x, dy = my - ref.y;
        var len = Math.sqrt(dx * dx + dy * dy) || 1;
        return { x: mx + (dx / len) * dist, y: my + (dy / len) * dist };
      }

      function labelPosToward(p1, p2, ref, dist) {
        var mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        var dx = ref.x - mx, dy = ref.y - my;
        var len = Math.sqrt(dx * dx + dy * dy) || 1;
        return { x: mx + (dx / len) * dist, y: my + (dy / len) * dist };
      }

      function pointsAttr(poly) {
        return poly.map(function (p) { return p.x + "," + p.y; }).join(" ");
      }

      var SQUARE_OF_LINE = {
        AB: "youth", BC: "youth", CD: "youth",
        DE: "power", EF: "power", FG: "power",
        GH: "wisdom", HI: "wisdom", IA: "wisdom"
      };

      var corners = {
        D: { x: 110, y: 215 },
        A: { x: 110, y: 125 },
        G: { x: 200, y: 215 },
        B: { x: 20,  y: 125 },
        C: { x: 20,  y: 215 },
        E: { x: 110, y: 305 },
        F: { x: 200, y: 305 },
        H: { x: 290, y: 125 },
        I: { x: 200, y: 35 }
      };

      var youthCenter = {
        x: (corners.A.x + corners.B.x + corners.C.x + corners.D.x) / 4,

      var powerCenter = {
        x: (corners.D.x + corners.E.x + corners.F.x + corners.G.x) / 4,

      };
      var wisdomCenter = {
        x: (corners.G.x + corners.H.x + corners.I.x + corners.A.x) / 4,
        y: (corners.G.y + corners.H.y + corners.I.y + corners.A.y) / 4
      };
      var triangleCenter = {
        x: (corners.A.x + corners.D.x + corners.G.x) / 3,
        y: (corners.A.y + corners.D.y + corners.G.y) / 3
      };

      var youthPoly  = [corners.A, corners.B, corners.C, corners.D];
      var powerPoly  = [corners.D, corners.E, corners.F, corners.G];
      var wisdomPoly = [corners.G, corners.H, corners.I, corners.A];

      var perimeterEdges = [
        { id: "AB", p1: corners.A, p2: corners.B, center: youthCenter },
        { id: "BC", p1: corners.B, p2: corners.C, center: youthCenter },
        { id: "CD", p1: corners.C, p2: corners.D, center: youthCenter },
        { id: "DE", p1: corners.D, p2: corners.E, center: powerCenter },
        { id: "EF", p1: corners.E, p2: corners.F, center: powerCenter },
        { id: "FG", p1: corners.F, p2: corners.G, center: powerCenter },
        { id: "GH", p1: corners.G, p2: corners.H, center: wisdomCenter },
        { id: "HI", p1: corners.H, p2: corners.I, center: wisdomCenter },
        { id: "IA", p1: corners.I, p2: corners.A, center: wisdomCenter }
      ];

      var interiorEdges = [
        { key: "AD", p1: corners.A, p2: corners.D },
        { key: "DG", p1: corners.D, p2: corners.G },
        { key: "AG", p1: corners.A, p2: corners.G }

      var svg = '<svg viewBox="0 0 320 320" width="100%" xmlns="http://www.w3.org/2000/svg">';

      svg += '<defs>' +
        '<linearGradient id="dtbYouthFill" x1="0%" y1="0%" x2="100%" y2="100%">' +
          '<stop offset="0%" stop-color="#22d3ee" stop-opacity="0.14"/>' +

      svg += '<polygon points="' + pointsAttr(youthPoly)  + '" fill="url(#dtbYouthFill)"  stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>';
      svg += '<polygon points="' + pointsAttr(powerPoly)  + '" fill="url(#dtbPowerFill)"  stroke="rgba(168,85,247,0.4)" stroke-width="1.5"/>';

      perimeterEdges.forEach(function (edge) {

          'font-size="9" fill="rgba(232,220,255,0.85)">' + escapeXml(lineDisplay(line)) + '</text>';
        if (opts.interactive) {
          var square = SQUARE_OF_LINE[edge.id] || "";
          var ageRange = line ? line.ageRange : "";
          svg += '<g class="mc-tappable" data-mc-type="line" data-mc-line="' + edge.id +
            '" data-mc-square="' + square + '" data-mc-agerange="' + ageRange + '">' + textEl + '</g>';
        } else {
          svg += textEl;
        }
      });

      interiorEdges.forEach(function (edge) {
        var data = interior[edge.key];
        if (!data) return;
        var pos = labelPosToward(edge.p1, edge.p2, triangleCenter, 10);
        var textEl = '<text x="' + pos.x + '" y="' + pos.y + '" text-anchor="middle" dominant-baseline="middle" ' +
          'font-size="8" fill="rgba(217,179,255,0.8)">' + escapeXml(centerDisplay(data)) + '</text>';
        if (opts.interactive) {
          svg += '<g class="mc-tappable" data-mc-type="interior" data-mc-interior="' + edge.key +
            '" data-mc-value="' + data.reduced + '">' + textEl + '</g>';
        } else {
          svg += textEl;
        }
      });

      function centerTapWrap(textEl, centerKey, centerObj) {
        if (!opts.interactive) return textEl;
        var val = centerObj && centerObj.reduced != null ? centerObj.reduced : "";
        return '<g class="mc-tappable" data-mc-type="center" data-mc-center="' + centerKey +
          '" data-mc-value="' + val + '">' + textEl + '</g>';
      }
      svg += centerTapWrap('<text x="' + youthCenter.x + '" y="' + youthCenter.y + '" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#9df6ff">' + escapeXml(centerDisplay(centers.youth)) + '</text>', "youth", centers.youth);
      svg += centerTapWrap('<text x="' + powerCenter.x + '" y="' + powerCenter.y + '" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#d9b3ff">' + escapeXml(centerDisplay(centers.power)) + '</text>', "power", centers.power);
      svg += centerTapWrap('<text x="' + wisdomCenter.x + '" y="' + wisdomCenter.y + '" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#f4e4b8">' + escapeXml(centerDisplay(centers.wisdom)) + '</text>', "wisdom", centers.wisdom);
      svg += centerTapWrap('<text x="' + triangleCenter.x + '" y="' + triangleCenter.y + '" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#f4e4b8">' + escapeXml(centerDisplay(centers.triangle)) + '</text>', "triangle", centers.triangle);

      svg += '</svg>';

      if (opts.large || opts.maxWidth) {
        var maxWidth = opts.maxWidth || "640px";
        return '<div class="dtb-visual-large" style="max-width:' + maxWidth + '; width:100%;">' + svg + '</div>';

      return svg;

    /* ═══ Numerology data loader — adapted from oracle.html's
       fetchNumerology(). TRIMMED (deliberately, not a blind copy): the
       original also populates #numLifePath/#numExpression/etc. and calls
       renderNumerologySystem()/renderQuantumSynthesis() — all profile-box
       UI this page doesn't have, so those calls are dropped. The in-flight
       promise guard, the actual fetch, and the numerologyData assignment
       are otherwise identical. ═══ */
    var numerologyData = null;
    var numerologyFetchPromise = null;

    function fetchNumerology() {
      if (numerologyFetchPromise) return numerologyFetchPromise;
      if (typeof API_URL === "undefined" || typeof token === "undefined" || !token) {
        return Promise.resolve(null);
      }

      numerologyFetchPromise = fetch(API_URL + "/api/oracle/numerology", {
        headers: { "Authorization": "Bearer " + token }
      })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          numerologyData = data || null;
          return numerologyData;
        })
        .catch(function () { return null; })
        .then(function (result) {
          numerologyFetchPromise = null;
          return result;
        });

      return numerologyFetchPromise;
    }

    /* ═══ Natal chart loader — Stage D1, mirrors fetchNumerology exactly
       (same API_URL/token/Authorization header, same in-flight guard
       shape). Confirmed live against the real backend before this was
       built: GET /api/oracle/natal returns { available, timeKnown,
       planets:[{name,sign,degree,longitude}], ascendant:{sign,degree,
       longitude}, midheaven:{...}, houses, moonUncertain }. Resolves to
       null on any failure OR on { available:false, ... } so the caller
       can degrade gracefully (triangle alone, no orbit, no error shown). ═══ */
    var natalFetchPromise = null;

    function fetchNatal() {
      if (natalFetchPromise) return natalFetchPromise;
      if (typeof API_URL === "undefined" || typeof token === "undefined" || !token) {
        return Promise.resolve(null);
      }

      natalFetchPromise = fetch(API_URL + "/api/oracle/natal", {
        headers: { "Authorization": "Bearer " + token }
      })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data || !data.available) return null;
          return data;
        })
        .catch(function () { return null; })
        .then(function (result) {
          natalFetchPromise = null;
          return result;
        });

      return natalFetchPromise;
    }

    /* ═══ Natal orbit — Stage D1, visual placement only (no taps yet).
       Places the 10 planets + Ascendant + Midheaven as a ring of chips
       around the centered triangle. Radius is computed from the actual
       rendered triangle size and stage box at render time (not a fixed
       CSS value), so it clears the triangle and stays inside the stage
       on any window size; recomputed on resize. ═══ */
    var lastNatalData = null;

    var NATAL_GLYPHS = {
      Sun: "☉", Moon: "☽", Mercury: "☿", Venus: "♀", Mars: "♂",
      Jupiter: "♃", Saturn: "♄", Uranus: "♅", Neptune: "♆", Pluto: "♇",
      ASC: "ASC", MC: "MC"
    };

    /* Which house a longitude falls in, from the natal response's 12
       cusps — the response gives planets {name,sign,degree,longitude}
       with NO house field of their own (confirmed from the real
       /api/oracle/natal shape), so this is a genuine "which cusp
       interval contains this longitude" search, generic to any house
       system (not hardcoded to whole-sign's exact-30°-per-house math),
       using the houses array's own {house, longitude} cusps. */
    function houseForLongitude(houses, longitude) {
      if (!houses || houses.length !== 12 || longitude == null) return null;
      var sorted = houses.slice().sort(function (a, b) { return a.longitude - b.longitude; });
      var lon = ((longitude % 360) + 360) % 360;
      for (var i = 0; i < sorted.length; i++) {
        var start = sorted[i].longitude;
        var end   = sorted[(i + 1) % sorted.length].longitude;
        if (start < end) {
          if (lon >= start && lon < end) return sorted[i].house;
        } else {
          /* this interval wraps past 360 (e.g. start=350, end=20) */
          if (lon >= start || lon < end) return sorted[i].house;
        }
      }
      return null;
    }

    function ordinalSuffix(n) {
      var v = n % 100;
      if (v >= 11 && v <= 13) return n + "th";
      switch (n % 10) {
        case 1: return n + "st";
        case 2: return n + "nd";
        case 3: return n + "rd";
        default: return n + "th";
      }
    }

    /* Sun/Moon/Rising headline beneath the title — the core identity of
       the chart. Sun/Moon come from natalData.planets by name; Rising
       from natalData.ascendant.sign (null when no birth time is synced,
       in which case this renders nothing rather than a broken line). */
    function renderNatalSummary(natalData) {
      var el = document.getElementById("mychartNatalSummary");
      if (!el) return;
      if (!natalData) { el.innerHTML = ""; return; }

      var sun  = (natalData.planets || []).filter(function (p) { return p.name === "Sun"; })[0];
      var moon = (natalData.planets || []).filter(function (p) { return p.name === "Moon"; })[0];
      var asc  = natalData.ascendant;

      if (!sun || !moon || !asc || !sun.sign || !moon.sign || !asc.sign) {
        el.innerHTML = "";
        return;
      }

      el.innerHTML =
        "&#9737; Sun in <span class=\"mc-natal-sign\">" + sun.sign + "</span> &middot; " +
        "&#9789; Moon in <span class=\"mc-natal-sign\">" + moon.sign + "</span> &middot; " +
        "ASC <span class=\"mc-natal-sign\">" + asc.sign + "</span> Rising";
    }

    function renderNatalOrbit(natalData) {
      lastNatalData = natalData;
      renderNatalSummary(natalData);

      var stage = document.getElementById("myChartStage");
      if (!stage || !natalData) return;

      var existing = stage.querySelector(".natal-orbit");
      if (existing) existing.parentNode.removeChild(existing);

      var nodes = (natalData.planets || []).map(function (p) {
        return { name: p.name, sign: p.sign, degree: p.degree, longitude: p.longitude, kind: "planet" };
      });
      if (natalData.ascendant) {
        nodes.push({ name: "ASC", sign: natalData.ascendant.sign, degree: natalData.ascendant.degree, longitude: natalData.ascendant.longitude, kind: "angle" });
      }
      if (natalData.midheaven) {
        nodes.push({ name: "MC", sign: natalData.midheaven.sign, degree: natalData.midheaven.degree, longitude: natalData.midheaven.longitude, kind: "angle" });
      }
      if (!nodes.length) return;

      var stageRect  = stage.getBoundingClientRect();
      var triangleEl = stage.querySelector(".dtb-visual-large");

      /* A CIRCLE, not an ellipse — deliberate change from the previous
         version. An ellipse has tighter curvature (and therefore tighter
         card-to-card spacing) at the ends of its minor axis, which is
         exactly what caused the Sun/Moon/MC cards to collide at the top:
         uniform ANGULAR spacing on an ellipse does not mean uniform
         PHYSICAL spacing. A circle has identical chord distance between
         every adjacent pair at any angle, so "evenly spaced by angle" and
         "evenly spaced physically" become the same guarantee.

         CARD_WIDTH/CARD_HEIGHT match the fixed compact-card CSS exactly.
         CARD_GAP is the minimum clear gap enforced between adjacent card
         EDGES (not just centers). minRadiusForSpacing is the radius below
         which two 30°-apart cards would start to overlap — this is a hard
         floor, not a suggestion: no-overlap is preferred over full
         on-screen containment on a screen too small for both (see below). */
      var CARD_WIDTH  = 140;
      var CARD_HEIGHT = 44;
      var CARD_GAP    = 16;
      var MIN_GAP     = 60; /* clearance between the triangle's edge and the ring */

      var count        = nodes.length;
      var stepAngleRad = (Math.PI * 2) / count;
      var minRadiusForSpacing = (CARD_WIDTH + CARD_GAP) / (2 * Math.sin(stepAngleRad / 2));

      var cardHalfDiag = Math.sqrt(Math.pow(CARD_WIDTH / 2, 2) + Math.pow(CARD_HEIGHT / 2, 2));
      var maxRadius    = Math.max(40, Math.min(stageRect.width, stageRect.height) / 2 - cardHalfDiag);
      var triangleSize = triangleEl ? triangleEl.getBoundingClientRect().width : 320;

      /* If the triangle at its natural size wouldn't leave room for a
         comfortable gap before hitting maxRadius, shrink the triangle
         itself (floor 200px) — this only affects the triangle-clearance
         term below, not the no-overlap floor, which is independent of
         triangle size entirely. */
      var neededTriangleHalf = maxRadius - MIN_GAP;
      if (triangleEl && neededTriangleHalf * 2 < triangleSize) {
        var shrunkWidth = Math.max(200, neededTriangleHalf * 2);
        triangleEl.style.maxWidth = shrunkWidth + "px";
        triangleSize = shrunkWidth;
      }

      var desiredRadius = Math.max(triangleSize / 2 + MIN_GAP, minRadiusForSpacing);
      /* minRadiusForSpacing wins even over maxRadius (the on-screen
         ceiling) — on a screen too small for both constraints, cards may
         clip slightly at the edge, but they will never overlap each
         other. That trade-off is deliberate. */
      var radius  = Math.max(minRadiusForSpacing, Math.min(desiredRadius, maxRadius));

      /* Center the ring on the TRIANGLE's own visual center, not the
         stage's geometric center — guarantees the ring and the triangle
         share a center point exactly, regardless of how the triangle sits
         within the stage's flex box. Read fresh here (after the possible
         shrink above) so a resized triangle's rect is up to date. */
      var centerX, centerY;
      var triangleRectNow = triangleEl ? triangleEl.getBoundingClientRect() : null;
      if (triangleRectNow) {
        centerX = (triangleRectNow.left + triangleRectNow.width / 2) - stageRect.left;
        centerY = (triangleRectNow.top + triangleRectNow.height / 2) - stageRect.top;
      } else {
        centerX = stageRect.width / 2;
        centerY = stageRect.height / 2;
      }

      var wrap = document.createElement("div");
      wrap.className = "natal-orbit";

      nodes.forEach(function (node, i) {
        var angle = (i / count) * Math.PI * 2 - Math.PI / 2; /* start at 12 o'clock, clockwise */
        var x = centerX + radius * Math.cos(angle);
        var y = centerY + radius * Math.sin(angle);
        var glyph = NATAL_GLYPHS[node.name] || node.name;
        var deg   = (node.degree != null) ? (Math.round(node.degree * 10) / 10) : null;

        var accentClass = "";
        if (node.name === "Sun" || node.name === "Moon") accentClass = " natal-node-luminary";
        else if (node.kind === "angle") accentClass = " natal-node-angle";

        /* Shortened to two compact lines — the long "1st House cusp"/
           "10th House cusp" phrasing moved out of the card face entirely
           (it'll live in the tap panel next pass); the card itself just
           needs to read at a glance. ASC = the 1st-house cusp, MC = the
           10th, so neither gets a house number the way planets do.
           Planet house comes from houseForLongitude (the response has no
           per-planet house field; this is computed from the houses cusp
           array). */
        var line1, line2;
        if (node.kind === "angle") {
          line1 = (node.name === "ASC") ? "ASC · Rising" : "MC · Midheaven";
          line2 = (node.sign || "") + (deg != null ? " " + deg + "°" : "");
        } else {
          var house = houseForLongitude(natalData.houses, node.longitude);
          line1 = glyph + " " + (node.sign || "") + (deg != null ? " " + deg + "°" : "");
          line2 = house ? ordinalSuffix(house) + " House" : "";
        }

        var chip = document.createElement("div");
        chip.className = "natal-node" + accentClass;
        chip.style.left = x + "px";
        chip.style.top  = y + "px";
        chip.innerHTML =
          '<div class="natal-node-line1">' + line1 + '</div>' +
          (line2 ? '<div class="natal-node-line2">' + line2 + '</div>' : '');
        wrap.appendChild(chip);
      });

      stage.appendChild(wrap);
    }

    function mcShortEssencePhrase(reducedValue) {

        var interiorObj = blueprint && blueprint.interior && blueprint.interior[data.interior];
        var interiorVals = mcFullValue(interiorObj, data.value);
        var which = data.interior === "AD" ? "month" : data.interior === "DG" ? "day" : "year";
        return "Speak personally about my birth " + which + " vibration " + interiorVals.display +
          " on the interior of my Divine Triangle — what does this foundation mean for me?";
      }

      return "Speak personally about this element of my Divine Triangle blueprint.";
    }

    /* Short descriptive label for the button, e.g. "Line DE" / "your Life
       Lesson" / "your Power Square" / "your Birth Month" — matches
       whatever was just tapped. */
    function mcAskLabelFor(type, data) {
      if (type === "line") return "Line " + data.line;
      if (type === "center") {
        if (data.center === "triangle") return "your Life Lesson";
        var info = DT_LIFEMAP.squares[data.center];
        return info ? "your " + info.title.replace(/^The /, "") : "this center";
      }
      if (type === "interior") {
        var names = { AD: "your Birth Month", DG: "your Birth Day", AG: "your Birth Year" };
        return names[data.interior] || "this interior line";
      }
      return "this element";
    }

    /* Ask-Termaximus block — appended below the authored content inside
       #mcInfoBody every time a chart element is tapped (openMcInfo
       rebuilds this innerHTML fresh each time, so the button/reply always
       start clean for whatever was just tapped). */
    function buildMcAskBlockHtml(type, data) {
      var label = mcAskLabelFor(type, data);
      return '<div class="mc-ask-row">' +
        '<button type="button" class="mc-ask-btn" id="mcAskBtn">&#x2726; Ask Termaximus about ' + label + '</button>' +
        '</div>' +
        '<div class="mc-oracle-reply" id="mcOracleReply"></div>';
    }

    var mcAskInFlight = false;

    function askTermaximusAbout(type, data) {
      if (mcAskInFlight) return;

      var askBtn  = document.getElementById("mcAskBtn");
      var replyEl = document.getElementById("mcOracleReply");
      if (!askBtn || !replyEl) return;

      var label = mcAskLabelFor(type, data);

      if (typeof API_URL === "undefined" || typeof token === "undefined" || !token) {
        replyEl.className = "mc-oracle-reply mc-oracle-reply-error";
        replyEl.textContent = "The Oracle is silent for a moment — try again.";
        return;
      }

      var message = buildMcAskMessage(type, data);

      mcAskInFlight = true;
      askBtn.disabled = true;
      askBtn.textContent = "Termaximus is contemplating…";
      replyEl.className = "mc-oracle-reply mc-oracle-reply-loading";
      replyEl.textContent = "Termaximus is contemplating…";

      var formData = new FormData();
      formData.append("message", message);

      fetch(API_URL + "/api/oracle", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token },
        body: formData
      })
        .then(function (r) {
          if (r.ok) return r.json();
          return r.json().catch(function () { return null; }).then(function (errBody) {
            return Promise.reject((errBody && errBody.error) || null);
          });
        })
        .then(function (resData) {
          var reply = resData && resData.reply;
          if (!reply) throw new Error("empty reply");
          replyEl.className = "mc-oracle-reply mc-oracle-reply-live";
          replyEl.textContent = reply;
          askBtn.disabled = false;
          askBtn.textContent = "✦ Ask again about " + label;
        })
        .catch(function () {
          replyEl.className = "mc-oracle-reply mc-oracle-reply-error";
          replyEl.textContent = "The Oracle is silent for a moment — try again.";
          askBtn.disabled = false;
          askBtn.textContent = "✦ Ask Termaximus about " + label;
        })
        .then(function () {
          mcAskInFlight = false;
        });
    }

    var openMcInfoAnchor = null;

    function closeMcInfo() {
      var panel = document.getElementById("mcInfoPanel");
      if (panel) {
        panel.classList.remove("is-open");
        panel.setAttribute("aria-hidden", "true");
      }
      openMcInfoAnchor = null;
    }

    function openMcInfo(anchorEl, type, data) {
      var panel = document.getElementById("mcInfoPanel");
      var body  = document.getElementById("mcInfoBody");
      if (!panel || !body) return;

      if (openMcInfoAnchor === anchorEl) { closeMcInfo(); return; }

      body.innerHTML = buildMcInfoHtml(type, data) + buildMcAskBlockHtml(type, data);
      panel.classList.add("is-open");
      panel.setAttribute("aria-hidden", "false");
      openMcInfoAnchor = anchorEl;

      var askBtn = document.getElementById("mcAskBtn");
      if (askBtn) {
        askBtn.addEventListener("click", function () {
          askTermaximusAbout(type, data);
        });
      }
    }

    var myChartStageEl = document.getElementById("myChartStage");
    if (myChartStageEl) {
      myChartStageEl.addEventListener("click", function (e) {
        var target = e.target.closest ? e.target.closest(".mc-tappable") : null;
        if (!target) return;
        var type = target.getAttribute("data-mc-type");
        if (!type) return;

        openMcInfo(target, type, {
          line:     target.getAttribute("data-mc-line"),
          square:   target.getAttribute("data-mc-square"),
          ageRange: target.getAttribute("data-mc-agerange"),
          center:   target.getAttribute("data-mc-center"),
          interior: target.getAttribute("data-mc-interior"),
          value:    target.getAttribute("data-mc-value")
        });
      });
    }

    var mcInfoCloseBtn = document.getElementById("mcInfoClose");
    if (mcInfoCloseBtn) {
      mcInfoCloseBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        closeMcInfo();
      });
    }

    /* ═══ STEP 3 — wire it on load ═══ */
    renderMyChart();
    renderAbyssMoon();
    refreshRealMoonPhase();
    setInterval(refreshRealMoonPhase, 30 * 60 * 1000);
  }());
  </script>

</body>
</html>
