    /* The 13 Galactic Tones -- the count's other axis, cycling independently
       of the 20 day signs. Each tone is read as a distinct QUALITY OF
       ACTION the day sign's energy moves through, not a sign of its own;
       "meaning" is written to complete the sentence "Tone N here means the
       sign's energy is expressed through ___." */
    var TONE_MEANINGS = {
      1: { name: "Magnetic", meaning: "unification — this is read as a first-tone purpose-setting energy, drawing every part of the day sign's character toward a single, clear intention." },
      2: { name: "Lunar", meaning: "polarity — this tone is read as surfacing the challenge or duality within the day sign's energy, the friction that has to be met before it can move further." },
      3: { name: "Electric", meaning: "activation — this tone is read as bonding the day sign's energy to service, the spark that turns intention into a first, active step." },
      4: { name: "Self-Existing", meaning: "definition — this tone is read as giving the day sign's energy a concrete form, measuring and structuring what tone 3 activated." },
      5: { name: "Overtone", meaning: "radiance — this tone is read as empowerment, the day sign's energy stepping into confident, visible expression." },
      6: { name: "Rhythmic", meaning: "balance — this tone is read as organizing the day sign's energy into equality and steady flow, distributing its force evenly." },
      7: { name: "Resonant", meaning: "attunement — this tone is read as channeling the day sign's energy inward, aligning it with something larger than the individual carrying it." },
      8: { name: "Galactic", meaning: "harmony — this tone is read as integrity, the day sign's energy becoming a model others can pattern themselves on." },
      9: { name: "Solar", meaning: "intention — this tone is read as the day sign's energy pulsing toward realization, the drive that carries a purpose to completion." },
      10: { name: "Planetary", meaning: "manifestation — this tone is read as perfecting the day sign's energy in physical, tangible form." },
      11: { name: "Spectral", meaning: "liberation — this tone is read as releasing the day sign's energy from whatever has bound or limited its expression." },
      12: { name: "Crystal", meaning: "cooperation — this tone is read as dedicating the day sign's energy to a shared, universal purpose beyond the self." },
      13: { name: "Cosmic", meaning: "transcendence — this tone is read as the day sign's energy reaching its endurance and completion, the last breath of the thirteen-tone cycle before the count begins again." }
    };

    var MC_INTERIOR_TITLES = {
      AD: "Birth Month",
      DG: "Birth Day",
      AG: "Birth Year"
    };

    function mcNumberMeaningHtml(value) {
      var meta = NUM_MEANINGS.numbers && NUM_MEANINGS.numbers[String(value)];
      if (!meta) return "";
      return '<div class="mc-info-number-heading">The Number ' + value + '</div>' +
        '<div class="mc-info-body-text">' + meta.essence + '</div>' +
        '<div class="mc-info-body-text">' + meta.shadow + '</div>' +
        '<div class="mc-info-body-text mc-info-wisdom">' + meta.wisdom + '</div>';
    }

    /* First clause of a number's essence (split on the em-dash every
       essence entry uses, e.g. "The number of change — restless..." ->
       "The number of change") — a one-phrase gloss to keep the per-age
       experience list scannable rather than repeating full paragraphs. */
    function mcShortEssencePhrase(reducedValue) {
      var meta = NUM_MEANINGS.numbers && NUM_MEANINGS.numbers[String(reducedValue)];
      if (!meta || !meta.essence) return "";
      return meta.essence.split("—")[0].trim();
    }

    function mcProcessRows(results) {
      var sorted = results.slice().sort(function (a, b) { return a.age - b.age; });
      return sorted.map(function (r) {
        var val = (r.type.unreduced === r.type.reduced) ? String(r.type.reduced) : (r.type.unreduced + "/" + r.type.reduced);
        var phrase = mcShortEssencePhrase(r.type.reduced);
        return '<div class="mc-info-row">Age ' + r.age + ' &mdash; a ' + val + ' experience' +
          (phrase ? ' <span class="mc-info-row-phrase">(' + phrase + ')</span>' : '') +
          '</div>';
      }).join("");
    }

    /* Centers/interior only carry their REDUCED value via data-mc-value
       (see renderDivineTriangleBlueprintVisual's centerTapWrap/interior
       hooks) — these look up the full {unreduced, reduced} pair from
       numerologyData directly, so the panel can show "74/11" the same
       way the blueprint SVG itself does, not just the bare "11". */
    function mcFullValue(obj, fallback) {
      if (!obj || obj.reduced == null) return { display: fallback, reduced: fallback };
      return {
        display: (obj.unreduced === obj.reduced) ? String(obj.reduced) : (obj.unreduced + "/" + obj.reduced),
        reduced: obj.reduced
      };
    }

    /* Line reading, deepened: era header -> this specific 9-year chapter's
       flavor (DT_LIFEMAP.lines) -> the letter placed here as the personal
       "note" coloring that chapter (pulled fresh from blueprint.lines,
       not from the tap's data attributes, which only carry id/square/
       ageRange) -> the REAL Major/Minor life-events (unchanged from
       before) -> the square's full deepened stage/shadow/wisdom as the
       closing frame. Reads as one chapter, not a stitched data dump. */
    function buildMcLineHtml(lineId, square, ageRange) {
      var blueprint = numerologyData && numerologyData.systems && numerologyData.systems.divineTriangleBlueprint;
      var processes = blueprint && blueprint.processes;
      var lineObj = blueprint && blueprint.lines ? blueprint.lines.filter(function (l) { return l.id === lineId; })[0] : null;
      var major = processes && processes.major ? processes.major.filter(function (m) { return m.lineId === lineId; })[0] : null;
      var minor = processes && processes.minor ? processes.minor.filter(function (m) { return m.lineId === lineId; })[0] : null;
      var squareInfo = DT_LIFEMAP.squares[square];
      var squareTitle = squareInfo ? squareInfo.title : (square ? square.charAt(0).toUpperCase() + square.slice(1) + " Square" : "");
      var displayAgeRange = ageRange ? ageRange.split("-").join("–") : "";

      var html = '<div class="mc-info-heading">Line ' + lineId + ' &middot; ' + squareTitle + ' &middot; Ages ' + displayAgeRange + '</div>';

      var lineEra = DT_LIFEMAP.lines[lineId];
      if (lineEra) {
        html += '<div class="mc-info-body-text">' + lineEra + '</div>';
      }

      if (lineObj && lineObj.letter) {
        var letterUpper   = lineObj.letter.toUpperCase();
        var letterDisplay = (lineObj.ordinal === lineObj.reduced) ? String(lineObj.reduced) : (lineObj.ordinal + "/" + lineObj.reduced);
        var letterMeta    = NUM_MEANINGS.numbers && NUM_MEANINGS.numbers[String(lineObj.reduced)];
        html += '<div class="mc-info-section-title">The Letter on This Line</div>';
        html += '<div class="mc-info-body-text">Your letter here is <strong>' + letterUpper + '</strong> (' + letterDisplay + ')' +
          (letterMeta ? ' &mdash; ' + letterMeta.essence : '') + '</div>';
      }

      if (major && major.results && major.results.length) {
        html += '<div class="mc-info-section-title">Major Process &mdash; The Wider Arc</div>' + mcProcessRows(major.results);
      }
      if (minor && minor.results && minor.results.length) {
        html += '<div class="mc-info-section-title">Minor Process &mdash; The Personal Current</div>' + mcProcessRows(minor.results);
      }

      if (squareInfo) {
        html += '<div class="mc-info-section-title">' + squareInfo.title + ' &mdash; The Larger Stage</div>';
        html += '<div class="mc-info-body-text">' + squareInfo.stage + '</div>';
        html += '<div class="mc-info-body-text"><strong>Shadow:</strong> ' + squareInfo.shadow + '</div>';
        html += '<div class="mc-info-body-text mc-info-wisdom"><strong>Wisdom:</strong> ' + squareInfo.wisdom + '</div>';
      }
      return html;
    }

    /* Center reading, deepened: square's full stage/shadow/wisdom -> the
       governing-vibration number meaning -> a closing line on how this
       vibration presides over the whole stage (distinct from any single
       line's event). Triangle (Life Lesson) gets its own richer branch:
       the deepened lifeLesson framing + the number meaning + an explicit
       note that this thread repeats on every line of the blueprint. */
    function buildMcCenterHtml(centerKey, value) {
      var blueprint = numerologyData && numerologyData.systems && numerologyData.systems.divineTriangleBlueprint;
      var centerObj = blueprint && blueprint.centers && blueprint.centers[centerKey];
      var vals = mcFullValue(centerObj, value);

      if (centerKey === "triangle") {
        var html = '<div class="mc-info-heading">Your Life Lesson &middot; ' + vals.display + '</div>';
        html += '<div class="mc-info-body-text mc-info-wisdom">' + DT_LIFEMAP.lifeLesson + '</div>';
        html += mcNumberMeaningHtml(vals.reduced);
        html += '<div class="mc-info-body-text mc-info-wisdom" style="margin-top:8px;">This number does not belong to any one era — it is read as the thread that repeats on every line of the blueprint, the lesson you are held to meet again at every age, in whatever costume that age wears.</div>';
        return html;
      }

      var squareInfo = DT_LIFEMAP.squares[centerKey];
      var html = '<div class="mc-info-heading">' + (squareInfo ? squareInfo.title : centerKey) + ' &middot; Governing Vibration ' + vals.display + '</div>';
      if (squareInfo) {
        html += '<div class="mc-info-body-text">' + squareInfo.stage + '</div>';
        html += '<div class="mc-info-body-text"><strong>Shadow:</strong> ' + squareInfo.shadow + '</div>';
        html += '<div class="mc-info-body-text mc-info-wisdom"><strong>Wisdom:</strong> ' + squareInfo.wisdom + '</div>';
      }
      html += mcNumberMeaningHtml(vals.reduced);
      if (squareInfo) {
        html += '<div class="mc-info-body-text mc-info-wisdom" style="margin-top:8px;">This vibration is read as presiding over the whole ' + squareInfo.ageRange + ' stage &mdash; not one line\'s event but the governing note every line within ' + squareInfo.title + ' is tuned to.</div>';
      }
      return html;
    }

    function buildMcInteriorHtml(interiorKey, value) {
      var blueprint = numerologyData && numerologyData.systems && numerologyData.systems.divineTriangleBlueprint;
      var interiorObj = blueprint && blueprint.interior && blueprint.interior[interiorKey];
      var vals = mcFullValue(interiorObj, value);

      var html = '<div class="mc-info-heading">' + (MC_INTERIOR_TITLES[interiorKey] || interiorKey) + ' &middot; ' + vals.display + '</div>';
      html += '<div class="mc-info-body-text mc-info-wisdom">' + DT_LIFEMAP.interiorNote + '</div>';
      html += mcNumberMeaningHtml(vals.reduced);
      return html;
    }

    /* Mayan Tzolk'in Birth Signature reading -- data is { daySign, tone,
       kin } as computed by renderTzolkinCard() (see below). Day-sign/tone
       content pulled from TZOLKIN_MEANINGS/TONE_MEANINGS above; same
       heading/section-title/wisdom CSS classes as every other panel here. */
    function buildMcTzolkinHtml(data) {
      var signInfo = TZOLKIN_MEANINGS[data.daySign] || {};
      var toneInfo = TONE_MEANINGS[data.tone] || {};

      var html = '<div class="mc-info-heading">Tone ' + data.tone + ' ' + data.daySign + ' &middot; Kin ' + data.kin + '</div>';
      html += '<div class="mc-info-body-text mc-info-wisdom">The Tzolk\'in is the Maya sacred count of 260 days &mdash; thirteen tones cycling through twenty day signs. This is the tradition\'s own reading of your birth date\'s place in that count: a day sign and tone read as the character you arrived carrying, not a fixed fate.</div>';

      html += '<div class="mc-info-section-title">' + data.daySign + (signInfo.glyphName ? ' &middot; ' + signInfo.glyphName : '') + '</div>';
      if (signInfo.essence) html += '<div class="mc-info-body-text">' + signInfo.essence + '</div>';
      if (signInfo.shadow)  html += '<div class="mc-info-body-text"><strong>Shadow:</strong> ' + signInfo.shadow + '</div>';
      if (signInfo.gift)    html += '<div class="mc-info-body-text mc-info-wisdom"><strong>Gift:</strong> ' + signInfo.gift + '</div>';

      html += '<div class="mc-info-section-title">Tone ' + data.tone + (toneInfo.name ? ' &middot; ' + toneInfo.name : '') + '</div>';
      if (toneInfo.meaning) html += '<div class="mc-info-body-text">Here, tone ' + data.tone + ' means ' + data.daySign + '\'s energy is expressed through ' + toneInfo.meaning + '</div>';

      html += '<div class="mc-info-body-text mc-info-wisdom" style="margin-top:8px;">Kin ' + data.kin + ' of 260 &mdash; your exact position in the full Tzolk\'in count, the one day out of the whole 260-day cycle this sign-and-tone pairing belongs to.</div>';
      return html;
    }

    function buildMcInfoHtml(type, data) {
      if (type === "line")     return buildMcLineHtml(data.line, data.square, data.ageRange);
      if (type === "center")   return buildMcCenterHtml(data.center, data.value);
      if (type === "interior") return buildMcInteriorHtml(data.interior, data.value);
      if (type === "tzolkin")  return buildMcTzolkinHtml(data);
      return "";
    }

    /* Tzolk'in Birth Signature card -- populates/reveals #mcTzolkinCard from
       numerologyData.birth_date. mayanFromJdn/gregorianToJDN live in the
       calendar-engine <script> further down this document, which hasn't
       run yet the moment THIS script's own top-level code executes, but
       has always finished by the time this function is actually called
       (either from fetchNumerology()'s async .then(), or from a later
       renderMyChart() call) -- see the "window.mayanFromJdn = ..." bridge
       at the bottom of that script for why this ordering is safe.
       PART F: birth_date missing, unparseable, or the bridge not yet
       available all fall through to hiding the card entirely rather than
       showing a broken/partial reading. */
    var mcTzolkinData = null;

    function renderTzolkinCard() {
      var card = document.getElementById("mcTzolkinCard");
      if (!card) return;

      var birthDate = numerologyData && numerologyData.birth_date;
      if (!birthDate || typeof window.mayanFromJdn !== "function" || typeof window.gregorianToJDN !== "function") {
        card.style.display = "none";
        mcTzolkinData = null;
        return;
      }

      // CRITICAL: parse as local midnight, not bare new Date("YYYY-MM-DD"),
      // which parses as UTC midnight and shifts the day backward in
      // negative-UTC-offset timezones -- corrupting the signature.
      var parsed = new Date(birthDate + "T00:00:00");
      if (isNaN(parsed.getTime())) {
        card.style.display = "none";
        mcTzolkinData = null;
        return;
      }

      var jdn = window.gregorianToJDN(parsed.getFullYear(), parsed.getMonth() + 1, parsed.getDate());
      var mayan = window.mayanFromJdn(jdn);
      if (!mayan || !mayan.tzolkin) {
        card.style.display = "none";
        mcTzolkinData = null;
        return;
      }

      mcTzolkinData = { daySign: mayan.tzolkin.name, tone: mayan.tzolkin.number, kin: mayan.tzolkin.kin };

      var signInfo = TZOLKIN_MEANINGS[mcTzolkinData.daySign] || {};
      var line1 = document.getElementById("mcTzolkinLine1");
      var line2 = document.getElementById("mcTzolkinLine2");
      if (line1) line1.textContent = mcTzolkinData.tone + " " + mcTzolkinData.daySign + " · Kin " + mcTzolkinData.kin;
      if (line2) line2.textContent = signInfo.glyphName || "";

      card.style.display = "";
    }

    /* ── "Ask Termaximus about this" — composes a context-rich, first-
       person message from the SAME data the panel's authored content
       already pulled (blueprint.lines/processes/centers/interior,
       DT_LIFEMAP), then POSTs it through the real chat endpoint
       (confirmed: POST /api/oracle, FormData body, Authorization:
       Bearer bf_token, returns { reply }) — mirroring oracle.html's
       sendMessage() exactly. The backend already injects the user's
       numerology/seeker-profile context server-side, but NOT the
       Divine Triangle blueprint or natal data, so the specific tapped
       facts (letter, ages, events, vibration) are included in the
       message text itself. ── */
    function buildMcAskMessage(type, data) {
      var blueprint = numerologyData && numerologyData.systems && numerologyData.systems.divineTriangleBlueprint;

      function squareLabel(key) {
        var info = DT_LIFEMAP.squares[key];
        return info ? info.title.replace(/^The /, "").replace(/ Square$/, "") : (key || "");
      }

      if (type === "line") {
        var lineId = data.line;
        var lineObj = blueprint && blueprint.lines ? blueprint.lines.filter(function (l) { return l.id === lineId; })[0] : null;
        var processes = blueprint && blueprint.processes;
        var major = processes && processes.major ? processes.major.filter(function (m) { return m.lineId === lineId; })[0] : null;
        var minor = processes && processes.minor ? processes.minor.filter(function (m) { return m.lineId === lineId; })[0] : null;
        var displayAgeRange = data.ageRange ? data.ageRange.split("-").join("–") : "";

        var letterPart = "an unrecorded letter";
        if (lineObj && lineObj.letter) {
          var letterDisplay = (lineObj.ordinal === lineObj.reduced) ? String(lineObj.reduced) : (lineObj.ordinal + "/" + lineObj.reduced);
          letterPart = lineObj.letter.toUpperCase() + " (" + letterDisplay + ")";
        }

        var eventParts = [];
        [major, minor].forEach(function (proc) {
          if (!proc || !proc.results) return;
          proc.results.slice().sort(function (a, b) { return a.age - b.age; }).forEach(function (r) {
            var val = (r.type.unreduced === r.type.reduced) ? String(r.type.reduced) : (r.type.unreduced + "/" + r.type.reduced);
            eventParts.push("age " + r.age + " brings a " + val + " experience");
          });
        });
        var eventsText = eventParts.length ? eventParts.join("; ") : "no specific ages are marked";

        return "Speak to me personally about my life-era on Line " + lineId + " — my " + squareLabel(data.square) +
          " years, ages " + displayAgeRange + ". The letter sounded here is " + letterPart +
          ". Within these years these experiences arise: " + eventsText +
          ". What is the deeper personal significance of this chapter of my life?";
      }

      if (type === "center") {
        var centerObj = blueprint && blueprint.centers && blueprint.centers[data.center];
        var vals = mcFullValue(centerObj, data.value);

        if (data.center === "triangle") {
          return "My Life Lesson number is " + vals.display + ", the thread woven through my whole chart. Speak personally about what this master lesson means for my life and how it repeats across my eras.";
        }
        var squareInfo = DT_LIFEMAP.squares[data.center];
        return "Speak personally about my " + squareLabel(data.center) + " Square, ages " +
          (squareInfo ? squareInfo.ageRange : "") + ", and its governing vibration " + vals.display +
          " — what does this life-stage mean for me and how do I move through it?";
      }

      if (type === "interior") {
        var interiorObj = blueprint && blueprint.interior && blueprint.interior[data.interior];
        var interiorVals = mcFullValue(interiorObj, data.value);
        var which = data.interior === "AD" ? "month" : data.interior === "DG" ? "day" : "year";
        return "Speak personally about my birth " + which + " vibration " + interiorVals.display +
          " on the interior of my Divine Triangle — what does this foundation mean for me?";
      }

      if (type === "tzolkin") {
        var signInfo = TZOLKIN_MEANINGS[data.daySign] || {};
        return "Speak personally about my Mayan Tzolk'in birth signature — Tone " + data.tone + " " + data.daySign +
          (signInfo.glyphName ? " (" + signInfo.glyphName + ")" : "") + ", Kin " + data.kin +
          " of 260. What does this day sign and tone mean for who I am?";
      }

      return "Speak personally about this element of my Divine Triangle blueprint.";
    }

    /* Short descriptive label for the button, e.g. "Line DE" / "your Life
       Lesson" / "your Power Square" / "your Birth Month" — matches
       whatever was just tapped. */
    function mcAskLabelFor(type, data) {
      if (type === "line") return "Line " + data.line;
      if (type === "center") {
        if (data.center === "triangle") return "your Life Lesson";
        var info = DT_LIFEMAP.squares[data.center];
        return info ? "your " + info.title.replace(/^The /, "") : "this center";
      }
      if (type === "interior") {
        var names = { AD: "your Birth Month", DG: "your Birth Day", AG: "your Birth Year" };
        return names[data.interior] || "this interior line";
      }
      if (type === "tzolkin") return "your Tzolk'in Birth Signature";
      return "this element";
    }

    /* Ask-Termaximus block — appended below the authored content inside
       #mcInfoBody every time a chart element is tapped (openMcInfo
       rebuilds this innerHTML fresh each time, so the button/reply always
       start clean for whatever was just tapped). */
    function buildMcAskBlockHtml(type, data) {
      var label = mcAskLabelFor(type, data);
      return '<div class="mc-ask-row">' +
        '<button type="button" class="mc-ask-btn" id="mcAskBtn">&#x2726; Ask Termaximus about ' + label + '</button>' +
        '</div>' +
        '<div class="mc-oracle-reply" id="mcOracleReply"></div>';
    }

    var mcAskInFlight = false;

    function askTermaximusAbout(type, data) {
      if (mcAskInFlight) return;

      var askBtn  = document.getElementById("mcAskBtn");
      var replyEl = document.getElementById("mcOracleReply");
      if (!askBtn || !replyEl) return;

      var label = mcAskLabelFor(type, data);

      if (typeof API_URL === "undefined" || typeof token === "undefined" || !token) {
        replyEl.className = "mc-oracle-reply mc-oracle-reply-error";
        replyEl.textContent = "The Oracle is silent for a moment — try again.";
        return;
      }

      var message = buildMcAskMessage(type, data);

      mcAskInFlight = true;
      askBtn.disabled = true;
      askBtn.textContent = "Termaximus is contemplating…";
      replyEl.className = "mc-oracle-reply mc-oracle-reply-loading";
      replyEl.textContent = "Termaximus is contemplating…";

      var formData = new FormData();
      formData.append("message", message);

      fetch(API_URL + "/api/oracle", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token },
        body: formData
      })
        .then(function (r) {
          if (r.ok) return r.json();
          return r.json().catch(function () { return null; }).then(function (errBody) {
            return Promise.reject((errBody && errBody.error) || null);
          });
        })
        .then(function (resData) {
          var reply = resData && resData.reply;
          if (!reply) throw new Error("empty reply");
          replyEl.className = "mc-oracle-reply mc-oracle-reply-live";
          replyEl.textContent = reply;
          askBtn.disabled = false;
          askBtn.textContent = "✦ Ask again about " + label;
        })
        .catch(function () {
          replyEl.className = "mc-oracle-reply mc-oracle-reply-error";
          replyEl.textContent = "The Oracle is silent for a moment — try again.";
          askBtn.disabled = false;
          askBtn.textContent = "✦ Ask Termaximus about " + label;
        })
        .then(function () {
          mcAskInFlight = false;
        });
    }

    var openMcInfoAnchor = null;

    function closeMcInfo() {
      var panel = document.getElementById("mcInfoPanel");
      if (panel) {
        panel.classList.remove("is-open");
        panel.setAttribute("aria-hidden", "true");
      }
      openMcInfoAnchor = null;
    }

    function openMcInfo(anchorEl, type, data) {
      var panel = document.getElementById("mcInfoPanel");
      var body  = document.getElementById("mcInfoBody");
      if (!panel || !body) return;

      if (openMcInfoAnchor === anchorEl) { closeMcInfo(); return; }

      body.innerHTML = buildMcInfoHtml(type, data) + buildMcAskBlockHtml(type, data);
      panel.classList.add("is-open");
      panel.setAttribute("aria-hidden", "false");
      openMcInfoAnchor = anchorEl;

      var askBtn = document.getElementById("mcAskBtn");
      if (askBtn) {
        askBtn.addEventListener("click", function () {
          askTermaximusAbout(type, data);
        });
      }
    }

    var myChartStageEl = document.getElementById("myChartStage");
    if (myChartStageEl) {
      myChartStageEl.addEventListener("click", function (e) {
        var target = e.target.closest ? e.target.closest(".mc-tappable") : null;
        if (!target) return;
        var type = target.getAttribute("data-mc-type");
        if (!type) return;

        openMcInfo(target, type, {
          line:     target.getAttribute("data-mc-line"),
          square:   target.getAttribute("data-mc-square"),
          ageRange: target.getAttribute("data-mc-agerange"),
          center:   target.getAttribute("data-mc-center"),
          interior: target.getAttribute("data-mc-interior"),
          value:    target.getAttribute("data-mc-value")
        });
      });
    }

    var mcInfoCloseBtn = document.getElementById("mcInfoClose");
    if (mcInfoCloseBtn) {
      mcInfoCloseBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        closeMcInfo();
      });
    }

    // Tzolk'in card lives outside #myChartStage (it's a fixed upper-right
    // panel, not part of the blueprint), so it isn't caught by that
    // delegated listener above -- wire it directly, same openMcInfo call
    // shape, using the { daySign, tone, kin } computed by renderTzolkinCard().
    var mcTzolkinCardEl = document.getElementById("mcTzolkinCard");
    if (mcTzolkinCardEl) {
      mcTzolkinCardEl.addEventListener("click", function () {
        if (!mcTzolkinData) return;
        openMcInfo(mcTzolkinCardEl, "tzolkin", mcTzolkinData);
      });
    }

    /* ═══ STEP 3 — wire it on load ═══ */
    renderMyChart();
    renderAbyssMoon();
    refreshRealMoonPhase();
    setInterval(refreshRealMoonPhase, 30 * 60 * 1000);
  }());
  </script>

  <!-- ══════════ Calendar panel — engine ported VERBATIM from oracle.html's
       Celestial panel (all 11 real calendars: forward conversions,
       convertDate, formatDateForActiveCalendar), plus the reverse *ToJdn
       functions and daysInMonth/monthsInYear/weekdayFromJdn helpers
       ported from the validated test-calendars.js (oracle.html doesn't
       have those yet). Self-contained, its own IIFE — this page's
       "Calendar" left panel only, no full-screen grid yet (next step). ══════════ -->
  <script>
  (function () {

    // ---------------------------------------------------------------------
    // 1. Gregorian <-> Julian Day Number
    // ---------------------------------------------------------------------
    var GREGORIAN_MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December',
    ];

    function gregorianToJDN(year, month, day) {
      var a = Math.floor((14 - month) / 12);
      var y = year + 4800 - a;
      var m = month + 12 * a - 3;
      return (
        day +
        Math.floor((153 * m + 2) / 5) +
        365 * y +
        Math.floor(y / 4) -
        Math.floor(y / 100) +
        Math.floor(y / 400) -
        32045
      );
    }

    function jdnToGregorian(jdn) {
      var a = jdn + 32044;
      var b = Math.floor((4 * a + 3) / 146097);
      var c = a - Math.floor((146097 * b) / 4);
      var d = Math.floor((4 * c + 3) / 1461);
      var e = c - Math.floor((1461 * d) / 4);
      var m = Math.floor((5 * e + 2) / 153);
      var day = e - Math.floor((153 * m + 2) / 5) + 1;
      var month = m + 3 - 12 * Math.floor(m / 10);
      var year = 100 * b + d - 4800 + Math.floor(m / 10);
      return { year: year, month: month, day: day };
    }

    function gregorianPartsOf(date) {
      return {
        year: date.getFullYear(),
        month: date.getMonth() + 1,
        day: date.getDate(),
      };
    }

    // ---------------------------------------------------------------------
    // 2. Hijri (tabular/arithmetic civil Islamic calendar)
    // ---------------------------------------------------------------------
    var ISLAMIC_EPOCH = 1948440; // JDN of 1 Muharram, AH 1

    var ISLAMIC_MONTH_NAMES = [
      'Muharram', "Safar", "Rabi' al-awwal", "Rabi' al-thani",
      'Jumada al-awwal', 'Jumada al-thani', 'Rajab', "Sha'ban",
      'Ramadan', 'Shawwal', "Dhu al-Qi'dah", 'Dhu al-Hijjah',
    ];

    function islamicToJd(year, month, day) {
      return (
        day +
        Math.ceil(29.5 * (month - 1)) +
        (year - 1) * 354 +
        Math.floor((3 + 11 * year) / 30) +
        ISLAMIC_EPOCH -
        1
      );
    }

    function jdToIslamic(jd) {
      jd = Math.floor(jd);
      var year = Math.floor((30 * (jd - ISLAMIC_EPOCH) + 10646) / 10631);
      var month = Math.min(
        12,
        Math.ceil((jd - (29 + islamicToJd(year, 1, 1))) / 29.5) + 1
      );
      var day = jd - islamicToJd(year, month, 1) + 1;
      return { year: year, month: month, day: day };
    }

    // ---------------------------------------------------------------------
    // 3. Hebrew (Dershowitz & Reingold arithmetic algorithm, JD-based)
    // ---------------------------------------------------------------------
    var HEBREW_EPOCH_JDN = 347998;

    var HEBREW_MONTH_NAMES = {
      1: 'Nisan', 2: 'Iyyar', 3: 'Sivan', 4: 'Tammuz', 5: 'Av', 6: 'Elul',
      7: 'Tishrei', 8: 'Cheshvan', 9: 'Kislev', 10: 'Tevet', 11: 'Shevat',
      12: 'Adar', 13: 'Adar II',
    };

    function hebrewIsLeapYear(year) {
      return (7 * year + 1) % 19 < 7;
    }

    function hebrewMonthsInYear(year) {
      return hebrewIsLeapYear(year) ? 13 : 12;
    }

    function hebrewElapsedDays(year) {
      var monthsElapsed = Math.floor((235 * year - 234) / 19);
      var partElapsed = 12084 + 13753 * monthsElapsed;
      var day = 29 * monthsElapsed + Math.floor(partElapsed / 25920);
      if ((3 * (day + 1)) % 7 < 3) day += 1;
      return day;
    }

    function hebrewDaysInYear(year) {
      return hebrewElapsedDays(year + 1) - hebrewElapsedDays(year);
    }

    function hebrewLongCheshvan(year) {
      return hebrewDaysInYear(year) % 10 === 5;
    }

    function hebrewShortKislev(year) {
      return hebrewDaysInYear(year) % 10 === 3;
    }

    function hebrewDaysInMonth(year, month) {
      if ([2, 4, 6, 10, 13].indexOf(month) !== -1) return 29; // Iyyar, Tammuz, Elul, Tevet, Adar II
      if (month === 12 && !hebrewIsLeapYear(year)) return 29; // Adar (non-leap)
      if (month === 8 && !hebrewLongCheshvan(year)) return 29; // Cheshvan short
      if (month === 9 && hebrewShortKislev(year)) return 29; // Kislev short
      return 30;
    }

    function hebrewToJd(year, month, day) {
      var jd = HEBREW_EPOCH_JDN + hebrewElapsedDays(year) + day - 1;
      var monthsInYearHebrew = hebrewMonthsInYear(year);
      var m;
      if (month < 7) {
        for (m = 7; m <= monthsInYearHebrew; m++) jd += hebrewDaysInMonth(year, m);
        for (m = 1; m < month; m++) jd += hebrewDaysInMonth(year, m);
      } else {
        for (m = 7; m < month; m++) jd += hebrewDaysInMonth(year, m);
      }
      return jd;
    }

    function jdToHebrew(jd) {
      jd = Math.floor(jd);
      var year = Math.floor((jd - HEBREW_EPOCH_JDN) / 365.2468) - 1;
      while (hebrewToJd(year + 1, 7, 1) <= jd) year++;
      while (hebrewToJd(year, 7, 1) > jd) year--;

      var order = [];
      var monthsInYearHebrew = hebrewMonthsInYear(year);
      var m;
      for (m = 7; m <= monthsInYearHebrew; m++) order.push(m);
      for (m = 1; m <= 6; m++) order.push(m);
      var month = order[0];
      for (var i = 0; i < order.length; i++) {
        var start = hebrewToJd(year, order[i], 1);
        var end = start + hebrewDaysInMonth(year, order[i]);
        if (jd >= start && jd < end) {
          month = order[i];
          break;
        }
      }
      var day = jd - hebrewToJd(year, month, 1) + 1;
      return { year: year, month: month, day: day };
    }

    // ---------------------------------------------------------------------
    // 4. Mayan Long Count, Tzolk'in, Haab'
    // ---------------------------------------------------------------------
    var MAYA_EPOCH_JDN = 584283; // GMT correlation: JDN of Long Count 0.0.0.0.0

    var TZOLKIN_NAMES = [
      'Imix', 'Ik', 'Akbal', 'Kan', 'Chicchan', 'Cimi', 'Manik', 'Lamat',
      'Muluc', 'Oc', 'Chuen', 'Eb', 'Ben', 'Ix', 'Men', 'Cib', 'Caban',
      'Etznab', 'Cauac', 'Ahau',
    ];

    var HAAB_NAMES = [
      'Pop', 'Wo', 'Sip', "Sotz'", 'Sek', 'Xul', "Yaxk'in", 'Mol', "Ch'en",
      'Yax', "Sak'", 'Keh', 'Mak', "K'ank'in", 'Muwan', 'Pax', "K'ayab",
      "Kumk'u", "Wayeb'",
    ];

    function mayanFromJdn(jdn) {
      var totalDays = jdn - MAYA_EPOCH_JDN;

      var remainder = totalDays;
      var baktun = Math.floor(remainder / 144000);
      remainder -= baktun * 144000;
      var katun = Math.floor(remainder / 7200);
      remainder -= katun * 7200;
      var tun = Math.floor(remainder / 360);
      remainder -= tun * 360;
      var winal = Math.floor(remainder / 20);
      var kin = remainder - winal * 20;

      var mod = function (n, m) { return ((n % m) + m) % m; };
      var tzolkinNumber = mod(totalDays + 3, 13) + 1;
      var tzolkinNameIndex = mod(totalDays + 19, 20);
      // Kin -- the day's 1-260 position in the full Tzolk'in count (distinct
      // from the Long Count's own 0-19 "kin" component below). Offset 159
      // derived so totalDays=0 (Long Count epoch, 4 Ahau) lands on kin 160,
      // the standard alignment.
      var tzolkinKin = mod(totalDays + 159, 260) + 1;

      var haabCount = mod(totalDays + 347, 365);
      var haabMonthIndex, haabDay;
      if (haabCount < 360) {
        haabMonthIndex = Math.floor(haabCount / 20);
        haabDay = (haabCount % 20) + 1;
      } else {
        haabMonthIndex = 18; // Wayeb'
        haabDay = haabCount - 360 + 1;
      }

      return {
        longCount: baktun + "." + katun + "." + tun + "." + winal + "." + kin,
        baktun: baktun, katun: katun, tun: tun, winal: winal, kin: kin,
        totalDays: totalDays,
        tzolkin: { number: tzolkinNumber, name: TZOLKIN_NAMES[tzolkinNameIndex], kin: tzolkinKin },
        haab: { day: haabDay, month: haabMonthIndex + 1, monthName: HAAB_NAMES[haabMonthIndex] },
      };
    }

    // ---------------------------------------------------------------------
    // 5. Egyptian civil calendar (365 days, no leap year)
    // ---------------------------------------------------------------------
    var EGYPTIAN_EPOCH_JDN = 1448638; // 1 Thoth, Year 1 of Nabonassar (26 Feb 747 BCE Julian)

    var EGYPTIAN_MONTH_NAMES = [
      'Thoth', 'Phaophi', 'Athyr', 'Choiak', 'Tybi', 'Mechir', 'Phamenoth',
      'Pharmuthi', 'Pachons', 'Payni', 'Epiphi', 'Mesore', 'Epagomenal Days',
    ];

    function egyptianFromJdn(jdn) {
      var mod = function (n, m) { return ((n % m) + m) % m; };
      var daysSinceEpoch = jdn - EGYPTIAN_EPOCH_JDN;
      var year = Math.floor(daysSinceEpoch / 365) + 1;
      var dayOfYear = mod(daysSinceEpoch, 365); // 0-364
      var month, day;
      if (dayOfYear < 360) {
        month = Math.floor(dayOfYear / 30) + 1;
        day = (dayOfYear % 30) + 1;
      } else {
        month = 13; // epagomenal days
        day = dayOfYear - 360 + 1; // 1-5
      }
      return { year: year, month: month, day: day, monthName: EGYPTIAN_MONTH_NAMES[month - 1] };
    }

    // ---------------------------------------------------------------------
    // 6. Persian / Solar Hijri (Jalali) — 33-year-cycle arithmetic approximation
    // ---------------------------------------------------------------------
    var PERSIAN_EPOCH_JDN = 1948320;

    var PERSIAN_MONTH_NAMES = [
      'Farvardin', 'Ordibehesht', 'Khordad', 'Tir', 'Mordad', 'Shahrivar',
      'Mehr', 'Aban', 'Azar', 'Dey', 'Bahman', 'Esfand',
    ];

    function persianIsLeap(year) {
      return ((25 * year + 11) % 33) < 8;
    }

    function persianDaysInYear(year) {
      return persianIsLeap(year) ? 366 : 365;
    }

    function persianDaysBeforeYear(year) {
      var days = 0, y;
      if (year >= 1) {
        for (y = 1; y < year; y++) days += persianDaysInYear(y);
      } else {
        for (y = year; y < 1; y++) days -= persianDaysInYear(y);
      }
      return days;
    }

    function persianDaysInMonth(year, month) {
      if (month <= 6) return 31;
      if (month <= 11) return 30;
      return persianIsLeap(year) ? 30 : 29; // Esfand
    }

    function persianToJdn(year, month, day) {
      var days = persianDaysBeforeYear(year);
      for (var m = 1; m < month; m++) days += persianDaysInMonth(year, m);
      return PERSIAN_EPOCH_JDN + days + day - 1;
    }

    function jdnToPersian(jdn) {
      var year = Math.floor((jdn - PERSIAN_EPOCH_JDN) / 365.25) + 1;
      while (persianToJdn(year, 1, 1) > jdn) year--;
      while (persianToJdn(year + 1, 1, 1) <= jdn) year++;
      var dayOfYear = jdn - persianToJdn(year, 1, 1) + 1;
      var month = 1, remaining = dayOfYear;
      while (remaining > persianDaysInMonth(year, month)) {
        remaining -= persianDaysInMonth(year, month);
        month++;
      }
      return { year: year, month: month, day: remaining };
    }

    // ---------------------------------------------------------------------
    // 7. Coptic — 12x30 + 5/6 epagomenal days ("Pi Kogi Enavot")
    // ---------------------------------------------------------------------
    var COPTIC_EPOCH_JDN = 1825030;

    var COPTIC_MONTH_NAMES = [
      'Thout', 'Paopi', 'Hathor', 'Koiak', 'Tobi', 'Meshir', 'Paremhat',

    ];

    function copticIsLeap(year) {
      return ((year % 4) + 4) % 4 === 3;
    }

    function copticDaysInYear(year) {
      return copticIsLeap(year) ? 366 : 365;
    }

    function copticDaysBeforeYear(year) {
      var days = 0, y;
      if (year >= 1) {
        for (y = 1; y < year; y++) days += copticDaysInYear(y);
      } else {
        for (y = year; y < 1; y++) days -= copticDaysInYear(y);
      }
      return days;
    }

    function copticDaysInMonth(year, month) {
      if (month <= 12) return 30;
      return copticIsLeap(year) ? 6 : 5; // epagomenal days
    }

    function copticToJdn(year, month, day) {
      var days = copticDaysBeforeYear(year);
      for (var m = 1; m < month; m++) days += copticDaysInMonth(year, m);

    }

      var year = Math.floor((jdn - COPTIC_EPOCH_JDN) / 365.25) + 1;
      while (copticToJdn(year, 1, 1) > jdn) year--;
      while (copticToJdn(year + 1, 1, 1) <= jdn) year++;

      var month = 1, remaining = dayOfYear;
      while (remaining > copticDaysInMonth(year, month)) {

        month++;

      return { year: year, month: month, day: remaining };

    // ---------------------------------------------------------------------
    // 8. Ethiopic — same 12x30 + 5/6 epagomenal structure as Coptic
    // ---------------------------------------------------------------------

    // ---------------------------------------------------------------------

          var eraYear = g.year - era.startYear + 1;
          return {
            era: era.name,
            eraYear: eraYear,
            label: eraYear === 1 ? (era.name + " gannen") : (era.name + " " + eraYear),
            month: g.month,
            day: g.day,
            monthName: GREGORIAN_MONTH_NAMES[g.month - 1],

        }

        era: null,
        eraYear: null,
        label: g.year + " (pre-Showa — era not tabulated)",
        month: g.month,
        day: g.day,
        monthName: GREGORIAN_MONTH_NAMES[g.month - 1],

    // 12. Chinese lunisolar — honestly not implemented

    // ---------------------------------------------------------------------

    // ---------------------------------------------------------------------

    function japaneseToJdn(eraName, eraYear, month, day) {
      var era = null;

        case 'persian':

        case 'ethiopic':

        case 'japanese':

        case 'indianNational':

      }
    }

    // Same shape/branches as formatDateForActiveCalendar above, but emits
    // HTML with the month name shown in its native script (Stage 5) plus
    // the Latin transliteration as a small muted companion -- never the
    // native script alone (Part B). formatDateForActiveCalendar itself is
    // left untouched since it still returns a plain string for callers
    // that need one; this is a parallel function for the callers that
    // switched from .textContent to .innerHTML to make room for this.
    function formatDateForActiveCalendarHtml(jsDate) {
      if (activeCalendar === "gregorian") return escapeHtml(formatGregorian(jsDate));

      var r;
      try {
        r = convertDate(jsDate);
      } catch (e) {
        return escapeHtml(formatGregorian(jsDate));
      }

      function inline(calendar, day, monthName, month, suffix) {
        var native = nativeMonthName(calendar, month);
        var monthHtml = native
          ? nativeScriptSpan(calendar, native) + ' <span class="cal-native-latin-inline">(' + escapeHtml(monthName) + ')</span>'
          : escapeHtml(monthName);
        return escapeHtml(String(day)) + ' ' + monthHtml + escapeHtml(suffix);
      }

      try {
        switch (activeCalendar) {
          case "hijri":
            return inline('hijri', r.hijri.day, r.hijri.monthName, r.hijri.month, ' ' + r.hijri.year + ' AH');

          case "hebrew":
            return inline('hebrew', r.hebrew.day, r.hebrew.monthName, r.hebrew.month, ' ' + r.hebrew.year);

          case "mayan": {
            var m = r.mayan;
            var s = escapeHtml(m.longCount);
            if (m.tzolkin && m.haab) {
              s += ' · ' + escapeHtml(m.tzolkin.number + ' ' + m.tzolkin.name + ' ' + m.haab.day + ' ' + m.haab.monthName);
            }
            return s;
          }

          case "egyptian": {
            var e = r.egyptian;
            if (e.month === 13) {
              var epaName = EGYPTIAN_EPAGOMENAL_NAMES[e.day - 1] || ("Epagomenal Day " + e.day);
              return escapeHtml(epaName + ", Year " + e.year);
            }
            // Optional secondary Coptic-script annotation (Part A note) --
            // Egyptian's own month name stays primary/Latin.
            var secondary = nativeMonthName('egyptian', e.month, true);
            var monthHtml = secondary
              ? escapeHtml(e.monthName) + ' ' + nativeScriptSpan('coptic', secondary, 'cal-native-secondary')
              : escapeHtml(e.monthName);
            return escapeHtml(String(e.day)) + ' ' + monthHtml + escapeHtml(", Year " + e.year);
          }

          case "persian":
            return inline('persian', r.persian.day, r.persian.monthName, r.persian.month, ' ' + r.persian.year);

          case "coptic":
            return inline('coptic', r.coptic.day, r.coptic.monthName, r.coptic.month, ' ' + r.coptic.year + ' AM');

          case "ethiopic":
            return inline('ethiopic', r.ethiopic.day, r.ethiopic.monthName, r.ethiopic.month, ' ' + r.ethiopic.year + ' EE');

          case "buddhist":
            return escapeHtml(r.buddhist.day + " " + r.buddhist.monthName + " " + r.buddhist.year + " BE");

          case "japanese": {
            var j = r.japanese;
            var eraLabel = j.eraYear === 1 ? (j.era + " gannen") : (j.era ? (j.era + " " + j.eraYear) : j.label);
            var nativeJ = nativeMonthName('japanese', j.month);
            var monthHtmlJ = nativeJ
              ? nativeScriptSpan('japanese', nativeJ) + ' <span class="cal-native-latin-inline">(' + escapeHtml(j.monthName) + ')</span>'
              : escapeHtml(j.monthName);
            return escapeHtml(eraLabel) + ' · ' + monthHtmlJ + ' ' + escapeHtml(String(j.day));
          }

          case "indianNational":
            return inline('indianNational', r.indianNational.day, r.indianNational.monthName, r.indianNational.month, ' ' + r.indianNational.year);

          case "chinese":
            return escapeHtml(formatGregorian(jsDate));

          default:
            return escapeHtml(formatGregorian(jsDate));
        }
      } catch (e2) {
        return escapeHtml(formatGregorian(jsDate));
      }
    }

    // ---------------------------------------------------------------------
    // Custom dropdown component -- trigger button + absolutely positioned
    // option list, replacing a native <select> (browsers won't let CSS
    // theme a native select's open list). Click-outside and Escape both
    // close it; clicking a non-disabled option selects it and fires
    // onChange. Self-contained, no dependency on the calendar engine
    // above -- reusable for the other calendar dropdown (oracle.html has
    // its own copy of this same function).
    // ---------------------------------------------------------------------
    function initCelDropdown(opts) {
      var trigger = opts.trigger;
      var triggerLabel = opts.triggerLabel;
      var list = opts.list;
      var options = opts.options;
      var currentValue = opts.value;

      function labelFor(value) {
        for (var i = 0; i < options.length; i++) {
          if (options[i].value === value) return options[i].label;
        }
        return value;
      }

      function renderList() {
        list.innerHTML = "";
        options.forEach(function (opt) {
          var li = document.createElement("li");
          var classes = "cel-dd-option";
          if (opt.disabled) classes += " is-disabled";
          if (opt.value === currentValue) classes += " is-selected";
          li.className = classes;
          li.setAttribute("role", "option");
          li.setAttribute("data-value", opt.value);
          li.setAttribute("aria-selected", opt.value === currentValue ? "true" : "false");
          li.setAttribute("aria-disabled", opt.disabled ? "true" : "false");
          li.textContent = opt.label;
          if (!opt.disabled) {
            li.addEventListener("click", function () {
              setValue(opt.value);
              close();
              trigger.focus();
            });
          }
          list.appendChild(li);
        });
      }

      function isOpen() { return !list.hidden; }

      function onOutsideClick(e) {
        if (!trigger.contains(e.target) && !list.contains(e.target)) close();
      }

      function onKeyDown(e) {
        if (e.key === "Escape") {
          close();
          trigger.focus();
        }
      }

      function open() {
        renderList();
        list.hidden = false;
        trigger.classList.add("is-open");
        trigger.setAttribute("aria-expanded", "true");
        document.addEventListener("mousedown", onOutsideClick, true);
        document.addEventListener("keydown", onKeyDown, true);
      }

      function close() {
        list.hidden = true;
        trigger.classList.remove("is-open");
        trigger.setAttribute("aria-expanded", "false");
        document.removeEventListener("mousedown", onOutsideClick, true);
        document.removeEventListener("keydown", onKeyDown, true);
      }

      function setValue(value) {
        currentValue = value;
        triggerLabel.textContent = labelFor(value);
        if (opts.onChange) opts.onChange(value);
      }

      trigger.addEventListener("click", function () {
        if (isOpen()) { close(); } else { open(); }
      });

      triggerLabel.textContent = labelFor(currentValue);

      return {
        setValue: setValue,
        getValue: function () { return currentValue; }
      };
    }

    // ---------------------------------------------------------------------
    // Panel wiring -- dropdown, today's date readout, "Open Full Calendar"
    // button (inert placeholder; the full-screen grid is the next step)
    // ---------------------------------------------------------------------
    var CALENDARS = [
      { value: "gregorian",      label: "Gregorian" },
      { value: "hijri",          label: "Hijri · Islamic" },
      { value: "hebrew",         label: "Hebrew" },
      { value: "persian",        label: "Persian · Solar Hijri" },
      { value: "coptic",         label: "Coptic" },
      { value: "ethiopic",       label: "Ethiopic" },
      { value: "indianNational", label: "Indian National · Saka" },
      { value: "buddhist",       label: "Buddhist · Thai" },
      { value: "japanese",       label: "Japanese · Era" },
      { value: "mayan",          label: "Mayan · Long Count" },
      { value: "egyptian",       label: "Egyptian · Civil" },
      { value: "chinese",        label: "Chinese — coming soon", disabled: true }
    ];

    var mcCalendarTrigger      = document.getElementById("mcCalendarTrigger");
    var mcCalendarTriggerLabel = document.getElementById("mcCalendarTriggerLabel");
    var mcCalendarList         = document.getElementById("mcCalendarList");
    var mcCalendarToday        = document.getElementById("mcCalendarToday");
    var mcOpenFullBtn          = document.getElementById("mcOpenFullCalendar");

    function renderCalendarToday() {
      if (mcCalendarToday) {
        mcCalendarToday.innerHTML = formatDateForActiveCalendarHtml(new Date());
      }
    }

    if (mcCalendarTrigger && mcCalendarTriggerLabel && mcCalendarList) {
      initCelDropdown({
        trigger: mcCalendarTrigger,
        triggerLabel: mcCalendarTriggerLabel,
        list: mcCalendarList,
        options: CALENDARS,
        value: activeCalendar,
        onChange: function (value) {
          activeCalendar = value;
          try { localStorage.setItem(ACTIVE_CALENDAR_KEY, activeCalendar); } catch (e) {}
          renderCalendarToday();
        }
      });
    }

    renderCalendarToday();

    // Bridge for the Tzolk'in Birth Signature card, defined in the My
    // Chart script ABOVE this one in the document (so it runs first --
    // these names don't exist yet when that script's own top-level code
    // runs, only by the time its async fetch callbacks/click handlers
    // fire, which is always after this whole script has finished).
    window.mayanFromJdn = mayanFromJdn;
    window.gregorianToJDN = gregorianToJDN;
  }());
  </script>

</body>
</html>
