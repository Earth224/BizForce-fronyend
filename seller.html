<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Seller Storefront</title>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <style>
    :root{
      --sa: #22d3ee;
      --sa-rgb: 34,211,238;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(var(--sa-rgb),.14),transparent 38%),radial-gradient(circle at 85% 90%,rgba(251,191,36,.10),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 0 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:32px 24px;flex-wrap:wrap;max-width:900px;margin:0 auto}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(34,211,238,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(34,211,238,.55);box-shadow:0 0 20px rgba(34,211,238,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#22d3ee}

    .sf-banner{position:relative;width:100%;height:200px;background-size:cover;background-position:center;background-color:rgba(255,255,255,.04)}
    .sf-banner.no-image{background-image:radial-gradient(circle at 20% 30%,rgba(var(--sa-rgb),.22),transparent 55%),radial-gradient(circle at 85% 75%,rgba(251,191,36,.14),transparent 55%)}
    .sf-header-wrap{max-width:860px;margin:0 auto;padding:0 24px}
    .sf-header{display:flex;align-items:flex-end;gap:20px;margin-top:-56px;margin-bottom:16px;flex-wrap:wrap;position:relative;z-index:2}
    .sf-avatar-wrap{flex-shrink:0}
    .sf-avatar{width:112px;height:112px;border-radius:50%;object-fit:cover;display:block;border:3px solid rgba(10,15,35,.95);box-shadow:0 0 0 1px rgba(var(--sa-rgb),.25),0 0 24px rgba(var(--sa-rgb),.2)}
    .sf-avatar-initials{width:112px;height:112px;border-radius:50%;border:3px solid rgba(10,15,35,.95);box-shadow:0 0 0 1px rgba(var(--sa-rgb),.25),0 0 24px rgba(var(--sa-rgb),.2);background:rgba(var(--sa-rgb),.1);display:none;align-items:center;justify-content:center;font-size:2.2rem;font-weight:900;color:var(--sa)}
    .sf-name-block{flex:1;min-width:200px;padding-bottom:6px}
    .sf-name{margin:0 0 4px;font-size:1.7rem;font-weight:800;color:#f4f7ff;letter-spacing:-.02em}
    .sf-tagline{margin:0 0 8px;color:#8892b8;font-size:.95rem;line-height:1.5}
    .sf-meta-row{display:flex;flex-wrap:wrap;gap:14px}
    .sf-meta-item{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;color:#8892b8}
    .sf-meta-item svg{width:13px;height:13px;color:var(--sa);flex-shrink:0}
    .sf-meta-item a{color:#8892b8;text-decoration:none}
    .sf-meta-item a:hover{color:var(--sa)}
    .sf-bio{max-width:860px;margin:0 auto 32px;padding:0 24px;color:#c3cbe6;font-size:.92rem;line-height:1.7}

    .sf-sections{max-width:860px;margin:0 auto;padding:0 24px}
    .sf-section{margin-bottom:44px}
    .sf-section-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
    .sf-section-icon{width:30px;height:30px;border-radius:8px;background:rgba(var(--sa-rgb),.1);border:1px solid rgba(var(--sa-rgb),.25);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sf-section-icon svg{width:15px;height:15px;color:var(--sa)}
    .sf-section-title{font-size:1.05rem;font-weight:800;color:#f4f7ff}

    .sf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
    .sf-card{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:all .2s}
    .sf-card:hover{border-color:rgba(var(--sa-rgb),.3)}
    .sf-card-img-wrap{width:100%;aspect-ratio:16/10;overflow:hidden;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
    .sf-card-img{width:100%;height:100%;object-fit:cover;display:block}
    .sf-card-img-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#8892b8;font-size:.65rem}
    .sf-card-img-fallback svg{width:26px;height:26px;opacity:.5}
    .sf-card-body{padding:14px 16px;display:flex;flex-direction:column;gap:6px;flex:1}
    .sf-card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .sf-card-name{font-size:.95rem;font-weight:700;color:#f4f7ff;margin:0;line-height:1.3}
    .sf-card-category{flex-shrink:0;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:999px;padding:3px 9px;white-space:nowrap}
    .sf-card-desc{font-size:.8rem;color:#8892b8;line-height:1.5;margin:0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .sf-card-price{font-size:1.05rem;font-weight:800;color:#34d399;margin-top:2px}
    .sf-buy-btn{align-self:flex-start;margin-top:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;border:1px solid rgba(52,211,153,.4);background:rgba(52,211,153,.12);color:#34d399;font-size:.78rem;font-weight:700;text-decoration:none;transition:all .2s}
    .sf-buy-btn:hover{background:rgba(52,211,153,.2)}
    .sf-card-link{font-size:.78rem;color:var(--sa);text-decoration:none;margin-top:auto;align-self:flex-start}
    .sf-card-link:hover{text-decoration:underline}

    .sf-music-list{display:flex;flex-direction:column;gap:10px}
    .sf-track{background:rgba(10,15,35,.78);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 18px;display:flex;flex-direction:column;gap:8px}
    .sf-track-info{display:flex;flex-direction:column;gap:2px}
    .sf-track-title{font-size:.9rem;font-weight:700;color:#e8e8ff}
    .sf-track-artist{font-size:.78rem;color:#8892b8}
    .sf-track audio{width:100%;height:32px}

    .sf-videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .sf-video-card{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden}
    .sf-video-embed{position:relative;width:100%;aspect-ratio:16/9;background:#000}
    .sf-video-embed iframe,.sf-video-embed video{position:absolute;inset:0;width:100%;height:100%;border:0}
    .sf-video-title{padding:12px 14px;font-size:.88rem;font-weight:700;color:#e8e8ff}

    .empty-msg{text-align:center;padding:52px 24px;color:#8892b8;font-size:.9rem;line-height:1.6}
    .loading{text-align:center;padding:80px 24px;color:#8892b8;font-size:.9rem}
    .sf-not-found{text-align:center;padding:100px 24px}
    .sf-not-found-icon{width:52px;height:52px;margin:0 auto 18px;color:#8892b8;opacity:.6}
    .sf-not-found-title{font-size:1.3rem;font-weight:800;color:#f4f7ff;margin-bottom:8px}
    .sf-not-found-sub{color:#8892b8;font-size:.9rem}
    @media(max-width:600px){.sf-header{margin-top:-40px}.sf-avatar,.sf-avatar-initials{width:84px;height:84px}}
  </style>
</head>
<body>
<div class="top-nav">
  <a href="dashboard.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Executive HQ
  </a>
  <span class="brand-badge">BizForce AI</span>
</div>

<div class="loading" id="loadingState">Loading storefront...</div>

<div class="sf-not-found" id="notFoundState" style="display:none">
  <svg class="sf-not-found-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  <div class="sf-not-found-title">Seller not found</div>
  <div class="sf-not-found-sub">This storefront doesn't exist, or the link may be outdated.</div>
</div>

<div class="page" id="pageRoot" style="display:none">
  <div class="sf-banner" id="sfBanner"></div>
  <div class="sf-header-wrap">
    <div class="sf-header">
      <div class="sf-avatar-wrap">
        <img class="sf-avatar" id="sfAvatarImg" src="" alt="" style="display:none">
        <div class="sf-avatar-initials" id="sfAvatarInitials">?</div>
      </div>
      <div class="sf-name-block">
        <h1 class="sf-name" id="sfName">—</h1>
        <p class="sf-tagline" id="sfTagline" style="display:none"></p>
        <div class="sf-meta-row" id="sfMetaRow"></div>
      </div>
    </div>
  </div>
  <p class="sf-bio" id="sfBio" style="display:none"></p>

  <div class="sf-sections">
    <div class="sf-section" id="sec-services" style="display:none">
      <div class="sf-section-head">
        <div class="sf-section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 16l2.5 2.5L16 13"/></svg></div>
        <span class="sf-section-title">Services</span>
      </div>
      <div class="sf-grid" id="servicesGrid"></div>
    </div>

    <div class="sf-section" id="sec-products" style="display:none">
      <div class="sf-section-head">
        <div class="sf-section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
        <span class="sf-section-title">Products</span>
      </div>
      <div class="sf-grid" id="productsGrid"></div>
    </div>

    <div class="sf-section" id="sec-portfolio" style="display:none">
      <div class="sf-section-head">
        <div class="sf-section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
        <span class="sf-section-title">Portfolio</span>
      </div>
      <div class="sf-grid" id="portfolioGrid"></div>
    </div>

    <div class="sf-section" id="sec-music" style="display:none">
      <div class="sf-section-head">
        <div class="sf-section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
        <span class="sf-section-title">Music</span>
      </div>
      <div class="sf-music-list" id="musicList"></div>
    </div>

    <div class="sf-section" id="sec-videos" style="display:none">
      <div class="sf-section-head">
        <div class="sf-section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>
        <span class="sf-section-title">Videos</span>
      </div>
      <div class="sf-videos-grid" id="videosGrid"></div>
    </div>
  </div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function initials(name) {
  return String(name || "").split(" ").filter(Boolean).map(function(w){ return w[0]; }).join("").toUpperCase().slice(0,2) || "?";
}

function formatPrice(price, currency) {
  var n = Number(price);
  if (price == null || !isFinite(n) || n === 0) return "Free";
  var cur = (currency || "USD").toUpperCase();
  return cur + " " + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function setAccent(hex) {
  if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty("--sa", hex);
  document.documentElement.style.setProperty("--sa-rgb", r+","+g+","+b);
}

function getYouTubeId(url) {
  var m = String(url || "").match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{6,})/);
  return m ? m[1] : null;
}
function getVimeoId(url) {
  var m = String(url || "").match(/vimeo\.com\/(?:video\/)?(\d+)/);
  return m ? m[1] : null;
}

function showNotFound() {
  document.getElementById("loadingState").style.display = "none";
  document.getElementById("notFoundState").style.display = "block";
}

async function loadSeller() {
  var handle = new URLSearchParams(window.location.search).get("u");
  if (!handle) { showNotFound(); return; }
  try {
    var res = await fetch(API_URL + "/api/bfp/seller/" + encodeURIComponent(handle));
    if (res.status === 404) { showNotFound(); return; }
    if (!res.ok) throw new Error("fetch failed");
    var data = await res.json();
    renderStorefront(data);
  } catch (e) {
    showNotFound();
  }
}

function renderListingCard(item) {
  var img = item.image_url
    ? '<img class="sf-card-img" src="' + esc(item.image_url) + '" alt="">'
    : '<div class="sf-card-img-fallback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>No image</span></div>';
  var categoryTag = item.category ? '<span class="sf-card-category">' + esc(item.category) + '</span>' : "";
  var buyBtn = item.buy_link
    ? '<a class="sf-buy-btn" href="' + esc(item.buy_link) + '" target="_blank" rel="noopener">View / Buy</a>'
    : "";
  return '<div class="sf-card">' +
    '<div class="sf-card-img-wrap">' + img + '</div>' +
    '<div class="sf-card-body">' +
      '<div class="sf-card-top-row"><h3 class="sf-card-name">' + esc(item.name) + '</h3>' + categoryTag + '</div>' +
      '<p class="sf-card-desc">' + esc(item.description || "") + '</p>' +
      '<div class="sf-card-price">' + formatPrice(item.price, item.currency) + '</div>' +
      buyBtn +
    '</div>' +
  '</div>';
}

function renderPortfolioCard(item) {
  var img = item.image_url
    ? '<img class="sf-card-img" src="' + esc(item.image_url) + '" alt="">'
    : '<div class="sf-card-img-fallback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>No image</span></div>';
  var categoryTag = item.category ? '<span class="sf-card-category">' + esc(item.category) + '</span>' : "";
  var link = item.url
    ? '<a class="sf-card-link" href="' + esc(item.url) + '" target="_blank" rel="noopener">View →</a>'
    : "";
  return '<div class="sf-card">' +
    '<div class="sf-card-img-wrap">' + img + '</div>' +
    '<div class="sf-card-body">' +
      '<div class="sf-card-top-row"><h3 class="sf-card-name">' + esc(item.title) + '</h3>' + categoryTag + '</div>' +
      '<p class="sf-card-desc">' + esc(item.description || "") + '</p>' +
      link +
    '</div>' +
  '</div>';
}

function renderTrack(t) {
  return '<div class="sf-track">' +
    '<div class="sf-track-info"><div class="sf-track-title">' + esc(t.title) + '</div>' +
    (t.artist ? '<div class="sf-track-artist">' + esc(t.artist) + '</div>' : '') + '</div>' +
    '<audio controls src="' + esc(t.audio_url) + '"></audio>' +
  '</div>';
}

function renderVideoCard(v) {
  var embed;
  if (v.video_type === "youtube") {
    var yt = getYouTubeId(v.video_url);
    embed = yt
      ? '<iframe src="https://www.youtube.com/embed/' + esc(yt) + '" allowfullscreen loading="lazy"></iframe>'
      : '<div class="sf-card-img-fallback">Unable to embed video</div>';
  } else if (v.video_type === "vimeo") {
    var vm = getVimeoId(v.video_url);
    embed = vm
      ? '<iframe src="https://player.vimeo.com/video/' + esc(vm) + '" allowfullscreen loading="lazy"></iframe>'
      : '<div class="sf-card-img-fallback">Unable to embed video</div>';
  } else {
    embed = '<video controls src="' + esc(v.video_url) + '"></video>';
  }
  return '<div class="sf-video-card">' +
    '<div class="sf-video-embed">' + embed + '</div>' +
    '<div class="sf-video-title">' + esc(v.title) + '</div>' +
  '</div>';
}

function renderStorefront(data) {
  var seller = data.seller || {};
  setAccent(seller.accent_color);
  document.title = "BizForce AI — " + (seller.display_name || seller.username || "Seller") + " Storefront";

  var banner = document.getElementById("sfBanner");
  if (seller.banner_url) {
    banner.style.backgroundImage = "url('" + seller.banner_url.replace(/'/g, "") + "')";
  } else {
    banner.classList.add("no-image");
  }

  var avatarImg = document.getElementById("sfAvatarImg");
  var avatarInitials = document.getElementById("sfAvatarInitials");
  if (seller.avatar_url) {
    avatarImg.src = seller.avatar_url;
    avatarImg.style.display = "block";
    avatarInitials.style.display = "none";
  } else {
    avatarInitials.textContent = initials(seller.display_name || seller.username);
    avatarInitials.style.display = "flex";
  }

  document.getElementById("sfName").textContent = seller.display_name || seller.username || "Unnamed seller";

  var taglineEl = document.getElementById("sfTagline");
  if (seller.tagline) { taglineEl.textContent = seller.tagline; taglineEl.style.display = ""; }

  var bioEl = document.getElementById("sfBio");
  if (seller.bio) { bioEl.textContent = seller.bio; bioEl.style.display = ""; }

  var metaHtml = "";
  if (seller.location) {
    metaHtml += '<span class="sf-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + esc(seller.location) + '</span>';
  }
  if (seller.website) {
    var href = seller.website.indexOf("http") === 0 ? seller.website : "https://" + seller.website;
    metaHtml += '<span class="sf-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><a href="' + esc(href) + '" target="_blank" rel="noopener">' + esc(seller.website.replace(/^https?:\/\//,"")) + '</a></span>';
  }
  document.getElementById("sfMetaRow").innerHTML = metaHtml;

  var services = Array.isArray(data.services) ? data.services : [];
  if (services.length) {
    document.getElementById("sec-services").style.display = "block";
    document.getElementById("servicesGrid").innerHTML = services.map(renderListingCard).join("");
  }

  var products = Array.isArray(data.products) ? data.products : [];
  if (products.length) {
    document.getElementById("sec-products").style.display = "block";
    document.getElementById("productsGrid").innerHTML = products.map(renderListingCard).join("");
  }

  var portfolio = Array.isArray(data.portfolio) ? data.portfolio : [];
  if (portfolio.length) {
    document.getElementById("sec-portfolio").style.display = "block";
    document.getElementById("portfolioGrid").innerHTML = portfolio.map(renderPortfolioCard).join("");
  }

  var music = Array.isArray(data.music) ? data.music : [];
  if (music.length) {
    document.getElementById("sec-music").style.display = "block";
    document.getElementById("musicList").innerHTML = music.map(renderTrack).join("");
  }

  var videos = Array.isArray(data.videos) ? data.videos : [];
  if (videos.length) {
    document.getElementById("sec-videos").style.display = "block";
    document.getElementById("videosGrid").innerHTML = videos.map(renderVideoCard).join("");
  }

  document.getElementById("loadingState").style.display = "none";
  document.getElementById("pageRoot").style.display = "block";
}

loadSeller();
</script>
<script src="/scripts/termaximus-presence.js"></script>
<script src="/scripts/termaximus-guide.js"></script>
</body>
</html>
