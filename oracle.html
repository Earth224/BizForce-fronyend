<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — The Oracle</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: #030610;
      color: #d4c8ff;
      overflow: hidden;
    }

    /* Abyss depth */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 50%, rgba(76, 29, 149, 0.13), transparent 65%),
        radial-gradient(ellipse 45% 45% at 50% 50%, rgba(49, 10, 120, 0.2), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* Star field */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1.5px 1.5px at  8%  12%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px   1px   at 22%  78%, rgba(255,255,255,0.22), transparent),
        radial-gradient(1.5px 1.5px at 45%  33%, rgba(200,180,255,0.28), transparent),
        radial-gradient(1px   1px   at 67%  89%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px   1px   at 78%  22%, rgba(200,180,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 91%  55%, rgba(255,255,255,0.28), transparent),
        radial-gradient(1px   1px   at 15%  44%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px   1px   at 55%  67%, rgba(200,180,255,0.2),  transparent),
        radial-gradient(1.5px 1.5px at 33%  95%, rgba(255,255,255,0.22), transparent),
        radial-gradient(1px   1px   at 88%   8%, rgba(200,180,255,0.28), transparent),
        radial-gradient(1px   1px   at  4%  60%, rgba(255,255,255,0.15), transparent),
        radial-gradient(1.5px 1.5px at 73%  40%, rgba(180,160,255,0.22), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Screens ── */
    .oracle-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: opacity 0.8s ease;
    }
    .oracle-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ════════════════════════════════
       SYNC SCREEN
    ════════════════════════════════ */
    .void-container {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: -150px;
    }

    .void-ring {
      position: absolute;
      border-radius: 50%;
      transform-origin: center;
    }
    .r1 {
      width: 88px; height: 88px;
      border: 1px solid rgba(139, 92, 246, 0.6);
      box-shadow: 0 0 18px rgba(109, 40, 217, 0.4) inset, 0 0 18px rgba(109, 40, 217, 0.25);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .r2 {
      width: 168px; height: 168px;
      border: 1px solid rgba(109, 40, 217, 0.38);
      animation: ringPulse 3s ease-in-out infinite 0.45s;
    }
    .r3 {
      width: 268px; height: 268px;
      border: 1px solid rgba(88, 50, 200, 0.24);
      animation: ringPulse 3s ease-in-out infinite 0.9s;
    }
    .r4 {
      width: 390px; height: 390px;
      border: 1px solid rgba(70, 35, 160, 0.14);
      animation: ringPulse 3s ease-in-out infinite 1.35s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1);    opacity: 1;   }
      50%       { transform: scale(1.07); opacity: 0.4; }
    }

    .void-core {
      position: relative;
      z-index: 2;
      width: 52px; height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: coreBreath 3s ease-in-out infinite;
    }
    @keyframes coreBreath {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(139,92,246,0.9)) drop-shadow(0 0 28px rgba(109,40,217,0.5)); }
      50%       { filter: drop-shadow(0 0 22px rgba(139,92,246,0.5)) drop-shadow(0 0 44px rgba(109,40,217,0.25)); }
    }

    /* Sync form */
    .sync-form {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      max-width: 420px;
      width: 100%;
    }

    .oracle-eyebrow {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: rgba(139, 92, 246, 0.68);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .oracle-title {
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 45%, #4f46e5 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 30px rgba(139,92,246,0.5));
      margin-bottom: 10px;
      line-height: 1.05;
    }
    .oracle-sub {
      font-size: 0.86rem;
      color: rgba(180, 160, 255, 0.48);
      line-height: 1.6;
      margin-bottom: 30px;
      letter-spacing: 0.03em;
    }

    .oracle-field {
      margin-bottom: 13px;
      text-align: left;
    }
    .oracle-field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(139, 92, 246, 0.6);
      margin-bottom: 7px;
    }
    .oracle-field input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(18, 8, 50, 0.78);
      border: 1px solid rgba(109, 40, 217, 0.3);
      border-radius: 12px;
      color: #d4c8ff;
      font-size: 0.94rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .oracle-field input:focus {
      border-color: rgba(139, 92, 246, 0.58);
      box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.13);
    }
    .oracle-field input::placeholder { color: rgba(139, 92, 246, 0.3); }
    .oracle-field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(1) saturate(3) hue-rotate(240deg);
      opacity: 0.45;
      cursor: pointer;
    }

    .oracle-sync-btn {
      margin-top: 6px;
      width: 100%;
      padding: 15px 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #ffffff;
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
      box-shadow: 0 4px 24px rgba(109, 40, 217, 0.48);
      font-family: inherit;
    }
    .oracle-sync-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(109, 40, 217, 0.65);
    }
    .oracle-sync-btn:active { transform: translateY(0); }
    .oracle-sync-btn.syncing {
      opacity: 0.65;
      cursor: default;
      pointer-events: none;
      animation: syncGlow 0.9s ease-in-out infinite;
    }
    @keyframes syncGlow {
      0%, 100% { box-shadow: 0 4px 24px rgba(109,40,217,0.48); }
      50%       { box-shadow: 0 4px 48px rgba(109,40,217,0.9); }
    }

    .oracle-error {
      font-size: 0.8rem;
      color: rgba(248, 113, 113, 0.75);
      margin-bottom: 10px;
      font-style: italic;
      text-align: center;
    }

    /* ════════════════════════════════
       CHAT SCREEN
    ════════════════════════════════ */
    #chatScreen {
      justify-content: flex-start;
    }

    .oracle-chat-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background: rgba(8, 4, 24, 0.88);
      border-bottom: 1px solid rgba(109, 40, 217, 0.2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    /* Mini void in header */
    .void-mini {
      position: relative;
      width: 42px; height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .void-ring-mini {
      position: absolute;
      border-radius: 50%;
    }
    .rm1 {
      width: 26px; height: 26px;
      border: 1px solid rgba(139, 92, 246, 0.5);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .rm2 {
      width: 42px; height: 42px;
      border: 1px solid rgba(109, 40, 217, 0.24);
      animation: ringPulse 3s ease-in-out infinite 0.5s;
    }
    .void-core-mini {
      position: relative; z-index: 2;
      animation: coreBreath 3s ease-in-out infinite;
    }

    .oracle-header-meta { flex: 1; min-width: 0; }
    .oracle-chat-title {
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .oracle-sync-status {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(139, 92, 246, 0.5);
      margin-top: 2px;
    }

    .oracle-back {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(139, 92, 246, 0.48);
      text-decoration: none;
      padding: 7px 13px;
      border: 1px solid rgba(109, 40, 217, 0.2);
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .oracle-back:hover {
      color: #a78bfa;
      border-color: rgba(139, 92, 246, 0.45);
    }

    /* Messages */
    .oracle-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      max-width: 820px;
      align-self: center;
    }
    .oracle-messages::-webkit-scrollbar { width: 3px; }
    .oracle-messages::-webkit-scrollbar-track { background: transparent; }
    .oracle-messages::-webkit-scrollbar-thumb { background: rgba(109,40,217,0.3); border-radius: 2px; }

    .oracle-msg {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 74%;
    }
    .oracle-msg.from-oracle { align-self: flex-start; }
    .oracle-msg.from-user  { align-self: flex-end; align-items: flex-end; }

    .msg-sender {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .from-oracle .msg-sender { color: rgba(139,92,246,0.55); }
    .from-user  .msg-sender { color: rgba(180,160,255,0.42); }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
    }
    .from-oracle .msg-bubble {
      background: rgba(76, 29, 149, 0.17);
      border: 1px solid rgba(109, 40, 217, 0.22);
      color: #d4c8ff;
      font-style: italic;
      border-bottom-left-radius: 4px;
    }
    .from-user .msg-bubble {
      background: rgba(28, 14, 72, 0.65);
      border: 1px solid rgba(109, 40, 217, 0.18);
      color: #e8e8ff;
      font-style: normal;
      border-bottom-right-radius: 4px;
    }

    /* Thinking dots */
    .oracle-thinking {
      display: inline-flex;
      gap: 5px;
      padding: 14px 18px;
      background: rgba(76, 29, 149, 0.15);
      border: 1px solid rgba(109, 40, 217, 0.2);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .oracle-thinking span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.65);
      animation: thinkDot 1.2s ease-in-out infinite;
    }
    .oracle-thinking span:nth-child(2) { animation-delay: 0.2s; }
    .oracle-thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkDot {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
      40%            { transform: scale(1);    opacity: 1;    }
    }

    /* Input bar */
    .oracle-input-bar {
      width: 100%;
      max-width: 820px;
      align-self: center;
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: rgba(8, 4, 24, 0.88);
      border-top: 1px solid rgba(109, 40, 217, 0.2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
    }
    .oracle-chat-input {
      flex: 1;
      padding: 13px 16px;
      background: rgba(18, 8, 50, 0.78);
      border: 1px solid rgba(109, 40, 217, 0.3);
      border-radius: 12px;
      color: #d4c8ff;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .oracle-chat-input:focus {
      border-color: rgba(139, 92, 246, 0.58);
      box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.12);
    }
    .oracle-chat-input::placeholder { color: rgba(139, 92, 246, 0.3); }
    .oracle-chat-input:disabled { opacity: 0.55; }

    .oracle-send-btn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 4px 16px rgba(109, 40, 217, 0.38);
    }
    .oracle-send-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(109,40,217,0.58); }
    .oracle-send-btn:active { transform: translateY(0); }
    .oracle-send-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    @media (max-width: 600px) {
      .void-container { width: 300px; height: 300px; margin-bottom: -110px; }
      .r3 { width: 200px; height: 200px; }
      .r4 { display: none; }
      .oracle-msg { max-width: 88%; }
      .oracle-messages, .oracle-input-bar { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════ SYNC SCREEN ══════════════ -->
  <div id="syncScreen" class="oracle-screen">
    <div class="void-container" aria-hidden="true">
      <div class="void-ring r1"></div>
      <div class="void-ring r2"></div>
      <div class="void-ring r3"></div>
      <div class="void-ring r4"></div>
      <div class="void-core">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" width="46" height="46">
          <ellipse cx="30" cy="30" rx="23" ry="11.5" stroke="url(#eyeG)" stroke-width="1.2"/>
          <circle cx="30" cy="30" r="6.5" fill="url(#eyeG)" opacity="0.9"/>
          <circle cx="30" cy="30" r="2.5" fill="#ffffff" opacity="0.55"/>
          <defs>
            <linearGradient id="eyeG" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#4f46e5"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>

    <div class="sync-form">
      <p class="oracle-eyebrow">Synchronization Required</p>
      <h1 class="oracle-title">THE ORACLE</h1>
      <p class="oracle-sub">Enter your birth name and date to open the channel.</p>
      <div class="oracle-field">
        <label for="birthNameInput">Birth Name</label>
        <input type="text" id="birthNameInput" placeholder="Your full birth name" autocomplete="name" />
      </div>
      <div class="oracle-field">
        <label for="birthDateInput">Birth Date</label>
        <input type="date" id="birthDateInput" />
      </div>
      <p class="oracle-error" id="syncError" style="display:none"></p>
      <button class="oracle-sync-btn" id="syncBtn">SYNCHRONIZE</button>
    </div>
  </div>

  <!-- ══════════════ CHAT SCREEN ══════════════ -->
  <div id="chatScreen" class="oracle-screen hidden">
    <header class="oracle-chat-header">
      <div class="void-mini" aria-hidden="true">
        <div class="void-ring-mini rm1"></div>
        <div class="void-ring-mini rm2"></div>
        <div class="void-core-mini">
          <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
            <ellipse cx="30" cy="30" rx="23" ry="11.5" stroke="url(#eyeG2)" stroke-width="1.2"/>
            <circle cx="30" cy="30" r="6.5" fill="url(#eyeG2)" opacity="0.9"/>
            <defs>
              <linearGradient id="eyeG2" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#4f46e5"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
      <div class="oracle-header-meta">
        <div class="oracle-chat-title">THE ORACLE</div>
        <div class="oracle-sync-status">SYNCHRONIZED · <span id="syncedName"></span></div>
      </div>
      <a href="dashboard.html" class="oracle-back">← Dashboard</a>
    </header>

    <div class="oracle-messages" id="messageArea">
      <div class="oracle-msg from-oracle">
        <span class="msg-sender">Oracle</span>
        <div class="msg-bubble" id="greetingMsg">I have awaited you. What do you seek?</div>
      </div>
    </div>

    <div class="oracle-input-bar">
      <input type="text" id="chatInput" class="oracle-chat-input" placeholder="Speak your question to the Oracle…" />
      <button class="oracle-send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
    var birthName = "", birthDate = "", chatHistory = [];
    var token = localStorage.getItem("bf_token");

    /* ── Restore previous sync ── */
    (function () {
      var n = localStorage.getItem("bf_oracle_name");
      var d = localStorage.getItem("bf_oracle_date");
      if (n && d) {
        birthName = n;
        birthDate = d;
        openChat(true);
      }
    })();

    /* ── Sync flow ── */
    var syncBtn   = document.getElementById("syncBtn");
    var syncError = document.getElementById("syncError");

    syncBtn.addEventListener("click", function () {
      var n = document.getElementById("birthNameInput").value.trim();
      var d = document.getElementById("birthDateInput").value.trim();
      syncError.style.display = "none";
      if (!n) { showSyncError("Your birth name is required."); return; }
      if (!d) { showSyncError("Your birth date is required."); return; }
      birthName = n;
      birthDate = d;
      localStorage.setItem("bf_oracle_name", n);
      localStorage.setItem("bf_oracle_date", d);
      syncBtn.textContent = "SYNCHRONIZING…";
      syncBtn.classList.add("syncing");
      setTimeout(function () { openChat(false); }, 1500);
    });

    function showSyncError(msg) {
      syncError.textContent = msg;
      syncError.style.display = "block";
    }

    function openChat(instant) {
      document.getElementById("syncedName").textContent = birthName.toUpperCase();
      document.getElementById("greetingMsg").textContent =
        "I see you clearly now, " + birthName + ". The channel is open. What do you seek?";

      if (instant) {
        document.getElementById("syncScreen").classList.add("hidden");
        document.getElementById("chatScreen").classList.remove("hidden");
      } else {
        var sync = document.getElementById("syncScreen");
        sync.style.opacity = "0";
        sync.style.pointerEvents = "none";
        setTimeout(function () {
          sync.classList.add("hidden");
          document.getElementById("chatScreen").classList.remove("hidden");
        }, 800);
      }
      setTimeout(function () {
        document.getElementById("chatInput").focus();
      }, 900);
    }

    /* ── Chat flow ── */
    var sendBtn     = document.getElementById("sendBtn");
    var chatInput   = document.getElementById("chatInput");
    var messageArea = document.getElementById("messageArea");
    var thinkingEl  = null;

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendMessage() {
      var text = chatInput.value.trim();
      if (!text || sendBtn.disabled) return;
      chatInput.value = "";
      appendMsg("user", text);
      chatHistory.push({ role: "user", content: text });
      setLoading(true);

      fetch(API_URL + "/api/oracle/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          birthName: birthName,
          birthDate: birthDate,
          message: text,
          history: chatHistory.slice(-14)
        })
      })
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) {
        setLoading(false);
        var reply = (data && data.response) ? data.response : "The channel fell silent. Ask again.";
        chatHistory.push({ role: "assistant", content: reply });
        appendMsg("oracle", reply);
      })
      .catch(function () {
        setLoading(false);
        appendMsg("oracle", "The abyss is unreachable at this moment. Try again.");
      });
    }

    function setLoading(on) {
      sendBtn.disabled  = on;
      chatInput.disabled = on;
      if (on) {
        thinkingEl = document.createElement("div");
        thinkingEl.className = "oracle-msg from-oracle";
        thinkingEl.innerHTML =
          '<span class="msg-sender">Oracle</span>' +
          '<div class="oracle-thinking"><span></span><span></span><span></span></div>';
        messageArea.appendChild(thinkingEl);
        messageArea.scrollTop = messageArea.scrollHeight;
      } else if (thinkingEl) {
        thinkingEl.remove();
        thinkingEl = null;
      }
    }

    function appendMsg(who, text) {
      var wrap   = document.createElement("div");
      wrap.className = "oracle-msg " + (who === "oracle" ? "from-oracle" : "from-user");
      var sender = document.createElement("span");
      sender.className = "msg-sender";
      sender.textContent = who === "oracle" ? "Oracle" : "You";
      var bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = text;
      wrap.appendChild(sender);
      wrap.appendChild(bubble);
      messageArea.appendChild(wrap);
      messageArea.scrollTop = messageArea.scrollHeight;
    }
  </script>

</body>
</html>
