<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — The Oracle</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS Custom Properties (night defaults, overridden by JS) ── */
    :root {
      --bg-hex:       #020610;
      --bg-g1:        rgba(15, 23, 80, 0.22);
      --bg-g2:        rgba(8, 20, 55, 0.28);
      --star-op:      1;
      --ring-clr:     rgba(13, 148, 136, 0.45);
      --ring-glow:    rgba(13, 148, 136, 0.30);
      --core-g1:      rgba(80, 200, 220, 0.88);
      --core-g2:      rgba(13, 148, 136, 0.48);
      --ray-angle:    210deg;
      --ray-op:       0.022;
      --ray-clr:      rgba(56, 189, 248, 0.12);
      --bio-op:       0.90;
      --acc-from:     #2dd4bf;
      --acc-mid:      #0ea5e9;
      --acc-to:       #7c3aed;
      --btn-from:     #0369a1;
      --btn-to:       #1e3a8a;
      --btn-shadow:   rgba(3, 105, 161, 0.48);
      --status-clr:   rgba(45, 212, 191, 0.55);
      --sub-clr:      rgba(180, 210, 230, 0.45);
      --input-bg:     rgba(2, 8, 22, 0.78);
      --input-bdr:    rgba(13, 148, 136, 0.30);
      --input-foc:    rgba(13, 148, 136, 0.58);
      --msg-bg:       rgba(5, 30, 50, 0.25);
      --msg-bdr:      rgba(13, 148, 136, 0.22);
      --header-bg:    rgba(2, 5, 16, 0.88);
      --text-clr:     #cce8ee;
      --sender-clr:   rgba(45, 212, 191, 0.55);
      /* Jungle & mirror — overridden by JS palette */
      --j-far:        rgba(10, 20, 48, 0.85);
      --j-mid:        rgba(4, 10, 28, 0.92);
      --j-near:       rgba(1, 4, 14, 1);
      --stream-clr:   rgba(0, 90, 130, 0.38);
      --stream-deep:  rgba(0, 55, 98, 0.62);
      --stream-shim:  rgba(45, 212, 191, 0.18);
      --mirror-f-clr: #2dd4bf;
      --mirror-glow:  rgba(45, 212, 191, 0.44);
      --nebula-1:     rgba(76, 0, 115, 0.48);
      --nebula-2:     rgba(0, 115, 155, 0.42);
      --mist-clr:     rgba(30, 80, 150, 0.15);
      --glow-a-soft:  rgba(45, 212, 191, 0.30);
      --glow-b-soft:  rgba(124, 58, 237, 0.28);
      --neb-base-1:   rgba(55, 5, 75, 1);
      --neb-base-2:   rgba(18, 2, 35, 1);
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: var(--bg-hex);
      color: var(--text-clr);
      overflow: hidden;
      transition: background 4s ease, color 4s ease;
    }

    /* Abyss depth gradient — color shifts with palette */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 50%, var(--bg-g1), transparent 65%),
        radial-gradient(ellipse 45% 45% at 50% 50%, var(--bg-g2), transparent),
        var(--bg-hex);
      transition: background 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* Star field — opacity driven by time (full at night, near-zero at midday) */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: var(--star-op);
      background:
        radial-gradient(1.5px 1.5px at  7%  11%, rgba(255,255,255,0.40), transparent),
        radial-gradient(1px   1px   at 18%  72%, rgba(255,255,255,0.28), transparent),
        radial-gradient(1.5px 1.5px at 28%  44%, rgba(200,220,255,0.32), transparent),
        radial-gradient(1px   1px   at 41%  85%, rgba(255,255,255,0.22), transparent),
        radial-gradient(2px   2px   at 52%  19%, rgba(220,200,255,0.35), transparent),
        radial-gradient(1px   1px   at 63%  56%, rgba(255,255,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 72%  33%, rgba(200,220,255,0.30), transparent),
        radial-gradient(1px   1px   at 81%  78%, rgba(255,255,255,0.20), transparent),
        radial-gradient(1.5px 1.5px at 89%  14%, rgba(220,200,255,0.32), transparent),
        radial-gradient(1px   1px   at 94%  62%, rgba(255,255,255,0.26), transparent),
        radial-gradient(1px   1px   at 11%  92%, rgba(200,220,255,0.22), transparent),
        radial-gradient(2px   2px   at 35%  28%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px   1px   at 58%  95%, rgba(220,200,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 76%  50%, rgba(255,255,255,0.20), transparent),
        radial-gradient(1px   1px   at 96%  38%, rgba(200,220,255,0.28), transparent);
      transition: opacity 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* Light rays — angle and color temperature shift with time of day */
    .light-rays {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        var(--ray-angle),
        transparent 0px,
        transparent 80px,
        var(--ray-clr) 80px,
        var(--ray-clr) 81px,
        transparent 81px,
        transparent 160px
      );
      opacity: var(--ray-op);
      transition: opacity 4s ease, background 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Screens ── */
    .oracle-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: opacity 0.8s ease;
    }
    .oracle-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ════════════════════════════════════════
       SYNC SCREEN
    ════════════════════════════════════════ */
    .void-container {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: -150px;
    }

    /* Bioluminescent rings — color, glow, and opacity all time-responsive */
    .void-ring {
      position: absolute;
      border-radius: 50%;
      transform-origin: center;
      transition: border-color 4s ease, box-shadow 4s ease, opacity 4s ease;
    }
    .r1 {
      width: 88px; height: 88px;
      border: 1px solid var(--ring-clr);
      box-shadow: 0 0 18px var(--ring-glow) inset, 0 0 18px var(--ring-glow);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .r2 {
      width: 168px; height: 168px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.45s;
    }
    .r3 {
      width: 268px; height: 268px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.9s;
    }
    .r4 {
      width: 390px; height: 390px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 1.35s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1);    opacity: var(--bio-op); }
      50%       { transform: scale(1.07); opacity: calc(var(--bio-op) * 0.38); }
    }

    /* Void core — glow color follows palette */
    .void-core {
      position: relative;
      z-index: 2;
      width: 52px; height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: coreBreath 3s ease-in-out infinite;
      transition: opacity 4s ease;
    }
    @keyframes coreBreath {
      0%, 100% { filter: drop-shadow(0 0 14px var(--core-g1)) drop-shadow(0 0 28px var(--core-g2)); }
      50%       { filter: drop-shadow(0 0 24px var(--core-g1)) drop-shadow(0 0 48px var(--core-g2)); }
    }

    /* Sync form */
    .sync-form {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      max-width: 420px;
      width: 100%;
    }

    .oracle-eyebrow {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: var(--status-clr);
      text-transform: uppercase;
      margin-bottom: 14px;
      transition: color 4s ease;
    }

    .oracle-title {
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--acc-from) 0%, var(--acc-mid) 45%, var(--acc-to) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 30px var(--acc-from));
      margin-bottom: 10px;
      line-height: 1.05;
      transition: filter 4s ease;
    }

    .oracle-sub {
      font-size: 0.86rem;
      color: var(--sub-clr);
      line-height: 1.6;
      margin-bottom: 30px;
      letter-spacing: 0.03em;
      transition: color 4s ease;
    }

    .oracle-field { margin-bottom: 13px; text-align: left; }
    .oracle-field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--status-clr);
      margin-bottom: 7px;
      transition: color 4s ease;
    }
    .oracle-field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-bdr);
      border-radius: 12px;
      color: var(--text-clr);
      font-size: 0.94rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 4s ease, color 4s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .oracle-field input:focus {
      border-color: var(--input-foc);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.14);
    }
    .oracle-field input::placeholder { color: var(--status-clr); opacity: 0.45; }
    .oracle-field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.55) sepia(1) saturate(3) hue-rotate(180deg);
      opacity: 0.45;
      cursor: pointer;
    }

    .oracle-sync-btn {
      margin-top: 6px;
      width: 100%;
      padding: 15px 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
      color: #ffffff;
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 24px var(--btn-shadow);
      font-family: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease, background 4s ease;
    }
    .oracle-sync-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px var(--btn-shadow);
    }
    .oracle-sync-btn:active { transform: translateY(0); }
    .oracle-sync-btn.syncing {
      opacity: 0.65;
      cursor: default;
      pointer-events: none;
      animation: syncGlow 0.9s ease-in-out infinite;
    }
    @keyframes syncGlow {
      0%, 100% { box-shadow: 0 4px 24px var(--btn-shadow); }
      50%       { box-shadow: 0 4px 52px var(--btn-shadow); }
    }

    .oracle-error {
      font-size: 0.8rem;
      color: rgba(248, 113, 113, 0.78);
      margin-bottom: 10px;
      font-style: italic;
      text-align: center;
    }

    /* ════════════════════════════════════════
       CHAT SCREEN
    ════════════════════════════════════════ */
    #chatScreen { justify-content: flex-start; }

    .oracle-chat-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--msg-bdr);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
      transition: background 4s ease, border-color 4s ease;
    }

    /* Mini void — bioluminescent rings in header, same palette */
    .void-mini {
      position: relative;
      width: 42px; height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .void-ring-mini {
      position: absolute;
      border-radius: 50%;
      transition: border-color 4s ease;
    }
    .rm1 {
      width: 26px; height: 26px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .rm2 {
      width: 42px; height: 42px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.5s;
    }
    .void-core-mini {
      position: relative; z-index: 2;
      animation: coreBreath 3s ease-in-out infinite;
    }

    .oracle-header-meta { flex: 1; min-width: 0; }
    .oracle-chat-title {
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--acc-from), var(--acc-to));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .oracle-sync-status {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--status-clr);
      margin-top: 2px;
      transition: color 4s ease;
    }

    .oracle-back {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--status-clr);
      opacity: 0.75;
      text-decoration: none;
      padding: 7px 13px;
      border: 1px solid var(--msg-bdr);
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }
    .oracle-back:hover { opacity: 1; border-color: var(--input-foc); }

    /* Messages */
    .oracle-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      max-width: 820px;
      align-self: center;
    }
    .oracle-messages::-webkit-scrollbar { width: 3px; }
    .oracle-messages::-webkit-scrollbar-track { background: transparent; }
    .oracle-messages::-webkit-scrollbar-thumb { background: var(--input-bdr); border-radius: 2px; }

    .oracle-msg {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 74%;
    }
    .oracle-msg.from-oracle { align-self: flex-start; }
    .oracle-msg.from-user  { align-self: flex-end; align-items: flex-end; }

    .msg-sender {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color 4s ease;
    }
    .from-oracle .msg-sender { color: var(--sender-clr); }
    .from-user  .msg-sender  { color: var(--sender-clr); opacity: 0.65; }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
      transition: background 4s ease, border-color 4s ease, color 4s ease;
    }
    .from-oracle .msg-bubble {
      background: var(--msg-bg);
      border: 1px solid var(--msg-bdr);
      color: var(--text-clr);
      font-style: italic;
      border-bottom-left-radius: 4px;
    }
    .from-user .msg-bubble {
      background: var(--msg-bg);
      border: 1px solid var(--msg-bdr);
      color: var(--text-clr);
      font-style: normal;
      opacity: 0.88;
      border-bottom-right-radius: 4px;
    }

    /* Thinking dots */
    .oracle-thinking {
      display: inline-flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--msg-bg);
      border: 1px solid var(--msg-bdr);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .oracle-thinking span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sender-clr);
      animation: thinkDot 1.2s ease-in-out infinite;
    }
    .oracle-thinking span:nth-child(2) { animation-delay: 0.2s; }
    .oracle-thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkDot {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
      40%            { transform: scale(1);    opacity: 1;    }
    }

    /* Input bar */
    .oracle-input-bar {
      width: 100%;
      max-width: 820px;
      align-self: center;
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: var(--header-bg);
      border-top: 1px solid var(--msg-bdr);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
      transition: background 4s ease, border-color 4s ease;
    }
    .oracle-chat-input {
      flex: 1;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-bdr);
      border-radius: 12px;
      color: var(--text-clr);
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 4s ease;
    }
    .oracle-chat-input:focus {
      border-color: var(--input-foc);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.12);
    }
    .oracle-chat-input::placeholder { color: var(--sender-clr); opacity: 0.4; }
    .oracle-chat-input:disabled { opacity: 0.55; }

    .oracle-send-btn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
      color: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px var(--btn-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease, background 4s ease;
    }
    .oracle-send-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 24px var(--btn-shadow); }
    .oracle-send-btn:active { transform: translateY(0); }
    .oracle-send-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    /* ════════════════════════════════════════
       JUNGLE SCENE
    ════════════════════════════════════════ */
    .jungle-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .jl-layer { position: absolute; bottom: 0; left: 0; right: 0; }
    .jl-far   { opacity: 0.28; z-index: 1; }
    .jl-mid   { opacity: 0.58; z-index: 2; }
    .jl-near  { opacity: 0.90; z-index: 5; }

    .jl-far  .jungle-tree { color: var(--j-far); }
    .jl-mid  .jungle-tree { color: var(--j-mid); }
    .jl-near .jungle-tree { color: var(--j-near); }

    .jungle-tree { position: absolute; bottom: 0; transform-origin: bottom center; }
    .jungle-tree svg { display: block; fill: currentColor; transition: fill 4s ease; }

    /* Stream */
    .jungle-stream {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 65px; z-index: 3; overflow: hidden;
    }
    .stream-surface {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 0%, var(--stream-clr) 45%, var(--stream-deep) 100%);
      transition: background 4s ease;
    }
    .stream-shimmer {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg, transparent 0px, transparent 36px,
        var(--stream-shim) 36px, var(--stream-shim) 37px
      );
      animation: streamFlow 3s linear infinite;
    }
    .stream-wave {
      position: absolute; bottom: 0; left: -100%; width: 200%; height: 38px;
      background: var(--stream-clr);
      border-radius: 50% 50% 0 0 / 22px 22px 0 0;
      animation: streamWave 5.5s ease-in-out infinite;
      opacity: 0.44; transition: background 4s ease;
    }
    .stream-wave.sw2 { animation-delay: -2.75s; opacity: 0.26; }
    @keyframes streamFlow {
      from { transform: translateX(0); } to { transform: translateX(37px); }
    }
    @keyframes streamWave {
      0%, 100% { transform: translateX(-4%) scaleY(1);   }
      50%       { transform: translateX(4%)  scaleY(1.4); }
    }

    /* ════════════════════════════════════════
       ORNATE MIRROR
    ════════════════════════════════════════ */
    .mirror-container {
      position: relative;
      width: 260px; height: 360px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-bottom: -100px;
      z-index: 2;
    }
    .mirror-frame-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      color: var(--mirror-f-clr); z-index: 3;
      filter: drop-shadow(0 0 10px var(--mirror-glow));
      transition: color 4s ease, filter 4s ease;
    }
    .mirror-face {
      position: absolute; width: 170px; height: 240px;
      border-radius: 50%; overflow: hidden; z-index: 2;
      box-shadow: 0 0 24px var(--mirror-glow), 0 0 52px var(--mirror-glow), inset 0 0 50px rgba(0,0,0,0.88);
      transition: box-shadow 4s ease;
    }
    .cosmic-abyss { position: absolute; inset: 0; border-radius: inherit; overflow: hidden; }
    .nebula-base {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 55%, var(--neb-base-1) 0%, var(--neb-base-2) 42%, rgba(0,0,8,1) 100%);
      transition: background 4s ease;
    }
    .nebula-bloom-1 {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 68% 48% at 38% 46%, var(--nebula-1) 0%, transparent 68%);
      animation: nebulaDrift 8s ease-in-out infinite alternate;
      transition: background 4s ease;
    }
    .nebula-bloom-2 {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 58% 42% at 64% 58%, var(--nebula-2) 0%, transparent 62%);
      animation: nebulaDrift 11s ease-in-out infinite alternate-reverse;
      transition: background 4s ease;
    }
    @keyframes nebulaDrift {
      0%   { opacity: 0.55; transform: scale(1)    translate(0,   0);   }
      50%  { opacity: 0.82; transform: scale(1.09) translate(-4%, 3%);  }
      100% { opacity: 0.58; transform: scale(0.94) translate(5%, -4%);  }
    }
    .star-particles {
      position: absolute; width: 1px; height: 1px; top: 50%; left: 50%; background: transparent;
      box-shadow:
        -62px -98px 0 0.5px rgba(255,255,255,0.85), -42px -110px 0 1px rgba(220,240,255,0.72),
        -18px -118px 0 0.5px rgba(255,255,255,0.80),  12px -106px 0 1px rgba(200,220,255,0.68),
         36px -115px 0 0.5px rgba(255,255,255,0.75),  57px  -97px 0 1px rgba(220,240,255,0.70),
         70px  -70px 0 0.5px rgba(255,255,255,0.62),  78px  -40px 0 1px rgba(200,220,255,0.58),
         74px   -8px 0 0.5px rgba(255,255,255,0.66),  66px   24px 0 1px rgba(220,240,255,0.62),
         52px   54px 0 0.5px rgba(255,255,255,0.55),  30px   72px 0 1px rgba(200,220,255,0.52),
          5px   82px 0 0.5px rgba(255,255,255,0.60), -22px   78px 0 1px rgba(220,240,255,0.58),
        -48px   64px 0 0.5px rgba(255,255,255,0.65), -66px   40px 0 1px rgba(200,220,255,0.62),
        -74px   10px 0 0.5px rgba(255,255,255,0.72), -76px  -22px 0 1px rgba(220,240,255,0.66),
        -70px  -52px 0 0.5px rgba(255,255,255,0.76), -32px  -72px 0 1px rgba(200,220,255,0.58),
         20px  -65px 0 0.5px rgba(255,255,255,0.62),  50px  -32px 0 1px rgba(220,240,255,0.52),
         42px   30px 0 0.5px rgba(255,255,255,0.56), -14px   42px 0 1px rgba(200,220,255,0.52),
        -52px  -12px 0 0.5px rgba(255,255,255,0.62),  -4px  -42px 0 1px rgba(220,240,255,0.66),
         28px   12px 0 0.5px rgba(255,255,255,0.48), -36px   22px 0 1px rgba(200,220,255,0.48);
      animation: starTwinkle 5.5s ease-in-out infinite;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.88; } 50% { opacity: 0.42; }
    }
    .eye-pupil {
      position: absolute; top: 50%; left: 50%;
      width: 44px; height: 44px;
      transform: translate(-50%, -50%); border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,255,255,0.92) 0%, rgba(210,245,255,0.82) 14%,
        var(--core-g1) 35%, var(--core-g2) 62%, transparent 82%);
      animation: pupilPulse 3s ease-in-out infinite;
      transition: background 4s ease;
    }
    @keyframes pupilPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1);    opacity: 1;    }
      50%       { transform: translate(-50%,-50%) scale(1.18); opacity: 0.78; }
    }

    /* ════════════════════════════════════════
       HANGING VINES
    ════════════════════════════════════════ */
    .jungle-vines-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 8;
      pointer-events: none;
      color: var(--j-near);
      transition: color 4s ease;
    }
    .hanging-vine {
      position: absolute;
      top: 0;
      transform-origin: top center;
    }
    .hanging-vine svg {
      display: block;
      fill: currentColor;
      stroke: currentColor;
      transition: fill 4s ease, stroke 4s ease;
    }
    .vs-a { animation: vineSwayA var(--vs-dur, 6s) var(--vs-delay, 0s) ease-in-out infinite; }
    .vs-b { animation: vineSwayB var(--vs-dur, 6s) var(--vs-delay, 0s) ease-in-out infinite; }
    @keyframes vineSwayA {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(3deg);  }
    }
    @keyframes vineSwayB {
      0%, 100% { transform: rotate(3deg);  }
      50%       { transform: rotate(-4deg); }
    }

    /* ════════════════════════════════════════
       GROUND MIST
    ════════════════════════════════════════ */
    .jungle-mist-layer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 150px;
      z-index: 4;
      pointer-events: none;
    }
    .mist-cloud {
      position: absolute;
      border-radius: 50%;
      background: var(--mist-clr);
      filter: blur(22px);
      transition: background 4s ease;
    }
    .mc1 {
      bottom: 62px; left: -8%; width: 70%; height: 82px;
      animation: mistDrift 13s ease-in-out infinite alternate;
    }
    .mc2 {
      bottom: 70px; left: 18%; width: 65%; height: 68px;
      animation: mistDrift 17s -5s ease-in-out infinite alternate-reverse;
    }
    .mc3 {
      bottom: 58px; right: -8%; width: 60%; height: 78px;
      animation: mistDrift 15s -2s ease-in-out infinite alternate;
    }
    @keyframes mistDrift {
      0%   { transform: translateX(0);    opacity: 0.65; }
      50%  { transform: translateX(28px); opacity: 0.92; }
      100% { transform: translateX(-18px); opacity: 0.50; }
    }

    /* ════════════════════════════════════════
       BIOLUMINESCENT PLANTS
    ════════════════════════════════════════ */
    .bio-plants {
      position: absolute; inset: 0;
      z-index: 6; pointer-events: none;
    }
    .bio-plant {
      position: absolute;
      border-radius: 50%;
      animation: bioGlow var(--bg-dur, 3s) var(--bg-delay, 0s) ease-in-out infinite;
    }
    .bio-teal {
      width: 6px; height: 9px;
      background: var(--acc-from);
      box-shadow:
        0 0 8px 3px var(--acc-from),
        0 0 20px 8px var(--glow-a-soft),
        0 0 40px 16px var(--glow-a-soft);
      transition: background 4s ease, box-shadow 4s ease;
    }
    .bio-purple {
      width: 5px; height: 8px;
      background: var(--acc-to);
      box-shadow:
        0 0 7px 3px var(--acc-to),
        0 0 18px 7px var(--glow-b-soft),
        0 0 36px 14px var(--glow-b-soft);
      transition: background 4s ease, box-shadow 4s ease;
    }
    @keyframes bioGlow {
      0%, 100% { opacity: 0.72; transform: scale(1);    }
      50%       { opacity: 1;    transform: scale(1.24); }
    }

    /* ════════════════════════════════════════
       FIREFLIES
    ════════════════════════════════════════ */
    .firefly-container {
      position: absolute; inset: 0;
      z-index: 7; pointer-events: none;
    }
    .firefly {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--acc-from);
      box-shadow: 0 0 5px 2px var(--acc-from), 0 0 12px 5px var(--acc-mid);
      animation:
        ffRise var(--ff-dur, 9s) var(--ff-delay, 0s) ease-in infinite,
        ffGlow var(--ff-gd, 2.2s) var(--ff-delay, 0s) ease-in-out infinite;
      transition: background 4s ease, box-shadow 4s ease;
    }
    .firefly.ff-p {
      background: var(--acc-to);
      box-shadow: 0 0 5px 2px var(--acc-to), 0 0 12px 5px var(--acc-mid);
    }
    @keyframes ffRise {
      0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 0.72; }
      100% { transform: translate(var(--ff-dx, 18px), -260px) scale(1); opacity: 0; }
    }
    @keyframes ffGlow {
      0%, 100% { filter: brightness(1);   }
      50%       { filter: brightness(2.4); }
    }

    @media (max-width: 600px) {
      .mirror-container { width: 200px; height: 280px; margin-bottom: -80px; }
      .mirror-face { width: 130px; height: 184px; }
      .oracle-msg { max-width: 88%; }
      .oracle-messages, .oracle-input-bar { padding-left: 16px; padding-right: 16px; }
    }
  </style>

    function getPaletteName(hour) {
      if (hour >= 5  && hour < 9)  return 'dawn';
      if (hour >= 9  && hour < 17) return 'day';
      if (hour >= 17 && hour < 21) return 'sunset';
      return 'night';
    }

    function applyPalette() {
      var name    = getPaletteName(new Date().getHours());
      var palette = PALETTES[name];
      var root    = document.documentElement;
      Object.keys(palette).forEach(function (k) {
        root.style.setProperty(k, palette[k]);
      });
    }

    /* Apply immediately on load, refresh every 5 minutes */
    applyPalette();
    setInterval(applyPalette, 5 * 60 * 1000);

    /* ── Restore previous sync ── */
    (function () {
      var n = localStorage.getItem("bf_oracle_name");
      var d = localStorage.getItem("bf_oracle_date");
      if (n && d) { birthName = n; birthDate = d; openChat(true); }
    })();

    /* ── Sync flow ── */
    var syncBtn   = document.getElementById("syncBtn");
    var syncError = document.getElementById("syncError");

    syncBtn.addEventListener("click", function () {
      var n = document.getElementById("birthNameInput").value.trim();
      var d = document.getElementById("birthDateInput").value.trim();
      syncError.style.display = "none";
      if (!n) { showSyncError("Your birth name is required."); return; }
      if (!d) { showSyncError("Your birth date is required."); return; }
      birthName = n; birthDate = d;
      localStorage.setItem("bf_oracle_name", n);
      localStorage.setItem("bf_oracle_date", d);
      syncBtn.textContent = "SYNCHRONIZING…";
      syncBtn.classList.add("syncing");
      setTimeout(function () { openChat(false); }, 1500);
    });

    function showSyncError(msg) {
      syncError.textContent = msg;
      syncError.style.display = "block";
    }

    function openChat(instant) {
      document.getElementById("syncedName").textContent = birthName.toUpperCase();
      document.getElementById("greetingMsg").textContent =
        "I see you clearly now, " + birthName + ". The channel is open. What do you seek?";
      if (instant) {
        document.getElementById("syncScreen").classList.add("hidden");
        document.getElementById("chatScreen").classList.remove("hidden");
      } else {
        var sync = document.getElementById("syncScreen");
        sync.style.opacity = "0";
        sync.style.pointerEvents = "none";
        setTimeout(function () {
          sync.classList.add("hidden");
          document.getElementById("chatScreen").classList.remove("hidden");
        }, 800);
      }
      setTimeout(function () { document.getElementById("chatInput").focus(); }, 900);
    }

    /* ── Chat flow ── */
    var sendBtn     = document.getElementById("sendBtn");
    var chatInput   = document.getElementById("chatInput");
    var messageArea = document.getElementById("messageArea");
    var thinkingEl  = null;

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendMessage() {
      var text = chatInput.value.trim();
      if (!text || sendBtn.disabled) return;
      chatInput.value = "";
      appendMsg("user", text);
      chatHistory.push({ role: "user", content: text });
      setLoading(true);

      fetch(API_URL + "/api/oracle/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          birthName: birthName,
          birthDate: birthDate,
          message:   text,
          history:   chatHistory.slice(-14)
        })
      })
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) {
        setLoading(false);
        var reply = (data && data.response) ? data.response : "The channel fell silent. Ask again.";
        chatHistory.push({ role: "assistant", content: reply });
        appendMsg("oracle", reply);
      })
      .catch(function () {
        setLoading(false);
        appendMsg("oracle", "The abyss is unreachable at this moment. Try again.");
      });
    }

    function setLoading(on) {
      sendBtn.disabled   = on;
      chatInput.disabled = on;
      if (on) {
        thinkingEl = document.createElement("div");
        thinkingEl.className = "oracle-msg from-oracle";
        thinkingEl.innerHTML =
          '<span class="msg-sender">Oracle</span>' +
          '<div class="oracle-thinking"><span></span><span></span><span></span></div>';
        messageArea.appendChild(thinkingEl);
        messageArea.scrollTop = messageArea.scrollHeight;
      } else if (thinkingEl) {
        thinkingEl.remove();
        thinkingEl = null;
      }
    }

    function appendMsg(who, text) {
      var wrap   = document.createElement("div");
      wrap.className = "oracle-msg " + (who === "oracle" ? "from-oracle" : "from-user");
      var sender = document.createElement("span");
      sender.className = "msg-sender";
      sender.textContent = who === "oracle" ? "Oracle" : "You";
      var bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = text;
      wrap.appendChild(sender);
      wrap.appendChild(bubble);
      messageArea.appendChild(wrap);
      messageArea.scrollTop = messageArea.scrollHeight;
    }
  </script>
