<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — The Oracle</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS Custom Properties (night defaults, overridden by JS) ── */
    :root {
      --bg-hex:       #050308;
      --bg-g1:        rgba(70, 25, 100, 0.20);
      --bg-g2:        rgba(40, 14, 60, 0.26);
      --star-op:      1;
      --ring-clr:     rgba(150,80,220,0.50);
      --ring-glow:    rgba(0, 160, 140, 0.30);
      --core-g1:      rgba(0, 210, 190, 0.88);
      --core-g2:      rgba(0, 140, 120, 0.48);
      --ray-angle:    210deg;
      --ray-op:       0.028;
      --ray-clr:      rgba(120, 70, 170, 0.10);
      --bio-op:       0.90;
      --acc-from:     #00d4b8;
      --acc-mid:      #00a090;
      --acc-to:       #006858;
      --btn-from:     #006858;
      --btn-to:       #003830;
      --btn-shadow:   rgba(0, 104, 88, 0.48);
      --status-clr:   rgba(0, 212, 190, 0.55);
      --sub-clr:      rgba(0, 212, 190, 0.45);
      --input-bg:     rgba(2, 8, 14, 0.78);
      --input-bdr:    rgba(0, 180, 160, 0.30);
      --input-foc:    rgba(0, 180, 160, 0.58);
      --msg-bg:       rgba(0, 30, 26, 0.25);
      --msg-bdr:      rgba(0, 180, 160, 0.22);
      --header-bg:    rgba(2, 6, 10, 0.88);
      --text-clr:     #e9d8ff;
      --sender-clr:   rgba(200,160,255,0.60);
      /* Scene & mirror — overridden by JS palette */
      --j-far:        rgba(0, 15, 12, 0.85);
      --j-mid:        rgba(0, 8, 6, 0.92);
      --j-near:       rgba(0, 3, 2, 1);
      --stream-clr:   rgba(150,90,210,0.38);
      --stream-deep:  rgba(90,55,140,0.62);
      --stream-shim:  rgba(230,190,110,0.20);
      --mirror-f-clr: #c8a84b;
      --mirror-glow:  rgba(180,120,255,0.55);
      --nebula-1:     rgba(120,50,160,0.50);
      --nebula-2:     rgba(180,60,140,0.42);
      --mist-clr:     rgba(90,50,130,0.40);
      --glow-a-soft:  rgba(190,130,255,0.32);
      --glow-b-soft:  rgba(230,190,110,0.30);
      --neb-base-1:   rgba(60,30,80,1);
      --neb-base-2:   rgba(30,16,45,1);
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: var(--bg-hex);
      color: var(--text-clr);
      overflow: hidden;
      transition: background 4s ease, color 4s ease;
    }

    /* Abyss depth gradient — color shifts with palette */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 50%, var(--bg-g1), transparent 65%),
        radial-gradient(ellipse 45% 45% at 50% 50%, var(--bg-g2), transparent),
        var(--bg-hex);
      transition: background 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* Star field — opacity driven by time (full at night, near-zero at midday) */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: var(--star-op);
      background:
        radial-gradient(1.5px 1.5px at  7%  11%, rgba(255,255,255,0.40), transparent),
        radial-gradient(1px   1px   at 18%  72%, rgba(255,255,255,0.28), transparent),
        radial-gradient(1.5px 1.5px at 28%  44%, rgba(200,220,255,0.32), transparent),
        radial-gradient(1px   1px   at 41%  85%, rgba(255,255,255,0.22), transparent),
        radial-gradient(2px   2px   at 52%  19%, rgba(220,200,255,0.35), transparent),
        radial-gradient(1px   1px   at 63%  56%, rgba(255,255,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 72%  33%, rgba(200,220,255,0.30), transparent),
        radial-gradient(1px   1px   at 81%  78%, rgba(255,255,255,0.20), transparent),
        radial-gradient(1.5px 1.5px at 89%  14%, rgba(220,200,255,0.32), transparent),
        radial-gradient(1px   1px   at 94%  62%, rgba(255,255,255,0.26), transparent),
        radial-gradient(1px   1px   at 11%  92%, rgba(200,220,255,0.22), transparent),
        radial-gradient(2px   2px   at 35%  28%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px   1px   at 58%  95%, rgba(220,200,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 76%  50%, rgba(255,255,255,0.20), transparent),
        radial-gradient(1px   1px   at 96%  38%, rgba(200,220,255,0.28), transparent);
      transition: opacity 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* Light rays — angle and color temperature shift with time of day */
    .light-rays {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        var(--ray-angle),
        transparent 0px,
        transparent 80px,
        var(--ray-clr) 80px,
        var(--ray-clr) 81px,
        transparent 81px,
        transparent 160px
      );
      opacity: var(--ray-op);
      transition: opacity 4s ease, background 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Screens ── */
    .oracle-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: opacity 0.8s ease;
    }
    .oracle-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ════════════════════════════════════════
       SYNC SCREEN
    ════════════════════════════════════════ */
    .void-container {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: -150px;
    }

    /* Bioluminescent rings — color, glow, and opacity all time-responsive */
    .void-ring {
      position: absolute;
      border-radius: 50%;
      transform-origin: center;
      transition: border-color 4s ease, box-shadow 4s ease, opacity 4s ease;
    }
    .r1 {
      width: 88px; height: 88px;
      border: 1px solid var(--ring-clr);
      box-shadow: 0 0 18px var(--ring-glow) inset, 0 0 18px var(--ring-glow);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .r2 {
      width: 168px; height: 168px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.45s;
    }
    .r3 {
      width: 268px; height: 268px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.9s;
    }
    .r4 {
      width: 390px; height: 390px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 1.35s;
    }

    @keyframes ringPulse {
      0%, 100% {
        transform: scale(1);
        opacity: var(--bio-op);
        box-shadow: 0 0 6px var(--ring-clr);
      }
      50% {
        transform: scale(1.07);
        opacity: calc(var(--bio-op) * 0.38);
        box-shadow: 0 0 18px var(--mirror-glow), 0 0 36px var(--ring-clr);
      }
    }

    /* Void core — glow color follows palette */
    .void-core {
      position: relative;
      z-index: 2;
      width: 52px; height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: coreBreath 3s ease-in-out infinite;
      transition: opacity 4s ease;
    }
    @keyframes coreBreath {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px var(--core-g1))
                drop-shadow(0 0 22px var(--core-g2))
                drop-shadow(0 0 4px var(--mirror-glow));
      }
      50% {
        transform: scale(1.08);
        filter: drop-shadow(0 0 22px var(--core-g1))
                drop-shadow(0 0 48px var(--mirror-glow))
                drop-shadow(0 0 18px var(--core-g2))
                drop-shadow(0 0 8px var(--mirror-f-clr));
      }
    }

    /* Sync form */
    .sync-form {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 28px 28px 24px;
      max-width: 420px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--neb-base-2);
      border: 1px solid var(--ring-clr);
      border-radius: 18px;
      box-shadow: 0 0 32px var(--mirror-glow), 0 8px 40px rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .oracle-eyebrow {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: var(--status-clr);
      text-transform: uppercase;
      margin-bottom: 14px;
      transition: color 4s ease;
    }

    .oracle-title {
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--acc-from) 0%, var(--acc-mid) 45%, var(--acc-to) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 30px var(--acc-from));
      margin-bottom: 10px;
      line-height: 1.05;
      transition: filter 4s ease;
    }

    .oracle-sub {
      font-size: 0.86rem;
      color: var(--sub-clr);
      line-height: 1.6;
      margin-bottom: 30px;
      letter-spacing: 0.03em;
      transition: color 4s ease;
    }

    .oracle-field { margin-bottom: 13px; text-align: left; }
    .oracle-field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--status-clr);
      margin-bottom: 7px;
      transition: color 4s ease;
    }
    .oracle-field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-bdr);
      border-radius: 12px;
      color: var(--text-clr);
      font-size: 0.94rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 4s ease, color 4s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .oracle-field input:focus {
      border-color: var(--input-foc);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.14);
    }
    .oracle-field input::placeholder { color: var(--status-clr); opacity: 0.45; }
    .oracle-field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.55) sepia(1) saturate(3) hue-rotate(180deg);
      opacity: 0.45;
      cursor: pointer;
    }

    .oracle-sync-btn {
      margin-top: 6px;
      width: 100%;
      padding: 15px 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--mirror-glow), var(--mirror-f-clr));
      color: #1a0e2e;
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(200,168,75,0.35), 0 0 12px var(--mirror-glow);
      font-family: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }
    .oracle-sync-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(200,168,75,0.60), 0 0 28px var(--mirror-f-clr), 0 0 14px var(--mirror-glow);
    }
    .oracle-sync-btn:active { transform: translateY(0); }
    .oracle-sync-btn.syncing {
      opacity: 0.65;
      cursor: default;
      pointer-events: none;
      animation: syncGlow 0.9s ease-in-out infinite;
    }
    @keyframes syncGlow {
      0%, 100% { box-shadow: 0 4px 24px var(--btn-shadow); }
      50%       { box-shadow: 0 4px 52px var(--btn-shadow); }
    }

    .oracle-error {
      font-size: 0.8rem;
      color: rgba(248, 113, 113, 0.78);
      margin-bottom: 10px;
      font-style: italic;
      text-align: center;
    }

    /* ════════════════════════════════════════
       CHAT SCREEN
    ════════════════════════════════════════ */
    #chatScreen { justify-content: flex-start; }

    .oracle-chat-header {
      width: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
      padding: 22px 24px 18px;
      background: transparent;
      flex-shrink: 0;
    }
    .oracle-chat-header .oracle-back {
      position: absolute;
      top: 14px;
      left: 20px;
    }
    .oracle-brand-pill {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      background: rgba(0, 229, 255, 0.08);
      color: #22d3ee;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Mini void — bioluminescent rings in header, same palette */
    .void-mini {
      position: relative;
      width: 42px; height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .void-ring-mini {
      position: absolute;
      border-radius: 50%;
      transition: border-color 4s ease;
    }
    .rm1 {
      width: 26px; height: 26px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .rm2 {
      width: 42px; height: 42px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.5s;
    }
    .void-core-mini {
      position: relative; z-index: 2;
      animation: coreBreath 3s ease-in-out infinite;
    }

    .oracle-header-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }
    .oracle-chat-title {
      margin: 2px 0;
      font-size: clamp(1.3rem, 3.4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00e5ff 0%, #7b2ff7 50%, #a855f7 78%, #ff5ec2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.35)) drop-shadow(0 0 16px rgba(168, 85, 247, 0.22));
    }
    .oracle-sync-status {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8c874;
      text-shadow: 0 0 8px rgba(232, 200, 116, 0.45);
      margin-top: 2px;
      transition: color 4s ease;
    }

    .oracle-back {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--status-clr);
      opacity: 0.75;
      text-decoration: none;
      padding: 7px 13px;
      border: 1px solid var(--msg-bdr);
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }
    .oracle-back:hover { opacity: 1; border-color: var(--input-foc); }

    /* Messages */
    .oracle-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      max-width: 820px;
      align-self: center;
    }
    .oracle-messages::-webkit-scrollbar { width: 3px; }
    .oracle-messages::-webkit-scrollbar-track { background: transparent; }
    .oracle-messages::-webkit-scrollbar-thumb { background: var(--input-bdr); border-radius: 2px; }

    .oracle-msg {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 74%;
    }
    .oracle-msg.from-oracle { align-self: flex-start; }
    .oracle-msg.from-user  { align-self: flex-end; align-items: flex-end; }

    .msg-sender {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color 4s ease;
    }
    .from-oracle .msg-sender { color: var(--sender-clr); }
    .from-user  .msg-sender  { color: var(--sender-clr); opacity: 0.65; }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
      transition: background 4s ease, border-color 4s ease, color 4s ease;
    }
    .from-oracle .msg-bubble {
      background: var(--neb-base-2);
      border: 1px solid var(--ring-clr);
      color: var(--text-clr);
      font-style: italic;
      border-bottom-left-radius: 4px;
      box-shadow: 0 0 16px var(--mirror-glow), 0 2px 12px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .from-user .msg-bubble {
      background: var(--neb-base-1);
      border: 1px solid rgba(200,168,75,0.28);
      color: var(--text-clr);
      font-style: normal;
      border-bottom-right-radius: 4px;
      box-shadow: 0 0 8px rgba(200,168,75,0.18), 0 2px 10px rgba(0,0,0,0.40);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Thinking dots */
    .oracle-thinking {
      display: inline-flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--msg-bg);
      border: 1px solid var(--msg-bdr);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .oracle-thinking span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sender-clr);
      animation: thinkDot 1.2s ease-in-out infinite;
    }
    .oracle-thinking span:nth-child(2) { animation-delay: 0.2s; }
    .oracle-thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkDot {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
      40%            { transform: scale(1);    opacity: 1;    }
    }

    /* Input bar */
    .oracle-input-bar {
      width: 100%;
      max-width: 820px;
      align-self: center;
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: var(--neb-base-2);
      border-top: 1px solid var(--ring-clr);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
      transition: background 4s ease, border-color 4s ease;
    }
    .oracle-chat-input {
      flex: 1;
      padding: 13px 16px;
      background: var(--neb-base-1);
      border: 1px solid var(--ring-clr);
      border-radius: 12px;
      color: var(--text-clr);
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .oracle-chat-input:focus {
      border-color: var(--mirror-glow);
      box-shadow: 0 0 0 2px rgba(180,120,255,0.18), 0 0 12px var(--mirror-glow);
    }
    .oracle-chat-input::placeholder { color: var(--sender-clr); opacity: 0.38; }
    .oracle-chat-input:disabled { opacity: 0.55; }

    .oracle-send-btn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--mirror-glow), var(--mirror-f-clr));
      color: #1a0e2e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(200,168,75,0.30), 0 0 8px var(--mirror-glow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .oracle-send-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(200,168,75,0.55), 0 0 18px var(--mirror-f-clr); }
    .oracle-send-btn:active { transform: translateY(0); }
    .oracle-send-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    /* ════════════════════════════════════════
       SCENE — Forest Portal
    ════════════════════════════════════════ */
    .scene {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }

    /* ── Layered starfield — far/mid/near parallax depth ── */
    .star-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-repeat: repeat;
      will-change: transform;
      transition: transform 2.5s ease-in-out;
    }
    .star-far {
      background-image:
        radial-gradient(0.6px 0.6px at 12% 18%, rgba(200,200,230,0.20), transparent 100%),
        radial-gradient(0.5px 0.5px at 55% 42%, rgba(190,180,225,0.16), transparent 100%),
        radial-gradient(0.6px 0.6px at 82% 78%, rgba(210,205,235,0.22), transparent 100%),
        radial-gradient(0.5px 0.5px at 32% 88%, rgba(195,185,225,0.18), transparent 100%);
      background-size: 220px 260px, 220px 260px, 220px 260px, 220px 260px;
      animation: star-drift-far 140s linear infinite;
    }
    .star-mid {
      background-image:
        radial-gradient(1px 1px at 20% 25%, rgba(225,220,245,0.30), transparent 100%),
        radial-gradient(0.9px 0.9px at 68% 55%, rgba(200,190,235,0.26), transparent 100%),
        radial-gradient(1px 1px at 42% 85%, rgba(220,210,245,0.32), transparent 100%);
      background-size: 320px 380px, 320px 380px, 320px 380px;
      animation: star-drift-mid 70s linear infinite;
    }
    .star-near {
      background-image:
        radial-gradient(1.6px 1.6px at 30% 30%, rgba(255,255,255,0.55), rgba(220,210,255,0.20) 55%, transparent 100%),
        radial-gradient(1.4px 1.4px at 75% 68%, rgba(240,230,255,0.50), rgba(200,180,255,0.18) 55%, transparent 100%);
      background-size: 460px 520px, 460px 520px;
      animation: star-drift-near 30s linear infinite;
    }
    @keyframes star-drift-far {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: 0px -260px, 0px -260px, 0px -260px, 0px -260px; }
    }
    @keyframes star-drift-mid {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: 0px -380px, 0px -380px, 0px -380px; }
    }
    @keyframes star-drift-near {
      0%   { background-position: 0px 0px,    0px 0px;    }
      100% { background-position: 0px -520px, 0px -520px; }
    }

    /* ── Per-star twinkle — a few points quietly catch light and fade,
       layered on top of the drifting parallax, each at its own slow rate ── */
    .star-twinkle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle, rgba(230,230,255,0.9) 0%, rgba(200,190,240,0.4) 45%, transparent 100%);
    }
    .tw1 { top:14%; left:22%; width:1.6px; height:1.6px; animation: twinkle-slow   7.5s  ease-in-out infinite 0s;    }
    .tw2 { top:62%; left:8%;  width:1.2px; height:1.2px; animation: twinkle-slow   9.2s  ease-in-out infinite 1.4s;  }
    .tw3 { top:28%; left:76%; width:1.8px; height:1.8px; animation: twinkle-bright 11s   ease-in-out infinite 2.6s;  }
    .tw4 { top:80%; left:64%; width:1.2px; height:1.2px; animation: twinkle-slow   6.4s  ease-in-out infinite 0.8s;  }
    .tw5 { top:45%; left:48%; width:1.4px; height:1.4px; animation: twinkle-bright 13.5s ease-in-out infinite 4.2s;  }
    .tw6 { top:10%; left:58%; width:1.1px; height:1.1px; animation: twinkle-slow   8.6s  ease-in-out infinite 3.1s;  }
    @keyframes twinkle-slow {
      0%, 100% { opacity: 0.12; transform: scale(1);   }
      50%       { opacity: 0.35; transform: scale(1.1); }
    }
    @keyframes twinkle-bright {
      0%, 100% { opacity: 0.15; transform: scale(1);   }
      45%       { opacity: 0.85; transform: scale(1.3); }
      60%       { opacity: 0.5;  transform: scale(1.1); }
    }

    /* ── Alternate starfield drift directions — defined only, not yet wired up.
       Each direction keeps the same far/mid/near tile sizes and relative speed
       ratio (far slowest, near fastest) as the existing drift so the parallax
       depth reads the same no matter which direction is applied later. ── */

    /* Downward — slow rain-like fall */
    @keyframes star-drift-down-far {
      0%   { background-position: 0px 0px,   0px 0px,   0px 0px,   0px 0px;   }
      100% { background-position: 0px 260px, 0px 260px, 0px 260px, 0px 260px; }
    }
    @keyframes star-drift-down-mid {
      0%   { background-position: 0px 0px,   0px 0px,   0px 0px;   }
      100% { background-position: 0px 380px, 0px 380px, 0px 380px; }
    }
    @keyframes star-drift-down-near {
      0%   { background-position: 0px 0px,   0px 0px;   }
      100% { background-position: 0px 520px, 0px 520px; }
    }

    /* Upward — slow ascent */
    @keyframes star-drift-up-far {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: 0px -260px, 0px -260px, 0px -260px, 0px -260px; }
    }
    @keyframes star-drift-up-mid {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: 0px -380px, 0px -380px, 0px -380px; }
    }
    @keyframes star-drift-up-near {
      0%   { background-position: 0px 0px,    0px 0px;    }
      100% { background-position: 0px -520px, 0px -520px; }
    }

    /* Leftward — slow swoosh */
    @keyframes star-drift-left-far {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: -220px 0px, -220px 0px, -220px 0px, -220px 0px; }
    }
    @keyframes star-drift-left-mid {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: -320px 0px, -320px 0px, -320px 0px; }
    }
    @keyframes star-drift-left-near {
      0%   { background-position: 0px 0px,    0px 0px;    }
      100% { background-position: -460px 0px, -460px 0px; }
    }

    /* Rightward — slow swoosh */
    @keyframes star-drift-right-far {
      0%   { background-position: 0px 0px,   0px 0px,   0px 0px,   0px 0px;   }
      100% { background-position: 220px 0px, 220px 0px, 220px 0px, 220px 0px; }
    }
    @keyframes star-drift-right-mid {
      0%   { background-position: 0px 0px,   0px 0px,   0px 0px;   }
      100% { background-position: 320px 0px, 320px 0px, 320px 0px; }
    }
    @keyframes star-drift-right-near {
      0%   { background-position: 0px 0px,   0px 0px;   }
      100% { background-position: 460px 0px, 460px 0px; }
    }

    /* Diagonal 1 — down-right */
    @keyframes star-drift-diag1-far {
      0%   { background-position: 0px 0px,   0px 0px,   0px 0px,   0px 0px;   }
      100% { background-position: 220px 260px, 220px 260px, 220px 260px, 220px 260px; }
    }
    @keyframes star-drift-diag1-mid {
      0%   { background-position: 0px 0px,   0px 0px,   0px 0px;   }
      100% { background-position: 320px 380px, 320px 380px, 320px 380px; }
    }
    @keyframes star-drift-diag1-near {
      0%   { background-position: 0px 0px,   0px 0px;   }
      100% { background-position: 460px 520px, 460px 520px; }
    }

    /* Diagonal 2 — down-left */
    @keyframes star-drift-diag2-far {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: -220px 260px, -220px 260px, -220px 260px, -220px 260px; }
    }
    @keyframes star-drift-diag2-mid {
      0%   { background-position: 0px 0px,    0px 0px,    0px 0px;    }
      100% { background-position: -320px 380px, -320px 380px, -320px 380px; }
    }
    @keyframes star-drift-diag2-near {
      0%   { background-position: 0px 0px,    0px 0px;    }
      100% { background-position: -460px 520px, -460px 520px; }
    }

    /* ── Shooting star — occasional thin streak crossing the void ── */
    .shoot-star {
      position: absolute;
      top: 0; left: 0;
      width: 90px;
      height: 1px;
      border-radius: 1px;
      pointer-events: none;
      opacity: 0;
      z-index: 0;
      transform-origin: right center;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(200,210,255,0.05) 18%,
        rgba(220,228,255,0.55) 52%,
        rgba(210,220,255,0.10) 82%,
        transparent 100%
      );
    }
    @keyframes shoot-fly {
      0%   { opacity: 0;    transform: translateX(0);                       }
      8%   { opacity: 0.65;                                                 }
      75%  { opacity: 0.45;                                                 }
      100% { opacity: 0;    transform: translateX(var(--shoot-dist,260px)); }
    }

    /* ── Forest Trees ── */
    .forest-tree { position: absolute; bottom: 0; pointer-events: none; fill: #071a12; }
    .tree-left  { left: -30px;  height: 88vh; width: auto; z-index: 3; }
    .tree-right { right: -30px; height: 88vh; width: auto; z-index: 3; transform: scaleX(-1); }

    /* ── Branch Vines ── */
    .branch-vines { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
    .bvine { position: absolute; }

    /* ── Ground Mist ── */
    .mist-field {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 220px; z-index: 5; pointer-events: none;
    }
    .mist { position: absolute; border-radius: 50%; background: rgba(55,25,90,0.10); filter: blur(40px); }
    .m1 { bottom:0;    left:-10%; width:88%; height:138px; opacity:0.95; animation:mDrift 16s          ease-in-out infinite alternate; }
    .m2 { bottom:14px; left:8%;   width:92%; height:108px; opacity:0.80; animation:mDrift 22s -6s     ease-in-out infinite alternate-reverse; }
    .m3 { bottom:6px;  right:-8%; width:80%; height:122px; opacity:0.90; animation:mDrift 19s -3s     ease-in-out infinite alternate; }
    .m4 { bottom:24px; left:2%;   width:74%; height:88px;  opacity:0.65; animation:mDrift 25s -9s     ease-in-out infinite alternate-reverse; }
    .m5 { bottom:0;    left:20%;  width:58%; height:98px;  opacity:0.75; animation:mDrift 14s -4s     ease-in-out infinite alternate; }
    .m6 { bottom:10px; left:-5%;  width:112%;height:78px;  opacity:0.55; animation:mDrift 28s -12s    ease-in-out infinite alternate; }
    @keyframes mDrift {
      0%   { transform: translateX(0);    }
      100% { transform: translateX(44px); }
    }

    /* ════════════════════════════════════════
       ORNATE MIRROR — Cosmic Portal
    ════════════════════════════════════════ */
    .mirror-container {
      position: relative;
      width: 260px; height: 360px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-bottom: -100px; z-index: 2;
    }
    .mirror-halo {
      position: absolute; width: 210px; height: 295px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,200,176,0.80) 0%, transparent 70%);
      filter: blur(54px);
      animation: haloBreath 4s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes haloBreath {
      0%, 100% { opacity: 0.28; transform: scale(1);    }
      50%       { opacity: 0.52; transform: scale(1.14); }
    }
    .mirror-frame-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      color: #c8a84b; z-index: 3;
      filter: drop-shadow(0 0 12px rgba(200,168,75,0.50)) drop-shadow(0 0 30px rgba(200,168,75,0.28));
    }
    .mirror-face {
      position: absolute; width: 170px; height: 240px;
      border-radius: 50%; overflow: hidden; z-index: 2;
      box-shadow:
        0 0 35px 18px rgba(0,200,176,0.52),
        0 0 80px 40px rgba(0,200,176,0.38),
        0 0 150px 75px rgba(0,200,176,0.20),
        0 0 260px 130px rgba(0,200,176,0.08),
        inset 0 0 55px rgba(0,0,0,0.78);
    }
    .cosmic-abyss { position: absolute; inset: 0; border-radius: inherit; overflow: hidden; }
    .nebula-base {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 52%,
        #b0fff5 0%, rgba(176,255,245,0.92) 5%,
        #00d4b0 16%, rgba(0,164,136,0.80) 30%,
        #004d3a 55%, rgba(1,12,8,0.96) 76%, #010f0a 100%);
    }
    .nebula-bloom-1 {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 68% 48% at 38% 46%, rgba(0,90,75,0.55) 0%, transparent 68%);
      animation: nebulaDrift 8s ease-in-out infinite alternate;
    }
    .nebula-bloom-2 {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 58% 42% at 64% 58%, rgba(0,120,100,0.45) 0%, transparent 62%);
      animation: nebulaDrift 11s ease-in-out infinite alternate-reverse;
    }
    @keyframes nebulaDrift {
      0%   { opacity: 0.55; transform: scale(1)    translate(0,   0);   }
      50%  { opacity: 0.82; transform: scale(1.09) translate(-4%, 3%);  }
      100% { opacity: 0.58; transform: scale(0.94) translate(5%, -4%);  }
    }
    .star-particles {
      position: absolute; width: 1px; height: 1px; top: 50%; left: 50%; background: transparent;
      box-shadow:
        -62px -98px 0 0.5px rgba(255,255,255,0.85), -42px -110px 0 1px rgba(180,255,245,0.72),
        -18px -118px 0 0.5px rgba(255,255,255,0.80),  12px -106px 0 1px rgba(160,255,240,0.68),
         36px -115px 0 0.5px rgba(255,255,255,0.75),  57px  -97px 0 1px rgba(180,255,245,0.70),
         70px  -70px 0 0.5px rgba(255,255,255,0.62),  78px  -40px 0 1px rgba(160,255,240,0.58),
         74px   -8px 0 0.5px rgba(255,255,255,0.66),  66px   24px 0 1px rgba(180,255,245,0.62),
         52px   54px 0 0.5px rgba(255,255,255,0.55),  30px   72px 0 1px rgba(160,255,240,0.52),
          5px   82px 0 0.5px rgba(255,255,255,0.60), -22px   78px 0 1px rgba(180,255,245,0.58),
        -48px   64px 0 0.5px rgba(255,255,255,0.65), -66px   40px 0 1px rgba(160,255,240,0.62),
        -74px   10px 0 0.5px rgba(255,255,255,0.72), -76px  -22px 0 1px rgba(180,255,245,0.66),
        -70px  -52px 0 0.5px rgba(255,255,255,0.76), -32px  -72px 0 1px rgba(160,255,240,0.58),
         20px  -65px 0 0.5px rgba(255,255,255,0.62),  50px  -32px 0 1px rgba(180,255,245,0.52),
         42px   30px 0 0.5px rgba(255,255,255,0.56), -14px   42px 0 1px rgba(160,255,240,0.52),
        -52px  -12px 0 0.5px rgba(255,255,255,0.62),  -4px  -42px 0 1px rgba(180,255,245,0.66),
         28px   12px 0 0.5px rgba(255,255,255,0.48), -36px   22px 0 1px rgba(160,255,240,0.48);
      animation: starTwinkle 5.5s ease-in-out infinite;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.88; } 50% { opacity: 0.42; }
    }
    .eye-pupil {
      position: absolute; top: 50%; left: 50%;
      width: 62px; height: 62px;
      transform: translate(-50%, -50%); border-radius: 50%;
      background: radial-gradient(circle,
        #ffffff 0%, rgba(220,255,250,0.96) 8%,
        #b0fff5 18%, #00d4b0 38%,
        rgba(0,80,65,0.75) 65%, transparent 85%);
      box-shadow: 0 0 22px 10px rgba(176,255,245,0.45), 0 0 44px 22px rgba(0,212,176,0.35);
      animation: pupilPulse 3s ease-in-out infinite;
    }
    @keyframes pupilPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1);    opacity: 1;    }
      50%       { transform: translate(-50%,-50%) scale(1.22); opacity: 0.80; }
    }

    /* ── Corner star — a lone breathing concentration of living gold light,
       no defined edge, its own presence ── */
    .corner-star {
      position: fixed;
      right: 20px;
      bottom: 100px;
      width: 14px;
      height: 14px;
      z-index: 5;
      pointer-events: auto;
      cursor: grab;
      border-radius: 46% 54% 51% 49% / 52% 48% 53% 47%;
      background: radial-gradient(circle,
        rgba(255,250,235,0.95) 0%,
        rgba(255,224,150,0.62) 22%,
        rgba(230,170,60,0.34) 42%,
        rgba(180,120,30,0.16) 62%,
        rgba(140,90,20,0.05) 80%,
        transparent 100%
      );
      filter: blur(1.5px);
      box-shadow:
        0 0 10px 4px rgba(255,236,190,0.40),
        0 0 22px 9px rgba(255,200,110,0.28),
        0 0 40px 16px rgba(225,160,60,0.18),
        0 0 62px 24px rgba(180,120,30,0.10),
        0 0 90px 34px rgba(150,95,20,0.05);
      animation: corner-star-breathe 6s ease-in-out infinite;
    }
    /* Fine gold spark-points — two out-of-phase animations (flicker +
       jitter) layered on the same points so the scintillation catches
       and releases irregularly instead of reading as a steady loop */
    .corner-star::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      pointer-events: none;
      mix-blend-mode: screen;
      background:
        radial-gradient(1.4px 1.4px at 30% 20%, rgba(255,246,220,0.90), transparent 70%),
        radial-gradient(1px   1px   at 70% 32%, rgba(255,205,120,0.82), transparent 70%),
        radial-gradient(1.2px 1.2px at 20% 66%, rgba(255,228,165,0.85), transparent 70%),
        radial-gradient(1px   1px   at 76% 78%, rgba(225,165,70,0.75),  transparent 70%),
        radial-gradient(0.8px 0.8px at 50% 48%, rgba(255,250,235,0.90), transparent 70%),
        radial-gradient(1px   1px   at 46% 84%, rgba(235,180,90,0.70),  transparent 70%);
      filter: blur(0.4px);
      animation: corner-spark-flicker 4.3s ease-in-out infinite,
                 corner-spark-dart 6.7s ease-in-out infinite 1.1s;
    }
    @keyframes corner-spark-flicker {
      0%   { opacity: 0.35; }
      6%   { opacity: 0.9;  }
      9%   { opacity: 0.4;  }
      23%  { opacity: 0.95; }
      27%  { opacity: 0.3;  }
      44%  { opacity: 0.8;  }
      52%  { opacity: 0.35; }
      68%  { opacity: 1;    }
      74%  { opacity: 0.4;  }
      89%  { opacity: 0.75; }
      100% { opacity: 0.5;  }
    }
    @keyframes corner-spark-dart {
      0%   { transform: scale(1)    translate(0, 0);         }
      15%  { transform: scale(1.16) translate(1px, -1px);    }
      30%  { transform: scale(0.9)  translate(-1px, 1px);    }
      48%  { transform: scale(1.2)  translate(0.5px, 0.5px); }
      63%  { transform: scale(0.94) translate(-0.5px, -1px); }
      80%  { transform: scale(1.1)  translate(1px, 0);       }
      100% { transform: scale(1)    translate(0, 0);         }
    }
    @keyframes corner-star-breathe {
      0%, 100% {
        opacity: 0.65;
        transform: scale(0.9);
        border-radius: 46% 54% 51% 49% / 52% 48% 53% 47%;
      }
      50% {
        opacity: 1;
        transform: scale(1.15);
        border-radius: 52% 48% 47% 53% / 47% 53% 49% 51%;
      }
    }
    /* Star collapses away as the profile panel opens */
    @keyframes corner-star-collapse {
      0%   { opacity: 0.65; transform: scale(0.9);  }
      100% { opacity: 0.05; transform: scale(0.15); }
    }
    /* Star fades back in, briefly overshoots, then recedes into the
       distance before settling back into its normal breathing frame */
    @keyframes corner-star-settle {
      0%   { opacity: 0.05; transform: scale(0.15); }
      55%  { opacity: 0.9;  transform: scale(1.25); }
      75%  { opacity: 0.55; transform: scale(0.8);  }
      100% { opacity: 0.65; transform: scale(0.9);  }
    }

    /* ── Your Oracle Profile — floating panel ── */
    .oracle-profile-panel {
      position: fixed;
      right: 20px;
      bottom: 130px;
      width: 300px;
      max-height: 70vh;
      overflow-y: auto;
      z-index: 6;
      background: rgba(10,15,35,0.78);
      border: 1px solid rgba(0,255,255,0.12);
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 28px;
      opacity: 0;
      transform: scale(0.85) translateY(10px);
      transform-origin: bottom right;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
    }
    .oracle-profile-panel.is-open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .oracle-profile-title {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      background: linear-gradient(90deg, #00ffff, #8a5cff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 4px;
    }
    .oracle-profile-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(232,200,116,0.6);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s ease;
    }
    .oracle-profile-close:hover { color: rgba(232,200,116,0.95); }
    .oracle-profile-field { margin-bottom: 13px; text-align: left; }
    .oracle-profile-field label {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #e8c874;
      margin-bottom: 6px;
    }
    .oracle-profile-field input,
    .oracle-profile-field textarea {
      width: 100%;
      padding: 11px 14px;
      background: rgba(10,4,20,0.7);
      border: 1px solid rgba(200,168,75,0.30);
      border-radius: 10px;
      color: #e9d8ff;
      font-family: inherit;
      font-size: 0.85rem;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .oracle-profile-field input:focus,
    .oracle-profile-field textarea:focus {
      border-color: rgba(200,168,75,0.65);
    }
    .oracle-profile-field textarea {
      resize: vertical;
      min-height: 90px;
    }
    .oracle-profile-save {
      display: block;
      width: 100%;
      margin-top: 4px;
      padding: 11px 16px;
      border: 1px solid rgba(200,168,75,0.55);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(200,168,75,0.28), rgba(120,60,200,0.20));
      color: #f4e4b8;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .oracle-profile-save:hover {
      border-color: rgba(200,168,75,0.85);
      background: linear-gradient(135deg, rgba(200,168,75,0.4), rgba(120,60,200,0.28));
    }
    .oracle-profile-save-status {

        '--core-g1':    'rgba(0,200,182,0.92)',
        '--core-g2':    'rgba(0,138,122,0.52)',
        '--ray-angle':  '288deg',
        '--ray-op':     '0.068',
        '--ray-clr':    'rgba(120,70,170,0.10)',
        '--bio-op':     '0.85',
        '--acc-from':   '#00c8b4',
        '--acc-mid':    '#009c8c',
        '--acc-to':     '#006458',
        '--btn-from':   '#006050',
        '--btn-to':     '#003428',
        '--btn-shadow': 'rgba(0,96,82,0.50)',
        '--status-clr': 'rgba(0,200,180,0.62)',
        '--sub-clr':    'rgba(0,200,180,0.46)',
        '--input-bg':   'rgba(2,7,12,0.78)',
        '--input-bdr':  'rgba(0,168,150,0.30)',
        '--input-foc':  'rgba(0,168,150,0.58)',
        '--msg-bg':     'rgba(0,26,22,0.28)',
        '--msg-bdr':    'rgba(0,168,150,0.22)',
        '--header-bg':  'rgba(2,5,8,0.88)',
        '--text-clr':   '#a0e8d8',
        '--sender-clr':   'rgba(0,200,180,0.64)',
        '--j-far':        'rgba(0,14,11,0.85)',
        '--j-mid':        'rgba(0,8,6,0.92)',
        '--j-near':       'rgba(0,3,2,1)',
        '--stream-clr':   'rgba(0,88,78,0.32)',
        '--stream-deep':  'rgba(0,52,46,0.56)',
        '--stream-shim':  'rgba(0,200,180,0.22)',
        '--mirror-f-clr': '#c8a84b',
        '--mirror-glow':  'rgba(0,188,168,0.44)',
        '--nebula-1':     'rgba(0,70,58,0.48)',
        '--nebula-2':     'rgba(0,95,78,0.42)',
        '--mist-clr':     'rgba(0,70,62,0.30)',
        '--glow-a-soft':  'rgba(0,200,180,0.30)',
        '--glow-b-soft':  'rgba(0,145,130,0.28)',
        '--neb-base-1':   'rgba(0,44,34,1)',
        '--neb-base-2':   'rgba(0,17,13,1)'
      }
    };

    function getPaletteName(hour) {
      if (hour >= 5  && hour < 9)  return 'dawn';
      if (hour >= 9  && hour < 17) return 'day';
      if (hour >= 17 && hour < 21) return 'sunset';
      return 'night';
    }

    function applyPalette() {
      var name    = getPaletteName(new Date().getHours());
      var palette = PALETTES[name];
      var root    = document.documentElement;
      Object.keys(palette).forEach(function (k) {
        root.style.setProperty(k, palette[k]);
      });
    }

    /* Apply immediately on load, refresh every 5 minutes */
    applyPalette();
    setInterval(applyPalette, 5 * 60 * 1000);

    /* ── Restore previous sync ── */
    (function () {
      var n = localStorage.getItem("bf_oracle_name");
      var d = localStorage.getItem("bf_oracle_date");
      if (n && d) { birthName = n; birthDate = d; openChat(true); }
    })();

    /* ── Sync flow ── */
    var syncBtn   = document.getElementById("syncBtn");
    var syncError = document.getElementById("syncError");

    syncBtn.addEventListener("click", function () {
      var n = document.getElementById("birthNameInput").value.trim();
      var d = document.getElementById("birthDateInput").value.trim();
      syncError.style.display = "none";
      if (!n) { showSyncError("Your birth name is required."); return; }
      if (!d) { showSyncError("Your birth date is required."); return; }

      var birthNameInput       = document.getElementById("birthNameInput").value.trim();
      var birthDateInput       = document.getElementById("birthDateInput").value.trim();
      var birthTimeInput       = document.getElementById("birthTimeInput").value.trim();
      var birthPlaceInput      = document.getElementById("birthPlaceInput").value.trim();
      var currentLocationInput = document.getElementById("currentLocationInput").value.trim();
      var pathFocusInput       = document.getElementById("pathFocusInput").value.trim();
      var lifeDetailsInput     = document.getElementById("lifeDetailsInput").value.trim();

      var syncPayload = {
        birth_name:       birthNameInput,
        birth_date:       birthDateInput,
        birth_time:       birthTimeInput,
        birth_place:      birthPlaceInput,
        current_location: currentLocationInput,
        path_focus:       pathFocusInput,
        life_details:     lifeDetailsInput
      };

      try {
        fetch(API_URL + "/api/oracle/sync", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(syncPayload)
        }).catch(function (err) {
          console.error("Oracle sync failed:", err);
        });
      } catch (err) {
        console.error("Oracle sync failed:", err);
      }

      birthName = n; birthDate = d;
      localStorage.setItem("bf_oracle_name", n);
      localStorage.setItem("bf_oracle_date", d);
      syncBtn.textContent = "SYNCHRONIZING…";
      syncBtn.classList.add("syncing");
      setTimeout(function () { openChat(false); }, 1500);
    });

    function showSyncError(msg) {
      syncError.textContent = msg;
      syncError.style.display = "block";
    }

    function openChat(instant) {
      document.getElementById("syncedName").textContent = birthName.toUpperCase();
      document.getElementById("greetingMsg").textContent =
        "I see you clearly now, " + birthName + ". The channel is open. What do you seek?";
      if (instant) {
        document.getElementById("syncScreen").classList.add("hidden");
        document.getElementById("chatScreen").classList.remove("hidden");
      } else {
        var sync = document.getElementById("syncScreen");
        sync.style.opacity = "0";
        sync.style.pointerEvents = "none";
        setTimeout(function () {
          sync.classList.add("hidden");
          document.getElementById("chatScreen").classList.remove("hidden");
        }, 800);
      }
      setTimeout(function () { document.getElementById("chatInput").focus(); }, 900);
    }

    /* ── Chat flow ── */
    var sendBtn     = document.getElementById("sendBtn");
    var chatInput   = document.getElementById("chatInput");
    var messageArea = document.getElementById("messageArea");
    var thinkingEl  = null;

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendMessage() {
      var text = chatInput.value.trim();
      if (!text || sendBtn.disabled) return;
      chatInput.value = "";
      appendMsg("user", text);
      chatHistory.push({ role: "user", content: text });
      setLoading(true);

      fetch(API_URL + "/api/oracle", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          message: text
        })
      })
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) {
        setLoading(false);
        var reply = (data && data.reply) ? data.reply : "The channel fell silent. Ask again.";
        chatHistory.push({ role: "assistant", content: reply });
        appendMsg("oracle", reply);
      })
      .catch(function () {
        setLoading(false);
        appendMsg("oracle", "The abyss is unreachable at this moment. Try again.");
      });
    }

    function setLoading(on) {
      sendBtn.disabled   = on;
      chatInput.disabled = on;
      if (on) {
        thinkingEl = document.createElement("div");
        thinkingEl.className = "oracle-msg from-oracle";
        thinkingEl.innerHTML =
          '<span class="msg-sender">Oracle</span>' +
          '<div class="oracle-thinking"><span></span><span></span><span></span></div>';
        messageArea.appendChild(thinkingEl);
        messageArea.scrollTop = messageArea.scrollHeight;
      } else if (thinkingEl) {
        thinkingEl.remove();
        thinkingEl = null;
      }
    }

    function appendMsg(who, text) {
      var wrap   = document.createElement("div");
      wrap.className = "oracle-msg " + (who === "oracle" ? "from-oracle" : "from-user");
      var sender = document.createElement("span");
      sender.className = "msg-sender";
      sender.textContent = who === "oracle" ? "Oracle" : "You";
      var bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = text;
      wrap.appendChild(sender);
      wrap.appendChild(bubble);
      messageArea.appendChild(wrap);
      messageArea.scrollTop = messageArea.scrollHeight;
    }
  </script>

  <!-- Independent shooting-star driver — scene background only -->
  <script>
  (function () {
    var star = document.getElementById("sceneShootStar");
    if (!star) return;

    function fireSceneShoot() {
      var W = window.innerWidth;
      var H = window.innerHeight;
      var edge = Math.floor(Math.random() * 4);
      var top, left, angle;

      if (edge === 0) {        /* top edge — travel downward, 55–125° */
        top   = -20;
        left  = -40 + Math.random() * (W + 80);
        angle = 55 + Math.random() * 70;
      } else if (edge === 1) { /* right edge — travel leftward, 145–215° */
        top   = -40 + Math.random() * (H + 80);
        left  = W + 20;
        angle = 145 + Math.random() * 70;
      } else if (edge === 2) { /* bottom edge — travel upward, 235–305° */
        top   = H + 20;
        left  = -40 + Math.random() * (W + 80);
        angle = 235 + Math.random() * 70;
      } else {                 /* left edge — travel rightward, -35 to 35° */
        top   = -40 + Math.random() * (H + 80);
        left  = -20;
        angle = -35 + Math.random() * 70;
      }

      var t    = Math.random();
      var dur  = (1.2 + t * 1.6).toFixed(2);
      var len  = Math.round(60 + t * 70);
      var dist = Math.round(220 + t * 280);

      star.style.animation = "none";
      star.offsetHeight; /* force reflow to restart */
      star.style.top    = top   + "px";
      star.style.left   = left  + "px";
      star.style.rotate = angle + "deg";
      star.style.width  = len   + "px";
      star.style.setProperty("--shoot-dist", dist + "px");
      star.style.animation = "shoot-fly " + dur + "s ease-out forwards";

      setTimeout(fireSceneShoot, 6000 + Math.random() * 10000);
    }

    setTimeout(fireSceneShoot, 3000 + Math.random() * 4000);
  }());
  </script>

  <!-- Independent starfield direction driver — scene background only -->
  <script>
  (function () {
    var far  = document.querySelector(".star-far");
    var mid  = document.querySelector(".star-mid");
    var near = document.querySelector(".star-near");
    if (!far || !mid || !near) return;

    var DIRECTIONS = ["down", "up", "left", "right", "diag1", "diag2"];
    var calmDir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];

    /* Direction unit vectors — same down/up/left/right/diag1(down-right)/
       diag2(down-left) senses as the star-drift-* keyframes. */
    var DIR_VECTORS = {
      down:  { x: 0,       y: 1       },
      up:    { x: 0,       y: -1      },
      left:  { x: -1,      y: 0       },
      right: { x: 1,       y: 0       },
      diag1: { x: 0.7071,  y: 0.7071  },
      diag2: { x: -0.7071, y: 0.7071  }
    };

    /* Base per-layer offset in px at intensity 1 (calm) — far moves least,
       near moves most, matching the far/mid/near parallax depth. The
       perpetual star-drift-* keyframe scroll keeps running underneath;
       this only nudges each layer's transform, which the transition on
       .star-layer eases smoothly instead of snapping. */
    var BASE_OFFSET = { far: 3, mid: 6, near: 10 };

    function applyDrift(dir, intensity) {
      var v = DIR_VECTORS[dir];
      if (!v) return;
      far.style.transform  = "translate(" + (v.x * BASE_OFFSET.far  * intensity).toFixed(2) + "px, " + (v.y * BASE_OFFSET.far  * intensity).toFixed(2) + "px)";
      mid.style.transform  = "translate(" + (v.x * BASE_OFFSET.mid  * intensity).toFixed(2) + "px, " + (v.y * BASE_OFFSET.mid  * intensity).toFixed(2) + "px)";
      near.style.transform = "translate(" + (v.x * BASE_OFFSET.near * intensity).toFixed(2) + "px, " + (v.y * BASE_OFFSET.near * intensity).toFixed(2) + "px)";
    }

    function scheduleNextShift() {
      var delay = 20000 + Math.random() * 20000; /* 20-40s calm stretches */
      setTimeout(function () {
        calmDir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
        applyDrift(calmDir, 1);
        scheduleNextShift();
      }, delay);
    }

    function scheduleNextBurst() {
      var delay = 30000 + Math.random() * 60000; /* 30-90s between bursts */
      setTimeout(function () {
        var burstDir      = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
        var burstFactor   = 8 + Math.random() * 10;        /* sudden 8x-18x sprint */
        var burstDuration = 2000 + Math.random() * 2000;   /* 2-4s */

        applyDrift(burstDir, burstFactor);

        setTimeout(function () {
          applyDrift(calmDir, 1); /* ease back into the current calm drift */
        }, burstDuration);

        scheduleNextBurst();
      }, delay);
    }

    applyDrift(calmDir, 1);
    scheduleNextShift();
    scheduleNextBurst();
  }());
  </script>

  <!-- Independent corner-star drag driver — position only, no tap behavior yet -->
  <script>
  (function () {
    var star = document.getElementById("oracleCornerStar");
    if (!star) return;

    var POS_KEY        = "oracle_corner_star_pos";
    var DRAG_THRESHOLD  = 6;
    var pressX = 0, pressY = 0;
    var startLeft = 0, startTop = 0;
    var dragging  = false;
    var dragMoved = false;

    function clampPosition(left, top) {
      var maxLeft = Math.max(window.innerWidth  - star.offsetWidth,  0);
      var maxTop  = Math.max(window.innerHeight - star.offsetHeight, 0);
      return {
        left: Math.min(Math.max(left, 0), maxLeft),
        top:  Math.min(Math.max(top,  0), maxTop)
      };
    }

    function restorePosition() {
      var raw;
      try { raw = localStorage.getItem(POS_KEY); } catch (e) { return; }
      if (!raw) return;
      var pos;
      try { pos = JSON.parse(raw); } catch (e) { return; }
      if (typeof pos.left !== "number" || typeof pos.top !== "number") return;
      var c = clampPosition(pos.left, pos.top);
      star.style.left   = c.left + "px";
      star.style.top    = c.top  + "px";
      star.style.right  = "auto";
      star.style.bottom = "auto";
    }

    star.addEventListener("pointerdown", function (e) {
      pressX     = e.clientX;
      pressY     = e.clientY;
      dragMoved  = false;
      dragging   = true;
      var rect   = star.getBoundingClientRect();
      startLeft  = rect.left;
      startTop   = rect.top;
      if (star.setPointerCapture) {
        try { star.setPointerCapture(e.pointerId); } catch (err) {}
      }
    });

    star.addEventListener("pointermove", function (e) {
      if (!dragging) return;
      var dx = e.clientX - pressX;
      var dy = e.clientY - pressY;
      if (!dragMoved && Math.sqrt(dx * dx + dy * dy) < DRAG_THRESHOLD) return;
      dragMoved = true;
      var c = clampPosition(startLeft + dx, startTop + dy);
      star.style.left   = c.left + "px";
      star.style.top    = c.top  + "px";
      star.style.right  = "auto";
      star.style.bottom = "auto";
    });

    function endDrag() {
      if (!dragging) return;
      dragging = false;
      if (dragMoved) {
        var rect = star.getBoundingClientRect();
        try {
          localStorage.setItem(POS_KEY, JSON.stringify({ left: rect.left, top: rect.top }));
        } catch (err) {}
      }
    }

    star.addEventListener("pointerup", endDrag);
    star.addEventListener("pointercancel", endDrag);

    restorePosition();

    /* ── Tap to open/close the profile panel; drags never open it ── */
    var panel    = document.getElementById("oracleProfilePanel");
    var closeBtn = document.getElementById("oracleProfileClose");
    var isOpen   = false;

    function collapseStar() {
      star.style.animation = "corner-star-collapse 0.45s ease forwards";
    }

    function settleStar() {
      star.style.animation = "corner-star-settle 0.6s ease forwards";
      setTimeout(function () {
        star.style.animation = ""; /* hand control back to the base breathing animation */
      }, 620);
    }

    function prefillProfile() {
      if (typeof API_URL === "undefined" || typeof token === "undefined") return;
      fetch(API_URL + "/api/oracle/sync", {
        headers: { "Authorization": "Bearer " + token }
      })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (result) {
          if (!result || !result.synced || !result.data) return;
          var d        = result.data;
          var nameEl   = document.getElementById("birthNameInput");
          var dateEl   = document.getElementById("birthDateInput");
          var timeEl   = document.getElementById("birthTimeInput");
          var placeEl  = document.getElementById("birthPlaceInput");
          var locEl    = document.getElementById("currentLocationInput");
          var pathEl   = document.getElementById("pathFocusInput");
          var lifeEl   = document.getElementById("lifeDetailsInput");
          if (nameEl  && d.birth_name)       nameEl.value  = d.birth_name;
          if (dateEl  && d.birth_date)       dateEl.value  = d.birth_date;
          if (timeEl  && d.birth_time)       timeEl.value  = d.birth_time;
          if (placeEl && d.birth_place)      placeEl.value = d.birth_place;
          if (locEl   && d.current_location) locEl.value   = d.current_location;
          if (pathEl  && d.path_focus)       pathEl.value  = d.path_focus;
          if (lifeEl  && d.life_details)     lifeEl.value  = d.life_details;
        })
        .catch(function () {});
    }

    function fetchNumerology() {
      var section = document.getElementById("oracleProfileNumerology");
      if (!section) return;
      section.style.display = "none";

      if (typeof API_URL === "undefined" || typeof token === "undefined") return;

      fetch(API_URL + "/api/oracle/numerology", {
        headers: { "Authorization": "Bearer " + token }
      })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data ||
              (data.life_path   == null &&
               data.expression  == null &&
               data.soul_urge   == null &&
               data.birthday    == null)) {
            return; /* leave hidden — soft-fail on empty result */
          }
          var lp = document.getElementById("numLifePath");
          var ex = document.getElementById("numExpression");
          var su = document.getElementById("numSoulUrge");
          var bd = document.getElementById("numBirthday");
          if (lp) lp.textContent = data.life_path  != null ? data.life_path  : "—";
          if (ex) ex.textContent = data.expression != null ? data.expression : "—";
          if (su) su.textContent = data.soul_urge  != null ? data.soul_urge  : "—";
          if (bd) bd.textContent = data.birthday   != null ? data.birthday   : "—";
          section.style.display = "block";
        })
        .catch(function () {}); /* leave hidden — soft-fail on error */
    }

    /* Save control — reuses the exact same read-fields → build-payload →
       POST logic as the SYNCHRONIZE button, just without the birth
       name/date requirement or the sync-screen → chat transition. */
    var saveBtn      = document.getElementById("oracleProfileSave");
    var saveStatusEl = document.getElementById("oracleProfileSaveStatus");

    function saveProfile() {
      if (typeof API_URL === "undefined" || typeof token === "undefined") return;

      var birthNameInput       = document.getElementById("birthNameInput").value.trim();
      var birthDateInput       = document.getElementById("birthDateInput").value.trim();
      var birthTimeInput       = document.getElementById("birthTimeInput").value.trim();
      var birthPlaceInput      = document.getElementById("birthPlaceInput").value.trim();
      var currentLocationInput = document.getElementById("currentLocationInput").value.trim();
      var pathFocusInput       = document.getElementById("pathFocusInput").value.trim();
      var lifeDetailsInput     = document.getElementById("lifeDetailsInput").value.trim();

      var syncPayload = {
        birth_name:       birthNameInput,
        birth_date:       birthDateInput,
        birth_time:       birthTimeInput,
        birth_place:      birthPlaceInput,
        current_location: currentLocationInput,
        path_focus:       pathFocusInput,
        life_details:     lifeDetailsInput
      };

      try {
        fetch(API_URL + "/api/oracle/sync", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(syncPayload)
        }).catch(function (err) {
          console.error("Oracle profile save failed:", err);
        });
      } catch (err) {
        console.error("Oracle profile save failed:", err);
      }

      if (saveStatusEl) {
        saveStatusEl.classList.add("is-visible");
        setTimeout(function () {
          saveStatusEl.classList.remove("is-visible");
          closeProfile();
        }, 1100);
      } else {
        closeProfile();
      }
    }

    if (saveBtn) {
      saveBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        saveProfile();
      });
    }

    function openProfile() {
      if (isOpen || !panel) return;
      isOpen = true;
      collapseStar();
      panel.classList.add("is-open");
      prefillProfile();
      fetchNumerology();
    }

    function closeProfile() {
      if (!isOpen || !panel) return;
      isOpen = false;
      panel.classList.remove("is-open");
      settleStar();
    }

    star.addEventListener("click", function () {
      if (dragMoved) return;
      if (isOpen) { closeProfile(); } else { openProfile(); }
    });

    if (closeBtn) {
      closeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        closeProfile();
      });
    }
  }());
  </script>
