<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — The Oracle</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS Custom Properties (night defaults, overridden by JS) ── */
    :root {
      --bg-hex:       #020d0a;
      --bg-g1:        rgba(0, 120, 108, 0.22);
      --bg-g2:        rgba(0, 75, 65, 0.28);
      --star-op:      1;
      --ring-clr:     rgba(150,80,220,0.50);
      --ring-glow:    rgba(0, 160, 140, 0.30);
      --core-g1:      rgba(0, 210, 190, 0.88);
      --core-g2:      rgba(0, 140, 120, 0.48);
      --ray-angle:    210deg;
      --ray-op:       0.028;
      --ray-clr:      rgba(0, 255, 200, 0.12);
      --bio-op:       0.90;
      --acc-from:     #00d4b8;
      --acc-mid:      #00a090;
      --acc-to:       #006858;
      --btn-from:     #006858;
      --btn-to:       #003830;
      --btn-shadow:   rgba(0, 104, 88, 0.48);
      --status-clr:   rgba(0, 212, 190, 0.55);
      --sub-clr:      rgba(0, 212, 190, 0.45);
      --input-bg:     rgba(2, 8, 14, 0.78);
      --input-bdr:    rgba(0, 180, 160, 0.30);
      --input-foc:    rgba(0, 180, 160, 0.58);
      --msg-bg:       rgba(0, 30, 26, 0.25);
      --msg-bdr:      rgba(0, 180, 160, 0.22);
      --header-bg:    rgba(2, 6, 10, 0.88);
      --text-clr:     #e9d8ff;
      --sender-clr:   rgba(200,160,255,0.60);
      /* Scene & mirror — overridden by JS palette */
      --j-far:        rgba(0, 15, 12, 0.85);
      --j-mid:        rgba(0, 8, 6, 0.92);
      --j-near:       rgba(0, 3, 2, 1);
      --stream-clr:   rgba(150,90,210,0.38);
      --stream-deep:  rgba(90,55,140,0.62);
      --stream-shim:  rgba(230,190,110,0.20);
      --mirror-f-clr: #c8a84b;
      --mirror-glow:  rgba(180,120,255,0.55);
      --nebula-1:     rgba(120,50,160,0.50);
      --nebula-2:     rgba(180,60,140,0.42);
      --mist-clr:     rgba(90,50,130,0.40);
      --glow-a-soft:  rgba(190,130,255,0.32);
      --glow-b-soft:  rgba(230,190,110,0.30);
      --neb-base-1:   rgba(60,30,80,1);
      --neb-base-2:   rgba(30,16,45,1);
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: var(--bg-hex);
      color: var(--text-clr);
      overflow: hidden;
      transition: background 4s ease, color 4s ease;
    }

    /* Abyss depth gradient — color shifts with palette */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 50%, var(--bg-g1), transparent 65%),
        radial-gradient(ellipse 45% 45% at 50% 50%, var(--bg-g2), transparent),
        var(--bg-hex);
      transition: background 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* Star field — opacity driven by time (full at night, near-zero at midday) */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: var(--star-op);
      background:
        radial-gradient(1.5px 1.5px at  7%  11%, rgba(255,255,255,0.40), transparent),
        radial-gradient(1px   1px   at 18%  72%, rgba(255,255,255,0.28), transparent),
        radial-gradient(1.5px 1.5px at 28%  44%, rgba(200,220,255,0.32), transparent),
        radial-gradient(1px   1px   at 41%  85%, rgba(255,255,255,0.22), transparent),
        radial-gradient(2px   2px   at 52%  19%, rgba(220,200,255,0.35), transparent),
        radial-gradient(1px   1px   at 63%  56%, rgba(255,255,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 72%  33%, rgba(200,220,255,0.30), transparent),
        radial-gradient(1px   1px   at 81%  78%, rgba(255,255,255,0.20), transparent),
        radial-gradient(1.5px 1.5px at 89%  14%, rgba(220,200,255,0.32), transparent),
        radial-gradient(1px   1px   at 94%  62%, rgba(255,255,255,0.26), transparent),
        radial-gradient(1px   1px   at 11%  92%, rgba(200,220,255,0.22), transparent),
        radial-gradient(2px   2px   at 35%  28%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px   1px   at 58%  95%, rgba(220,200,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 76%  50%, rgba(255,255,255,0.20), transparent),
        radial-gradient(1px   1px   at 96%  38%, rgba(200,220,255,0.28), transparent);
      transition: opacity 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* Light rays — angle and color temperature shift with time of day */
    .light-rays {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        var(--ray-angle),
        transparent 0px,
        transparent 80px,
        var(--ray-clr) 80px,
        var(--ray-clr) 81px,
        transparent 81px,
        transparent 160px
      );
      opacity: var(--ray-op);
      transition: opacity 4s ease, background 4s ease;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Screens ── */
    .oracle-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: opacity 0.8s ease;
    }
    .oracle-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ════════════════════════════════════════
       SYNC SCREEN
    ════════════════════════════════════════ */
    .void-container {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: -150px;
    }

    /* Bioluminescent rings — color, glow, and opacity all time-responsive */
    .void-ring {
      position: absolute;
      border-radius: 50%;
      transform-origin: center;
      transition: border-color 4s ease, box-shadow 4s ease, opacity 4s ease;
    }
    .r1 {
      width: 88px; height: 88px;
      border: 1px solid var(--ring-clr);
      box-shadow: 0 0 18px var(--ring-glow) inset, 0 0 18px var(--ring-glow);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .r2 {
      width: 168px; height: 168px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.45s;
    }
    .r3 {
      width: 268px; height: 268px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.9s;
    }
    .r4 {
      width: 390px; height: 390px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 1.35s;
    }

    @keyframes ringPulse {
      0%, 100% {
        transform: scale(1);
        opacity: var(--bio-op);
        box-shadow: 0 0 6px var(--ring-clr);
      }
      50% {
        transform: scale(1.07);
        opacity: calc(var(--bio-op) * 0.38);
        box-shadow: 0 0 18px var(--mirror-glow), 0 0 36px var(--ring-clr);
      }
    }

    /* Void core — glow color follows palette */
    .void-core {
      position: relative;
      z-index: 2;
      width: 52px; height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: coreBreath 3s ease-in-out infinite;
      transition: opacity 4s ease;
    }
    @keyframes coreBreath {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px var(--core-g1))
                drop-shadow(0 0 22px var(--core-g2))
                drop-shadow(0 0 4px var(--mirror-glow));
      }
      50% {
        transform: scale(1.08);
        filter: drop-shadow(0 0 22px var(--core-g1))
                drop-shadow(0 0 48px var(--mirror-glow))
                drop-shadow(0 0 18px var(--core-g2))
                drop-shadow(0 0 8px var(--mirror-f-clr));
      }
    }

    /* Sync form */
    .sync-form {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 28px 28px 24px;
      max-width: 420px;
      width: 100%;
      background: var(--neb-base-2);
      border: 1px solid var(--ring-clr);
      border-radius: 18px;
      box-shadow: 0 0 32px var(--mirror-glow), 0 8px 40px rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .oracle-eyebrow {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      color: var(--status-clr);
      text-transform: uppercase;
      margin-bottom: 14px;
      transition: color 4s ease;
    }

    .oracle-title {
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--acc-from) 0%, var(--acc-mid) 45%, var(--acc-to) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 30px var(--acc-from));
      margin-bottom: 10px;
      line-height: 1.05;
      transition: filter 4s ease;
    }

    .oracle-sub {
      font-size: 0.86rem;
      color: var(--sub-clr);
      line-height: 1.6;
      margin-bottom: 30px;
      letter-spacing: 0.03em;
      transition: color 4s ease;
    }

    .oracle-field { margin-bottom: 13px; text-align: left; }
    .oracle-field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--status-clr);
      margin-bottom: 7px;
      transition: color 4s ease;
    }
    .oracle-field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-bdr);
      border-radius: 12px;
      color: var(--text-clr);
      font-size: 0.94rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 4s ease, color 4s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .oracle-field input:focus {
      border-color: var(--input-foc);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.14);
    }
    .oracle-field input::placeholder { color: var(--status-clr); opacity: 0.45; }
    .oracle-field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.55) sepia(1) saturate(3) hue-rotate(180deg);
      opacity: 0.45;
      cursor: pointer;
    }

    .oracle-sync-btn {
      margin-top: 6px;
      width: 100%;
      padding: 15px 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--mirror-glow), var(--mirror-f-clr));
      color: #1a0e2e;
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(200,168,75,0.35), 0 0 12px var(--mirror-glow);
      font-family: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }
    .oracle-sync-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(200,168,75,0.60), 0 0 28px var(--mirror-f-clr), 0 0 14px var(--mirror-glow);
    }
    .oracle-sync-btn:active { transform: translateY(0); }
    .oracle-sync-btn.syncing {
      opacity: 0.65;
      cursor: default;
      pointer-events: none;
      animation: syncGlow 0.9s ease-in-out infinite;
    }
    @keyframes syncGlow {
      0%, 100% { box-shadow: 0 4px 24px var(--btn-shadow); }
      50%       { box-shadow: 0 4px 52px var(--btn-shadow); }
    }

    .oracle-error {
      font-size: 0.8rem;
      color: rgba(248, 113, 113, 0.78);
      margin-bottom: 10px;
      font-style: italic;
      text-align: center;
    }

    /* ════════════════════════════════════════
       CHAT SCREEN
    ════════════════════════════════════════ */
    #chatScreen { justify-content: flex-start; }

    .oracle-chat-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background: var(--neb-base-2);
      border-bottom: 1px solid var(--ring-clr);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
      transition: background 4s ease, border-color 4s ease;
    }

    /* Mini void — bioluminescent rings in header, same palette */
    .void-mini {
      position: relative;
      width: 42px; height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .void-ring-mini {
      position: absolute;
      border-radius: 50%;
      transition: border-color 4s ease;
    }
    .rm1 {
      width: 26px; height: 26px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0s;
    }
    .rm2 {
      width: 42px; height: 42px;
      border: 1px solid var(--ring-clr);
      animation: ringPulse 3s ease-in-out infinite 0.5s;
    }
    .void-core-mini {
      position: relative; z-index: 2;
      animation: coreBreath 3s ease-in-out infinite;
    }

    .oracle-header-meta { flex: 1; min-width: 0; }
    .oracle-chat-title {
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-clr);
      filter: drop-shadow(0 0 6px var(--mirror-glow));
    }
    .oracle-sync-status {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mirror-f-clr);
      margin-top: 2px;
      transition: color 4s ease;
    }

    .oracle-back {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--status-clr);
      opacity: 0.75;
      text-decoration: none;
      padding: 7px 13px;
      border: 1px solid var(--msg-bdr);
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }
    .oracle-back:hover { opacity: 1; border-color: var(--input-foc); }

    /* Messages */
    .oracle-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      max-width: 820px;
      align-self: center;
    }
    .oracle-messages::-webkit-scrollbar { width: 3px; }
    .oracle-messages::-webkit-scrollbar-track { background: transparent; }
    .oracle-messages::-webkit-scrollbar-thumb { background: var(--input-bdr); border-radius: 2px; }

    .oracle-msg {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 74%;
    }
    .oracle-msg.from-oracle { align-self: flex-start; }
    .oracle-msg.from-user  { align-self: flex-end; align-items: flex-end; }

    .msg-sender {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color 4s ease;
    }
    .from-oracle .msg-sender { color: var(--sender-clr); }
    .from-user  .msg-sender  { color: var(--sender-clr); opacity: 0.65; }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
      transition: background 4s ease, border-color 4s ease, color 4s ease;
    }
    .from-oracle .msg-bubble {
      background: var(--neb-base-2);
      border: 1px solid var(--ring-clr);
      color: var(--text-clr);
      font-style: italic;
      border-bottom-left-radius: 4px;
      box-shadow: 0 0 16px var(--mirror-glow), 0 2px 12px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .from-user .msg-bubble {
      background: var(--neb-base-1);
      border: 1px solid rgba(200,168,75,0.28);
      color: var(--text-clr);
      font-style: normal;
      border-bottom-right-radius: 4px;
      box-shadow: 0 0 8px rgba(200,168,75,0.18), 0 2px 10px rgba(0,0,0,0.40);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Thinking dots */
    .oracle-thinking {
      display: inline-flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--msg-bg);
      border: 1px solid var(--msg-bdr);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .oracle-thinking span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sender-clr);
      animation: thinkDot 1.2s ease-in-out infinite;
    }
    .oracle-thinking span:nth-child(2) { animation-delay: 0.2s; }
    .oracle-thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkDot {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
      40%            { transform: scale(1);    opacity: 1;    }
    }

    /* Input bar */
    .oracle-input-bar {
      width: 100%;
      max-width: 820px;
      align-self: center;
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: var(--neb-base-2);
      border-top: 1px solid var(--ring-clr);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
      transition: background 4s ease, border-color 4s ease;
    }
    .oracle-chat-input {
      flex: 1;
      padding: 13px 16px;
      background: var(--neb-base-1);
      border: 1px solid var(--ring-clr);
      border-radius: 12px;
      color: var(--text-clr);
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .oracle-chat-input:focus {
      border-color: var(--mirror-glow);
      box-shadow: 0 0 0 2px rgba(180,120,255,0.18), 0 0 12px var(--mirror-glow);
    }
    .oracle-chat-input::placeholder { color: var(--sender-clr); opacity: 0.38; }
    .oracle-chat-input:disabled { opacity: 0.55; }

    .oracle-send-btn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--mirror-glow), var(--mirror-f-clr));
      color: #1a0e2e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(200,168,75,0.30), 0 0 8px var(--mirror-glow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .oracle-send-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(200,168,75,0.55), 0 0 18px var(--mirror-f-clr); }
    .oracle-send-btn:active { transform: translateY(0); }
    .oracle-send-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    /* ════════════════════════════════════════
       SCENE — Forest Portal
    ════════════════════════════════════════ */
    .scene {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }

    /* ── Radiating Light Beams ── */
    .light-beams {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      animation: beamBreath 9s ease-in-out infinite;
    }
    .light-beams svg { width: 100%; height: 100%; }
    @keyframes beamBreath { 0%,100%{opacity:0.60} 50%{opacity:1} }

    /* ── Forest Trees ── */
    .forest-tree { position: absolute; bottom: 0; pointer-events: none; fill: #071a12; }
    .tree-left  { left: -30px;  height: 88vh; width: auto; z-index: 3; }
    .tree-right { right: -30px; height: 88vh; width: auto; z-index: 3; transform: scaleX(-1); }

    /* ── Branch Vines ── */
    .branch-vines { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
    .bvine { position: absolute; }

    /* ── Ground Mist ── */
    .mist-field {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 220px; z-index: 5; pointer-events: none;
    }
    .mist { position: absolute; border-radius: 50%; background: rgba(0,180,140,0.08); filter: blur(40px); }
    .m1 { bottom:0;    left:-10%; width:88%; height:138px; opacity:0.95; animation:mDrift 16s          ease-in-out infinite alternate; }
    .m2 { bottom:14px; left:8%;   width:92%; height:108px; opacity:0.80; animation:mDrift 22s -6s     ease-in-out infinite alternate-reverse; }
    .m3 { bottom:6px;  right:-8%; width:80%; height:122px; opacity:0.90; animation:mDrift 19s -3s     ease-in-out infinite alternate; }
    .m4 { bottom:24px; left:2%;   width:74%; height:88px;  opacity:0.65; animation:mDrift 25s -9s     ease-in-out infinite alternate-reverse; }
    .m5 { bottom:0;    left:20%;  width:58%; height:98px;  opacity:0.75; animation:mDrift 14s -4s     ease-in-out infinite alternate; }
    .m6 { bottom:10px; left:-5%;  width:112%;height:78px;  opacity:0.55; animation:mDrift 28s -12s    ease-in-out infinite alternate; }
    @keyframes mDrift {
      0%   { transform: translateX(0);    }
      100% { transform: translateX(44px); }
    }

    /* ════════════════════════════════════════
       ORNATE MIRROR — Cosmic Portal
    ════════════════════════════════════════ */
    .mirror-container {
      position: relative;
      width: 260px; height: 360px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-bottom: -100px; z-index: 2;
    }
    .mirror-halo {
      position: absolute; width: 210px; height: 295px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,200,176,0.80) 0%, transparent 70%);
      filter: blur(54px);
      animation: haloBreath 4s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes haloBreath {
      0%, 100% { opacity: 0.28; transform: scale(1);    }
      50%       { opacity: 0.52; transform: scale(1.14); }
    }
    .mirror-frame-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      color: #c8a84b; z-index: 3;
      filter: drop-shadow(0 0 12px rgba(200,168,75,0.50)) drop-shadow(0 0 30px rgba(200,168,75,0.28));
    }
    .mirror-face {
      position: absolute; width: 170px; height: 240px;
      border-radius: 50%; overflow: hidden; z-index: 2;
      box-shadow:
        0 0 35px 18px rgba(0,200,176,0.52),
        0 0 80px 40px rgba(0,200,176,0.38),
        0 0 150px 75px rgba(0,200,176,0.20),
        0 0 260px 130px rgba(0,200,176,0.08),
        inset 0 0 55px rgba(0,0,0,0.78);
    }
    .cosmic-abyss { position: absolute; inset: 0; border-radius: inherit; overflow: hidden; }
    .nebula-base {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 52%,
        #b0fff5 0%, rgba(176,255,245,0.92) 5%,
        #00d4b0 16%, rgba(0,164,136,0.80) 30%,
        #004d3a 55%, rgba(1,12,8,0.96) 76%, #010f0a 100%);

    .nebula-bloom-1 {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 68% 48% at 38% 46%, rgba(0,90,75,0.55) 0%, transparent 68%);
      animation: nebulaDrift 8s ease-in-out infinite alternate;
    }
    .nebula-bloom-2 {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 58% 42% at 64% 58%, rgba(0,120,100,0.45) 0%, transparent 62%);

        #ffffff 0%, rgba(220,255,250,0.96) 8%,

    function getPaletteName(hour) {
      if (hour >= 5  && hour < 9)  return 'dawn';
      if (hour >= 9  && hour < 17) return 'day';
      if (hour >= 17 && hour < 21) return 'sunset';
      return 'night';
    }

    function applyPalette() {
      var name    = getPaletteName(new Date().getHours());
      var palette = PALETTES[name];
      var root    = document.documentElement;
      Object.keys(palette).forEach(function (k) {
        root.style.setProperty(k, palette[k]);
      });
    }

    /* Apply immediately on load, refresh every 5 minutes */
    applyPalette();
    setInterval(applyPalette, 5 * 60 * 1000);

    /* ── Restore previous sync ── */
    (function () {
      var n = localStorage.getItem("bf_oracle_name");
      var d = localStorage.getItem("bf_oracle_date");
      if (n && d) { birthName = n; birthDate = d; openChat(true); }
    })();

    /* ── Sync flow ── */
    var syncBtn   = document.getElementById("syncBtn");
    var syncError = document.getElementById("syncError");

    syncBtn.addEventListener("click", function () {
      var n = document.getElementById("birthNameInput").value.trim();
      var d = document.getElementById("birthDateInput").value.trim();
      syncError.style.display = "none";
      if (!n) { showSyncError("Your birth name is required."); return; }
      if (!d) { showSyncError("Your birth date is required."); return; }
      birthName = n; birthDate = d;
      localStorage.setItem("bf_oracle_name", n);
      localStorage.setItem("bf_oracle_date", d);
      syncBtn.textContent = "SYNCHRONIZING…";
      syncBtn.classList.add("syncing");
      setTimeout(function () { openChat(false); }, 1500);
    });

    function showSyncError(msg) {
      syncError.textContent = msg;
      syncError.style.display = "block";
    }

    function openChat(instant) {
      document.getElementById("syncedName").textContent = birthName.toUpperCase();
      document.getElementById("greetingMsg").textContent =
        "I see you clearly now, " + birthName + ". The channel is open. What do you seek?";
      if (instant) {
        document.getElementById("syncScreen").classList.add("hidden");
        document.getElementById("chatScreen").classList.remove("hidden");
      } else {
        var sync = document.getElementById("syncScreen");
        sync.style.opacity = "0";
        sync.style.pointerEvents = "none";
        setTimeout(function () {
          sync.classList.add("hidden");
          document.getElementById("chatScreen").classList.remove("hidden");
        }, 800);
      }
      setTimeout(function () { document.getElementById("chatInput").focus(); }, 900);
    }

    /* ── Chat flow ── */
    var sendBtn     = document.getElementById("sendBtn");
    var chatInput   = document.getElementById("chatInput");
    var messageArea = document.getElementById("messageArea");
    var thinkingEl  = null;

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendMessage() {
      var text = chatInput.value.trim();
      if (!text || sendBtn.disabled) return;
      chatInput.value = "";
      appendMsg("user", text);
      chatHistory.push({ role: "user", content: text });
      setLoading(true);

      fetch(API_URL + "/api/oracle", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          message: text
        })
      })
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) {
        setLoading(false);
        var reply = (data && data.reply) ? data.reply : "The channel fell silent. Ask again.";
        chatHistory.push({ role: "assistant", content: reply });
        appendMsg("oracle", reply);
      })
      .catch(function () {
        setLoading(false);
        appendMsg("oracle", "The abyss is unreachable at this moment. Try again.");
      });
    }

    function setLoading(on) {
      sendBtn.disabled   = on;
      chatInput.disabled = on;
      if (on) {
        thinkingEl = document.createElement("div");
        thinkingEl.className = "oracle-msg from-oracle";
        thinkingEl.innerHTML =
          '<span class="msg-sender">Oracle</span>' +
          '<div class="oracle-thinking"><span></span><span></span><span></span></div>';
        messageArea.appendChild(thinkingEl);
        messageArea.scrollTop = messageArea.scrollHeight;
      } else if (thinkingEl) {
        thinkingEl.remove();
        thinkingEl = null;
      }
    }

    function appendMsg(who, text) {
      var wrap   = document.createElement("div");
      wrap.className = "oracle-msg " + (who === "oracle" ? "from-oracle" : "from-user");
      var sender = document.createElement("span");
      sender.className = "msg-sender";
      sender.textContent = who === "oracle" ? "Oracle" : "You";
      var bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = text;
      wrap.appendChild(sender);
      wrap.appendChild(bubble);
      messageArea.appendChild(wrap);
      messageArea.scrollTop = messageArea.scrollHeight;
    }
  </script>
