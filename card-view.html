<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>BizForce AI — Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#070b18;overflow:hidden;
      font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff}
    body{display:flex;align-items:center;justify-content:center}

    /* ── Viewport container: phone-width centered on desktop ── */
    #cardViewport{
      position:relative;
      width:100vw;max-width:430px;
      height:100vh;height:100dvh;
      overflow:hidden;background:#070b18;
      flex-shrink:0;
    }

    /* ── Loading / Error ── */
    .state-wrap{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:#070b18;z-index:30;padding:40px 24px;text-align:center;
    }
    .spinner{width:42px;height:42px;border:2.5px solid rgba(34,211,238,.15);
      border-top-color:#22d3ee;border-radius:50%;
      animation:cvSpin .75s linear infinite;margin:0 auto 18px}
    @keyframes cvSpin{to{transform:rotate(360deg)}}
    .state-msg{font-size:.9rem;color:#8892b8;line-height:1.6}
    .state-err-ico{font-size:2.8rem;margin-bottom:14px}
    .state-err-title{font-size:1.15rem;font-weight:900;color:#f4f7ff;margin-bottom:8px}

    /* ── Card preview fills viewport ── */
    #cardPreview{
      position:absolute;inset:0;width:100%;height:100%;
      overflow:hidden;display:none;border-radius:20px;--border-weight:16px;
    }
    #cardPreview[data-theme="dark"]    {background:linear-gradient(160deg,#0c1228 0%,#070b18 100%)}
    #cardPreview[data-theme="midnight"]{background:linear-gradient(160deg,#1a1040 0%,#0f1729 100%)}
    #cardPreview[data-theme="forest"]  {background:linear-gradient(160deg,#0a1f14 0%,#061a12 100%)}
    #cardPreview[data-theme="ember"]   {background:linear-gradient(160deg,#220e06 0%,#1a0a06 100%)}

    /* ── Background image layer ── */
    .card-bg-layer{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;display:none;border-radius:20px}

    /* ── Holographic overlay ── */
    #cardPreview.holographic::before{
      content:"";position:absolute;inset:0;pointer-events:none;z-index:4;
      background:linear-gradient(105deg,
        transparent 20%,
        rgba(255,0,128,.09) 30%,
        rgba(0,255,255,.10) 40%,
        rgba(128,0,255,.09) 50%,
        rgba(255,200,0,.07) 60%,
        transparent 70%);
      background-size:200% 200%;
      animation:holoShift 3s linear infinite;
      mix-blend-mode:screen;
    }
    @keyframes holoShift{
      0%{background-position:0% 50%}
      100%{background-position:200% 50%}
    }

    /* ── Card inner layout: vertical full-screen ── */
    .card-inner{
      position:absolute;inset:0;
      display:flex;flex-direction:column;justify-content:space-between;
      padding:env(safe-area-inset-top,44px) 28px calc(env(safe-area-inset-bottom,0px) + 128px) 28px;
      z-index:7;
    }

    .card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}

    .card-company{font-size:.72rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;padding-top:2px}
    #cardPreview[data-theme="dark"]    .card-company{color:#22d3ee}
    #cardPreview[data-theme="midnight"].card-company{color:#c084fc}
    #cardPreview[data-theme="forest"]  .card-company{color:#34d399}
    #cardPreview[data-theme="ember"]   .card-company{color:#fb923c}

    .card-qr-wrap{background:rgba(255,255,255,.07);border-radius:10px;padding:7px;
      border:1px solid rgba(255,255,255,.1);flex-shrink:0}
    #qrCanvas{display:block;border-radius:5px}
    .card-qr-label{font-size:.45rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:rgba(255,255,255,.28);text-align:center;margin-top:3px;white-space:nowrap}

    .card-name-block{padding:0}
    .card-name{font-size:clamp(2rem,9vw,3.2rem);font-weight:900;line-height:1.05;margin-bottom:8px;
      overflow-wrap:break-word}
    #cardPreview[data-theme="dark"]    .card-name{background:linear-gradient(135deg,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    #cardPreview[data-theme="midnight"].card-name{background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent}
    #cardPreview[data-theme="forest"]  .card-name{background:linear-gradient(135deg,#34d399,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
    #cardPreview[data-theme="ember"]   .card-name{background:linear-gradient(135deg,#f97316,#fbbf24);-webkit-background-clip:text;background-clip:text;color:transparent}
    .card-job{font-size:.92rem;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.03em}
    .card-tagline{font-size:.72rem;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:.07em;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ── Card fonts ── */
    #cardPreview.font-orbitron      .card-name,#cardPreview.font-orbitron      .card-job,#cardPreview.font-orbitron      .card-company,#cardPreview.font-orbitron      .card-contact-line,#cardPreview.font-orbitron      .card-tagline{font-family:'Orbitron',monospace!important}
    #cardPreview.font-exo2          .card-name,#cardPreview.font-exo2          .card-job,#cardPreview.font-exo2          .card-company,#cardPreview.font-exo2          .card-contact-line,#cardPreview.font-exo2          .card-tagline{font-family:'Exo 2',sans-serif!important}
    #cardPreview.font-rajdhani      .card-name,#cardPreview.font-rajdhani      .card-job,#cardPreview.font-rajdhani      .card-company,#cardPreview.font-rajdhani      .card-contact-line,#cardPreview.font-rajdhani      .card-tagline{font-family:'Rajdhani',sans-serif!important}
    #cardPreview.font-audiowide     .card-name,#cardPreview.font-audiowide     .card-job,#cardPreview.font-audiowide     .card-company,#cardPreview.font-audiowide     .card-contact-line,#cardPreview.font-audiowide     .card-tagline{font-family:'Audiowide',monospace!important}
    #cardPreview.font-syncopate     .card-name,#cardPreview.font-syncopate     .card-job,#cardPreview.font-syncopate     .card-company,#cardPreview.font-syncopate     .card-contact-line,#cardPreview.font-syncopate     .card-tagline{font-family:'Syncopate',sans-serif!important}
    #cardPreview.font-cormorant     .card-name,#cardPreview.font-cormorant     .card-job,#cardPreview.font-cormorant     .card-company,#cardPreview.font-cormorant     .card-contact-line,#cardPreview.font-cormorant     .card-tagline{font-family:'Cormorant Garamond',Georgia,serif!important}
    #cardPreview.font-playfair      .card-name,#cardPreview.font-playfair      .card-job,#cardPreview.font-playfair      .card-company,#cardPreview.font-playfair      .card-contact-line,#cardPreview.font-playfair      .card-tagline{font-family:'Playfair Display',Georgia,serif!important}
    #cardPreview.font-cinzel        .card-name,#cardPreview.font-cinzel        .card-job,#cardPreview.font-cinzel        .card-company,#cardPreview.font-cinzel        .card-contact-line,#cardPreview.font-cinzel        .card-tagline{font-family:'Cinzel',serif!important}
    #cardPreview.font-imfell        .card-name,#cardPreview.font-imfell        .card-job,#cardPreview.font-imfell        .card-company,#cardPreview.font-imfell        .card-contact-line,#cardPreview.font-imfell        .card-tagline{font-family:'IM Fell English',Georgia,serif!important}
    #cardPreview.font-baskerville   .card-name,#cardPreview.font-baskerville   .card-job,#cardPreview.font-baskerville   .card-company,#cardPreview.font-baskerville   .card-contact-line,#cardPreview.font-baskerville   .card-tagline{font-family:'Libre Baskerville',Georgia,serif!important}
    #cardPreview.font-bebas         .card-name,#cardPreview.font-bebas         .card-job,#cardPreview.font-bebas         .card-company,#cardPreview.font-bebas         .card-contact-line,#cardPreview.font-bebas         .card-tagline{font-family:'Bebas Neue',sans-serif!important}
    #cardPreview.font-oswald        .card-name,#cardPreview.font-oswald        .card-job,#cardPreview.font-oswald        .card-company,#cardPreview.font-oswald        .card-contact-line,#cardPreview.font-oswald        .card-tagline{font-family:'Oswald',Impact,sans-serif!important}
    #cardPreview.font-anton         .card-name,#cardPreview.font-anton         .card-job,#cardPreview.font-anton         .card-company,#cardPreview.font-anton         .card-contact-line,#cardPreview.font-anton         .card-tagline{font-family:'Anton',Impact,sans-serif!important}
    #cardPreview.font-blackhan      .card-name,#cardPreview.font-blackhan      .card-job,#cardPreview.font-blackhan      .card-company,#cardPreview.font-blackhan      .card-contact-line,#cardPreview.font-blackhan      .card-tagline{font-family:'Black Han Sans',sans-serif!important}
    #cardPreview.font-righteous     .card-name,#cardPreview.font-righteous     .card-job,#cardPreview.font-righteous     .card-company,#cardPreview.font-righteous     .card-contact-line,#cardPreview.font-righteous     .card-tagline{font-family:'Righteous',sans-serif!important}
    #cardPreview.font-dancing       .card-name,#cardPreview.font-dancing       .card-job,#cardPreview.font-dancing       .card-company,#cardPreview.font-dancing       .card-contact-line,#cardPreview.font-dancing       .card-tagline{font-family:'Dancing Script',cursive!important}
    #cardPreview.font-pacifico      .card-name,#cardPreview.font-pacifico      .card-job,#cardPreview.font-pacifico      .card-company,#cardPreview.font-pacifico      .card-contact-line,#cardPreview.font-pacifico      .card-tagline{font-family:'Pacifico',cursive!important}
    #cardPreview.font-lobster       .card-name,#cardPreview.font-lobster       .card-job,#cardPreview.font-lobster       .card-company,#cardPreview.font-lobster       .card-contact-line,#cardPreview.font-lobster       .card-tagline{font-family:'Lobster',cursive!important}
    #cardPreview.font-satisfy       .card-name,#cardPreview.font-satisfy       .card-job,#cardPreview.font-satisfy       .card-company,#cardPreview.font-satisfy       .card-contact-line,#cardPreview.font-satisfy       .card-tagline{font-family:'Satisfy',cursive!important}
    #cardPreview.font-greatvibes    .card-name,#cardPreview.font-greatvibes    .card-job,#cardPreview.font-greatvibes    .card-company,#cardPreview.font-greatvibes    .card-contact-line,#cardPreview.font-greatvibes    .card-tagline{font-family:'Great Vibes',cursive!important}
    #cardPreview.font-montserrat    .card-name,#cardPreview.font-montserrat    .card-job,#cardPreview.font-montserrat    .card-company,#cardPreview.font-montserrat    .card-contact-line,#cardPreview.font-montserrat    .card-tagline{font-family:'Montserrat',Helvetica,sans-serif!important}
    #cardPreview.font-raleway       .card-name,#cardPreview.font-raleway       .card-job,#cardPreview.font-raleway       .card-company,#cardPreview.font-raleway       .card-contact-line,#cardPreview.font-raleway       .card-tagline{font-family:'Raleway',sans-serif!important}
    #cardPreview.font-poppins       .card-name,#cardPreview.font-poppins       .card-job,#cardPreview.font-poppins       .card-company,#cardPreview.font-poppins       .card-contact-line,#cardPreview.font-poppins       .card-tagline{font-family:'Poppins',sans-serif!important}
    #cardPreview.font-nunito        .card-name,#cardPreview.font-nunito        .card-job,#cardPreview.font-nunito        .card-company,#cardPreview.font-nunito        .card-contact-line,#cardPreview.font-nunito        .card-tagline{font-family:'Nunito',sans-serif!important}
    #cardPreview.font-lato          .card-name,#cardPreview.font-lato          .card-job,#cardPreview.font-lato          .card-company,#cardPreview.font-lato          .card-contact-line,#cardPreview.font-lato          .card-tagline{font-family:'Lato',sans-serif!important}
    #cardPreview.font-courier       .card-name,#cardPreview.font-courier       .card-job,#cardPreview.font-courier       .card-company,#cardPreview.font-courier       .card-contact-line,#cardPreview.font-courier       .card-tagline{font-family:'Courier New',Courier,monospace!important}
    #cardPreview.font-vt323         .card-name,#cardPreview.font-vt323         .card-job,#cardPreview.font-vt323         .card-company,#cardPreview.font-vt323         .card-contact-line,#cardPreview.font-vt323         .card-tagline{font-family:'VT323',monospace!important}
    #cardPreview.font-pressstart    .card-name,#cardPreview.font-pressstart    .card-job,#cardPreview.font-pressstart    .card-company,#cardPreview.font-pressstart    .card-contact-line,#cardPreview.font-pressstart    .card-tagline{font-family:'Press Start 2P',monospace!important}
    #cardPreview.font-permanentmarker .card-name,#cardPreview.font-permanentmarker .card-job,#cardPreview.font-permanentmarker .card-company,#cardPreview.font-permanentmarker .card-contact-line,#cardPreview.font-permanentmarker .card-tagline{font-family:'Permanent Marker',cursive!important}
    #cardPreview.font-russoone      .card-name,#cardPreview.font-russoone      .card-job,#cardPreview.font-russoone      .card-company,#cardPreview.font-russoone      .card-contact-line,#cardPreview.font-russoone      .card-tagline{font-family:'Russo One',sans-serif!important}
    #cardPreview.font-bungee        .card-name,#cardPreview.font-bungee        .card-job,#cardPreview.font-bungee        .card-company,#cardPreview.font-bungee        .card-contact-line,#cardPreview.font-bungee        .card-tagline{font-family:'Bungee',sans-serif!important}

    .card-contacts-block{display:flex;flex-direction:column;gap:5px}
    .card-contact-line{font-size:.82rem;color:rgba(255,255,255,.48);line-height:1.4;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card-contact-line:not(:empty)::before{content:"· ";color:rgba(255,255,255,.22)}

    .card-watermark{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 108px);
      left:50%;transform:translateX(-50%);
      font-size:.44rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
      color:rgba(255,255,255,.12);white-space:nowrap;z-index:2}

    /* ── Video mode ── */
    .card-video-el{position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;display:none;z-index:1;border-radius:20px}
    .card-video-overlay{position:absolute;inset:0;display:none;
      flex-direction:column;justify-content:flex-end;z-index:2;pointer-events:none}
    .card-video-grad{position:absolute;bottom:0;left:0;right:0;height:75%;
      background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.45) 60%,transparent 100%)}
    .card-video-text{position:relative;z-index:1;
      padding:16px 22px calc(env(safe-area-inset-bottom,0px) + 128px) 22px}
    .card-video-glass{background:rgba(8,12,30,.42);backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.14);
      border-radius:14px;padding:14px 18px;display:inline-block;max-width:100%;
      box-shadow:0 4px 24px rgba(0,0,0,.4)}
    .card-video-vname{font-size:clamp(1.1rem,5vw,1.7rem);font-weight:900;color:#fff;
      text-shadow:0 1px 6px rgba(0,0,0,.7);line-height:1.1;margin-bottom:4px}
    .card-video-vjob{font-size:.8rem;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.03em}
    .card-video-vco{font-size:.62rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;
      color:rgba(255,255,255,.5);margin-top:4px}
    .card-video-qr-ov{display:none;position:absolute;
      bottom:calc(env(safe-area-inset-bottom,0px) + 120px);right:16px;
      z-index:3;background:rgba(8,12,30,.76);backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);
      border-radius:10px;padding:6px}

    /* ── Video transition box ── */
    #vidBox{position:absolute;inset:0;z-index:10;display:none;opacity:0;border-radius:20px;overflow:hidden;will-change:opacity,transform,clip-path,filter}
    #vidBox.vt-active{opacity:1;pointer-events:auto}
    #vidBox .card-video-el{display:block}
    #vidBox .card-video-overlay{display:flex}
    #vidBox .card-video-qr-ov{display:block}
    /* Fade */
    #cardPreview[data-vid-trans="fade"] #vidBox.vt-enter{animation:vtFadeIn .8s ease forwards}
    #cardPreview[data-vid-trans="fade"] #vidBox.vt-exit{animation:vtFadeOut .8s ease forwards}
    @keyframes vtFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes vtFadeOut{from{opacity:1}to{opacity:0}}
    /* Blur Dissolve */
    #cardPreview[data-vid-trans="blur-dissolve"] #vidBox.vt-enter{animation:vtBlurIn .9s ease forwards}
    #cardPreview[data-vid-trans="blur-dissolve"] #vidBox.vt-exit{animation:vtBlurOut .9s ease forwards}
    @keyframes vtBlurIn{from{opacity:0;filter:blur(24px)}to{opacity:1;filter:blur(0)}}
    @keyframes vtBlurOut{from{opacity:1;filter:blur(0)}to{opacity:0;filter:blur(24px)}}
    /* Iris */
    #cardPreview[data-vid-trans="iris"] #vidBox.vt-enter{animation:vtIrisIn .7s ease forwards;opacity:1}
    #cardPreview[data-vid-trans="iris"] #vidBox.vt-exit{animation:vtIrisOut .7s ease forwards;opacity:1}
    @keyframes vtIrisIn{from{clip-path:circle(0% at 50% 50%)}to{clip-path:circle(150% at 50% 50%)}}
    @keyframes vtIrisOut{from{clip-path:circle(150% at 50% 50%)}to{clip-path:circle(0% at 50% 50%)}}
    /* Glitch */
    #cardPreview[data-vid-trans="glitch"] #vidBox.vt-enter{animation:vtGlitchIn .6s steps(8) forwards}
    #cardPreview[data-vid-trans="glitch"] #vidBox.vt-exit{animation:vtGlitchOut .6s steps(8) forwards}
    @keyframes vtGlitchIn{0%{opacity:0;transform:translateX(0) skewX(0)}20%{opacity:.9;transform:translateX(-8px) skewX(2deg);filter:hue-rotate(90deg)}40%{opacity:.4;transform:translateX(6px) skewX(-1deg);filter:hue-rotate(180deg)}60%{opacity:.8;transform:translateX(-3px) skewX(1deg);filter:hue-rotate(270deg)}80%{opacity:.7;transform:translateX(4px) skewX(-2deg);filter:none}100%{opacity:1;transform:translateX(0) skewX(0);filter:none}}
    @keyframes vtGlitchOut{0%{opacity:1;transform:translateX(0);filter:none}25%{opacity:.8;transform:translateX(8px) skewX(-2deg);filter:hue-rotate(90deg)}50%{opacity:.3;transform:translateX(-6px) skewX(2deg);filter:hue-rotate(180deg)}75%{opacity:.6;transform:translateX(4px) skewX(-1deg);filter:hue-rotate(270deg)}100%{opacity:0;transform:translateX(-8px);filter:none}}
    /* Swipe Left */
    #cardPreview[data-vid-trans="swipe-left"] #vidBox.vt-enter{animation:vtSwipeLeftIn .5s cubic-bezier(.4,0,.2,1) forwards;opacity:1}
    #cardPreview[data-vid-trans="swipe-left"] #vidBox.vt-exit{animation:vtSwipeLeftOut .5s cubic-bezier(.4,0,.2,1) forwards;opacity:1}
    @keyframes vtSwipeLeftIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    @keyframes vtSwipeLeftOut{from{transform:translateX(0)}to{transform:translateX(-100%)}}
    /* Swipe Up */
    #cardPreview[data-vid-trans="swipe-up"] #vidBox.vt-enter{animation:vtSwipeUpIn .5s cubic-bezier(.4,0,.2,1) forwards;opacity:1}
    #cardPreview[data-vid-trans="swipe-up"] #vidBox.vt-exit{animation:vtSwipeUpOut .5s cubic-bezier(.4,0,.2,1) forwards;opacity:1}
    @keyframes vtSwipeUpIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes vtSwipeUpOut{from{transform:translateY(0)}to{transform:translateY(100%)}}
    /* Zoom In */
    #cardPreview[data-vid-trans="zoom-in"] #vidBox.vt-enter{animation:vtZoomIn .7s cubic-bezier(.2,.8,.2,1) forwards}
    #cardPreview[data-vid-trans="zoom-in"] #vidBox.vt-exit{animation:vtZoomOut .7s cubic-bezier(.2,.8,.2,1) forwards}
    @keyframes vtZoomIn{from{opacity:0;transform:scale(.35)}to{opacity:1;transform:scale(1)}}
    @keyframes vtZoomOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.35)}}
    /* Color Burn */
    #cardPreview[data-vid-trans="color-burn"] #vidBox.vt-enter{animation:vtBurnIn .8s ease forwards}
    #cardPreview[data-vid-trans="color-burn"] #vidBox.vt-exit{animation:vtBurnOut .8s ease forwards}
    @keyframes vtBurnIn{0%{opacity:0}40%{opacity:1;filter:brightness(4) saturate(0)}70%{opacity:1;filter:brightness(1.5) saturate(.5)}100%{opacity:1;filter:none}}
    @keyframes vtBurnOut{0%{opacity:1;filter:none}30%{opacity:1;filter:brightness(1.5) saturate(.5)}60%{opacity:1;filter:brightness(4) saturate(0)}100%{opacity:0}}
    /* Matrix */
    #cardPreview[data-vid-trans="matrix"] #vidBox.vt-enter{animation:vtMatrixIn 1s steps(10) forwards}
    #cardPreview[data-vid-trans="matrix"] #vidBox.vt-exit{animation:vtMatrixOut 1s steps(10) forwards}
    @keyframes vtMatrixIn{0%{opacity:0;filter:hue-rotate(0deg) brightness(2) contrast(2) saturate(0)}40%{opacity:.7;filter:hue-rotate(120deg) brightness(2) contrast(2) saturate(5)}70%{opacity:.9;filter:hue-rotate(90deg) brightness(1.5) contrast(1.5) saturate(3)}100%{opacity:1;filter:none}}
    @keyframes vtMatrixOut{0%{opacity:1;filter:none}30%{opacity:.9;filter:hue-rotate(90deg) brightness(1.5) contrast(1.5) saturate(3)}60%{opacity:.7;filter:hue-rotate(120deg) brightness(2) contrast(2) saturate(5)}100%{opacity:0;filter:hue-rotate(0deg) brightness(2) contrast(2) saturate(0)}}
    /* Shatter */
    #cardPreview[data-vid-trans="shatter"] #vidBox.vt-enter{animation:vtShatterIn .9s ease forwards;opacity:1}
    #cardPreview[data-vid-trans="shatter"] #vidBox.vt-exit{animation:vtShatterOut .9s ease forwards;opacity:1}
    @keyframes vtShatterIn{0%{clip-path:polygon(50% 50%,50% 50%,50% 50%,50% 50%);transform:scale(1.08)}30%{clip-path:polygon(10% 30%,80% 0%,100% 60%,40% 100%,0% 70%);transform:scale(1.04)}60%{clip-path:polygon(0% 10%,90% 0%,100% 90%,10% 100%);transform:scale(1.01)}100%{clip-path:polygon(0% 0%,100% 0%,100% 100%,0% 100%);transform:scale(1)}}
    @keyframes vtShatterOut{0%{clip-path:polygon(0% 0%,100% 0%,100% 100%,0% 100%);transform:scale(1)}40%{clip-path:polygon(0% 10%,90% 0%,100% 90%,10% 100%);transform:scale(1.01)}70%{clip-path:polygon(10% 30%,80% 0%,100% 60%,40% 100%,0% 70%);transform:scale(1.04)}100%{clip-path:polygon(50% 50%,50% 50%,50% 50%,50% 50%);transform:scale(1.08)}}
    /* ── Tap-to-play ring ── */
    #vtPlayRing{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:transparent;display:flex;align-items:center;justify-content:center;z-index:28;pointer-events:none;opacity:0;transition:opacity .4s ease}
    #vtPlayRing svg{margin-left:2px}
    #vtPlayRing.vpr-show{opacity:1;animation:vtRingPulse 2s ease-in-out infinite}
    @keyframes vtRingPulse{0%,100%{border-color:rgba(255,255,255,.15);box-shadow:0 0 0 0 rgba(255,255,255,.08)}50%{border-color:rgba(255,255,255,.3);box-shadow:0 0 0 7px rgba(255,255,255,0)}}

    /* ── Action buttons overlay at bottom ── */
    .card-actions{
      position:absolute;bottom:0;left:0;right:0;z-index:20;
      padding:18px 20px calc(env(safe-area-inset-bottom,0px) + 14px);
      background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.65) 55%,transparent 100%);
      display:none;gap:10px;
    }
    .cv-btn{
      flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:13px 12px;border-radius:14px;
      font-size:.83rem;font-weight:700;font-family:inherit;
      cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid;
    }
    .cv-btn svg{width:15px;height:15px;flex-shrink:0}
    .cv-btn-vcf{background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.35);color:#22d3ee}
    .cv-btn-vcf:hover{background:rgba(34,211,238,.22);border-color:rgba(34,211,238,.55)}
    .cv-btn-create{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);color:#8892b8}
    .cv-btn-create:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.25);color:#e8e8ff}

    /* ── Permanent branded gradient border — blue steel ── */
    .card-brand-border{position:absolute;inset:0;z-index:30;pointer-events:none;border-radius:20px;padding:var(--border-weight,16px);background:linear-gradient(135deg,#1a3a5c,#4fc3f7,#0d47a1,#81d4fa,#1a3a5c);background-size:300% 300%;animation:brandBorderFlow 3s ease-in-out infinite;box-shadow:inset 0 1px 3px rgba(255,255,255,.35),inset 0 -1px 3px rgba(0,0,0,.5);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude}
    @keyframes brandBorderFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    /* ── Border stamp decorations ── */
    .card-brand-border::before{content:"◆  ◆  ◆  ◆  ◆";position:absolute;top:0;left:0;right:0;height:var(--border-weight,16px);display:flex;align-items:center;justify-content:center;font-size:6px;color:#4fc3f7;letter-spacing:2px;text-shadow:0 0 6px rgba(79,195,247,.9)}
    .card-brand-border::after{content:"BIZFORCE AI";position:absolute;bottom:0;left:0;right:0;height:var(--border-weight,16px);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:3px;color:#4fc3f7;text-shadow:0 0 8px rgba(79,195,247,.9)}
    /* ── Border styles ── */
    #cardPreview.border-glow{box-shadow:0 0 18px rgba(34,211,238,.55),0 0 40px rgba(34,211,238,.2),0 12px 40px rgba(0,0,0,.5)}
    #cardPreview.border-neon-pulse .card-brand-border{animation:brandBorderFlow 4s linear infinite,neonBorderPulse 1s ease-in-out infinite}
    @keyframes neonBorderPulse{0%,100%{opacity:1}50%{opacity:.25}}
    #cardPreview.border-neon-pulse{animation:neonPulseGlow 1s ease-in-out infinite}
    @keyframes neonPulseGlow{0%,100%{box-shadow:0 0 8px rgba(34,211,238,.4),0 12px 40px rgba(0,0,0,.5)}50%{box-shadow:0 0 28px rgba(34,211,238,.9),0 0 55px rgba(34,211,238,.45),0 12px 40px rgba(0,0,0,.5)}}
    #cardPreview.border-gold .card-brand-border{background:linear-gradient(135deg,#ffd700,#ffb700,#ff8c00,#ffd700);background-size:300% 300%;animation:brandBorderFlow 4s linear infinite}
    #cardPreview.border-gold{box-shadow:0 0 14px rgba(255,215,0,.5),0 0 38px rgba(255,165,0,.25),0 12px 40px rgba(0,0,0,.5)}
    #cardPreview.border-holo-rainbow .card-brand-border{background:linear-gradient(135deg,#ff0080,#ff8c00,#ffd700,#00ff8c,#00cfff,#8c00ff,#ff0080);background-size:400% 400%;animation:rainbowBorderFlow 3s linear infinite}
    @keyframes rainbowBorderFlow{0%{background-position:0% 50%}100%{background-position:100% 50%}}
    #cardPreview.holographic{animation:holoGlow 3s ease-in-out infinite}
    @keyframes holoGlow{0%,100%{box-shadow:0 0 18px rgba(34,211,238,.55),0 0 55px rgba(168,85,247,.28),0 12px 40px rgba(0,0,0,.5)}50%{box-shadow:0 0 38px rgba(34,211,238,.85),0 0 95px rgba(168,85,247,.55),0 12px 40px rgba(0,0,0,.5)}}
    #cardPreview.holographic.border-neon-pulse{animation:holoGlow 3s ease-in-out infinite,neonPulseGlow 1s ease-in-out infinite}

    /* ── Card audio bar ── */
    #cvAudioBar{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 72px);z-index:22;display:none;align-items:center;gap:10px;padding:10px 16px;background:rgba(7,11,24,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(34,211,238,.18)}
    .cv-audio-btn{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);border-radius:50%;cursor:pointer;color:#22d3ee;transition:background .2s;padding:0}
    .cv-audio-btn:hover,.cv-audio-btn:active{background:rgba(34,211,238,.22)}
    .cv-audio-btn svg{width:14px;height:14px}
    .cv-audio-track{flex:1;min-width:0;font-size:.7rem;font-weight:700;color:#22d3ee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.03em}

    /* ── BizForce watermark ── */
    .page-watermark{
      position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:25;
      font-size:.44rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
      color:rgba(255,255,255,.14);white-space:nowrap;pointer-events:none;
    }
  </style>
</head>
<body>
<div id="cardViewport">

  <!-- Loading -->
  <div id="stateLoading" class="state-wrap">
    <div class="spinner"></div>
    <div class="state-msg">Loading card…</div>
  </div>

  <!-- Error -->
  <div id="stateError" class="state-wrap" style="display:none">
    <div class="state-err-ico">🪪</div>
    <div class="state-err-title">Card not found</div>
    <div class="state-msg">This link may be invalid or the card was removed.</div>
  </div>

  <!-- Card preview — edge to edge -->
  <div id="cardPreview" data-theme="dark">
    <div id="cvBgLayer" class="card-bg-layer"></div>
    <img id="cardPoster" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:5;border-radius:20px;display:none;pointer-events:none;background:#000">
    <div id="cardPosterOverlay" style="position:absolute;inset:0;z-index:6;border-radius:20px;pointer-events:none;display:none"></div>
    <div id="vtPlayRing">
      <svg viewBox="0 0 20 20" fill="rgba(255,255,255,0.9)" width="13" height="13"><polygon points="7,4 16,10 7,16"/></svg>
    </div>
    <div class="card-inner">
      <div class="card-top-row">
        <div class="card-company" id="pCompany"></div>
        <div>
          <div class="card-qr-wrap">
            <canvas id="qrCanvas" width="80" height="80"></canvas>
          </div>
          <div class="card-qr-label">Scan to connect</div>
        </div>
      </div>
      <div class="card-name-block">
        <div class="card-name" id="pName"></div>
        <div class="card-job"  id="pTitle"></div>
        <div class="card-tagline" id="pTagline"></div>
      </div>
      <div class="card-contacts-block">
        <div class="card-contact-line" id="pEmail"></div>
        <div class="card-contact-line" id="pPhone"></div>
        <div class="card-contact-line" id="pWebsite"></div>
      </div>
    </div>
    <div class="card-watermark">BIZFORCE AI</div>
    <div id="vidBox">
      <video class="card-video-el" id="cardVideo" playsinline onended="exitVideoMode()"></video>
      <div class="card-video-overlay">
        <div class="card-video-grad"></div>
        <div class="card-video-text">
          <div class="card-video-glass">
            <div class="card-video-vname" id="pvName"></div>
            <div class="card-video-vjob"  id="pvJob"></div>
            <div class="card-video-vco"   id="pvCompany"></div>
          </div>
        </div>
      </div>
      <div class="card-video-qr-ov">
        <canvas id="qrVideoCanvas" width="52" height="52"></canvas>
      </div>
    </div>
    <audio id="cvAudio" preload="none"></audio>
    <div id="cvAudioBar">
      <button class="cv-audio-btn" id="cvAudioBtn" onclick="toggleCvAudio()">
        <svg id="cvAudioPlayIco" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="cvAudioPauseIco" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <div class="cv-audio-track" id="cvAudioTrack">Audio Track</div>
    </div>
    <div class="card-brand-border"></div>
  </div>

  <!-- Action buttons pinned to bottom -->
  <div class="card-actions" id="cardActions">
    <button class="cv-btn cv-btn-vcf" onclick="saveContact()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Save Contact
    </button>
    <a class="cv-btn cv-btn-create" href="https://bizforceai.net/digital-cards.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="9" x2="12" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      Create Your Own
    </a>
  </div>

  <div class="page-watermark">BIZFORCE AI</div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var cardData = null;
var _cvHasPoster = false;
var _cvOverlayOpacity = 0;

var THEME_QR = {
  dark:     { dark: "#e8e8ff", light: "#070b18" },
  midnight: { dark: "#e8e8ff", light: "#0f1729" },
  forest:   { dark: "#e8e8ff", light: "#061a12" },
  ember:    { dark: "#e8e8ff", light: "#1a0a06" }
};

function _applyPosterExit(el, style) {
  var exits = {
    "fade":          function(e) { e.style.opacity = '0'; },
    "blur-dissolve": function(e) { e.style.opacity = '0'; e.style.filter = 'blur(24px)'; },
    "iris":          function(e) { e.style.clipPath = 'circle(0% at 50% 50%)'; },
    "glitch":        function(e) { e.style.opacity = '0'; e.style.transform = 'translateX(-8px) skewX(2deg)'; e.style.filter = 'hue-rotate(90deg)'; },
    "swipe-left":    function(e) { e.style.transform = 'translateX(-100%)'; },
    "swipe-up":      function(e) { e.style.transform = 'translateY(-100%)'; },
    "zoom-in":       function(e) { e.style.opacity = '0'; e.style.transform = 'scale(0.35)'; },
    "color-burn":    function(e) { e.style.opacity = '0'; e.style.filter = 'brightness(4) saturate(0)'; },
    "matrix":        function(e) { e.style.opacity = '0'; e.style.filter = 'hue-rotate(120deg) brightness(2) saturate(5)'; },
    "shatter":       function(e) { e.style.clipPath = 'polygon(50% 50%,50% 50%,50% 50%,50% 50%)'; e.style.transform = 'scale(1.08)'; }
  };
  (exits[style] || exits['fade'])(el);
}

function buildVCard(c) {
  return [
    "BEGIN:VCARD", "VERSION:3.0",
    "FN:"    + (c.full_name || ""),
    "TITLE:" + (c.job_title || ""),
    "ORG:"   + (c.company   || ""),
    c.phone   ? "TEL:"   + c.phone   : "",
    c.email   ? "EMAIL:" + c.email   : "",
    c.website ? "URL:"   + c.website : "",
    "END:VCARD"
  ].filter(Boolean).join("\n");
}

function renderCard(c) {
  var theme = c.theme || "dark";
  var card  = document.getElementById("cardPreview");
  card.dataset.theme = theme;

  if (c.holographic_style) { card.classList.add("holographic"); }
  if (c.media_layout) {
    var ml = c.media_layout;
    if (ml.orientation === "vertical") card.classList.add("orient-vertical");
    var _CV_BORDERS = ["none","glow","neon-pulse","gold","holo-rainbow"];
    _CV_BORDERS.forEach(function(b) { card.classList.remove("border-" + b); });
    card.classList.add("border-" + (ml.border_style || "glow"));
    if (ml.border_weight) card.style.setProperty("--border-weight", ml.border_weight);
    if (ml.card_font && ml.card_font !== "default") {
      card.classList.add("font-" + ml.card_font);
      var _cvGF = {
        orbitron:"Orbitron:wght@400;700;900", exo2:"Exo+2:wght@400;700;900",
        rajdhani:"Rajdhani:wght@400;600;700", audiowide:"Audiowide",
        syncopate:"Syncopate:wght@400;700",
        cormorant:"Cormorant+Garamond:ital,wght@0,400;0,600;1,400",
        playfair:"Playfair+Display:ital,wght@0,400;0,700;1,400",
        cinzel:"Cinzel:wght@400;600;700", imfell:"IM+Fell+English:ital@0;1",
        baskerville:"Libre+Baskerville:ital,wght@0,400;0,700;1,400",
        bebas:"Bebas+Neue", oswald:"Oswald:wght@400;600;700", anton:"Anton",
        blackhan:"Black+Han+Sans", righteous:"Righteous",
        dancing:"Dancing+Script:wght@400;700", pacifico:"Pacifico",
        lobster:"Lobster", satisfy:"Satisfy", greatvibes:"Great+Vibes",
        montserrat:"Montserrat:wght@400;600;700;900", raleway:"Raleway:wght@400;600;700;900",
        poppins:"Poppins:wght@400;600;700;900", nunito:"Nunito:wght@400;600;700;900",
        lato:"Lato:wght@400;700;900", vt323:"VT323",
        pressstart:"Press+Start+2P", permanentmarker:"Permanent+Marker",
        russoone:"Russo+One", bungee:"Bungee"
      };
      if (_cvGF[ml.card_font]) {
        var lk = document.createElement("link");
        lk.rel = "stylesheet";
        lk.href = "https://fonts.googleapis.com/css2?family=" + _cvGF[ml.card_font] + "&display=swap";
        document.head.appendChild(lk);
      }
    }
  } else {
    card.classList.add("border-glow");
  }
  if (c.bg_image_url) {
    var bgLayer = document.getElementById("cvBgLayer");
    bgLayer.style.backgroundImage = "url(" + c.bg_image_url + ")";
    bgLayer.style.display = "block";
  }
  if (c.still_image_url) {
    var poster = document.getElementById("cardPoster");
    var pov    = document.getElementById("cardPosterOverlay");
    var ml2    = c.media_layout || {};
    poster.src = c.still_image_url;
    var posMode = ml2.still_img_mode || "fill";
    if (posMode === "fit") {
      poster.style.objectFit      = "contain";
      poster.style.objectPosition = "center";
      poster.style.transform      = "none";
      poster.style.transformOrigin = "50% 50%";
    } else {
      var posX = ml2.still_img_pos_x !== undefined ? +ml2.still_img_pos_x : 50;
      var posY = ml2.still_img_pos_y !== undefined ? +ml2.still_img_pos_y : 50;
      var zoom = ml2.still_img_zoom  !== undefined ? +ml2.still_img_zoom  : 100;
      poster.style.objectFit       = posMode === "center" ? "none" : "cover";
      poster.style.objectPosition  = posX + "% " + posY + "%";
      poster.style.transform       = zoom !== 100 ? "scale(" + (zoom / 100) + ")" : "none";
      poster.style.transformOrigin = posX + "% " + posY + "%";
    }
    if (ml2.still_bg_color && ml2.still_bg_color !== "#000000") {
      poster.style.background = ml2.still_bg_color;
    }
    if (ml2.still_overlay && +ml2.still_overlay > 0) {
      _cvOverlayOpacity = +ml2.still_overlay / 100;
      pov.style.background = "rgba(0,0,0," + _cvOverlayOpacity.toFixed(2) + ")";
      pov.style.display    = "block";
    }
    poster.style.display = "block";
    _cvHasPoster = true;
  }

  document.getElementById("pCompany").textContent  = (c.company || "").toUpperCase();
  document.getElementById("pName").textContent     = c.full_name || "";
  document.getElementById("pTitle").textContent    = c.job_title || "";
  document.getElementById("pTagline").textContent  = (c.media_layout && c.media_layout.tagline) || "";
  document.getElementById("pEmail").textContent   = c.email   || "";
  document.getElementById("pPhone").textContent   = c.phone   || "";
  var ws = (c.website || "").replace(/^https?:\/\//, "");
  document.getElementById("pWebsite").textContent = ws;

  var vcard  = buildVCard(c);
  var colors = THEME_QR[theme] || THEME_QR.dark;
  try {
    QRCode.toCanvas(document.getElementById("qrCanvas"), vcard || "BizForce AI", {
      width: 80, margin: 1, errorCorrectionLevel: "M",
      color: { dark: colors.dark, light: colors.light }
    }, function() {});
    QRCode.toCanvas(document.getElementById("qrVideoCanvas"), vcard || "BizForce AI", {
      width: 52, margin: 1, errorCorrectionLevel: "M",
      color: { dark: "#ffffff", light: "rgba(0,0,0,0)" }
    }, function() {});
  } catch(e) {}

  if (c.video_url) {
    var cvid = document.getElementById("cardVideo");
    cvid.muted = false;
    cvid.removeAttribute("muted");
    cvid.setAttribute("playsinline", "");
    cvid.src = c.video_url;
    cvid.load();
    document.getElementById("pvName").textContent    = c.full_name || "";
    document.getElementById("pvJob").textContent     = c.job_title || "";
    document.getElementById("pvCompany").textContent = (c.company  || "").toUpperCase();
    try { startVideoLoop(c); } catch(e) {}
  }

  if (c.audio_url) {
    var cvMl = c.media_layout || {};
    document.getElementById("cvAudio").src = c.audio_url;
    document.getElementById("cvAudioTrack").textContent = cvMl.audio_track_name || "Audio Track";
    document.getElementById("cvAudioBar").style.display = "flex";
  }

  document.getElementById("stateLoading").style.display = "none";
  card.style.display = "block";
  document.getElementById("cardActions").style.display = "flex";
}

function toggleCvAudio() {
  var audio = document.getElementById("cvAudio");
  if (audio.paused) {
    audio.play().catch(function() {});
    document.getElementById("cvAudioPlayIco").style.display = "none";
    document.getElementById("cvAudioPauseIco").style.display = "";
  } else {
    audio.pause();
    document.getElementById("cvAudioPlayIco").style.display = "";
    document.getElementById("cvAudioPauseIco").style.display = "none";
  }
}

var _vtStyle = "fade";
var _vtState = "still"; // still | entering | playing | paused | exiting
var _vtTimers = [];
var _tapReady = false; // set true only by an explicit user tap; cleared when video returns to still

function _vtClear() { _vtTimers.forEach(clearTimeout); _vtTimers = []; }

function _vtDur(s) {
  return ({fade:800,"blur-dissolve":900,iris:700,glitch:600,"swipe-left":500,"swipe-up":500,"zoom-in":700,"color-burn":800,matrix:1000,shatter:900})[s] || 800;
}

function setRing(show) {
  document.getElementById("vtPlayRing").classList.toggle("vpr-show", show);
}

function startVideoLoop(c) {
  _vtClear();
  var ml = c.media_layout || {};
  _vtStyle = ml.vid_transition || "fade";
  document.getElementById("cardPreview").dataset.vidTrans = _vtStyle;
  _vtState = "still";
  setRing(false);
  document.getElementById("cardPreview").addEventListener("click", onCardTap);
}

function onCardTap(e) {
  var audioBar = document.getElementById("cvAudioBar");
  if (audioBar && audioBar.contains(e.target)) return;
  _tapReady = true;
  if (_vtState === "still")   { enterVideoMode(); }
  else if (_vtState === "playing") { pauseVideo(); }
  else if (_vtState === "paused")  { resumeVideo(); }
}

function enterVideoMode() {
  if (!_tapReady) return;
  var vb  = document.getElementById("vidBox");
  var vid = document.getElementById("cardVideo");
  _vtState = "entering";
  setRing(false);
  if (vid.readyState < 2) {
    vid.addEventListener("canplay", enterVideoMode, {once:true});
    return;
  }
  if (_cvHasPoster) {
    var poster = document.getElementById("cardPoster");
    var pov    = document.getElementById("cardPosterOverlay");
    var inner  = document.getElementById("cardPreview").querySelector(".card-inner");
    var dur    = _vtDur(_vtStyle);
    var tr     = "opacity " + dur + "ms ease-in, filter " + dur + "ms ease-in, clip-path " + dur + "ms ease-in, transform " + dur + "ms ease-in";
    poster.style.transition = "none";
    poster.style.opacity    = "1";
    poster.style.transform  = "none";
    poster.style.filter     = "none";
    poster.style.clipPath   = "";
    if (_cvOverlayOpacity > 0) { pov.style.transition = "none"; pov.style.opacity = String(_cvOverlayOpacity); }
    if (inner) { inner.style.transition = "none"; inner.style.opacity = "1"; }
    void poster.offsetWidth;
    poster.style.transition = tr;
    if (_cvOverlayOpacity > 0) { pov.style.transition = "opacity " + dur + "ms ease-in"; pov.style.opacity = "0"; }
    if (inner) { inner.style.transition = "opacity " + dur + "ms ease-in"; inner.style.opacity = "0"; }
    _applyPosterExit(poster, _vtStyle);
    _vtTimers.push(setTimeout(function() {
      poster.style.transition = "none";
      poster.style.display    = "none";
      poster.style.opacity    = "1";
      poster.style.transform  = "none";
      poster.style.filter     = "none";
      poster.style.clipPath   = "";
      if (_cvOverlayOpacity > 0) { pov.style.display = "none"; pov.style.transition = "none"; pov.style.opacity = ""; }
      if (inner) { inner.style.transition = "none"; inner.style.display = "none"; inner.style.opacity = ""; }
      vb.style.display = "block";
      vb.className     = "vt-active";
      vb.style.opacity = "1";
      vid.currentTime  = 0;
      var ep = vid.play();
      if (ep !== undefined) ep.catch(function(e) { console.error("[BF] enterVideoMode play() failed:", e); });
      _vtState = "playing";
    }, dur));
  } else {
    vb.style.display = "block";
    void vb.offsetWidth;
    vid.currentTime = 0;
    var ep = vid.play();
    if (ep !== undefined) ep.catch(function(e) { console.error("[BF] enterVideoMode play() failed:", e); });
    vb.className = "vt-enter";
    _vtTimers.push(setTimeout(function() {
      vb.className = "vt-active";
      vb.style.opacity = "1";
      _vtState = "playing";
    }, _vtDur(_vtStyle)));
  }
}

function pauseVideo() {
  _vtState = "paused";
  document.getElementById("cardVideo").pause();
  setRing(true);
}

function resumeVideo() {
  _vtState = "playing";
  setRing(false);
  var rp = document.getElementById("cardVideo").play();
  if (rp !== undefined) rp.catch(function(e) { console.error("[BF] resumeVideo play() failed:", e); });
}

function exitVideoMode() {
  _vtClear();
  _vtState = "exiting";
  setRing(false);
  var vb  = document.getElementById("vidBox");
  var vid = document.getElementById("cardVideo");
  if (_cvHasPoster) {
    var poster = document.getElementById("cardPoster");
    var pov    = document.getElementById("cardPosterOverlay");
    var inner  = document.getElementById("cardPreview").querySelector(".card-inner");
    var dur    = _vtDur(_vtStyle);
    vid.pause();
    vid.currentTime = 0;
    vb.style.display = "none";
    vb.style.opacity = "";
    vb.className     = "";
    poster.style.transition = "none";
    poster.style.opacity    = "0";
    poster.style.transform  = "none";
    poster.style.filter     = "none";
    poster.style.clipPath   = "";
    poster.style.display    = "block";
    if (_cvOverlayOpacity > 0) {
      pov.style.transition = "none";
      pov.style.opacity    = "0";
      pov.style.display    = "block";
    }
    void poster.offsetWidth;
    poster.style.transition = "opacity " + dur + "ms ease-out";
    poster.style.opacity    = "1";
    if (_cvOverlayOpacity > 0) {
      pov.style.transition = "opacity " + dur + "ms ease-out";
      pov.style.opacity    = String(_cvOverlayOpacity);
    }
    _vtTimers.push(setTimeout(function() {
      poster.style.transition = "none";
      if (_cvOverlayOpacity > 0) { pov.style.transition = "none"; }
      if (inner) { inner.style.display = ""; inner.style.opacity = ""; inner.style.transition = "none"; }
      _tapReady = false;
      _vtState = "still";
    }, dur));
  } else {
    vb.style.opacity = "1";
    void vb.offsetWidth;
    vb.className = "vt-exit";
    _vtTimers.push(setTimeout(function() {
      vid.pause();
      vid.currentTime = 0;
      vb.style.display = "none";
      vb.style.opacity = "";
      vb.className = "";
      _tapReady = false;
      _vtState = "still";
    }, _vtDur(_vtStyle)));
  }
}

function saveContact() {
  if (!cardData) return;
  var blob = new Blob([buildVCard(cardData)], { type: "text/vcard" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (cardData.full_name || "contact").replace(/\s+/g, "_") + ".vcf";
  a.click();
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
}

(async function() {
  var token = new URLSearchParams(window.location.search).get("token");
  if (!token) {
    document.getElementById("stateLoading").style.display = "none";
    document.getElementById("stateError").style.display   = "block";
    return;
  }
  try {
    var res = await fetch(API_URL + "/api/cards/share/" + encodeURIComponent(token));
    if (!res.ok) throw new Error("not found");
    var d = await res.json();
    cardData = d.card;
    renderCard(cardData);
  } catch(e) {
    document.getElementById("stateLoading").style.display = "none";
    document.getElementById("stateError").style.display   = "block";
  }
})();
</script>
