<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>BizForce AI — Business Card</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#070b18;overflow:hidden;
      font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff}
    body{display:flex;align-items:center;justify-content:center}

    /* ── Viewport container: phone-width centered on desktop ── */
    #cardViewport{
      position:relative;
      width:100vw;max-width:430px;
      height:100vh;height:100dvh;
      overflow:hidden;background:#070b18;
      flex-shrink:0;
    }

    /* ── Loading / Error ── */
    .state-wrap{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:#070b18;z-index:30;padding:40px 24px;text-align:center;
    }
    .spinner{width:42px;height:42px;border:2.5px solid rgba(34,211,238,.15);
      border-top-color:#22d3ee;border-radius:50%;
      animation:cvSpin .75s linear infinite;margin:0 auto 18px}
    @keyframes cvSpin{to{transform:rotate(360deg)}}
    .state-msg{font-size:.9rem;color:#8892b8;line-height:1.6}
    .state-err-ico{font-size:2.8rem;margin-bottom:14px}
    .state-err-title{font-size:1.15rem;font-weight:900;color:#f4f7ff;margin-bottom:8px}

    /* ── Card preview fills viewport ── */
    #cardPreview{
      position:absolute;inset:0;width:100%;height:100%;
      overflow:hidden;display:none;border-radius:20px;
    }
    #cardPreview[data-theme="dark"]    {background:linear-gradient(160deg,#0c1228 0%,#070b18 100%)}
    #cardPreview[data-theme="midnight"]{background:linear-gradient(160deg,#1a1040 0%,#0f1729 100%)}
    #cardPreview[data-theme="forest"]  {background:linear-gradient(160deg,#0a1f14 0%,#061a12 100%)}
    #cardPreview[data-theme="ember"]   {background:linear-gradient(160deg,#220e06 0%,#1a0a06 100%)}

    /* ── Background image layer ── */
    .card-bg-layer{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;display:none;border-radius:20px}

    /* ── Holographic overlay ── */
    #cardPreview.holographic::before{
      content:"";position:absolute;inset:0;pointer-events:none;z-index:4;
      background:linear-gradient(105deg,
        transparent 20%,
        rgba(255,0,128,.09) 30%,
        rgba(0,255,255,.10) 40%,
        rgba(128,0,255,.09) 50%,
        rgba(255,200,0,.07) 60%,
        transparent 70%);
      background-size:200% 200%;
      animation:holoShift 3s linear infinite;
      mix-blend-mode:screen;
    }
    @keyframes holoShift{
      0%{background-position:0% 50%}
      100%{background-position:200% 50%}
    }

    /* ── Card inner layout: vertical full-screen ── */
    .card-inner{
      position:absolute;inset:0;
      display:flex;flex-direction:column;justify-content:space-between;
      padding:env(safe-area-inset-top,44px) 28px calc(env(safe-area-inset-bottom,0px) + 128px) 28px;
      z-index:2;
    }

    .card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}

    .card-company{font-size:.72rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;padding-top:2px}
    #cardPreview[data-theme="dark"]    .card-company{color:#22d3ee}
    #cardPreview[data-theme="midnight"].card-company{color:#c084fc}
    #cardPreview[data-theme="forest"]  .card-company{color:#34d399}
    #cardPreview[data-theme="ember"]   .card-company{color:#fb923c}

    .card-qr-wrap{background:rgba(255,255,255,.07);border-radius:10px;padding:7px;
      border:1px solid rgba(255,255,255,.1);flex-shrink:0}
    #qrCanvas{display:block;border-radius:5px}
    .card-qr-label{font-size:.45rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:rgba(255,255,255,.28);text-align:center;margin-top:3px;white-space:nowrap}

    .card-name-block{padding:0}
    .card-name{font-size:clamp(2rem,9vw,3.2rem);font-weight:900;line-height:1.05;margin-bottom:8px;
      overflow-wrap:break-word}
    #cardPreview[data-theme="dark"]    .card-name{background:linear-gradient(135deg,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    #cardPreview[data-theme="midnight"].card-name{background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent}
    #cardPreview[data-theme="forest"]  .card-name{background:linear-gradient(135deg,#34d399,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
    #cardPreview[data-theme="ember"]   .card-name{background:linear-gradient(135deg,#f97316,#fbbf24);-webkit-background-clip:text;background-clip:text;color:transparent}
    .card-job{font-size:.92rem;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.03em}

    .card-contacts-block{display:flex;flex-direction:column;gap:5px}
    .card-contact-line{font-size:.82rem;color:rgba(255,255,255,.48);line-height:1.4;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card-contact-line:not(:empty)::before{content:"· ";color:rgba(255,255,255,.22)}

    .card-watermark{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 108px);
      left:50%;transform:translateX(-50%);
      font-size:.44rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
      color:rgba(255,255,255,.12);white-space:nowrap;z-index:2}

    /* ── Video mode ── */
    .card-video-el{position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;display:none;z-index:1;border-radius:20px}
    .card-video-overlay{position:absolute;inset:0;display:none;
      flex-direction:column;justify-content:flex-end;z-index:2;pointer-events:none}
    .card-video-grad{position:absolute;bottom:0;left:0;right:0;height:75%;
      background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.45) 60%,transparent 100%)}
    .card-video-text{position:relative;z-index:1;
      padding:16px 22px calc(env(safe-area-inset-bottom,0px) + 128px) 22px}
    .card-video-glass{background:rgba(8,12,30,.42);backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.14);
      border-radius:14px;padding:14px 18px;display:inline-block;max-width:100%;
      box-shadow:0 4px 24px rgba(0,0,0,.4)}
    .card-video-vname{font-size:clamp(1.1rem,5vw,1.7rem);font-weight:900;color:#fff;
      text-shadow:0 1px 6px rgba(0,0,0,.7);line-height:1.1;margin-bottom:4px}
    .card-video-vjob{font-size:.8rem;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.03em}
    .card-video-vco{font-size:.62rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;
      color:rgba(255,255,255,.5);margin-top:4px}
    .card-video-qr-ov{display:none;position:absolute;
      bottom:calc(env(safe-area-inset-bottom,0px) + 120px);right:16px;
      z-index:3;background:rgba(8,12,30,.76);backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);
      border-radius:10px;padding:6px}

    #cardPreview.video-mode .card-inner{display:none}
    #cardPreview.video-mode .card-watermark{display:none}
    #cardPreview.video-mode .card-video-el{display:block}
    #cardPreview.video-mode .card-video-overlay{display:flex}
    #cardPreview.video-mode .card-video-qr-ov{display:block}

    /* ── Action buttons overlay at bottom ── */
    .card-actions{
      position:absolute;bottom:0;left:0;right:0;z-index:20;
      padding:18px 20px calc(env(safe-area-inset-bottom,0px) + 14px);
      background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.65) 55%,transparent 100%);
      display:none;gap:10px;
    }
    .cv-btn{
      flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:13px 12px;border-radius:14px;
      font-size:.83rem;font-weight:700;font-family:inherit;
      cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid;
    }
    .cv-btn svg{width:15px;height:15px;flex-shrink:0}
    .cv-btn-vcf{background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.35);color:#22d3ee}
    .cv-btn-vcf:hover{background:rgba(34,211,238,.22);border-color:rgba(34,211,238,.55)}
    .cv-btn-create{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);color:#8892b8}
    .cv-btn-create:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.25);color:#e8e8ff}

    /* ── Permanent branded gradient border ── */
    .card-brand-border{position:absolute;inset:0;z-index:30;pointer-events:none;border-radius:20px;padding:5px;background:linear-gradient(135deg,#22d3ee,#a855f7,#ec4899,#22d3ee);background-size:300% 300%;animation:brandBorderFlow 4s linear infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude}
    @keyframes brandBorderFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

    /* ── Card audio bar ── */
    #cvAudioBar{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 72px);z-index:22;display:none;align-items:center;gap:10px;padding:10px 16px;background:rgba(7,11,24,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(34,211,238,.18)}
    .cv-audio-btn{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);border-radius:50%;cursor:pointer;color:#22d3ee;transition:background .2s;padding:0}
    .cv-audio-btn:hover,.cv-audio-btn:active{background:rgba(34,211,238,.22)}
    .cv-audio-btn svg{width:14px;height:14px}
    .cv-audio-track{flex:1;min-width:0;font-size:.7rem;font-weight:700;color:#22d3ee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.03em}

    /* ── BizForce watermark ── */
    .page-watermark{
      position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:25;
      font-size:.44rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
      color:rgba(255,255,255,.14);white-space:nowrap;pointer-events:none;
    }
  </style>
</head>
<body>
<div id="cardViewport">

  <!-- Loading -->
  <div id="stateLoading" class="state-wrap">
    <div class="spinner"></div>
    <div class="state-msg">Loading card…</div>
  </div>

  <!-- Error -->
  <div id="stateError" class="state-wrap" style="display:none">
    <div class="state-err-ico">🪪</div>
    <div class="state-err-title">Card not found</div>
    <div class="state-msg">This link may be invalid or the card was removed.</div>
  </div>

  <!-- Card preview — edge to edge -->
  <div id="cardPreview" data-theme="dark">
    <div id="cvBgLayer" class="card-bg-layer"></div>
    <div class="card-inner">
      <div class="card-top-row">
        <div class="card-company" id="pCompany"></div>
        <div>
          <div class="card-qr-wrap">
            <canvas id="qrCanvas" width="80" height="80"></canvas>
          </div>
          <div class="card-qr-label">Scan to connect</div>
        </div>
      </div>
      <div class="card-name-block">
        <div class="card-name" id="pName"></div>
        <div class="card-job"  id="pTitle"></div>
      </div>
      <div class="card-contacts-block">
        <div class="card-contact-line" id="pEmail"></div>
        <div class="card-contact-line" id="pPhone"></div>
        <div class="card-contact-line" id="pWebsite"></div>
      </div>
    </div>
    <div class="card-watermark">BIZFORCE AI</div>
    <video class="card-video-el" id="cardVideo" autoplay loop muted playsinline></video>
    <div class="card-video-overlay">
      <div class="card-video-grad"></div>
      <div class="card-video-text">
        <div class="card-video-glass">
          <div class="card-video-vname" id="pvName"></div>
          <div class="card-video-vjob"  id="pvJob"></div>
          <div class="card-video-vco"   id="pvCompany"></div>
        </div>
      </div>
    </div>
    <div class="card-video-qr-ov">
      <canvas id="qrVideoCanvas" width="52" height="52"></canvas>
    </div>
    <audio id="cvAudio" preload="none"></audio>
    <div id="cvAudioBar">
      <button class="cv-audio-btn" id="cvAudioBtn" onclick="toggleCvAudio()">
        <svg id="cvAudioPlayIco" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="cvAudioPauseIco" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <div class="cv-audio-track" id="cvAudioTrack">Audio Track</div>
    </div>
    <div class="card-brand-border"></div>
  </div>

  <!-- Action buttons pinned to bottom -->
  <div class="card-actions" id="cardActions">
    <button class="cv-btn cv-btn-vcf" onclick="saveContact()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Save Contact
    </button>
    <a class="cv-btn cv-btn-create" href="https://bizforceai.net/digital-cards.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="9" x2="12" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      Create Your Own
    </a>
  </div>

  <div class="page-watermark">BIZFORCE AI</div>
</div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var cardData = null;

var THEME_QR = {
  dark:     { dark: "#e8e8ff", light: "#070b18" },
  midnight: { dark: "#e8e8ff", light: "#0f1729" },
  forest:   { dark: "#e8e8ff", light: "#061a12" },
  ember:    { dark: "#e8e8ff", light: "#1a0a06" }
};

function buildVCard(c) {
  return [
    "BEGIN:VCARD", "VERSION:3.0",
    "FN:"    + (c.full_name || ""),
    "TITLE:" + (c.job_title || ""),
    "ORG:"   + (c.company   || ""),
    c.phone   ? "TEL:"   + c.phone   : "",
    c.email   ? "EMAIL:" + c.email   : "",
    c.website ? "URL:"   + c.website : "",
    "END:VCARD"
  ].filter(Boolean).join("\n");
}

function renderCard(c) {
  var theme = c.theme || "dark";
  var card  = document.getElementById("cardPreview");
  card.dataset.theme = theme;

  if (c.holographic_style) { card.classList.add("holographic"); }
  if (c.media_layout && c.media_layout.orientation === "vertical") {
    card.classList.add("orient-vertical");
  }
  if (c.bg_image_url) {
    var bgLayer = document.getElementById("cvBgLayer");
    bgLayer.style.backgroundImage = "url(" + c.bg_image_url + ")";
    bgLayer.style.display = "block";
  }

  document.getElementById("pCompany").textContent = (c.company || "").toUpperCase();
  document.getElementById("pName").textContent    = c.full_name || "";
  document.getElementById("pTitle").textContent   = c.job_title || "";
  document.getElementById("pEmail").textContent   = c.email   || "";
  document.getElementById("pPhone").textContent   = c.phone   || "";
  var ws = (c.website || "").replace(/^https?:\/\//, "");
  document.getElementById("pWebsite").textContent = ws;

  var vcard  = buildVCard(c);
  var colors = THEME_QR[theme] || THEME_QR.dark;
  QRCode.toCanvas(document.getElementById("qrCanvas"), vcard || "BizForce AI", {
    width: 80, margin: 1, errorCorrectionLevel: "M",
    color: { dark: colors.dark, light: colors.light }
  }, function() {});
  QRCode.toCanvas(document.getElementById("qrVideoCanvas"), vcard || "BizForce AI", {
    width: 52, margin: 1, errorCorrectionLevel: "M",
    color: { dark: "#ffffff", light: "rgba(0,0,0,0)" }
  }, function() {});

  if (c.video_url) {
    document.getElementById("cardVideo").src = c.video_url;
    document.getElementById("pvName").textContent    = c.full_name || "";
    document.getElementById("pvJob").textContent     = c.job_title || "";
    document.getElementById("pvCompany").textContent = (c.company  || "").toUpperCase();
    card.classList.add("video-mode");
  }

  if (c.audio_url) {
    var ml = c.media_layout || {};
    document.getElementById("cvAudio").src = c.audio_url;
    document.getElementById("cvAudioTrack").textContent = ml.audio_track_name || "Audio Track";
    document.getElementById("cvAudioBar").style.display = "flex";
  }

  document.getElementById("stateLoading").style.display = "none";
  card.style.display = "block";
  document.getElementById("cardActions").style.display = "flex";
}

function toggleCvAudio() {
  var audio = document.getElementById("cvAudio");
  if (audio.paused) {
    audio.play().catch(function() {});
    document.getElementById("cvAudioPlayIco").style.display = "none";
    document.getElementById("cvAudioPauseIco").style.display = "";
  } else {
    audio.pause();
    document.getElementById("cvAudioPlayIco").style.display = "";
    document.getElementById("cvAudioPauseIco").style.display = "none";
  }
}

function saveContact() {
  if (!cardData) return;
  var blob = new Blob([buildVCard(cardData)], { type: "text/vcard" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (cardData.full_name || "contact").replace(/\s+/g, "_") + ".vcf";
  a.click();
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
}

(async function() {
  var token = new URLSearchParams(window.location.search).get("token");
  if (!token) {
    document.getElementById("stateLoading").style.display = "none";
    document.getElementById("stateError").style.display   = "block";
    return;
  }
  try {
    var res = await fetch(API_URL + "/api/cards/share/" + encodeURIComponent(token));
    if (!res.ok) throw new Error("not found");
    var d = await res.json();
    cardData = d.card;
    renderCard(cardData);
  } catch(e) {
    document.getElementById("stateLoading").style.display = "none";
    document.getElementById("stateError").style.display   = "block";
  }
})();
</script>
</body>
</html>
