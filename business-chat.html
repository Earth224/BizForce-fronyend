<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizForce AI — Business Chat</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("/app.html");})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: #e8e8ff;
      background: #070b18;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 229, 255, 0.14), transparent 38%),
        radial-gradient(circle at 85% 90%, rgba(168, 85, 247, 0.18), transparent 40%),
        #070b18;
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid rgba(0, 229, 255, 0.25);
      background: rgba(12, 18, 38, 0.6);
      color: #22d3ee;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.25s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .back-link:hover {
      border-color: rgba(0, 229, 255, 0.55);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
      transform: translateY(-1px);
    }

    .brand-badge {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .agent-header {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .agent-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 229, 255, 0.18), rgba(168, 85, 247, 0.22));
      border: 2px solid rgba(0, 229, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(0, 229, 255, 0.18), 0 0 32px rgba(168, 85, 247, 0.12);
      flex-shrink: 0;
    }

    .agent-avatar svg {
      width: 34px;
      height: 34px;
      opacity: 0.85;
    }

    .agent-header-text { flex: 1; min-width: 220px; }

    .agent-title {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00e5ff 0%, #7b2ff7 60%, #a855f7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .agent-subtitle {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #8892b8;
    }
  </style>
</head>
<body>
  <div class="page">

    <nav class="top-nav">
      <a class="back-link" href="/dashboard.html">&#8592; Dashboard</a>
      <span class="brand-badge">BizForce AI</span>
    </nav>

    <header class="agent-header">
      <div class="agent-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="agent-header-text">
        <h1 class="agent-title">Business Chat</h1>
        <p class="agent-subtitle">Your business-aware AI guide.</p>
      </div>
    </header>

    <style>
      .chat-msg {
        max-width: 78%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 0.92rem;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .chat-msg-user {
        align-self: flex-end;
        background: linear-gradient(135deg, rgba(6,182,212,0.18), rgba(139,92,246,0.18));
        border: 1px solid rgba(0, 229, 255, 0.25);
        color: #e8e8ff;
      }
      .chat-msg-assistant {
        align-self: flex-start;
        background: rgba(8, 12, 28, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #ccd0e8;
      }
    </style>

    <script>
      var API = "https://dynamic-prosperity-production-5382.up.railway.app";

      function addMessage(role, content) {
        var el = document.createElement("div");
        el.className = "chat-msg " + (role === "user" ? "chat-msg-user" : "chat-msg-assistant");
        el.textContent = content;
        document.getElementById("chatMessages").appendChild(el);
        var box = document.getElementById("chatMessages");
        box.scrollTop = box.scrollHeight;
        return el;
      }

      function sendMessage() {
        var input = document.getElementById("chatInput");
        var btn   = document.getElementById("chatSendBtn");
        var text  = input.value.trim();
        if (!text) return;

        addMessage("user", text);
        input.value = "";
        btn.disabled = true;
        btn.textContent = "Sending…";

        var thinkingEl = addMessage("assistant", "Thinking…");

        fetch(API + "/api/business-chat", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + (localStorage.getItem("bf_token") || ""),
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (thinkingEl && thinkingEl.parentNode) thinkingEl.parentNode.removeChild(thinkingEl);
          addMessage("assistant", data.reply || "No response received.");
          btn.disabled = false;
          btn.textContent = "Send";
        })
        .catch(function() {
          if (thinkingEl && thinkingEl.parentNode) thinkingEl.parentNode.removeChild(thinkingEl);
          addMessage("assistant", "Sorry, something went wrong. Try again.");
          btn.disabled = false;
          btn.textContent = "Send";
        });
      }

      function loadHistory() {
        try {
          fetch(API + "/api/business-chat", {
            headers: { "Authorization": "Bearer " + (localStorage.getItem("bf_token") || "") }
          })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) {
            if (!data || !Array.isArray(data.messages)) return;
            data.messages.forEach(function(msg) {
              addMessage(msg.role, msg.content);
            });
          })
          .catch(function() {});
        } catch (e) {}
      }

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("chatSendBtn").addEventListener("click", sendMessage);
        document.getElementById("chatInput").addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
        loadHistory();
      });
    </script>

    <div id="chatBody">

      <div id="chatMessages" style="
        min-height: 420px;
        max-height: 560px;
        overflow-y: auto;
        padding: 24px;
        border-radius: 20px;
        background: rgba(12, 18, 38, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 16px;
      "></div>

      <div style="display: flex; gap: 10px; align-items: stretch;">
        <input
          id="chatInput"
          type="text"
          placeholder="Ask your business guide anything..."
          style="
            flex: 1;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            background: rgba(8, 12, 28, 0.9);
            color: #e8e8ff;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
          "
        />
        <button
          id="chatSendBtn"
          type="button"
          style="
            padding: 14px 26px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
            color: #fff;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(0, 198, 255, 0.25);
            white-space: nowrap;
          "
        >Send</button>
      </div>

    </div>

  </div>
</body>
</html>
