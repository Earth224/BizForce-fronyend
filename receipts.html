<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizForce AI — Receipts</title>
  <script>(function(){var t=localStorage.getItem("bf_token");if(!t)window.location.replace("app.html");})();</script>
  <link rel="stylesheet" href="/css/bizforce-ui.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#e8e8ff;background:#070b18}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(0,229,255,.14),transparent 38%),radial-gradient(circle at 85% 90%,rgba(168,85,247,.18),transparent 40%),#070b18;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 24px 80px}
    .top-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:48px;flex-wrap:wrap}
    .back-link{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;border:1px solid rgba(0,229,255,.25);background:rgba(12,18,38,.6);color:#22d3ee;text-decoration:none;font-size:.875rem;font-weight:600;transition:all .25s;backdrop-filter:blur(12px)}
    .back-link:hover{border-color:rgba(0,229,255,.55);box-shadow:0 0 20px rgba(0,229,255,.18)}
    .back-link svg{width:16px;height:16px;flex-shrink:0}
    .brand-badge{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(90deg,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero{text-align:center;margin-bottom:40px}
    .hero-eyebrow{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(168,85,247,.3);background:rgba(168,85,247,.08);color:#a855f7;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px}
    .hero-title{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#00e5ff 0%,#7b2ff7 60%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero-sub{margin:0;color:#8892b8;font-size:1rem;line-height:1.6}
    .txn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
    .txn-card{background:rgba(10,15,35,.82);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:12px;transition:all .25s}
    .txn-card:hover{border-color:rgba(168,85,247,.28);transform:translateY(-2px);box-shadow:0 0 28px rgba(168,85,247,.1)}
    .txn-type-tag{font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;border:1px solid;width:fit-content}
    .txn-type-order{color:#34d399;background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.25)}
    .txn-type-wallet{color:#22d3ee;background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.25)}
    .txn-type-donation{color:#fbbf24;background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.25)}
    .txn-title{font-size:1rem;font-weight:800;color:#f4f7ff;margin:0;line-height:1.3}
    .txn-amount-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
    .txn-amount{font-size:1.15rem;font-weight:800;color:#34d399}
    .txn-role{font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8892b8}
    .txn-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto;padding-top:4px}
    .txn-date{font-size:.7rem;color:#4a5280}
    .btn-sm{padding:7px 14px;border-radius:10px;font-size:.78rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;border:1px solid}
    .btn-receipt{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.35);color:#a855f7}
    .btn-receipt:hover{background:rgba(168,85,247,.2)}
    .empty-msg{text-align:center;padding:64px 24px;color:#8892b8;font-size:.9rem;line-height:1.7}
    .loading{text-align:center;padding:64px 24px;color:#8892b8}
    .toast{position:fixed;bottom:28px;right:28px;z-index:300;padding:14px 22px;border-radius:12px;font-size:.875rem;font-weight:600;backdrop-filter:blur(12px);transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none}
    .toast.show{transform:translateY(0);opacity:1}
    .toast-success{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.4);color:#34d399}
    .toast-error{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);color:#f87171}
  </style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <a href="dashboard.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Executive HQ
    </a>
    <span class="brand-badge">BizForce AI</span>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">TRANSACTIONS</div>
    <h1 class="hero-title">Receipts</h1>
    <p class="hero-sub">Official receipts for every BizForce transaction.</p>
  </div>

  <div class="txn-grid" id="txnGrid"><div class="loading">Loading transactions...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_URL = "https://dynamic-prosperity-production-5382.up.railway.app";
var token = localStorage.getItem("bf_token");
var currentUserId = (function() {
  try { return JSON.parse(atob(token.split(".")[1])).id; } catch(e) { return null; }
})();

var allTransactions = [];

function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatOrderAmount(o) {
  var isUsd = o.payment_method === "usd" || (o.amount_usd !== null && o.amount_usd !== undefined);
  return isUsd ? ("$" + ((o.amount_usd || 0) / 100).toFixed(2)) : (o.amount_bfc || 0).toLocaleString() + " BFC";
}

function normalizeOrders(orders) {
  return (orders || []).map(function(o) {
    return {
      type: "order",
      id: o.id,
      title: o.listing_title || "Marketplace Order",
      amount: formatOrderAmount(o),
      created_at: o.created_at,
      isPayer: o.buyer_id === currentUserId,
      raw: o
    };
  });
}

function normalizeWallet(transactions) {
  return (transactions || []).map(function(t) {
    return {
      type: "wallet",
      id: t.id,
      title: t.description || "Wallet Transaction",
      amount: (t.amount || 0).toLocaleString() + " BFC",
      created_at: t.created_at,
      isPayer: t.type === "debit",
      raw: t
    };
  });
}

function normalizeDonations(donations) {
  return (donations || []).map(function(d) {
    return {
      type: "donation",
      id: d.id,
      title: "Donation: " + (d.campaign_title || "Campaign"),
      amount: (d.amount_bfc || 0).toLocaleString() + " BFC",
      created_at: d.created_at,
      isPayer: d.donor_id === currentUserId,
      raw: d
    };
  });
}

async function loadTransactions() {
  try {
    var [resOrders, resWallet, resDonations] = await Promise.all([
      fetch(API_URL + "/api/marketplace/orders", { headers: { "Authorization": "Bearer " + token } }),
      fetch(API_URL + "/api/wallet", { headers: { "Authorization": "Bearer " + token } }),
      fetch(API_URL + "/api/crowdfunding/donations", { headers: { "Authorization": "Bearer " + token } })
    ]);

    var orders = resOrders.ok ? (await resOrders.json()).orders : [];
    var wallet = resWallet.ok ? (await resWallet.json()).transactions : [];
    var donations = resDonations.ok ? (await resDonations.json()).donations : [];

    allTransactions = normalizeOrders(orders)
      .concat(normalizeWallet(wallet))
      .concat(normalizeDonations(donations));

    allTransactions.sort(function(a, b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });

    renderGrid();
  } catch (e) {
    document.getElementById("txnGrid").innerHTML = '<div class="empty-msg">Unable to load transactions. Please try again.</div>';
  }
}

function renderGrid() {
  var grid = document.getElementById("txnGrid");
  if (!allTransactions.length) {
    grid.innerHTML = '<div class="empty-msg">No transactions yet.</div>';
    return;
  }
  grid.innerHTML = allTransactions.map(function(txn, idx) { return renderCard(txn, idx); }).join("");
}

function renderCard(txn, idx) {
  var typeLabel = { order: "Order", wallet: "Wallet", donation: "Donation" }[txn.type];
  var date = new Date(txn.created_at).toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"});
  var roleLabel = txn.isPayer ? "You Paid" : "You Received";
  return '<div class="txn-card">' +
    '<span class="txn-type-tag txn-type-' + txn.type + '">' + typeLabel + '</span>' +
    '<h3 class="txn-title">' + escapeHtml(txn.title) + '</h3>' +
    '<div class="txn-amount-row">' +
      '<span class="txn-amount">' + escapeHtml(txn.amount) + '</span>' +
      '<span class="txn-role">' + roleLabel + '</span>' +
    '</div>' +
    '<div class="txn-footer">' +
      '<span class="txn-date">' + date + '</span>' +
      '<button class="btn-sm btn-receipt" onclick="openReceiptByIndex(' + idx + ')">View Receipt</button>' +
    '</div>' +
  '</div>';
}

function openReceiptByIndex(idx) {
  var txn = allTransactions[idx];
  if (!txn) return;
  openReceipt(txn.type, txn.id, txn.type === "wallet" ? txn.raw : null);
}

function formatReceiptDate(iso) {
  return new Date(iso).toLocaleDateString("en-US", {month:"long",day:"numeric",year:"numeric"});
}

function receiptRow(label, value) {
  return '<div class="receipt-row"><span class="receipt-label">' + escapeHtml(label) + '</span><span class="receipt-value">' + escapeHtml(value == null || value === "" ? "—" : String(value)) + '</span></div>';
}

function buildReceiptHtml(txnType, record) {
  var receiptId = record.id;
  var date = formatReceiptDate(record.created_at);

  var transactionRows = "";
  if (txnType === "order") {
    transactionRows =
      receiptRow("Item", record.listing_title || "Marketplace Order") +
      receiptRow("Buyer ID", record.buyer_id) +
      receiptRow("Seller ID", record.seller_id) +
      receiptRow("Amount", formatOrderAmount(record)) +
      receiptRow("Status", record.status) +
      (record.stripe_session_id ? receiptRow("Stripe Session", record.stripe_session_id) : "");
  } else if (txnType === "wallet") {
    transactionRows =
      receiptRow("Type", record.type) +
      receiptRow("Description", record.description) +
      receiptRow("Amount", (record.amount || 0).toLocaleString() + " BFC");
  } else if (txnType === "donation") {
    transactionRows =
      receiptRow("Campaign", record.campaign_title) +
      receiptRow("Donor ID", record.donor_id) +
      receiptRow("Owner ID", record.owner_id) +
      receiptRow("Amount", (record.amount_bfc || 0).toLocaleString() + " BFC");
  }

  return '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>' +
    '<title>BizForce AI — Receipt</title>' +
    '<style>' +
      '*,*::before,*::after{box-sizing:border-box}' +
      'body{background:#fff;color:#111;font-family:Georgia,"Times New Roman",serif;margin:0;padding:0}' +
      '.print-toolbar{position:sticky;top:0;background:#f4f4f4;border-bottom:1px solid #ccc;padding:12px 24px;text-align:right;z-index:10}' +
      '.print-btn{background:#111;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:.9rem;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;cursor:pointer}' +
      '.print-btn:hover{background:#333}' +
      '.receipt-wrap{max-width:800px;margin:0 auto;padding:48px 40px 80px}' +
      '.receipt-header{text-align:center;margin-bottom:24px}' +
      '.receipt-brand{font-size:1.6rem;margin:0 0 6px;font-weight:700}' +
      '.receipt-kind{font-size:.85rem;letter-spacing:.16em;text-transform:uppercase;color:#555;margin:0}' +
      'hr.rule{border:none;border-top:2px solid #111;margin:24px 0}' +
      '.meta-line{font-size:.85rem;color:#444;text-align:center;margin-bottom:32px}' +
      '.section{margin-bottom:28px}' +
      '.section-title{font-size:1rem;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #ccc;padding-bottom:6px;margin-bottom:14px}' +
      '.receipt-row{display:flex;justify-content:space-between;gap:16px;font-size:.95rem;line-height:1.8;margin:6px 0}' +
      '.receipt-label{font-weight:700}' +
      '.receipt-value{text-align:right;word-break:break-word}' +
      '.footer-disclaimer{margin-top:60px;font-size:.72rem;color:#888;text-align:center;line-height:1.6}' +
      '@media print{.print-toolbar{display:none}body{padding:0}}' +
    '</style></head><body>' +
    '<div class="print-toolbar"><button class="print-btn" onclick="window.print()">Print / Save as PDF</button></div>' +
    '<div class="receipt-wrap">' +
      '<div class="receipt-header">' +
        '<h1 class="receipt-brand">BizForce AI</h1>' +
        '<p class="receipt-kind">Official Receipt</p>' +
      '</div>' +
      '<hr class="rule">' +
      '<p class="meta-line">Receipt ID: ' + escapeHtml(receiptId) + ' &nbsp;|&nbsp; Date: ' + escapeHtml(date) + '</p>' +
      '<div class="section">' +
        '<h2 class="section-title">Transaction</h2>' +
        transactionRows +
      '</div>' +
      '<p class="footer-disclaimer">This is an official record of a transaction conducted on the BizForce AI platform.</p>' +
    '</div>' +
    '</body></html>';
}

async function openReceipt(txnType, txnId, preloadedData) {
  try {
    var record;
    if (txnType === "wallet") {
      record = preloadedData;
      if (!record) { showToast("Unable to load receipt", "error"); return; }
    } else {
      var endpoint = txnType === "order" ? "/api/marketplace/orders/" : "/api/crowdfunding/donations/";
      var res = await fetch(API_URL + endpoint + txnId, { headers: { "Authorization": "Bearer " + token } });
      if (!res.ok) { showToast("Unable to load receipt", "error"); return; }
      var d = await res.json();
      record = txnType === "order" ? d.order : d.donation;
    }

    var win = window.open("", "_blank");
    if (!win) { showToast("Please allow pop-ups to view the receipt", "error"); return; }

    var html = buildReceiptHtml(txnType, record);

    win.document.open();
    win.document.write(html);
    win.document.close();
  } catch (e) {
    showToast("Unable to open receipt", "error");
  }
}

function showToast(msg, type) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast toast-" + type + " show";
  setTimeout(function() { el.classList.remove("show"); }, 3200);
}

loadTransactions();
</script>
<script src="/scripts/termaximus-presence.js"></script>
<script src="/scripts/termaximus-guide.js"></script>
</body>
</html>
